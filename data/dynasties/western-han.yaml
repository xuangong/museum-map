id: western-han
name: 西汉（公元前202年—公元9年）
period: 公元前202年—公元9年
order_index: 6
overview: |-
  西汉是中国历史上第一个长期稳定的大一统帝国，奠定了"汉族""汉字""汉文化"的命名基础。刘邦（汉高祖）在楚汉争霸中击败项羽后建国，定都长安。西汉前期实行黄老无为之治，与民休息，经济迅速恢复。文帝和景帝的"文景之治"积累了大量国力，为汉武帝的扩张奠定了基础。

  汉武帝是西汉最具影响力的皇帝。他"罢黜百家，独尊儒术"，确立儒家作为官方意识形态的地位；设立太学，建立察举制（选拔人才的制度）；派张骞出使西域，开辟丝绸之路；多次北击匈奴，将帝国疆域扩展到前所未有的范围。然而武帝晚年穷兵黩武、好大喜功，导致国力损耗，晚年下"轮台罪己诏"反思。

  西汉后期外戚专权日益严重，最终王莽以"禅让"形式篡汉建新（公元9年）。西汉的制度遗产——郡国并行制到郡县制的过渡、儒家官僚体系、丝绸之路贸易——深刻影响了此后中国历史的走向。
culture:
  - category: 《史记》
    description: 司马迁著，130篇，开创纪传体史学传统
  - category: 儒学官方化
    description: 设太学、置五经博士，建立以经学为核心的教育和选官体系
  - category: 造纸术萌芽
    description: 西汉已有原始纸张（放马滩纸等），早于蔡伦改进
  - category: 丝绸之路
    description: 东西方贸易和文化交流通道，丝绸、漆器西传，西域良种和音乐东来
  - category: 天文历法
    description: 落下闳制定《太初历》，确立以正月为岁首
  - category: 数学
    description: 《周髀算经》《九章算术》（部分内容成于西汉）
  - category: 文学
    description: 汉赋（司马相如《子虚赋》《上林赋》）、乐府诗
  - category: 建筑
    description: 长安城面积36平方公里，是当时世界最大城市之一
  - category: 医学
    description: 《黄帝内经》成书（部分），奠定中医理论基础
