id: eastern-zhou
name: 东周：春秋与战国（公元前770年—前221年）
period: 公元前770年—前221年
order_index: 4
overview: |-
  东周是中国历史上最动荡也最精彩的时期，分为春秋（前770—前476年）和战国（前475—前221年）两段。周天子名义上仍是天下共主，但实际权力落入各路诸侯手中。春秋时期"礼崩乐坏"，齐桓公、晋文公等五霸先后称雄，大国以"尊王攘夷"为名行争霸之实。战国时期，兼并战争白热化，七雄（齐楚燕韩赵魏秦）逐鹿中原，最终秦国横扫六国，统一天下。

  这五百多年的乱世恰恰是中华文明的轴心时代。百家争鸣产生了孔子、老子、墨子、孟子、庄子、荀子、韩非子等伟大思想家，他们的思想塑造了中国此后两千年的精神世界。儒家重仁义礼乐，道家崇自然无为，墨家讲兼爱非攻，法家主赏罚严明——这场思想大爆炸与古希腊哲学、古印度佛教同属雅斯贝尔斯所说的"轴心时代"。

  技术层面，铁器和牛耕的推广引发了农业革命，都江堰、郑国渠等大型水利工程改变了经济版图。各国纷纷变法图强（李悝变法、商鞅变法等），从贵族分封制向官僚郡县制转变，为秦统一后的帝国制度奠定了基础。
culture:
  - category: 百家争鸣
    description: 儒、道、墨、法、名、兵、农、阴阳等学派并起，中国哲学的黄金时代
  - category: 文学
    description: 《诗经》编定、《楚辞》创作、诸子散文（《论语》《孟子》《庄子》《韩非子》等）
  - category: 军事理论
    description: 《孙子兵法》《吴子兵法》等，对世界军事思想影响深远
  - category: 铁器革命
    description: 铁制农具和兵器普及，生产力大幅提升
  - category: 水利工程
    description: 都江堰（李冰父子，前256年）、郑国渠、芍陂
  - category: 城市兴起
    description: 临淄、邯郸、大梁等都城人口达数十万
  - category: 天文历法
    description: 甘德、石申的恒星观测记录，《甘石星经》
  - category: 医学
    description: 扁鹊开创望闻问切诊法
  - category: 货币
    description: 各国铸币（布币、刀币、蚁鼻钱、圜钱），商品经济发展
