id: shang
name: 商朝（约公元前1600年—前1046年）
period: 约公元前1600年—前1046年
order_index: 2
overview: |-
  商朝是中国第一个有直接文字记载的王朝，也是中国青铜文明的巅峰时代。殷墟甲骨文的发现不仅证实了《史记》中商王世系的基本可靠性，更让我们直接"听到"了三千多年前商人的声音——他们的占卜、祭祀、战争和日常生活。商朝以安阳殷墟为晚期都城，统治核心在今河南、河北、山东一带，影响力远及长江流域。

  商代最令人震撼的成就是青铜铸造。以后母戊鼎为代表的大型青铜礼器，不仅体量惊人（重达832.84公斤），而且采用复杂的块范法铸造，工艺水平在当时的世界首屈一指。商人的宗教世界以祖先崇拜和占卜为核心，甲骨文记录的内容从军事行动到天气预报，从疾病诊断到生育预测，无所不包。

  商代社会已高度分化，王室贵族拥有大量殉葬品（包括人殉），妇好墓的发现展示了一位集军事统帅、祭司、王后于一身的传奇女性。商朝后期政治腐败，纣王暴虐失政，最终在牧野之战中被周武王联军击败。
culture:
  - category: 甲骨文
    description: 中国最早的成熟文字系统，已识别约1500字（总计约4500个不同字符），记录在龟甲和牛骨上
  - category: 青铜铸造
    description: 块范法（piece-mold）技术独步世界，不同于西方的失蜡法，可铸造超大型器物
  - category: 历法与天文
    description: 使用干支纪日，甲骨文中有日食、月食记录
  - category: 音乐
    description: 殷墟出土编铙、石磬等乐器，妇好墓出土五件铜铙组成编铙
  - category: 手工业
    description: 除青铜外，玉器、骨器、陶器、漆器工艺均很发达
  - category: 城市规划
    description: 殷墟宫殿区、作坊区、墓葬区分区明确，面积约30平方公里
  - category: 数学与计量
    description: 甲骨文中已有完整的十进制数字系统
events:
