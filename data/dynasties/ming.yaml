id: ming
name: 明朝（公元1368年—1644年）
period: 公元1368年—1644年
order_index: 18
overview: |-
  明朝是中国最后一个由汉人建立的大一统王朝。朱元璋从乞丐、僧人到开国皇帝的传奇经历本身就是中国历史上最精彩的草根逆袭故事。他驱逐蒙元、恢复中华，定都南京，后由其孙建文帝时期，燕王朱棣发动"靖难之役"夺取皇位，迁都北京，形成了此后近五百年（含清代）的北京政治格局。

  明朝前期国力强盛。永乐年间（1403—1424年），郑和七下西洋，率领当时世界上最庞大的舰队远航东南亚、印度洋、东非海岸，展示了中国的海上实力。北京紫禁城、天坛、明十三陵等大型建筑工程在这一时期兴建。明代中后期，商品经济发展，白银大量流入（来自日本和美洲），江南地区出现了资本主义萌芽的讨论（学术上有争议），市民文化繁荣，小说（四大名著中的三部成书于明代）和戏曲蓬勃发展。

  然而明朝中后期的政治痼疾——宦官专权（如魏忠贤）、党争激烈、皇帝怠政（嘉靖、万历数十年不上朝）——逐渐侵蚀了国家机器。加之小冰期导致的气候恶化、李自成农民起义和满清入关，明朝最终在1644年覆灭。
culture:
  - category: 小说
    description: 《三国演义》（罗贯中）、《水浒传》（施耐庵）、《西游记》（吴承恩）、《金瓶梅》
  - category: 戏曲
    description: 昆曲发展成熟，汤显祖《牡丹亭》（"东方莎士比亚"）
  - category: 哲学
    description: 王阳明心学，"知行合一"影响东亚
  - category: 科技
    description: 《本草纲目》（李时珍）、《天工开物》（宋应星）、《农政全书》（徐光启）
  - category: 百科全书
    description: 《永乐大典》22877卷，世界最大的百科全书（多已散佚）
  - category: 瓷器
    description: 景德镇成为全球瓷都，青花瓷、斗彩、五彩等品种辉煌
  - category: 建筑
    description: 北京紫禁城、天坛、明十三陵、南京明孝陵
  - category: 绘画
    description: 吴门画派（沈周、文徵明、唐寅、仇英），文人画传统延续
  - category: 长城
    description: 今天所见的万里长城主体为明长城
