id: eastern-han
name: 东汉（公元25年—220年）
period: 公元25年—220年
order_index: 7
overview: |-
  东汉由光武帝刘秀建立，定都洛阳（因在西汉都城长安之东，故称"东汉"）。刘秀以布衣起兵，历经昆阳之战等关键战役，推翻王莽新朝，恢复汉室，史称"光武中兴"。东汉在政治制度上基本沿袭西汉，但皇权与豪族的关系更加复杂。

  东汉的前半段（25—88年）政治相对稳定，经济恢复，学术繁荣。明帝、章帝时期班固撰成《汉书》，佛教正式传入中国（白马寺建于永平年间）。但从和帝以后，外戚和宦官交替专权成为东汉政治的主题——外戚梁冀、窦宪等权倾一时，宦官势力则在"党锢之祸"中与士大夫激烈对抗。

  184年黄巾起义爆发，虽被镇压但东汉中央政权名存实亡。各地军阀割据，最终形成曹操、刘备、孙权三足鼎立的局面。220年曹丕代汉，东汉灭亡。
culture:
  - category: 造纸术
    description: 蔡伦改良造纸，中国四大发明之一
  - category: 史学
    description: 班固《汉书》开创断代史体例
  - category: 科学
    description: 张衡地动仪、浑天仪；《九章算术》成书
  - category: 医学
    description: 张仲景《伤寒杂病论》、华佗外科手术
  - category: 佛教传入
    description: 白马寺（洛阳）为中国第一座佛寺
  - category: 画像砖/画像石
    description: 四川、山东、河南大量出土，是汉代社会生活的图像百科
  - category: 汉赋→五言诗
    description: 文学从赋体转向五言诗，《古诗十九首》标志五言诗成熟
