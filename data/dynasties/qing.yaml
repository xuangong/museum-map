id: qing
name: 清朝（公元1636年—1912年）
period: 公元1636年—1912年
order_index: 19
overview: |-
  清朝是中国最后一个封建王朝，由满族（女真后裔）建立。1616年努尔哈赤建后金，1636年皇太极改国号为清，1644年入关定鼎北京。清朝前期经历了"康雍乾盛世"（约1662—1795年），是中国帝制时代最后的辉煌：疆域扩展到历史最大（约1300万平方公里），人口从约1.5亿增至约4亿，经济总量占全球三分之一。康熙帝在位61年，平三藩、收台湾、征噶尔丹，被誉为千古一帝之一。

  清朝统治者在维持满族认同（八旗制度、满语、骑射传统）的同时，高度吸收了汉文化：沿用明代政治制度、推崇儒学、编纂《四库全书》和《康熙字典》。然而文字狱和思想控制也达到了中国历史的巅峰。在经济文化繁荣的表面下，清朝中后期逐渐落后于工业革命后的西方世界。

  1840年鸦片战争是清朝命运的转折点。此后百年间，中国经历了前所未有的外患（鸦片战争、甲午战争、八国联军）和内乱（太平天国、捻军、义和团），洋务运动、戊戌变法、清末新政等自救努力均未能挽救王朝。1911年辛亥革命爆发，1912年2月12日溥仪退位，延续两千余年的中国帝制终结。
culture:
  - category: 文学
    description: 《红楼梦》（曹雪芹，中国古典小说巅峰）、《聊斋志异》（蒲松龄）、《儒林外史》（吴敬梓）
  - category: 学术
    description: 考据学（乾嘉学派）、《四库全书》（3503种、79337卷、约8亿字）、《康熙字典》
  - category: 绘画
    description: 四王（正统派）、四僧（石涛、八大山人等个性派）、扬州八怪、郎世宁（中西融合）
  - category: 瓷器
    description: 珐琅彩、粉彩登峰造极，单色釉（郎窑红、霁蓝、秋葵绿）精妙绝伦
  - category: 建筑
    description: 圆明园（"万园之园"，已毁）、避暑山庄、颐和园、布达拉宫扩建
  - category: 工艺美术
    description: 玉雕（大禹治水玉山）、漆器、景泰蓝、织绣达到工艺巅峰
  - category: 戏曲
    description: 京剧在清代成型，成为中国最具代表性的戏曲形式
  - category: 外交与条约体系
    description: 被迫进入近代国际关系体系
