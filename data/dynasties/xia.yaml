id: xia
name: 夏朝（约公元前2070年—前1600年）
period: 约公元前2070年—前1600年
order_index: 1
overview: |-
  夏朝是中国历史上第一个世袭制王朝，由大禹之子启建立，标志着中国从传说中的"禅让制"进入"家天下"时代。夏朝是否真实存在，长期以来是学术界争论的焦点——传世文献（《史记·夏本纪》等）有详细记载，但长期缺乏直接的考古学证据。

  1959年发现的二里头遗址（河南洛阳偃师）被多数学者认为是夏朝中晚期的都城遗址。二里头遗址出土了中国最早的宫殿建筑基址、最早的青铜礼器（爵、鼎）、大型绿松石器作坊，以及具有明确中轴线布局的宫城——这些发现使"夏"从传说走向了考古学可讨论的范畴。

  但需要注意的是，"二里头=夏都"仍非学界共识。部分学者认为二里头可能是早商文化，或横跨夏商之际。这一争论的核心在于：二里头遗址没有出土自证身份的文字资料（如甲骨文），因此无法像殷墟那样直接与文献对应。
culture:
  - category: 青铜冶炼起步
    description: 二里头出土了中国最早的青铜容器（爵、鼎），标志青铜时代开端
  - category: 宫殿建筑
    description: 二里头一号宫殿是中国最早的具有中轴线布局的大型建筑
  - category: 绿松石工艺
    description: 绿松石龙形器（2000余片拼合）代表了极高的手工业组织能力
  - category: 牙璋传播
    description: 二里头文化的牙璋（礼仪用玉器）传播到南中国和越南，反映了广域王权的影响
  - category: 历法
    description: 传说夏朝已有"夏历"（农历前身），"夏小正"记录了一年十二个月的物候
