id: nanbeichao
name: 南北朝（公元420年—589年）
period: 公元420年—589年
order_index: 10
overview: |-
  南北朝是中国历史上民族融合和文化变革最剧烈的时期之一。南方和北方各自经历了多次朝代更替，但总的趋势是：南方汉族政权保存了华夏文化传统，北方鲜卑等民族政权则在汉化中完成了深度融合。

  **南朝**（420—589年）：宋（420—479）→ 齐（479—502）→ 梁（502—557）→ 陈（557—589），均定都建康（南京）。南朝文化艺术繁荣——骈文、山水诗、佛教造像、书法绘画都在这一时期达到高峰。但政治上频繁的禅代和内乱削弱了南方的实力。

  **北朝**（386—581年）：北魏（386—534）→ 东魏/西魏 → 北齐/北周 → 隋。北魏是最重要的北朝政权，由鲜卑拓跋氏建立。孝文帝改革（490年代）是中国历史上最彻底的民族文化融合运动——迁都洛阳、改汉姓、穿汉服、说汉语、与汉族通婚，使鲜卑贵族全面汉化。

  最终，脱胎于北周的隋朝统一了南北，结束了近四百年的分裂。
culture:
  - category: 佛教艺术巅峰
    description: 云冈石窟、龙门石窟、敦煌莫高窟（早期洞窟）、天龙山石窟、响堂山石窟
  - category: 文学
    description: 谢灵运山水诗、庾信骈文、《文心雕龙》（刘勰，文学批评巅峰）、《世说新语》
  - category: 数学
    description: 祖冲之圆周率、《大明历》
  - category: 地理
    description: 郦道元《水经注》
  - category: 农学
    description: 贾思勰《齐民要术》（现存最完整的古代农书）
  - category: 书法
    description: 魏碑（龙门二十品等），方劲雄强，与帖学并为中国书法两大传统
  - category: 民族融合
    description: 鲜卑汉化是中国历史上最成功的民族文化融合案例之一
