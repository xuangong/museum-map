id: western-zhou
name: 西周（约公元前1046年—前771年）
period: 约公元前1046年—前771年
order_index: 3
overview: |-
  西周是中国礼乐文明的奠基时代。周武王灭商后，以镐京（今西安附近）为都，通过分封制将同姓宗亲和功臣分封各地，建立起以血缘为纽带、以等级为秩序的政治体系。周公旦制礼作乐，将政治秩序与道德规范融为一体，形成了影响中国数千年的"礼乐制度"。这套制度的核心理念——天命观、德治、宗法制——成为后世儒家思想的源头。

  西周的青铜器从商代的神秘、狰狞风格转向庄重、典雅，最重要的变化是出现了大量长篇铭文。这些铭文记录了册封、赏赐、诉讼、战争等内容，是极为珍贵的第一手史料，弥补了传世文献的不足。利簋铭文记录了武王伐纣的日期，何尊铭文中首次出现"中国"一词，大盂鼎、毛公鼎等铭文则展示了西周的政治制度和社会生活。

  西周后期，由于王权衰落、戎狄入侵和贵族矛盾激化，幽王烽火戏诸侯（传说色彩浓厚）导致犬戎攻破镐京，幽王被杀，平王东迁洛邑，西周结束。
culture:
  - category: 礼乐制度
    description: 以"礼"规范社会等级（天子九鼎、诸侯七鼎、卿大夫五鼎……），以"乐"调和人际关系
  - category: 宗法制
    description: 嫡长子继承制为核心的家族-政治秩序，影响中国社会至近代
  - category: 分封制
    description: 封建诸侯以藩屏周室，齐鲁晋燕宋等大国均为西周所封
  - category: 金文（铭文）
    description: 西周青铜器铭文篇幅增长，毛公鼎铭文长达497字，是先秦最长金文
  - category: 《诗经》
    description: 收录西周至春秋的诗歌305篇（部分为西周时期作品），是中国最早的诗歌总集
  - category: 天命思想
    description: 提出"天命靡常""以德配天"，为后世政治正当性理论奠基
  - category: 井田制
    description: 土地公有分配制度（理想化程度有争议），影响后世均田思想
