id: sui
name: 隋朝（公元581年—618年）
period: 公元581年—618年
order_index: 11
overview: |-
  隋朝虽然仅存37年，却是中国历史上最重要的过渡性王朝之一——它结束了近四百年的分裂，建立了影响后世千余年的制度框架。

  隋文帝杨坚出身关陇军事贵族集团，以外戚身份代北周而立。589年灭南朝陈，完成统一。隋文帝推行了一系列影响深远的改革：废除九品中正制、创立科举制（开皇七年，587年）、制定《开皇律》、统一度量衡和货币、推行均田制和府兵制。"开皇之治"使全国人口从约3000万增至约4600万，国力空前强盛。

  然而，隋炀帝杨广即位后急功近利——营建东都洛阳、开凿大运河、三征高句丽——这些工程虽然对后世意义重大（尤其大运河），但在短时间内消耗了巨大民力，激起全国性反叛。618年杨广在江都被杀，隋朝灭亡。

  隋朝的命运常被比作秦朝：短命但奠定了此后长期统一王朝（唐朝/汉朝）的制度基础。
culture:
  - category: 科举制创立
    description: 废门阀垄断，以考试选拔人才，影响中国政治千余年
  - category: 大运河
    description: 连接南北的水运大动脉，此后成为中国经济命脉
  - category: 《开皇律》
    description: 奠定唐律基础，影响东亚法律体系
  - category: 建筑
    description: 赵州桥（李春设计，约605年），世界现存最古老的敞肩石拱桥
  - category: 佛教
    description: 天台宗创立（智顗），莫高窟隋代洞窟
