id: song
name: 宋朝（公元960年—1279年）
period: 公元960年—1279年
order_index: 14
overview: |-
  宋朝分为北宋（960—1127年，都开封）和南宋（1127—1279年，都临安/杭州），是中国经济、文化和科技最繁荣的时代之一。赵匡胤"陈桥兵变、黄袍加身"建国后，以"杯酒释兵权"化解武将威胁，确立了"重文抑武"的基本国策。这一政策使宋朝成为中国历史上文人地位最高、市民文化最发达的朝代，但也导致了军事上的长期被动。

  宋代经济高度繁荣，城市商业突破了唐代坊市制的限制，出现了夜市和通宵经营的商业街。北宋开封人口超过百万，是当时世界上最大的城市。世界最早的纸币"交子"在北宋四川出现。海上丝绸之路在宋代达到鼎盛，泉州成为世界最大港口之一。

  文化方面，宋代是中国文人画的成熟期，理学（以朱熹为代表的新儒学）重塑了中国哲学的面貌，宋词（苏轼、李清照、辛弃疾等）与唐诗并称中国文学双峰。科技上，活字印刷术、火药武器和指南针的实用化（"三大发明"的成熟期）改变了世界历史进程。
culture:
  - category: 宋词
    description: 婉约派（柳永、李清照、姜夔）和豪放派（苏轼、辛弃疾）并峙
  - category: 理学（新儒学）
    description: 程颢、程颐、朱熹等建立的哲学体系，融合儒释道，影响东亚数百年
  - category: 绘画
    description: 山水画巅峰（范宽《溪山行旅图》、郭熙《早春图》、马远、夏圭），花鸟画精妙（宋徽宗）
  - category: 瓷器
    description: 五大名窑（汝、官、哥、钧、定），宋瓷以素雅含蓄著称，代表中国陶瓷美学巅峰
  - category: 活字印刷术
    description: 毕昇泥活字，促进知识传播
  - category: 火药武器
    description: 火箭、突火枪、震天雷等，军事技术革新
  - category: 指南针
    description: 用于航海，推动海上贸易
  - category: 建筑
    description: 李诫《营造法式》，中国现存最早的完整建筑技术专著
  - category: 纸币
    description: 北宋交子，世界最早的纸币
  - category: 《资治通鉴》
    description: 司马光主编，294卷编年体通史
