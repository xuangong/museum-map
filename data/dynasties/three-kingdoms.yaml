id: three-kingdoms
name: 三国（公元220年—280年）
period: 公元220年—280年
order_index: 8
overview: |-
  三国是中国历史上最富戏剧性的时期之一。东汉末年群雄割据，最终形成魏（曹操/曹丕）、蜀汉（刘备）、吴（孙权）三足鼎立的格局。虽然三国存续仅六十年，但《三国演义》使其成为中国人最熟悉的历史时期。

  **曹魏**（220—265年）：曹操统一北方后，其子曹丕代汉称帝，定都洛阳。曹魏控制了北方核心区域，经济和人口占优，推行九品中正制（取代汉代察举制），对后世选官制度影响深远。

  **蜀汉**（221—263年）：刘备以汉室宗亲身份在成都称帝，以"兴复汉室"为旗帜。诸葛亮五次北伐未能成功，263年魏灭蜀。蜀汉虽小，但诸葛亮的治蜀方略和"鞠躬尽瘁"的精神成为千古传诵的典范。

  **孙吴**（222—280年）：孙权据江东，依托长江天险和江南经济，偏安东南。吴国对江南地区的开发为后来东晋南朝的繁荣奠定了基础。280年西晋灭吴，三国归于统一。
culture:
  - category: 建安文学
    description: 曹操、曹丕、曹植父子三人引领"建安风骨"，慷慨悲凉
  - category: 九品中正制
    description: 曹魏创立的选官制度，按家世和才能品评人才，后演变为门阀制度
  - category: 青瓷
    description: 三国吴地越窑开始大规模烧造青瓷，是中国成熟瓷器的开端
  - category: 数学
    description: 刘徽注《九章算术》，提出割圆术计算圆周率
