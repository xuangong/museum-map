id: tang
name: 唐朝（公元618年—907年）
period: 公元618年—907年
order_index: 12
overview: |-
  唐朝是中国古代文明的巅峰之一，也是中国历史上最具国际影响力的王朝。李渊建唐后，其子李世民（唐太宗）通过玄武门之变即位，开创了"贞观之治"，以开明的政治、繁荣的经济和开放的文化闻名于世。唐太宗的治国理念——"以人为镜，可以明得失"——和他与魏征的君臣关系，成为后世明君贤臣的典范。

  唐朝最为辉煌的时期是从贞观到开元年间（约627—755年）。唐玄宗的"开元盛世"将唐朝推向经济和文化的顶点：长安城是当时世界上最大的城市（人口约百万），胡商、僧侣、使节从波斯、大食、日本、新罗纷至沓来，丝绸之路贸易空前繁荣。唐诗达到中国古典诗歌的最高峰——李白、杜甫、王维、白居易等大诗人群星闪耀。

  755年安史之乱是唐朝由盛转衰的分水岭。此后藩镇割据、宦官专权、朋党之争三大痼疾困扰着唐朝后半段历史。黄巢起义（875—884年）进一步摧毁了帝国根基，907年朱温篡唐，五代十国的乱世开始。
culture:
  - category: 唐诗
    description: 中国古典诗歌的巅峰，《全唐诗》收录近五万首，李白、杜甫、王维、白居易、李商隐等巨匠辈出
  - category: 书法
    description: 颜真卿（颜体）、柳公权（柳体）、欧阳询（欧体）、张旭（草书）、怀素
  - category: 绘画
    description: 阎立本（《步辇图》《历代帝王图》）、吴道子（画圣）、周昉（仕女画）
  - category: 敦煌莫高窟
    description: 唐代壁画和彩塑达到艺术巅峰，如第220窟、第45窟
  - category: 佛教
    description: 玄奘翻译大量佛经，唯识宗和禅宗在中国定型
  - category: 陶瓷
    description: 唐三彩、越窑青瓷（"千峰翠色"）、邢窑白瓷，"南青北白"格局形成
  - category: 音乐舞蹈
    description: 融合西域和中原音乐，"霓裳羽衣曲"
  - category: 三省六部制
    description: 完善的中央官僚制度——中书省决策、门下省审核、尚书省执行
  - category: 科举制
    description: 在隋代基础上完善，进士科成为主要选官途径
