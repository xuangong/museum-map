recommended_museums:
  - name: 秦始皇帝陵博物院（兵马俑）
    location: 西安临潼
    reason: 世界第八大奇迹，三个俑坑展示约8000个真人大小的陶俑，是理解秦帝国军事力量的最直观方式
  - name: 陕西历史博物馆
    location: 西安
    reason: 秦代文物丰富，包括青铜器、兵器、建筑构件等
  - museum_id: guobo
    name: 中国国家博物馆
    location: 北京
    reason: 收藏秦代度量衡标准器、诏版等重要文物
  - museum_id: hubei
    name: 湖北省博物馆
    location: 武汉
    reason: 睡虎地秦简（1155枚竹简，记录秦律），是了解秦代法律制度的第一手资料
  - name: 湖南省博物馆
    location: 长沙
    reason: 里耶秦简（36000余枚），展示秦代基层行政运作
  - museum_id: 88f42955-6058-485d-95e4-c7711d85d326
    name: 咸阳博物院
    location: 咸阳
    reason: 秦都咸阳遗址出土文物
  - museum_id: gansu
    name: 甘肃省博物馆
    location: 兰州
    reason: 秦代在西北的扩展相关文物
  - name: 宝鸡青铜器博物院
    reason: 早期秦文化（秦公大墓出土品）
