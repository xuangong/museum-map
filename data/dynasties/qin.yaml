id: qin
name: 秦朝（公元前221年—前207年）
period: 公元前221年—前207年
order_index: 5
overview: |-
  秦朝虽然仅存续十五年，却是中国历史最重要的转折点之一。秦始皇嬴政统一六国后，废除分封制，推行郡县制，将权力集中于皇帝一人，创建了延续两千年的中央集权帝国模式。"皇帝"这个称号本身就是秦始皇的发明，取"三皇五帝"之名，意在超越一切前人。

  秦朝的制度创新影响深远：统一文字（小篆）、统一度量衡、统一货币（半两钱）、统一车轨，修建驰道和直道，将战国时期分裂的诸国焊接成一个统一的行政实体。李斯作为丞相，是这些改革的主要执行者。同时，秦始皇兴建了举世闻名的万里长城（连接和扩展战国长城）和骊山陵墓——兵马俑的发现让后世得以一窥秦帝国军事力量的恢弘。

  然而秦朝的严刑峻法、繁重徭役（修长城、建阿房宫、筑骊山陵）和焚书坑儒等文化专制政策激起了广泛的民间反抗。秦始皇驾崩后仅三年，陈胜吴广揭竿而起，项羽刘邦相继崛起，秦朝迅速灭亡。
culture:
  - category: 文字统一
    description: 以小篆为标准字体（后又推行更便捷的隶书），结束六国文字混乱局面
  - category: 法律制度
    description: 睡虎地秦简展示了极为详尽的秦律，涵盖行政、刑事、经济等各方面
  - category: 建筑工程
    description: 长城（连接修缮战国长城）、灵渠（沟通湘江和漓江）、驰道和直道
  - category: 军事
    description: 建立全国统一的征兵和军功爵制度，兵马俑展示了标准化的军事装备
  - category: 度量衡标准化
    description: 统一全国的长度、容量和重量标准，促进经济交流
  - category: 地方行政
    description: 郡县制取代分封制，官僚由中央任命和考核
