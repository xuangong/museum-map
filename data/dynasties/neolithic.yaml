id: neolithic
name: 远古与新石器时代（约公元前10000年—前2070年）
period: 约公元前10000年—前2070年
order_index: 0
overview: |-
  中国的远古与新石器时代是中华文明的孕育期，从约一万年前的农业萌芽到夏朝建立前夕，跨越近八千年。这一时期中国大地上出现了多个相互独立又有交流的文化区系，形成了"满天星斗"式的文明起源格局。苏秉琦提出的"区系类型"理论揭示了这种多元并进的面貌。

  黄河流域的仰韶文化（约前5000—前3000年）以彩陶闻名，半坡遗址展示了早期定居农业村落的完整面貌。随后的龙山文化（约前3000—前2000年）以黑陶和城址为标志，社会分化加剧，已处于文明门槛。长江流域的河姆渡文化（约前5000年）证明了稻作农业的独立起源；良渚文化（约前3300—前2300年）则以大型水利工程、玉礼器系统和古城遗址震惊世界，2019年被列入世界遗产名录。

  东北的红山文化（约前4000—前3000年）以玉龙、女神庙闻名，被认为与早期国家形态有关。此外还有大汶口文化、马家窑文化、屈家岭文化等，共同构成了中华文明多元一体的源头。
culture:
  - category: 农业革命
    description: 独立驯化水稻（长江流域）和粟/黍（黄河流域），是世界农业起源中心之一
  - category: 陶器工艺
    description: 从素面陶到仰韶彩陶、龙山蛋壳黑陶，工艺水平极高；蛋壳黑陶壁厚仅0.2毫米
  - category: 玉器系统
    description: 良渚玉琮、玉璧、玉钺形成完整的礼器体系；红山玉龙成为中华龙文化源头
  - category: 建筑与城市
    description: 良渚古城面积近300万平方米，外围水利系统工程量巨大
  - category: 音乐
    description: 贾湖骨笛（前7000年）可吹奏七声音阶，是世界最早的可吹奏乐器之一
  - category: 纺织与蚕丝
    description: 河姆渡已有原始纺织，良渚出现丝织品残片
  - category: 文字萌芽
    description: 贾湖龟甲刻符、大汶口陶文、良渚刻符等均为文字起源的线索
