artifacts:
  - name: 梁山聚义砖雕
    period: 清代（光绪年间）
    description: 位于正门两侧外墙的大型砖雕，画内建筑物雕工精细、层次分明，为近代罕见之作
  - name: 梧桐杏柳凤凰群砖雕
    period: 清代（光绪年间）
    description: 正门两侧外墙大型砖雕，花鸟题材，凤凰栩栩如生，构图饱满
  - name: 木雕
    period: 清代
    description: 岭南七绝之首，陈家祠梁架、屏门、檐板均以通雕、浮雕相结合，题材涵盖历史故事与山水花鸟
    image_url: /img/wikimedia/wikipedia/commons/7/7d/%E9%99%88%E5%AE%B6%E7%A5%A0%EF%BC%8C%E5%B1%95%E5%93%81%E6%9C%A8%E9%9B%95%E9%97%A8%E6%9D%BF_-_panoramio.jpg?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=original
    image_license: CC-BY-SA-3.0
    image_attribution: zengsx
  - name: 石雕
    period: 清代
    description: 廊柱、月台栏杆等处大量使用，岭南七绝之一
    image_url: /img/268e8a33908885d4.jpg
    image_license: CC-BY-SA-2.0-DE
    image_attribution: The original uploader was Flassig Reiner at German Wikipedia. (Original text:… · CC-BY-SA-2.0-DE · Wikidata Q328325
  - name: 陶塑脊饰
    period: 清代
    description: 屋脊上大型石湾陶塑，人物故事与花鸟瑞兽交织，色彩鲜艳，为岭南建筑装饰精华
  - name: 灰塑
    period: 清代
    description: 墀头、山墙等处灰塑，以矿物颜料着色，历经百年仍色泽鲜明
    image_url: /img/5354be8ad271191c.jpg
    image_license: CC-BY-2.0
    image_attribution: TANAKA Juuyoh (田中十洋) · CC-BY-2.0 · Commons
  - name: 铜铁铸
    period: 清代
    description: 铁栏杆、铜构件等，将实用与装饰融为一体，岭南七绝之一
    image_url: /img/1fb5860d85bf0384.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Huangchenhai · CC-BY-SA-4.0 · Commons
  - name: 彩绘
    period: 清代
    description: 门廊、厅堂满布彩绘，题材从商周到明清经典故事一应俱全
    image_url: /img/a3d6b5c79db18efa.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Patrick20242023 · CC-BY-SA-4.0 · Commons
dynasty_connections:
  - dynasty: 清代（光绪年间）
    description: 由清代广东七十二县陈氏宗族合资兴建，是现存规模最大、保存最完好、装饰最精美的清代岭南祠堂式建筑，集”岭南七绝”建筑装饰工艺之大成
  - dynasty: 民国
    description: 民国期间先后改作文范学校、广东体育专科学校、聚贤中学，是岭南近代教育转型的实物见证
  - dynasty: 中华人民共和国（现当代）
    description: 1959年辟为广东民间工艺馆，1994年正式更名广东民间工艺博物馆，持续征集、研究、展示岭南非物质文化遗产与传统工艺
