id: e275d5c3-b7d6-429e-8825-52f25dbca7c8
name: 陈家祠（陈氏书院）广东民间工艺博物馆
lat: 23.1285
lng: 113.2441
location: 广州市荔湾区中山七路恩龙里34号
level: 国家一级博物馆 · 国家AAAA旅游景区 · 全国重点文物保护单位
core_period: 清代（光绪十四年1888年筹建，光绪十九年1893年落成）
specialty: 岭南广东民间工艺（木雕、砖雕、石雕、陶塑、灰塑、铜铁铸、彩绘"七绝"工艺）
dynasty_coverage: 展藏题材跨越商周至明清；建筑本体为清末岭南祠堂建筑典范
timeline: 1888年：清光绪十四年各县陈氏宗族合议筹建；1893年：清光绪十九年正式落成启用；1905年：废科举后改为陈氏实业学堂；民国期间：先后用作文范学校、广东体育专科学校、聚贤中学；1950年：设广州市行政干部学校；1957年：列为广州市文物保护单位；1959年：辟为广东民间工艺馆（对外开放）；1960年：列为广东省文物保护单位；1988年：列为全国重点文物保护单位；1994年：更名为广东民间工艺博物馆；2016—2021年：建设古建筑安全动态监测系统；2022年：优化提升为文物预防性保护智能监测平台
treasures:
