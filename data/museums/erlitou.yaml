id: erlitou
name: 二里头夏都遗址博物馆
lat: 34.694
lng: 112.683
location: 河南省洛阳市偃师区翟镇镇二里头村
level: 国家一级博物馆（2024年5月认定）
core_period: 夏代中晚期（二里头文化，约前1750-前1530年）
specialty: 二里头遗址被学界称为"最早的中国"，是夏王朝中晚期都城遗址。博物馆占地246亩，总建筑面积3.2万㎡，馆藏文物2000余件。建筑外观暗含"钥匙"形象，寓意二里头是打开中华文明的钥匙。设有五个基本陈列展厅："第一王朝""赫赫夏都""世纪探索"。
dynasty_coverage: 夏代中晚期（二里头文化一至四期，约前1750-前1530年）
timeline: 二里头遗址（约前1750-前1530年）是目前考古学上能确认的最早的具有明确城市规划的都邑遗址。其宫殿区、铸铜作坊、绿松石器作坊等证明了王权和国家机器的存在。二里头文化的辐射范围远超中原，其牙璋传播到南中国和越南，反映了广域王权的影响。
treasures:
  - name: 1. 乳钉纹青铜爵（夏）— "华夏第一爵"
  - name: 高26.5cm
  - name: 中国目前发现最早的青铜容器之一
halls:
  - name: 第一王朝"（夏朝发展脉络）
  - name: 国之大事"（祭祀与战争
  - name: 二里头精品器物）
  - name: 建中立极"（都城环境和手工业）
  - name: 数字馆（全面复原二里头文化面貌）
artifacts:
  - name: 乳钉纹青铜爵
    period: 夏，二里头遗址出土
    description: 高26.5cm，总长31.5cm。束腰平底，三锥足细长，槽状长流，被誉为"华夏第一爵"，是中国目前发现时代最早的青铜容器之一。造型夸张，形态修长，极富美感
  - name: 绿松石龙形器
    period: 夏，高等级贵族墓葬出土
    description: 长64.5cm，由2000余片各种形状的绿松石片拼合而成，每片仅0.2-0.9cm大小，厚约0.1cm。龙身略呈波状，菱形主纹象征鳞纹，白玉为睛。是中国早期龙形象的杰出代表
    image_url: /img/wikimedia/wikipedia/commons/9/99/%E7%BB%BF%E6%9D%BE%E7%9F%B3%E9%BE%99%E5%BD%A2%E5%99%A8.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: 僧盐
  - name: 七孔玉刀
    period: 夏，1975年出土
    description: 长60.4-65cm，宽9.5cm，墨绿色玉料。两面以交叉直线阴纹组成网状和几何图形，刀背有七个等距圆孔。二里头遗址出土最大的玉器
    image_url: /img/wikimedia/wikipedia/commons/c/cd/%E5%A4%8F%E4%B8%83%E5%AD%94%E7%8E%89%E5%88%80%2C_2015-09-23.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Siyuwj
  - name: 网格纹青铜鼎
    period: 夏
    description: 通高20cm，口径15.3cm。造型承自龙山文化陶鼎，但材质为青铜——中国考古发现最早的青铜鼎，是王权礼制萌生的象征
  - name: 镶嵌绿松石兽面纹铜牌饰
    period: 夏
    description: 长16.5cm，宽8-11cm。青铜框架上以数百片绿松石拼合镶嵌兽面纹，历经三四千年无一松动脱落。出土时置于墓主人胸前
    image_url: /img/wikimedia/wikipedia/commons/4/47/%E7%BB%BF%E6%9D%BE%E7%9F%B3%E9%95%B6%E5%B5%8C%E9%9D%92%E9%93%9C%E5%85%BD%E9%9D%A2%E7%89%8C%E9%A5%B0.png
    image_license: PD
    image_attribution: User:Shibo77
  - name: 龙形牙璋
    period: 夏
    description: 长48.1cm，造型精美。牙璋是二里头文化典型的玉礼器，随二里头文化扩张传播到南中国和东南亚
  - name: 铜圆形器
    period: 夏
    description: 直径17cm，周边镶嵌61块绿松石，中间两圈各13个十字形绿松石。有专家认为与夏历历法天数相关
    image_url: https://upload.wikimedia.org/wikipedia/commons/5/55/%E5%9B%9B%E5%B7%9D%E6%88%90%E9%83%BD%E9%87%91%E6%B2%99%E9%81%97%E5%9D%80%E3%80%81%E5%9B%9B%E5%B7%9D%E5%B9%BF%E6%B1%89%E4%B8%89%E6%98%9F%E5%A0%86%E9%81%97%E5%9D%80-%E9%93%9C%E9%B8%9F%E3%80%81%E9%93%9C%E6%96%B9%E5%AD%94%E5%BD%A2%E5%99%A8%E3%80%81%E9%93%9C%E9%B8%9F%E5%BD%A2%E9%A5%B0%E3%80%81%E9%93%9C%E9%BE%99%E5%BD%A2%E9%A5%B0%E3%80%81%E9%93%9C%E8%99%8E%E3%80%81%E5%9C%86%E5%BD%A2%E9%93%9C%E6%8C%82%E9%A5%B0%E3%80%81%E5%85%AB%E8%BE%B9%E5%BD%A2%E9%93%9C%E6%8C%82%E9%A5%B0%E3%80%81%E5%8F%8C%E7%BF%BC%E5%B9%B3%E5%8F%A3%E9%93%9C%E9%93%83.jpg?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=original
    image_license: CC-BY-SA-4.0
    image_attribution: Kcx36
dynasty_connections:
  - dynasty: 城市规划
    description: 二里头是中国最早的具有明确中轴线布局的宫城。宫殿区、手工业作坊区、贵族居住区和一般居住区的分化，说明国家机器已经形成
  - dynasty: 青铜文明起点
    description: 青铜爵和青铜鼎的出土，标志着中国青铜时代的正式开始。铸铜作坊的发现说明二里头掌握了先进的青铜铸造技术
  - dynasty: 绿松石手工业
    description: "绿松石龙形器和铜牌饰等展现了极高的工艺水平，绿松石可能来自远方（甘肃等地），说明二里头有远距离资源调配能力  **与前后文化的关系**: 二里头文化承接龙山文化晚期（如新砦遗址、王湾三期文化），并对后来的偃师商城（早商文化）产生了直接影响。从二里头到殷墟，构成了夏商文明的完整过渡序列。"
sources:
