id: dingzhou
name: 定州博物馆
lat: 38.5132
lng: 114.9902
location: 河北省定州市中山东路南侧
level: 国家二级博物馆
core_period: 西汉中山国、北宋（定窑白瓷、静志寺/净众院塔基地宫）
specialty: 定州是西汉中山国都城（卢奴）、北宋定窑所在地，两大文化高峰在此交汇。静志寺塔基地宫出土的大批北宋定窑白瓷和佛教文物，质量之高、数量之多为全国罕见。虽为县级市博物馆，但藏品质量极高。
dynasty_coverage: 西汉（中山国）、东汉、北朝、隋唐、北宋（定窑）
timeline: 战国中山国灭亡（前296年）→ 西汉中山国重建（前154年）→ 东汉中山国 → 北朝佛教兴盛 → 唐宋定窑发展（晚唐-金代为盛期）→ 北宋静志寺塔（977年建）
treasures:
  - name: 东汉龙螭衔环谷纹青玉壁
  - name: 北宋白釉刻花龙首净瓶
  - name: '"只此青绿"定窑绿釉'
  - name: 透影白瓷
  - name: 西汉错金银铜车伞铤
halls:
  - name: 汉家陵阙
  - name: 北朝佛陀
  - name: 天下大白——定窑
  - name: 尘外千年——静志寺·净众院塔基地宫
artifacts:
  - name: 北宋白釉刻花龙首净瓶
    period: 北宋
    description: —静志寺塔基地宫出土，瓶口为龙首造型，通体白釉，刻花精美。是定窑白瓷中的极品，也是佛教法器的精品。净瓶是佛教僧人盛水器具，此件工艺之精在宋代瓷器中罕有其匹。
  - name: 东汉龙螭衔环谷纹青玉壁
    period: 东汉
    description: —直径约25厘米，双面浮雕龙螭纹和谷纹，龙螭衔环悬挂。玉质温润，雕工精细，是东汉玉壁中的上乘之作。
  - name: 定窑白瓷群
    period: 北宋，10-11世纪
    description: —静志寺和净众院两处塔基地宫共出土定窑白瓷等器物700余件，包括碗、盘、瓶、炉、盒等各种器形，许多为定窑精品中的精品。定窑是宋代五大名窑之一，以白瓷著称，"定州花瓷瑕不见"即指此窑。
    image_url: https://upload.wikimedia.org/wikipedia/commons/0/06/20241025_White-Glazed_Porcelain_Bowl_with_Six_Ridges%2C_Ding_Kiln%2C_Song_Dynasty.jpg?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=original
    image_license: CC-BY-SA-4.0
    image_attribution: Windmemories
  - name: 西汉错金银铜车伞铤
    period: 西汉
    description: —定州中山王墓出土，车伞的支撑构件，以错金银工艺装饰。体现了西汉中山国的手工业水平，与满城汉墓出土品风格相近。
  - name: 北宋定窑绿釉划花净瓶
    period: 北宋
    description: —极为稀有的定窑绿釉品种，世所罕见。定窑以白瓷为主，彩釉产品极少，此件绿釉净瓶是定窑色釉瓷的珍贵孤品。
  - name: 透影白瓷杯
    period: 北宋
    description: —薄胎白瓷，迎光可透影，有"薄如纸"之称。体现了定窑白瓷工艺的极致追求。
  - name: 北朝佛教造像
    period: 北朝，5-6世纪
    description: —定州在北朝时期是佛教重镇，出土大量白石造像，风格独特，被称为"定州样式"，对中国佛教造像艺术有重要影响。
    image_url: /img/553f8e052ba2a8f9.jpg
    image_license: CC0
    image_attribution: 氏子 · CC0 · Commons
sources:
