id: shanghai
name: 上海博物馆
lat: 31.2286
lng: 121.4747
location: 上海市浦东新区世博大道（东馆）/ 黄浦区人民大道201号（人民广场馆）
level: 国家一级博物馆
core_period: 青铜器（商周）、书画（唐宋元明清）、陶瓷（全时期）
specialty: 以青铜器、书画、陶瓷三大收藏闻名世界。文物系统性极强，是学术研究型博物馆的典范。2022年起东馆陆续开放，展览面积大幅扩展。
dynasty_coverage: 商周（青铜）、唐宋元明清（书画）、全时期（陶瓷）
timeline: 上博的青铜器收藏构成了从商到战国的完整序列，是理解中国青铜时代的最佳场所之一。书画收藏则覆盖唐至清的核心脉络。
treasures:
  - name: 1. 大克鼎（西周）— 铭文290字
  - name: 与大盂鼎并称"海内三宝"之二
halls:
  - name: 中国古代青铜馆
  - name: 中国历代书法馆
  - name: 中国历代绘画馆
  - name: 中国历代陶瓷馆
