id: zhongguo-kaogu
name: 中国考古博物馆
lat: 39.9988
lng: 116.3996
location: 北京市朝阳区国家体育场北路1号院1号楼（南门，奥林匹克公园中轴线北端）
level: 中国历史研究院直属国家级考古主题博物馆（2023年9月15日开馆）
core_period: 旧石器—元明清（以史前及夏商周三代为主体）
specialty: 中国首座以考古命名的国家级博物馆。展厅 7000 余平方米，展品 6000 余件，主题"历史中国，鼎铸文明"，五大基本陈列：文明起源、宅兹中国、大国一统、和融万方、民族觉醒。仓储式陈列+沉浸式体验，集中呈现中国考古百年成果。
dynasty_coverage: 旧石器、新石器（仰韶/龙山/陶寺/良渚）、夏（二里头）、商（殷墟）、西周、秦汉、唐宋元明清
timeline: 2019年中国历史研究院成立 → 2023年9月15日正式开馆 → 2025年4月福建平潭设壳丘头分馆 → 2025年9月开馆两周年累计接待观众约 130 万人次
treasures:
  - name: 绿松石龙形器（夏，二里头，长约70cm，2000余片绿松石组成）
  - name: 嵌绿松石象牙杯（商，殷墟妇好墓，禁止出境展览文物）
  - name: 彩绘龙纹陶盘（陶寺遗址，距今约4300—3900年，中原最早蟠龙形象）
  - name: 司母辛铜方鼎（商，殷墟妇好墓）
  - name: 西周铜牺尊（陕西长安张家坡井叔家族墓地，1984年出土）
  - name: 大口陶尊（安徽蒙城尉迟寺遗址，刻"日""月""山"符号，与汉字起源有关）
  - name: 白釉黑花龙凤纹瓷罐（元，北京元大都遗址，磁州窑）
halls:
  - name: 文明起源（旧石器—新石器）
  - name: 宅兹中国（夏商周三代）
  - name: 大国一统（秦汉）
  - name: 和融万方（魏晋—隋唐）
  - name: 民族觉醒（宋元明清近代）
  - name: 球幕影院（二里头数字影片）
artifacts:
  - name: 绿松石龙形器
    period: 夏，二里头文化（约公元前1750—前1500年）
    description: —1981年河南偃师二里头遗址3号墓出土，墓主胸部至腰部位置原物。龙身呈巨型S形，长约70.2厘米，由2000余片绿松石片组合而成，每片仅0.2—0.9厘米，巨眼以白玉作睛，是中国早期"龙图腾"最完整的实物证据，被视作华夏龙形象之源。
    image_url: /img/cedc451cd8f6f9b9.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Siyuwj
  - name: 嵌绿松石象牙杯
    period: 商（约公元前1200年）
    description: —1976年河南安阳殷墟妇好墓出土，象牙整段雕成，高30.5厘米，通体浮雕饕餮、夔龙纹，凹槽嵌绿松石，把手作鸟形。商代王室饮酒器中工艺最复杂者，1992年列入首批《禁止出国（境）展览文物》名单。
    image_url: /img/c19f2274ff54a9e7.jpg
    image_license: CC0
    image_attribution: Gary Todd
  - name: 彩绘龙纹陶盘
    period: 新石器，陶寺文化（距今约4300—3900年）
    description: —山西襄汾陶寺遗址早期大墓出土。盘内壁绘蟠龙一条，龙首衔禾，蛇躯上施鳞纹。是中原地区目前所见最早的蟠龙形象，与古文献"陶唐氏"龙崇拜传统相印证，被誉为"中原龙之祖"。
    image_url: /img/413829cb3d68019f.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Fo Guang Shan 佛光山
  - name: 司母辛铜方鼎
    period: 商，约公元前1200年
    description: —殷墟妇好墓出土，鼎腹内壁铸"司母辛"三字铭文（"辛"为妇好庙号）。是妇好之子（祖庚或祖甲）为母所铸祭器，纹饰承继司母戊鼎传统，是商代后期王室青铜礼器的代表。
  - name: 西周铜牺尊
    period: 西周（约公元前11—前10世纪）
    description: —1984年陕西西安长安张家坡西周井叔家族墓地出土。整体作牛形盛酒器，背开方口，内置可分离的盖；造型饱满写实，纹饰繁缛。井叔为周王室重臣，此尊体现西周中期高级贵族祭器的工艺巅峰。
  - name: 大口陶尊
    period: 新石器晚期，大汶口文化（距今约5000年）
    description: —安徽蒙城尉迟寺遗址出土，陶尊外壁刻有"日""月""山"组合符号，是汉字起源研究中"大汶口陶符"的重要标本，与山东莒县陵阳河出土同类符号互证，提示中国文字可能在距今 5000 年前已现雏形。
    image_url: /img/0ecc6d2252d961a9.jpg
    image_license: CC0
    image_attribution: Gary Todd
  - name: 白釉黑花龙凤纹瓷罐
    period: 元（13—14世纪）
    description: —北京元大都遗址出土，磁州窑系白地黑花典型器，腹部以粗放笔触绘云龙凤纹。是元大都汉人贵族日用瓷的代表，反映元代北方民窑兴盛与多元文化融合。
dynasty_connections:
  - dynasty: 夏
    description: 二里头遗址出土的绿松石龙形器、铜牌饰、青铜爵等，是夏文化最重要的实物集合。
  - dynasty: 商
    description: 殷墟妇好墓的象牙杯、司母辛鼎、玉器等，集中呈现商代王室祭祀与礼制。
  - dynasty: 西周
    description: 张家坡井叔墓地的铜牺尊及周原出土甲骨，构成西周礼乐文明的物证主线。
  - dynasty: 新石器
    description: 陶寺彩绘龙盘、良渚玉琮、仰韶人面鱼纹彩陶，是中华文明起源研究的核心展品。
