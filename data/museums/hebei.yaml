id: hebei
name: 河北博物院
lat: 38.0505
lng: 114.5146
location: 河北省石家庄市长安区东大街4号
level: 国家一级博物馆
core_period: 西汉（满城汉墓）、战国（中山国）
specialty: 以满城汉墓出土文物为镇馆核心，金缕玉衣和长信宫灯是中国考古标志性文物。中山靖王刘胜墓出土品之精美，是西汉王侯生活的最佳实物见证。
dynasty_coverage: 战国、西汉、北朝、唐、宋、元
timeline: 战国中山国（前414-前296年）→ 西汉中山国（刘胜，前154年封王）→ 北朝邺城文化
treasures:
  - name: 西汉金缕玉衣
  - name: 长信宫灯
  - name: 错金博山炉
  - name: 透雕双龙高钮谷纹白玉壁
  - name: 铜羊尊灯
halls:
  - name: 大汉绝唱——满城汉墓
  - name: 战国雄风——古中山国
  - name: 北朝壁画
artifacts:
  - name: 西汉金缕玉衣
    period: 西汉，约前113年
    description: —中山靖王刘胜的殓服，由2498片岫岩玉用金丝编缀而成，是中国出土年代最早、最完整的金缕玉衣，直接印证了文献记载的汉代丧葬制度。
    image_url: /img/70c9fe708192d53f.jpg
    image_license: fair-use
    image_attribution: 来源：百度百科 · https://baike.baidu.com/view/6428588.htm
  - name: 长信宫灯
    period: 西汉，约前172年前后
    description: —窦绾墓出土，宫女跪坐执灯造型，灯罩可调节光照方向，烟气通过袖管导入体内净化。兼具实用性与艺术性，被誉为"中华第一灯"。
    image_url: /img/ed3825fff4862aea.png
    image_license: CC-BY-SA-4.0
    image_attribution: 陳寅恪 · CC-BY-SA-4.0 · Commons
  - name: 错金博山炉
    period: 西汉
    description: —刘胜墓出土，炉身以金丝错出山峦、云气、人物、走兽，山间有猎人与虎豹，炉盖镂空出烟，点燃香料后云雾缭绕如仙山。是汉代错金工艺的巅峰之作。
    image_url: /img/a9cefebecdf59ae7.png
    image_license: CC-BY-SA-4.0
    image_attribution: 陳寅恪 · CC-BY-SA-4.0 · Commons
  - name: 透雕双龙高钮谷纹白玉壁
    period: 西汉
    description: —刘胜墓出土，玉质温润，双龙造型生动，谷纹规整。是汉代玉壁中的极品，体现了西汉王侯用玉的最高规格。
  - name: 错金银四龙四凤铜方案座
    period: 战国
    description: —中山国王墓出土，四条龙蜷曲成案座支撑，四只凤鸟展翅，工艺极其复杂。是战国中山国高超铸造技术的代表，也是中山国非华夏族群（白狄鲜虞）艺术风格的体现。
    image_url: /img/dfa0442a62167b38.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Windmemories · CC-BY-SA-4.0 · Commons
  - name: 中山王铁足铜鼎
    period: 战国
    description: —铭文469字，是目前所见战国铭文最长的铜器之一，记载了中山国的政治事件，是研究中山国历史的第一手文献。
    image_url: /img/e6c1b4f421ff3e9a.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Baomi · CC-BY-SA-4.0 · Commons
  - name: 十五连盏铜灯
    period: 战国
    description: —中山国出土，树形灯架上分布十五个灯盏，有猴戏、鸟栖等装饰，是战国青铜灯具中造型最复杂的一件。
  - name: 北齐高洋墓壁画
    period: 北齐，约550-559年
    description: —磁县湾漳出土，绘有仪仗出行图，人物众多、色彩鲜艳，是北朝壁画艺术的重要遗存。
sources:
  - source: "河北博物院官网: https://www.hebeimuseum.org.cn/"
