  - name: 牌坊
  - name: 大雄殿（辽）
  - name: 西宫禅院
artifacts:
  - name: 大雄殿
    period: 辽，1020年
    description: —面阔九间（48.2米）、进深五间（25.13米）、通高 24 米，单檐庑殿顶。是中国木构建筑中现存最大的单层殿堂，结构上承唐风。梁架使用整根巨木叉柱造，斗栱多达八种形制。
  - name: 过去七佛彩塑
    period: 辽，11世纪
    description: —大雄殿内一字排开七尊大佛：毗婆尸佛、尸弃佛、毗舍婆佛、拘留孙佛、拘那含牟尼佛、迦叶佛、释迦牟尼佛，高 8.6—9.5 米不等，是中国现存最大的辽代彩塑群。每尊主佛两侧配两尊胁侍菩萨，加上倒坐观音、天王共 14 尊辽代原塑。
  - name: 殿内壁画飞天
    period: 辽，11世纪
    description: —大雄殿内梁、栱、斗、柱上绘有大量辽代彩绘与壁画飞天 42 身，色彩仍有辽代原貌遗留。
  - name: 元代山门
    period: 元
    description: —现存山门为元代建筑，单檐悬山顶，仍保留辽-元过渡时期的构造特征。
sources:
  - source: 国家文物局：全国重点文物保护单位（第二批，1961年）
  - source: 梁思成《义县奉国寺辽代大雄殿》，1936年实地考察
