id: fengguosi
name: 义县奉国寺
lat: 41.5383
lng: 121.24
location: 辽宁省锦州市义县东街
level: 第二批全国重点文物保护单位（1961年）
core_period: 辽开泰九年（1020年）
specialty: 八大辽构之一。大雄殿建于辽开泰九年，面阔九间、进深五间，是中国现存最大的单层木结构佛殿，被梁思成誉为"千年国宝、无上国宝、罕有的国宝"。殿内七尊辽代彩塑大佛是中国现存最大的辽代彩塑群。
dynasty_coverage: 辽（主体）、元、明、清
timeline: 辽开泰九年大雄殿建成（1020年）→ 元代屡修 → 明清重修 → 1961年第二批国保 → 2012年列入世遗预备名单
treasures:
  - name: 大雄殿（辽，1020年，现存最大单层木构佛殿）
  - name: 过去七佛彩塑七尊（辽，高约8米）
  - name: 殿内辽代壁画飞天
  - name: 元代山门
  - name: 元代《大金奉国寺记》碑
