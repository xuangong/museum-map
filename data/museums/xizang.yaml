id: xizang
name: 西藏博物馆
lat: 29.65
lng: 91.1
location: 西藏自治区拉萨市城关区罗布林卡路19号
level: 国家一级博物馆
core_period: 吐蕃王朝（7-9世纪）、藏传佛教艺术（元明清至今）
specialty: 西藏唯一集典藏、展示、研究、教育为一体的现代化综合博物馆。新馆占地6.5万㎡，馆藏52万余件，珍贵文物4万余件（套）。以藏传佛教艺术（唐卡、佛像、法器）、历代中央政府颁赐金印金册、贝叶经和藏文典籍为核心收藏。"西藏历史文化"基本陈列获1999年全国十大陈列展览精品。
dynasty_coverage: 新石器时代（卡若文化/曲贡文化）→ 吐蕃王朝（7-9世纪）→ 分裂割据 → 萨迦/帕竹/甘丹颇章 → 清代（金瓶掣签制度）→ 近现代
timeline: 7世纪松赞干布统一吐蕃并迁都拉萨，与唐朝联姻（文成公主、金城公主入藏）。13世纪西藏纳入元朝版图，此后历经明清两代中央政府持续管辖。清乾隆时期建立金瓶掣签制度。
treasures:
  - name: 1. 双体陶罐（新石器时代·卡若文化）— 镇馆之宝
  - name: 卡若先民制陶最高水平
halls:
  - name: 雪域长歌——西藏历史与文化"（2022年新馆基本陈列）
  - name: 离太阳最近的人——西藏民俗文化
  - name: 元明清玉器精品馆
artifacts:
  - name: 双体陶罐
    period: 新石器时代·卡若文化，昌都卡若遗址出土
    description: 镇馆之宝。两个圆形陶罐通过桥状提手连为一体，造型独特，制作工艺纯熟，代表了卡若文化的最高制陶水平，也是新石器时代西藏陶器的标志作品
  - name: 贝叶经
    period: 古代印度传入
    description: 用南亚贝多罗树叶制作的梵文佛经，经特殊药物处理不干裂、不虫蛀、不霉变，是研究早期佛教史和佛教文化的第一手资料
  - name: 桦树皮书写经
    period: 吐蕃时代
    description: 世界上唯一完整的桦树皮经，采用桦树内层树皮双面墨书手写，历经千年文字仍清晰可读
  - name: 金瓶
    period: 清·乾隆
    description: 清乾隆帝颁赐，用于金瓶掣签制度认定活佛转世灵童。将候选灵童名字写在象牙签牌上放入金瓶，由呼图克图和驻藏大臣在大昭寺共同抽签认定
  - name: 历代达赖喇嘛金印金册
    period: 清代
    description: 清帝册封达赖喇嘛时颁布，金印为金或玉质，书写汉、藏、满、蒙四种文字；金册将诏书直接刻于金箔之上
    image_url: https://upload.wikimedia.org/wikipedia/commons/3/35/Gold_Seal_of_13th_Dalai_Lama%2C_1909.jpg
    image_license: CC0
    image_attribution: Gary Todd
  - name: 唐卡精品
    period: 历代
    description: 博物馆收藏大量勉唐画派、齐岗画派、尼泊尔画派唐卡，题材涉及历史、宗教、文化和社会生活
  - name: 青花缠枝莲纹花觚
    period: 清·乾隆
    description: 督窑官唐英监制，造型高大精美，成对保存，是中央政府赏赐给西藏的宫廷瓷器
  - name: 元明清玉器
    period: 元至清
    description: 107件历代中央政府赏赐给西藏地方政府的玉器
sources:
  - source: 百度百科·西藏博物馆（详细词条，含建馆历程、馆藏数据、文物详情）
  - source: 西藏博物馆官方信息
