dynasty_connections:
  - dynasty: 西周
    description: 宝鸡是周王朝发祥地，出土大量西周青铜重器，是研究西周礼乐文明的核心标本地
  - dynasty: 秦
    description: 宝鸡（古陈仓）为秦人肇基之地，馆藏秦早期青铜器是探源秦文明的重要实物证据
