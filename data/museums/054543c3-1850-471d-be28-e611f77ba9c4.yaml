  - name: 秦公镈
    period: 春秋早期
    description: 铭文记载秦国早期历史，是研究秦文明起源的珍贵实物
    image_url: /img/b9e47975348729ed.jpg
    image_license: CC0
    image_attribution: Huangdan2060 · CC0 · Commons
  - name: 卫鼎
    period: 西周中期
    description: 铭文记录西周土地交换史实，具有极高的历史与文献价值
    image_url: https://upload.wikimedia.org/wikipedia/commons/b/b0/%E4%BA%94%E7%A5%80%E5%8D%AB%E9%BC%8E.jpg?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=original
