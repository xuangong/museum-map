id: quanzhou
name: 泉州海外交通史博物馆
lat: 24.9091
lng: 118.606
location: 福建省泉州市丰泽区东湖街425号
level: 国家一级博物馆
core_period: 宋元（泉州为"东方第一大港"）
specialty: 中国最早也是唯一以海外交通史为专题的博物馆。2021年"泉州：宋元中国的世界海洋商贸中心"申遗成功，海交馆是核心展示中心。馆藏宋代沉船、宗教石刻、外销瓷等珍贵文物，集中反映古代海上丝绸之路的繁荣。
dynasty_coverage: 唐（泉州港兴起）→ 宋元（东方第一大港、刺桐城）→ 明（郑和下西洋）→ 清
timeline: 泉州（古称刺桐）在宋元时期是世界最大的港口之一，马可·波罗称其为"世界上最大的港口之一"。2021年联合国教科文组织将"泉州：宋元中国的世界海洋商贸中心"列入世界遗产
treasures:
  - name: 宋代海船（后渚港出土）
  - name: 印度教石刻（宋元）
  - name: 伊斯兰教碑刻
  - name: 阿拉伯商人墓碑
  - name: 外销瓷器
halls:
  - name: 泉州：宋元中国的世界海洋商贸中心
  - name: 泉州宗教石刻陈列
  - name: 泉州湾古船陈列馆
  - name: 泉州伊斯兰文化陈列馆"（2003年建成）
artifacts:
  - name: 宋代海船
    period: 南宋，1974年后渚港出土
    description: 残长24.2米，宽9.15米，是当时中国出土的最大古船之一。船体采用水密隔舱技术，是中国古代造船术的实物证据
    image_url: /img/8becaab097562fdf.jpg
    image_license: CC-BY-2.0
    image_attribution: meckleychina · CC-BY-2.0 · Commons
  - name: 印度教石刻
    period: 宋元
    description: 泉州出土的大量印度教神像石刻（毗湿奴、湿婆等），证明宋元时期印度商人社区在泉州的存在
    image_url: /img/b1eccf2b2ffe1211.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: 陳寅恪 · CC-BY-SA-4.0 · Commons
  - name: 伊斯兰教碑刻
    period: 宋元
    description: 阿拉伯文、波斯文墓碑和清真寺碑刻，反映泉州穆斯林社区的规模和影响力
    image_url: /img/210af8d5fd28b522.png
    image_license: PD
    image_attribution: Bogaevskii, Nikolai V., 1843-1912 · PD · Commons
  - name: 基督教（景教）石刻
    period: 元代
    description: 十字架石刻，证明元代泉州存在景教/天主教社区
  - name: 外销瓷器
    period: 宋元
    description: 德化窑白瓷、磁灶窑彩瓷等，是泉州作为陶瓷外销港的直接证据
  - name: 摩尼教石刻
    period: 宋元
    description: 泉州是中国摩尼教（明教）保存最完整的地区
    image_url: /img/b1938d315200ac92.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Zhangzhugang · CC-BY-SA-4.0 · Commons
sources:
  - source: "泉州海交馆官网: http://www.qzhjg.cn/"
  - source: "泉州海交馆简介: http://www.qzhjg.cn/html/hjgjj.html"
  - source: 百度百科·泉州海外交通史博物馆
  - source: 'UNESCO世界遗产: "泉州：宋元中国的世界海洋商贸中心"（2021年列入）'
