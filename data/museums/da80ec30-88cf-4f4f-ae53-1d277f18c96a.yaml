id: da80ec30-88cf-4f4f-ae53-1d277f18c96a
name: 法源寺（中国佛教图书文物馆）
lat: 39.8843
lng: 116.3715
location: 北京市西城区法源寺前街7号
level: 第五批全国重点文物保护单位
core_period: 唐代至当代，核心馆藏为历代佛教文物（共14万件，其中一级文物760件）
specialty: 佛教律宗寺庙，是中国佛学院、中国佛教图书文物馆所在地；以佛教文物收藏与丁香诗会享誉盛名
dynasty_coverage: 唐、辽、金、明、清及近现代
timeline: 贞观十九年（645年）唐太宗始建，初名悯忠寺，为追荐阵亡将士而建；武则天万岁通天元年（696年）正式建成。辽咸雍六年（1070年）改称大悯忠寺；明正统二年（1437年）改名崇福寺；清雍正十一年（1733年）重修并敕额"法源寺"；乾隆四十五年（1780年）乾隆亲临并赐御书"法海真源"匾额。1956年中国佛学院于此成立；1979年被批准为北京市重点文物保护单位；1980年设立中国佛教图书文物馆，鉴真大师像在此巡展；1983年被国务院确定为佛教重点寺院；2001年升格为全国重点文物保护单位；2002年恢复举办丁香诗会。
treasures:
  - name: 鉴真大师像
  - name: 法海真源匾额（清乾隆帝御笔）
