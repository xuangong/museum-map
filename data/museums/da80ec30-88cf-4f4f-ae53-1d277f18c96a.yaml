  - name: 明代木雕佛涅盘像（长约十米，北京最大卧佛）
  - name: 弥勒菩萨化身布袋和尚铜像（明代，高1.12米）
  - name: 四大天王铜造像（明代，高1.2米）
  - name: 韦驮坐像（明代铜铸，高1.7米）
  - name: 五方佛铜佛像（明代）
  - name: 十八罗汉坐像（清代，高约1.35米）
