artifacts:
  - name: 折觥
    period: 西周
    description: 造型庄重典雅，纹饰精美富丽，整体为绵羊形，盖体呈羊首形，饰以飞燕、饕餮、夔龙纹等纹饰
    image_url: /img/e53051b2087d6511.jpg
    image_license: CC0
    image_attribution: Gary Todd · CC0 · Commons
  - name: 史墙盘
    period: 西周
    description: 铭文最长的青铜器，计284字，历述西周文、武、成、康、昭、穆六王的主要业绩，有”青铜史书”之称
    image_url: /img/8c57bfa0dbd910c5.jpg
    image_license: CC-BY-SA-3.0
    image_attribution: 幽灵巴尼, 2014-03-08 15:03:24, Own work · CC-BY-SA-3.0 · Wikidata Q7495914
  - name: 三年疢壶
    period: 西周
    description: 通高65.4厘米，重26公斤，有”壶中之冠”美称，盖内沿有铭文12行60字
dynasty_connections:
  - dynasty: 西周
    description: 周原是西周王朝的发祥地与核心统治区域，出土了大量西周青铜礼器、甲骨文及玉器，是研究西周历史与文化的第一手资料宝库
