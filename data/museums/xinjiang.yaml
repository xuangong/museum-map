id: xinjiang
name: 新疆维吾尔自治区博物馆
lat: 43.81
lng: 87.5775
location: 新疆维吾尔自治区乌鲁木齐市西北路581号
level: 国家一级博物馆（2008年首批）
core_period: 青铜时代至唐代（丝绸之路西域段）
specialty: 中国唯一全面展示西域文明的省级博物馆。馆藏3.2万件，一级品288件。以古代干尸（楼兰美女等）、多语言文书（汉文、回鹘文、佉卢文、吐火罗文、梵文、粟特文等9种文字）、汉唐丝织品为三大独特收藏。2022年二期投用后，展览面积从6178㎡增至1.13万㎡。2023年设立"国博厅"和"故宫厅"。
dynasty_coverage: 青铜时代（小河/楼兰）→ 汉（西域都护府，前60年）→ 魏晋南北朝（高昌/龟兹）→ 唐（安西都护府）→ 宋元（回鹘/西辽）→ 清（新疆建省）
timeline: 前60年汉设西域都护府，新疆正式纳入中国版图。此后历经东汉班超经营西域、唐代安西都护府管辖、清代新疆建省，新疆始终是丝绸之路的核心段和东西方文明交汇之地。
treasures:
