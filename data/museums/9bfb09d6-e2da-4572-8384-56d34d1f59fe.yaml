id: 9bfb09d6-e2da-4572-8384-56d34d1f59fe
name: 洛阳古代艺术博物馆（洛阳古墓博物馆）
lat: 34.6878
lng: 112.474
location: 河南省洛阳市老城区机场路6号
level: 国家二级博物馆
core_period: 西汉至金代
specialty: 中国目前占地面积最大、墓葬数量和朝代最多、类型最全的古墓葬类专题博物馆；同时挂牌"河南古代壁画馆"，馆藏壁画与砖雕艺术品极为丰富
dynasty_coverage: 西汉、北魏、唐、宋、金
timeline: 1984年开始施工；1987年建成开放（馆名"洛阳古墓博物馆"）；2008年更名为"洛阳古代艺术博物馆"；2011年加挂"河南古代壁画馆"牌子；2020—2022年整体提升改造闭馆；开放时间：周二至周日 09:00–17:00（冬季09:00–16:30），周一闭馆（法定节假日除外）
treasures:
  - name: 西汉”打鬼图”壁画墓
  - name: 西汉卜千秋升仙图壁画墓
  - name: 唐代”胡人牵驼”壁画
  - name: 唐代”胡人牵马”壁画
  - name: 馆藏宋金时期墓葬雕砖
  - name: 北魏宣武帝景陵（建国以来经国家批准科学发掘的第二座皇帝陵）
halls:
  - name: 此岸彼岸——古代墓葬文化展
  - name: 河洛遗冢——洛阳典型墓葬陈列
  - name: 地府千秋——河南古墓壁画大观
  - name: 洛阳北魏帝王陵展
  - name: 砖画青史——馆藏宋金雕砖展
  - name: 历程——洛阳古代艺术博物馆馆史展
artifacts:
  - name: 卜千秋升仙图壁画
    period: 西汉
    description: 西汉壁画墓中保存最完整的升仙题材壁画，画面生动展现汉代”羽化升仙”的宇宙观与神话世界，是国家级珍贵文物
  - name: 打鬼图壁画
    period: 西汉
    description: 西汉壁画，描绘驱鬼辟邪仪式场景，是研究汉代方术与民间信仰的第一手图像资料
  - name: 北魏宣武帝景陵
    period: 北魏
    description: 建国以来经国家批准科学发掘的第二座皇帝陵，亦是目前发掘开放时代最早的帝王陵，1991年抢救性发掘后原址展示
    image_url: https://upload.wikimedia.org/wikipedia/commons/4/4a/Tomb_of_Emperor_Xuanwu_of_Northern_Wei_3.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Gary Lee Todd
  - name: 胡人牵驼壁画
    period: 唐
    description: 唐代墓葬壁画，画中胡人形象鲜明，是丝绸之路东西文化交流的直观见证
  - name: 宋金雕砖
    period: 宋—金
    description: 馆藏宋金时期大量仿木构砖雕墓葬构件，内容涵盖建筑、人物、花卉等题材，集中展示于《砖画青史》专题展
sources:
  - source: https://www.gumumuseum.cn/
  - source: https://www.gumumuseum.com/about/82
  - source: https://www.henan.gov.cn/2024/05-22/2997398.html
  - source: https://wwj.henan.gov.cn/2025/08-20/3203940.html
