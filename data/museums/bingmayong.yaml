id: bingmayong
name: 秦始皇兵马俑博物馆（秦始皇帝陵博物院）
lat: 34.3841
lng: 109.2785
location: 陕西省西安市临潼区秦陵北路
level: 国家一级博物馆 / 世界文化遗产
core_period: 秦（前221-前207）
specialty: 世界第八大奇迹。三个兵马俑坑出土陶俑8000余件，每个面孔都不同。是秦始皇陵的陪葬坑，展现了秦帝国的军事力量和工匠技艺。
dynasty_coverage: 秦
timeline: 秦始皇陵始建于前246年（始皇13岁即位时），动用70万人修建近40年。兵马俑坑是陵园外围的军事陪葬，整个陵园面积56平方公里，大部分尚未发掘。
treasures:
  - name: 1. 一号坑兵马俑军阵（秦）— 6000余件陶俑排列成实战军阵
