id: banpo
name: 西安半坡博物馆
lat: 34.2784
lng: 109.0336
location: 陕西省西安市灞桥区半坡路155号
level: 国家一级博物馆（2008年评定）
core_period: 新石器时代仰韶文化半坡类型（约前4800-前4300年）
specialty: 中国建国后第一座史前遗址博物馆。1953年发现，1954-1957年进行五次大规模发掘，清理出房屋遗迹40多座、窖穴200多座、墓葬170多座、陶窑6座，出土近万件文物。遗址大厅保存原始村落面貌约3000㎡。人面鱼纹彩陶盆是仰韶文化的标志性文物。馆藏文物3万多件，一级品200多件，其中陶器1.4万件。
dynasty_coverage: 新石器时代仰韶文化半坡类型（约前4800-前4300年）
timeline: 半坡遗址是黄河中游仰韶文化的典型代表，距今约6000-6700年。半坡先民以粟作农业为主、渔猎为辅，已有成熟的制陶技术和原始艺术，居住在半地穴式房屋中，形成了有防御沟壕的聚落。
