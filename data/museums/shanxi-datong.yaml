id: shanxi-datong
name: 大同市博物馆
lat: 40.0769
lng: 113.2971
location: 山西省大同市平城区御河西路南段
level: 国家一级博物馆
core_period: 北魏平城时代（398-494年）
specialty: 大同是北魏都城平城，历时近百年（398-494年迁洛阳）。大同博物馆集中展示了这一时期鲜卑拓跋氏政权从草原到中原的文化转型，是了解北魏前期最重要的博物馆。辽金西京大同府的文物也是重要收藏。
dynasty_coverage: 北魏、东魏、北齐、辽、金
timeline: 拓跋鲜卑南迁 → 北魏建国（386年）→ 迁都平城（398年）→ 太武帝统一北方（439年）→ 孝文帝迁洛（494年）→ 辽代西京大同府 → 金代西京
treasures:
