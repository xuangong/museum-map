id: 8d05e910-ec8f-4d99-8cba-140f10bd9ef2
name: 汉景帝阳陵博物院
lat: 34.47
lng: 109.15
location: 陕西省西安市咸阳国际机场专线公路东段（渭城区正阳镇张家湾村）
level: 国家一级博物馆
core_period: 西汉（公元前153年—公元前126年）
specialty: 汉代帝陵陵园遗址保护与展示、西汉陶俑艺术
dynasty_coverage: 西汉
timeline: 陵园始建于公元前153年，至王皇后下葬（公元前126年）历时约28年建成；1999年汉阳陵考古陈列馆对外开放；2003年帝陵南门阙遗址保护陈列厅建成；2006年3月31日帝陵外藏坑遗址保护展示厅建成开放。
treasures:
  - name: 武士俑
  - name: 仕女俑（侍女俑）
  - name: 陶塑动物俑
  - name: 木车马
  - name: 宗正之印龟钮银印
  - name: 大官之印铜印
  - name: 永巷丞印
  - name: 内官丞印
  - name: 阳陵令印封泥
halls:
  - name: 汉阳陵考古陈列馆
  - name: 帝陵外藏坑遗址保护展示厅
  - name: 帝陵南门阙遗址保护展示厅
  - name: 宗庙遗址展示区
artifacts:
  - name: 武士俑
    period: 西汉
    description: 披坚执锐、严阵以待，是汉阳陵出土数量最多的陶俑，展现西汉军事风貌
    image_url: https://upload.wikimedia.org/wikipedia/commons/6/6d/%E5%85%83%E9%AA%91%E9%A9%AC%E6%AD%A6%E5%A3%AB%E4%BF%913.jpg?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=original
    image_license: CC-BY-SA-4.0
    image_attribution: 三猎
  - name: 仕女俑（侍女俑）
    period: 西汉
    description: 宽衣博带、美目流盼，体态优雅，反映西汉宫廷女性形象
  - name: 动物俑
    period: 西汉
    description: 种类丰富，累千成万，生动异常，包括猪、羊、狗、鸡等家畜家禽陶塑
    image_url: https://upload.wikimedia.org/wikipedia/commons/8/85/%E6%9C%9B%E4%B8%9B%E5%8D%9A%E7%89%A9%E9%A6%86-%E5%8A%A8%E7%89%A9%E6%AE%8B%E4%BF%91%EF%BC%88%E4%B8%9C%E6%B1%89%EF%BC%89.jpg?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=original
    image_license: CC-BY-SA-4.0
    image_attribution: Kcx36
  - name: 宗正之印龟钮银印
    period: 西汉
    description: 出土于外藏坑，为西汉官署印章，是研究汉代官制的重要实物
sources:
