id: jiangsu
name: 南京六朝博物馆
lat: 32.0472
lng: 118.796
location: 江苏省南京市玄武区长江路302号（总统府旁）
level: 国家一级博物馆
core_period: 六朝（222-589年：东吴、东晋、宋、齐、梁、陈）
specialty: 中国唯一的六朝专题博物馆，建于六朝建康城遗址之上，由贝聿铭弟子齐欣设计。展示了六朝近四百年间南京作为都城的辉煌，是理解魏晋南北朝——中国历史上最富文化创造力的分裂时期——的核心场馆。
dynasty_coverage: 东吴（222-280）→ 东晋（317-420）→ 南朝宋（420-479）→ 南朝齐（479-502）→ 南朝梁（502-557）→ 南朝陈（557-589）
timeline: 222年孙权建都建业（南京）→ 317年东晋衣冠南渡 → 420-589年南朝宋齐梁陈更替 → 589年隋灭陈统一。六朝近四百年间，建康（南京）是中国南方的政治、经济、文化中心，也是当时世界上最大的城市之一
