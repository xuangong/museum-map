  - name: 六朝风采（人物与社会）
  - name: 建康城遗址展示区
  - name: 六朝青瓷专题
artifacts:
  - name: 六朝青瓷莲花尊
    description: 南朝（6世纪）。高大端庄，通体饰以莲花瓣纹，是六朝青瓷中的巅峰之作。莲花纹饰反映了佛教在六朝的深刻影响。
  - name: 人面纹瓦当
    description: 六朝。建康城遗址出土，瓦当上塑有人面形象，表情生动，是六朝建筑装饰的特色，在中国古代瓦当中独具一格。
    image_url: https://upload.wikimedia.org/wikipedia/commons/8/81/%E5%AE%81%E6%B3%A2%E5%8D%9A%E7%89%A9%E9%A6%86%E8%97%8F%E5%85%AD%E6%9C%9D%E4%BA%BA%E9%9D%A2%E7%BA%B9%E7%93%A6%E5%BD%93.jpg
    image_license: CC-BY-SA-3.0
    image_attribution: Siyuwj
  - name: 青瓷釉下彩羽人纹盘口壶
    description: 三国东吴（3世纪）。在青瓷釉下绘以褐彩羽人和佛像纹饰，是中国最早的釉下彩瓷器之一，在陶瓷史上具有重要地位。
  - name: 建康城遗址夯土城墙
    description: 六朝。博物馆地下层展示了六朝建康城的夯土城墙遗址，观众可以直接看到1700年前的都城基础，是博物馆"建在遗址上"的直观体现。
  - name: '"竹林七贤与荣启期"模印砖画'
    description: 南朝（约5世纪）。南京及周边六朝墓葬中多次出土，以模印砖拼成大型壁画，描绘嵇康、阮籍等竹林七贤的形象。原件藏南京博物院，六朝博物馆有高精度复制品。这是理解魏晋名士风度的标志性图像。
  - name: 六朝铜镜
    description: 六朝。有神兽镜、变形四叶镜等类型，纹饰融合汉代传统和南方新风格，反映了六朝工艺美术的特点。
  - name: 六朝墓志与碑刻拓片
    description: 六朝。南京出土的六朝墓志书法兼具隶书遗韵和楷书新意，是中国书法从隶到楷转变的关键时期的实物。
dynasty_connections:
  - dynasty: 东吴（222-280年）
    description: 孙权以建业（南京）为都，开启了南京作为都城的历史。东吴开发江南，发展海上交通，奠定了南方经济基础。青瓷釉下彩等工艺创新也始于此时。
  - dynasty: 东晋（317-420年）
    description: 永嘉之乱后，西晋灭亡，司马睿在建康重建朝廷，史称"衣冠南渡"。大量北方士族南迁，带来先进的文化和技术，催生了中国文化史上最富创造力的时期之一。王羲之的书法、顾恺之的绘画、陶渊明的诗歌都诞生于此时。
  - dynasty: 南朝（420-589年）
    description: 宋、齐、梁、陈四朝更替频繁但文化延续。南朝建康城人口达百万，是当时世界最大的城市。文学理论（刘勰《文心雕龙》、钟嵘《诗品》）、史学（范晔《后汉书》、沈约《宋书》）、佛教（梁武帝崇佛、达摩东渡）在此时达到新高度。"南朝四百八十寺，多少楼台烟雨中"正是这一时期的写照。
  - dynasty: 文化遗产
    description: 六朝是中国文化从古典向中世纪转变的关键时期。文学自觉、书法成为独立艺术、山水画兴起、佛教中国化、士族门阀制度确立——这些深刻影响后世的文化现象都始于或成熟于六朝。南京六朝博物馆是理解这一伟大转型的最佳入口。
sources:
  - source: 南京六朝博物馆
