name: 正定隆兴寺
lat: 38.1467
lng: 114.5783
location: 河北省石家庄市正定县
level: 全国重点文物保护单位
core_period: 北宋
specialty: 现存规模较大、保存较完整的宋代建筑群及佛教寺院
dynasty_coverage: 隋—清
timeline: 始建于隋开皇六年（586年），原称龙藏寺；唐代改额龙兴寺；北宋开宝二年（969年）宋太祖敕令铸大悲菩萨金身，开宝四年至八年建成大悲宝阁，并以中轴线布局大兴扩建，形成今存宋代建筑群；元、明、清历代续有扩建重修；康熙四十七年（1708年）在寺西侧增建帝王行宫，距今已有1400余年历史。
treasures:
  - name: 摩尼殿（中国宋代建筑孤例，平面造型和建筑形式在古代殿堂建筑中独树一帜）
  - name: 五彩悬塑倒坐观音（被誉为'东方美神'）
  - name: 转轮藏（现存时代最早的宋代小木作稀有遗物）
  - name: 龙藏寺碑（被推崇为'隋碑第一'）
  - name: 铜铸千手观音（高21.3米，中国现存古代最高铜铸立式佛教造像）
  - name: 御制铜铸毗卢佛（海内孤例，中国古代铜造像珍品）
