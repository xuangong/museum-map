id: 09fc018e-37d8-4aef-a17c-d9e3c0ac04cc
name: 周口店北京人遗址博物馆
lat: 39.6914
lng: 115.9256
location: 北京市房山区周口店大街13号
level: 国家一级博物馆
core_period: 旧石器时代（距今约50万年至1—3万年前）
specialty: 古人类化石、石器、动物化石及旧石器时代综合研究基地；涵盖古人类学、考古学、古生物学、地层学、年代学、环境学及岩溶学等多学科
dynasty_coverage: 旧石器时代；跨越北京猿人（约50万年前）、新洞人（约10—20万年前）、山顶洞人（约1—3万年前）三个阶段
timeline: 1927年开始大规模系统发掘；1961年被国务院公布为首批全国重点文物保护单位；1987年被联合国教科文组织列入中国首批"世界文化遗产名录"；1992年被北京市列为青少年教育基地；1997年被中宣部列为全国百家爱国主义教育示范基地；2006年被团中央授予全国青少年教育基地；2008年被国家文物局评为国家一级博物馆；2009年被评为"新北京十六景"之一；2010年被国家文物局评为"国家考古遗址公园"；2011年被联合国教科文组织亚太地区世界遗产培训与研究中心授予"世界遗产青少年教育基地"称号
treasures:
  - name: 代表40多个'北京人'个体的化石遗骸
  - name: 10多万件石器
  - name: 近200种古动物化石
  - name: 大量用火遗迹（世界已知最早人类用火证据之一）
halls:
  - name: 七个展厅（猿人洞遗址区、新洞遗址区、山顶洞遗址区及室内陈列展厅）
artifacts:
  - name: 猿人洞
    period: 约50万年前（北京猿人时期）
    description: 遗址核心区，出土大量北京猿人头盖骨化石及用火遗迹，是世界最重要的古人类遗址之一
  - name: 山顶洞
    period: 约1—3万年前（山顶洞人时期）
    description: 出土山顶洞人化石及骨针、装饰品等，反映晚期智人的生活面貌
  - name: 新洞
    period: 约10—20万年前（新洞人时期）
    description: 出土新洞人牙齿化石及动物化石，填补北京猿人与山顶洞人之间的演化空白
    image_url: /img/0f2c93c337499925.png
    image_license: fair-use
    image_attribution: 来源：百度百科 · https://baike.baidu.com/item/%E6%96%B0%E6%B4%9E
dynasty_connections:
  - dynasty: 史前旧石器时代
    description: 北京猿人、新洞人、山顶洞人先后在此生活，是中国乃至东亚地区人类起源与演化的重要实证地
sources:
  - source: https://www.zkd.cn/pc/survey/index
  - source: https://www.zkd.cn/pc/science/index?id=147&sid=234
  - source: https://www.beijing.gov.cn/renwen/rwzyd/bwg/zkdbjryzbwg/202301/t20230112_2897804.html
  - source: https://wwj.beijing.gov.cn/bjww/362771/362772/545883/
