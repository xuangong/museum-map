id: 7a1ddef6-ced8-4c2f-acd8-c7d369943f43
name: 北京中轴线
lat: 39.9163
lng: 116.3972
location: 北京市东城区（核心轴线南起永定门，北至钟鼓楼）
level: 世界遗产
core_period: 明永乐十七年（1419年）至今；2024年7月27日列入联合国教科文组织《世界遗产名录》
specialty: 中国传统都城中轴线发展至成熟阶段的杰出范例，中国现存最为完整的传统都城中轴线建筑群
dynasty_coverage: 元、明、清三朝
timeline: 元代确立中轴线格局；明永乐十七年（1419年）大规模营建；明正统年间持续扩建；清代沿用并扩充；1988年正阳门列为全国重点文物保护单位；2024年7月27日整体列入《世界遗产名录》
treasures:
  - name: 正阳门城楼
