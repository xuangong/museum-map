dynasty_connections:
  - dynasty: 元朝
    description: 北京中轴线在元大都时期确立基本格局，正南门最初称丽正门
  - dynasty: 明朝
    description: 明永乐十七年（1419年）大规模营建中轴线建筑群；永乐正统年间正阳门城楼、箭楼相继建成，正统四年（1439年）正式改名正阳门
  - dynasty: 清朝
    description: 清朝全面沿用明代中轴线，并在天坛、先农坛等处持续增建，形成现存完整格局
