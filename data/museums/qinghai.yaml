id: qinghai
name: 青海省博物馆
lat: 36.62
lng: 101.75
location: 青海省西宁市城西区新宁广场东侧
level: 国家一级博物馆（2017年第三批）
core_period: 新石器彩陶（马家窑/齐家）、唐蕃古道、藏传佛教
specialty: 青海第一座现代化大型综合博物馆。馆藏15742件/套，珍贵文物2079件/套。以新石器彩陶和民族宗教类文物最具特色。设主侧展厅10个，展厅面积9146㎡。"1+3"主题展览体系。旧址为军阀马步芳宅邸"馨庐"。
dynasty_coverage: 新石器（马家窑/齐家/宗日文化）→ 青铜时代（卡约/辛店/诺木洪文化）→ 秦汉（河湟设郡）→ 南北朝隋唐（吐谷浑/唐蕃古道）→ 宋元明清（藏传佛教）
timeline: 青海地处三江之源（黄河/长江/澜沧江），是中华文明多元一体的交汇地带。新石器时代马家窑文化在此繁荣，齐家文化的铜镜是中国铜镜史的起点。唐蕃古道（唐代通往吐蕃的官方通道）经过青海，使其成为汉藏文化交流的桥梁。
treasures:
  - name: 1. 舞蹈纹彩陶盆（宗日文化）— 青海同德宗日遗址出土
  - name: 盆内壁绘两组手拉手群舞人物（11人和13人）
halls:
  - name: 江河源文明——青海历史文物展"（510余件/套
  - name: 史前文明遗珍"和"历史文物精粹"两部分）
  - name: 青海考古成果展"（含都兰热水大墓出土文物首次亮相）
  - name: 藏传佛教金铜造像艺术展"（78件鎏金铜造像）
  - name: 唐卡艺术展"（50幅）
artifacts:
  - name: 舞蹈纹彩陶盆
    period: 新石器时代·宗日文化，青海同德宗日遗址出土
    description: 泥质红陶，口沿内壁绘两组手拉手群舞人物，分别为11人和13人。是中国史前彩陶中最生动的人物活动场景之一，与青海大通出土的另一件舞蹈纹盆齐名
    image_url: /img/8652a77f57943a10.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Augusthaiho · CC-BY-SA-4.0 · Wikidata Q132559093
  - name: 弦纹网纹彩陶壶
    period: 马家窑文化，青海民和核桃庄拱北台遗址出土
    description: 侈口长颈鼓腹平底，从上至下通体绘彩，颈部弦纹，肩腹部网纹、圆圈十字纹和波纹。色彩艳丽，代表马家窑彩陶最高水平
  - name: 铜镜
    period: 齐家文化，约4000年前，贵南尕马台墓葬出土
    description: 正面磨光，背面有半圆形钮，饰羽状七角星纹。齐家文化铜镜是中国铜镜史的开端
  - name: 石磬
    period: 约4000年前
    description: 长96cm，宽61cm，厚4cm。打击乐器，也是古代祭祀礼器。"八音"中"石"的代表乐器
    image_url: /img/e77562d3aa30a22e.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: S099001 · CC-BY-SA-4.0 · Commons
  - name: 唐黄地联珠团窠对马锦
    period: 唐代
    description: 黄地织锦，联珠圈纹内绘蓝彩对马，对马昂首，饰飘带。典型的唐代丝路风格织锦
  - name: 明永乐铜鎏金观音像
    period: 明代
    description: 站立莲花座上，发髻高耸，头戴五花冠，双手各牵莲花一枝，帔帛卷曲而下，是一代金铜造像的典范
  - name: 玄武砚滴
    period: 魏晋，互助高寨汉墓出土
    description: 龟蛇合体造型，龟头前伸口衔小铜碗，兼具实用性和艺术性
  - name: 唐手书"羯摩经"
    period: 唐代
    description: 全长约17米，用34张纸粘连，共933行。珍贵的唐代手写佛教经卷
sources:
  - source: 百度百科·青海省博物馆（详细词条，含馆藏数据、展厅描述、文物详情）
