id: jilin
name: 吉林省博物院
lat: 43.8241
lng: 125.3506
location: 吉林省长春市南关区永顺路1666号
level: 国家一级博物馆
core_period: 高句丽（前37年-668年）、渤海国（698-926年）、近现代书画
specialty: 高句丽和渤海国文物收藏是最大特色，吉林省集安市是高句丽早期都城所在。近现代书画收藏也较丰富，藏有张大千、齐白石等名家作品。
dynasty_coverage: 新石器时代、高句丽、渤海国、辽、金、清（东北边疆）
timeline: 高句丽建国（前37年）→ 丸都城/国内城（集安，3年-427年）→ 渤海国（698-926年）→ 辽金东北经略 → 清代柳条边外
treasures:
  - name: 高句丽好太王碑拓本
  - name: 渤海三彩
  - name: 契丹金银器
  - name: 《洞庭春色赋·中山松醪赋》（苏轼）
halls:
  - name: 白山松水的记忆——吉林省历史陈列
  - name: 破晓——吉林人民革命斗争史
artifacts:
  - name: 好太王碑拓本
    period: 高句丽，414年
    description: —原碑在吉林省集安市，高6.39米，四面刻字1775字，记载了高句丽好太王（广开土王，391-412年在位）的功绩和征战事迹。是研究高句丽历史和东北亚古代关系的最重要文字资料。碑文涉及高句丽与百济、新罗、倭的战争。
  - name: 渤海三彩釉陶
    period: 渤海国，8-9世纪
    description: —仿唐三彩烧制，但釉色和造型有渤海地方特点。渤海国被称为"海东盛国"，其文化深受唐文化影响，三彩器是这种文化交流的直接证据。
  - name: 苏轼《洞庭春色赋·中山松醪赋》
    period: 北宋，1091年
    description: —苏轼晚年手书两赋合卷，笔力遒劲，是苏轼存世书法中的重要作品。此件原为清宫旧藏，后流散至东北。
  - name: 高句丽金铜佛造像
    period: 高句丽，约5-6世纪
    description: —集安出土，体现了佛教在高句丽传播的实况。高句丽佛教艺术受中原北朝影响，同时向朝鲜半岛和日本传播。
  - name: 青花云龙纹高足碗
    period: 元代
    description: —元代青花瓷精品，体现了元代东北地区与中原的密切联系。
    image_url: /img/4c2eb8ca263a0492.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Kcx36 · CC-BY-SA-4.0 · Commons
  - name: 辽代鎏金铜观音像
    period: 辽代
    description: —造型端庄，工艺精湛，反映了辽代佛教在东北地区的兴盛。
sources:
  - source: "吉林省博物院官网: https://www.jlmuseum.org/"
