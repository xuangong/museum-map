id: 232d4da5-550c-49eb-89e0-042c913657c8
name: 成都武侯祠博物馆
lat: 30.6419
lng: 104.0453
location: 四川省成都市武侯区武侯祠大街231号
level: 国家一级博物馆
core_period: 汉末三国（公元2世纪末—3世纪中）
specialty: 三国历史文化、诸葛亮与刘备祭祀文化、蜀汉文物
dynasty_coverage: 东汉末年至蜀汉（约184年—263年）
timeline: 始建于西晋末年，明初与汉昭烈庙合并，现为全国唯一君臣合祀祠庙；1961年列入全国重点文物保护单位，1984年正式建立博物馆
treasures:
  - name: 唐碑（蜀丞相诸葛武侯祠堂碑）
  - name: 攻心联匾（清·赵藩撰）
  - name: 明豆青釉诸葛碗
  - name: 蜀汉铭文青铜弩机
  - name: 东汉四耳蹲蛙青铜鼓
  - name: 惠陵（刘备陵寝）
halls:
  - name: 汉昭烈庙（刘备殿）
  - name: 武侯祠（诸葛亮殿）
  - name: 三义庙
  - name: 惠陵（刘备墓）
  - name: 锦里古街区
  - name: 文物陈列馆
artifacts:
  - name: 明豆青釉诸葛碗
    period: 明代
    description: 豆青釉瓷碗，与诸葛亮传说相关联的典型文物
    image_url: https://upload.wikimedia.org/wikipedia/commons/a/a9/Zhuge_bowl.jpg
    image_license: CC-BY-SA-3.0
    image_attribution: Shizhao
  - name: 蜀汉铭文青铜弩机
    period: 蜀汉（三国）
    description: 铸有铭文的青铜弩机，为蜀汉军事文物的重要实物证据
    image_url: https://upload.wikimedia.org/wikipedia/commons/9/9e/%E5%BB%B6%E7%86%99%E5%8D%81%E5%85%AD%E5%B9%B4%E8%9C%80%E6%B1%89%E9%93%AD%E6%96%87%E9%9D%92%E9%93%9C%E5%BC%A9%E6%9C%BA.jpg
    image_license: CC0
    image_attribution: Remixia
  - name: 东汉四耳蹲蛙青铜鼓
    period: 东汉
    description: 四耳造型蹲蛙装饰青铜鼓，反映汉代礼乐文化
  - name: 唐裴度撰《蜀丞相诸葛武侯祠堂碑》
    period: 唐代
    description: 由唐代名臣裴度撰文、柳公绰书丹、鲁建镌刻，史称'三绝碑'，为祠内镇馆之宝
    image_url: https://upload.wikimedia.org/wikipedia/commons/d/d0/%E8%9C%80%E4%B8%9E%E7%9B%B8%E8%AF%B8%E8%91%9B%E6%AD%A6%E4%BE%AF%E7%A5%A0%E5%A0%82%E7%A2%91-%E5%94%90%E5%85%83%E5%92%8C%E5%9B%9B%E5%B9%B4.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Kcx36
  - name: 清赵藩撰《攻心联》匾
    period: 清代
    description: 清末赵藩撰写的名联，毛泽东曾多次观摩，具有极高历史与文化价值
    image_url: https://upload.wikimedia.org/wikipedia/commons/7/71/%E6%88%90%E9%83%BD%E6%AD%A6%E4%BE%AF%E7%A5%A0%E6%94%BB%E5%BF%83%E8%81%94_%E7%BF%BB%E5%88%BB%E6%8B%93%E6%9C%AC2_2025-08-07.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Kcx36
dynasty_connections:
  - dynasty: 蜀汉
    description: 供奉蜀汉昭烈帝刘备及丞相诸葛亮，是蜀汉政权历史的核心纪念地
  - dynasty: 西晋
    description: 武侯祠始建于西晋，为纪念诸葛亮所建
  - dynasty: 明
    description: 明初将汉昭烈庙与武侯祠合并为一祠，形成君臣合祀格局
