id: sanxingdui
name: 三星堆博物馆
lat: 31.0007
lng: 104.2073
location: 四川省广汉市西安路133号
level: 国家一级博物馆
core_period: 古蜀文明(约前1600-前1100年,相当于商代)
specialty: 中国考古史上最具颠覆性的发现之一。巨大的青铜纵目面具、黄金面罩、青铜神树等完全不同于中原商文明的风格,揭示了一个平行于商朝的独立文明体系。2020-2022年新坑发掘引发全球关注。
dynasty_coverage: 古蜀文明(商代同时期),与中原商文明平行
timeline: 三星堆文明(前1600-前1100年)与商文明同期但风格迥异,证明中国文明并非单一中原起源,而是多元并起。三星堆衰落后,文明中心转移至成都金沙(前1200-前600年)。
treasures:
  - name: 1. 青铜纵目面具(商)- 眼球突出16cm的巨型面具,可能代表蜀王蚕丛
halls:
  - name: 新馆全部(2023年开放的新展馆设计一流)
  - name: 祭祀坑出土物展区
artifacts:
  - name: 青铜纵目面具
    period: 商,前1300-前1100年
    description: 宽1.38米,眼球柱状外突16cm。可能是传说中蜀王蚕丛"纵目"的写照,也可能是巫师通神的面具
    image_url: /img/wikimedia/wikipedia/commons/9/9b/%E9%9D%92%E9%93%9C%E7%BA%B5%E7%9B%AE%E9%9D%A2%E5%85%B7B.jpg
