    description: 残高3.96米(完整约5米),树上9枝、9鸟(太阳鸟),可能是扶桑树或建木的写照
    image_url: /img/wikimedia/wikipedia/commons/d/d3/%E2%85%A0%E5%8F%B7%E5%A4%A7%E5%9E%8B%E9%9D%92%E9%93%9C%E7%A5%9E%E6%A0%91.jpg
