  - name: 青铜大立人像
    period: 商
    description: 全高2.62米,双手呈环形持物(持物已佚),头戴冠,身着三层衣。可能是大祭司或蜀王
    image_url: /img/wikimedia/wikipedia/commons/2/24/%E4%B8%89%E6%98%9F%E5%A0%86%E5%87%BA%E5%9C%9F%E9%9D%92%E9%93%9C%E5%A4%A7%E7%AB%8B%E4%BA%BA%E5%83%8F%2C_2017-09-17.jpg
