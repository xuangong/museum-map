id: zhongshanguo
name: 中山古城遗址·中山国王陵陈列馆
lat: 38.334
lng: 114.142
location: 河北省石家庄市平山县三汲乡
level: 全国重点文物保护单位，遗址类博物馆
core_period: 战国中山国（前414年-前296年）
specialty: 中国唯一专门展示战国中山国历史的遗址博物馆。中山国是战国"千乘之国"，由白狄鲜虞族建立，虽非"七雄"却创造了令人惊叹的青铜文明。遗址包括中山国都城灵寿和王陵区，出土文物精美绝伦。
dynasty_coverage: 战国
timeline: 白狄鲜虞（春秋，前6世纪）→ 中山国建立（前414年）→ 鼎盛期（前4世纪中后期）→ 被赵国所灭（前296年）
