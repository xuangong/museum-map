id: anhui
name: 安徽博物院
lat: 31.8206
lng: 117.2272
location: 安徽省合肥市蜀山区（新馆）/ 庐阳区（老馆）
level: 国家一级博物馆
core_period: 新石器时代（凌家滩文化）、春秋战国（楚文化）、明清（徽文化）
specialty: 安徽地跨淮河、长江两大流域，文化兼具南北特色。馆藏以凌家滩玉器、楚国青铜器和徽州文化三大板块见长，是理解皖南徽商文化和长江中下游古代文明的重要场馆。
dynasty_coverage: 新石器时代（凌家滩）→ 商周（皖南铜矿）→ 春秋战国（楚、吴越）→ 三国（曹魏、东吴争夺）→ 宋元 → 明清（徽文化鼎盛）
timeline: 凌家滩（约前3600-前3300年）是良渚文化的重要源头之一；战国时期安徽为楚国东部重地，寿春（寿县）为楚晚期都城；明清时期徽商崛起，"无徽不成镇"，深刻影响了中国商业与文化
treasures:
  - name: 楚大鼎（铸客大鼎）
  - name: 凌家滩玉鹰
  - name: 战国鄂君启金节
  - name: 明代徽州砖雕
  - name: 北宋金棺银椁
halls:
  - name: 安徽文明史陈列
  - name: 徽州古建筑专题展
  - name: 楚文化青铜器展厅
  - name: 凌家滩玉器展区
artifacts:
  - name: 楚大鼎（铸客大鼎）
    description: 战国（约前4世纪）。中国现存最大的先秦圆鼎之一，重约400公斤，出土于寿县楚王墓，铸有"铸客"铭文，是楚国国力与青铜铸造技术的象征。
    image_url: https://upload.wikimedia.org/wikipedia/commons/8/81/Warring_States_Bronze_ZHU_KE_Ding_1a.jpg
    image_license: CC0
    image_attribution: Gary Lee Todd, Ph.D.
  - name: 凌家滩玉鹰
    description: 新石器时代（约前3500年）。玉雕展翅飞鹰，造型抽象而有力，是凌家滩文化的标志性文物，反映了史前先民的精神信仰和高超玉作工艺。
    image_url: https://upload.wikimedia.org/wikipedia/commons/f/f9/%E5%87%8C%E5%AE%B6%E6%BB%A9%E7%8E%89%E9%B9%B0.jpeg
    image_license: CC-BY-SA-4.0
    image_attribution: 章彦博
  - name: 战国鄂君启金节
    description: 战国（前323年）。楚怀王颁发给鄂君启的免税通行凭证，分车节和舟节，金质错铭，是研究楚国交通、商业和政治制度的珍贵实物。
  - name: 凌家滩玉人
    description: 新石器时代（约前3500年）。站立玉人像，双手置于胸前，是中国最早的玉雕人像之一，对理解史前社会等级和宗教仪式有重要价值。
    image_url: https://upload.wikimedia.org/wikipedia/commons/f/f3/Jade_human_figure_at_Lingjiatan_Site%2C_2017-05-21.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Siyuwj
  - name: 北宋金棺银椁
    description: 北宋（11世纪）。出土于寿县报恩寺，工艺精湛，是宋代佛教舍利瘗埋制度的重要实物。
  - name: 吴王光剑
    description: 春秋（约前5世纪）。安徽南陵出土，铸有铭文"吴王光自作用剑"，证明了安徽在吴楚争霸中的前线地位。
    image_url: https://upload.wikimedia.org/wikipedia/commons/7/70/%E5%90%B4%E7%8E%8B%E5%85%89%E5%89%91.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: 怪怪～鱼
  - name: 明代徽州三雕（砖雕、木雕、石雕）
    description: 明清。精美的建筑装饰构件，展现徽派建筑的艺术成就和徽商的文化品位。
dynasty_connections:
  - dynasty: 新石器时代（凌家滩文化）
    description: 凌家滩遗址（含山县）出土的玉器在年代上早于良渚，被认为是良渚玉器文化的重要源头之一。玉鹰、玉龟、玉人等文物展示了长江流域早期文明的高度发展。
  - dynasty: 春秋战国（楚国）
    description: 战国晚期楚国迁都寿春（今寿县），安徽成为楚文化的核心区域。铸客大鼎等重器反映了楚国的强盛与衰亡。鄂君启金节则揭示了楚国发达的水陆交通网络。
  - dynasty: 明清（徽文化）
    description: 明中期至清中期，徽商是中国最强大的商帮之一，经营盐业、茶叶、木材等。徽商"贾而好儒"，推动了徽派建筑、新安画派、徽墨歙砚等文化成就。安徽博物院是理解徽文化全貌的最佳场馆。
sources:
  - source: "安徽博物院官网: https://www.ahm.cn/"
