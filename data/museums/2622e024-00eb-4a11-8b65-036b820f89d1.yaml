name: 南京鸡鸣寺
lat: 32.0558
lng: 118.7838
location: 南京市玄武区鸡鸣寺路1号
level: 南京市级文物保护单位
core_period: 西晋永康元年（300年）至今
specialty: 南朝佛教中心，素食肇始地，尼众道场；以倒坐观音、药师佛塔闻名，历史跨越东吴至今逾1700年
dynasty_coverage: 东吴、西晋、东晋、南朝（宋、齐、梁、陈）、南唐、宋、元、明、清、民国、中华人民共和国
timeline: 西晋永康元年（300年）始创道场 → 南朝梁普通八年（527年）梁武帝建同泰寺 → 南唐改称净居寺/圆寂寺 → 宋置法宝寺 → 明洪武二十年（1387年）朱元璋御题重建"鸡鸣寺" → 清康熙两度大修、康熙题匾 → 咸丰年间毁于兵火、同治年间重修 → 1958年改为尼众道场 → 1979年政府决定重建 → 1983年起按明清规制复建 → 1985年重新对外开放
