id: longmen
name: 龙门石窟
lat: 34.4653
lng: 112.471
location: 河南省洛阳市洛龙区龙门镇,伊河两岸
level: 全国重点文物保护单位 / UNESCO世界文化遗产(2000年)
core_period: 北魏(5-6世纪)、唐代(7-8世纪)
specialty: 中国三大石窟之一(与敦煌莫高窟、大同云冈石窟并列),现存窟龛2345个、造像近11万尊、碑刻题记2860余品。北魏造像秀骨清像,唐代造像丰腴雄健,两种风格对比鲜明,是理解中国佛教艺术风格演变的最佳实地课堂。
dynasty_coverage: 北魏 → 东西魏 → 北齐 → 隋代 → 唐代 → 五代 → 北宋
timeline: 493年北魏孝文帝迁都洛阳,开始营造龙门石窟(接续云冈石窟的皇家营造传统);唐高宗和武则天时期(650-705年)是龙门第二个营造高峰,奉先寺卢舍那大佛即此时所造
