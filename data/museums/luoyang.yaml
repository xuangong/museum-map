id: luoyang
name: 洛阳博物馆
lat: 34.619
lng: 112.454
location: 河南省洛阳市洛龙区聂泰路
level: 国家一级博物馆
core_period: 夏商周（二里头-东周王城）、东汉、魏晋北朝、隋唐（东都洛阳）
specialty: 洛阳是中国建都朝代最多的城市（夏、商、西周、东周、东汉、曹魏、西晋、北魏、隋、唐、后梁、后唐、后晋，十三朝古都），洛阳博物馆以其跨越数千年的通史藏品展现了这座都城的全部辉煌。唐三彩和北魏陶俑收藏尤为突出。
dynasty_coverage: 夏代（二里头）→ 商代 → 西周（成周）→ 东周（王城）→ 东汉 → 曹魏西晋 → 北魏 → 隋唐（东都）→ 五代
timeline: 二里头（约前1750-前1530年）被认为是夏朝晚期都城；周公营建洛邑（前1040年代），东周迁都洛阳（前770年）；东汉光武帝定都洛阳（25年）；北魏孝文帝迁都洛阳（493年）；隋唐以洛阳为东都，武则天时一度为首都
treasures:
  - name: 夏代乳钉纹青铜爵（中国最早的青铜酒器之一）
  - name: 东汉石辟邪
  - name: 曹魏白玉杯
  - name: 唐三彩黑釉马
  - name: 清代金丝楠木塔
halls:
  - name: 河洛文明"通史陈列
  - name: 宫廷文物展
  - name: 唐三彩专题展
  - name: 石刻馆
  - name: 二里头夏都遗址博物馆（关联场馆）
artifacts:
  - name: 夏代乳钉纹青铜爵
    description: 夏代（约前18世纪）。二里头遗址出土，是中国已知最早的青铜容器之一，造型朴素，但标志着中国青铜时代的开端。
  - name: 东汉石辟邪
    description: 东汉（2世纪）。青石雕刻的辟邪（天禄），体型庞大，昂首挺胸，造型雄浑有力，是东汉石刻艺术的代表作。
  - name: 曹魏白玉杯
    description: 三国曹魏（3世纪）。纯白玉质，素面无纹，造型简洁高雅，是三国时期极罕见的玉器精品。
  - name: 唐三彩黑釉马
    description: 唐代（8世纪）。唐三彩以黄、绿、白三色为主，黑釉极为罕见。此马造型雄健，黑釉光亮如漆，是唐三彩中的极品。
  - name: 北魏泥塑人面像
    description: 北魏（5-6世纪）。永宁寺塔基遗址出土，面容温和慈祥，彩绘保存良好，是北魏佛教塑像的代表。永宁寺塔高约百米，是古代中国最高的建筑之一。
    image_url: /img/3d0e95928669e393.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Baomi · CC-BY-SA-4.0 · Commons
  - name: 清代金丝楠木塔
    description: 清代（18世纪）。高约1.8米，以金丝楠木精工雕刻，层层飞檐，密布佛像，是清代木雕工艺的巅峰。
  - name: 东周错金银铜鼎
    description: 东周（战国）。以金银丝嵌入青铜器表面形成精美纹饰，反映了东周洛阳作为天子之都的工艺水平。
dynasty_connections:
  - dynasty: 夏代
    description: 二里头遗址（洛阳偃师）是探索夏文明的核心遗址，出土了中国最早的宫殿建筑基址、青铜礼器和绿松石龙形器。虽然"二里头=夏都"仍有学术讨论，但它无疑是中华文明从新石器时代向青铜时代转变的关键节点。
  - dynasty: 东周
    description: 前770年周平王东迁洛邑，开启东周（春秋战国）五百余年。虽然周天子实权渐失，但洛阳作为天下共主的象征地位始终存在。"问鼎中原"的成语即来自楚庄王向周使询问九鼎轻重的典故。
  - dynasty: 东汉与魏晋
    description: 光武帝刘秀定都洛阳，东汉近200年以洛阳为政治中心。曹魏、西晋继承这一格局。洛阳太学、白马寺（中国第一座佛寺）、"洛阳纸贵"的典故都出自这一时期。
  - dynasty: 北魏
    description: 493年孝文帝迁都洛阳推行汉化，开凿龙门石窟，建造永宁寺塔。北魏洛阳城极盛时人口超60万，杨衒之《洛阳伽蓝记》记录了这座城市的繁华与衰落。
  - dynasty: 隋唐
    description: 隋炀帝营建东都洛阳，修建大运河以洛阳为中心。唐代洛阳为东都，武则天时期改称"神都"，是事实上的首都。洛阳在中国历史上反复担任都城角色，其地位之持久无出其右。
sources:
  - source: "洛阳博物馆官网: https://www.lymuseum.com/"
