id: gugong
name: 故宫博物院
lat: 39.9163
lng: 116.3972
location: 北京市东城区景山前街4号
level: 国家一级博物馆 / 世界文化遗产（1987年）
core_period: 明清（1368-1912）
specialty: 世界上现存规模最大、保存最完整的木质结构古建筑群。藏品180余万件（套），涵盖书画、陶瓷、青铜、玉器、宫廷用品。建筑本身即是最大的展品。
dynasty_coverage: 明、清为主，藏品横跨新石器至清末
timeline: 明永乐帝迁都北京（1420年建成）→ 明清两代24位皇帝居所 → 1925年建院。宫廷收藏的集大成者。
treasures:
  - name: 1. 《清明上河图》（北宋·张择端）— 中国十大传世名画之首
halls:
  - name: 珍宝馆（宁寿宫区）
  - name: 钟表馆（奉先殿）
  - name: 书画馆
  - name: 陶瓷馆
