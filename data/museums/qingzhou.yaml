id: qingzhou
name: 青州博物馆
lat: 36.6907
lng: 118.4755
location: 山东省潍坊市青州市范公亭西路1号（新馆2023年开放）
level: 国家一级博物馆（2008年，首批县级市国家一级博物馆）
core_period: 南北朝（龙兴寺佛教造像）、汉代（香山汉墓）
specialty: 中国首批国家一级博物馆中唯一的县级市博物馆，有"小大博物馆"之称。馆藏文物5万余件，国家珍贵文物3000余件。1996年龙兴寺遗址出土的400余尊佛教造像震惊世界，被誉为"改写东方艺术史的杰作"。新馆设8个展厅，汉唐风格建筑。博物馆渊源可追溯至1887年英国传教士怀恩光在培真书院设立的博物堂，是中国最早的博物馆之一。
dynasty_coverage: 史前 → 先秦 → 两汉（香山汉墓）→ 南北朝（龙兴寺/佛教高峰）→ 唐宋 → 明（衡王府/赵秉忠状元卷）→ 清
timeline: 青州是古九州之一，东汉至南北朝时期是重要的政治文化中心。南北朝时期佛教在青州极为兴盛，形成了独特的"青州风格"佛教造像——面含微笑、衣薄贴体、彩绘贴金，与中原和南方风格均不同。
treasures:
  - name: 1. 龙兴寺佛教造像群（北魏至北齐
  - name: 400余尊）— "青州微笑"
  - name: 改写东方艺术史
halls:
  - name: 青州微笑——龙兴寺遗址出土佛教造像艺术展"（核心展）
  - name: 汉梦华章——香山汉墓陪葬坑出土文物展
  - name: 信美东方第一州——青州历史陈列
  - name: 有邻衡王府——衡王府历史文化专题厅
artifacts:
  - name: 龙兴寺佛教造像群
    period: 北魏至北齐，1996年出土
    description: 400余尊佛教石雕造像，多为圆雕，保存了大量原始彩绘和贴金。"青州微笑"成为标志性形象。北齐贴金彩绘石雕菩萨立像（通高165cm）是其中杰出代表，被誉为"改写东方艺术史的杰作"
  - name: 明万历赵秉忠殿试卷
    period: 1598年
    description: 中国目前发现的唯一一件存世状元卷原件（明万历二十六年状元赵秉忠的殿试策论），对研究明代科举制度价值极高
  - name: 东汉"宜子孙"玉璧
    period: 西汉，2006年发掘
    description: 2000余件彩绘陶俑和2000余件青铜/铁质武器，是了解汉代仪仗制度的珍贵实物。被评为当年全国重要考古发现
  - name: 战国玉人
    period: 北齐
    description: 通高165cm，360度圆雕。头戴透雕花蔓冠，璎珞华丽，裙带上装饰九方浅浮雕图案
