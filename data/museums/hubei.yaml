    period: 前433年
    description: 总重2567kg，音域跨五个半八度，可演奏中外乐曲。铭文2828字，记载了先秦乐律学体系
    image_url: https://upload.wikimedia.org/wikipedia/commons/9/9e/%E6%9B%BE%E4%BE%AF%E4%B9%99%E7%BC%96%E9%92%9F%E9%92%9F%E7%B0%A86.jpg
