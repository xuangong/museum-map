id: hubei
name: 湖北省博物馆
lat: 30.5674
lng: 114.373
location: 湖北省武汉市武昌区东湖路160号
level: 国家一级博物馆
core_period: 先秦（楚文化）、春秋战国
specialty: 曾侯乙墓出土文物是镇馆之基，尤其是编钟——改写了世界音乐史。楚文化收藏全国最强，漆器、丝绣、青铜器系统完整。
dynasty_coverage: 春秋战国（楚国、曾国）为核心，秦（云梦秦简）、元明亦有精品
timeline: 曾侯乙墓（前433年）是战国早期最重要的考古发现之一。曾国（随国）地处楚国北界，墓葬反映了楚文化圈的辐射范围和先秦礼乐制度的实物面貌。
treasures:
  - name: 1. 曾侯乙编钟（战国早期）— 65件青铜编钟
  - name: 可演奏完整音阶
  - name: 2400年前的乐器奇迹
halls:
  - name: 曾侯乙展厅（核心）
  - name: 楚文化展
  - name: 编钟演奏（每日定时）
  - name: 梁庄王墓展
artifacts:
