id: kaifeng
name: 开封博物馆
lat: 34.7872
lng: 114.3076
location: 河南省开封市鼓楼区
level: 国家一级博物馆
core_period: 北宋（960-1127年，东京汴梁）
specialty: 开封（古称汴梁、东京）是北宋都城，当时世界最大、最繁华的城市。开封博物馆以北宋文物为核心，结合战国魏国大梁、唐五代汴州等历史层次，展现这座"八朝古都"的文化积淀。因黄河多次泛滥，宋代地层深埋地下数米，考古发掘难度极大，使得每一件出土文物都格外珍贵。
dynasty_coverage: 战国（魏国大梁）→ 唐代（汴州）→ 五代（后梁、后晋、后汉、后周都城）→ 北宋（东京）→ 金代（南京） → 明清
timeline: 战国魏惠王迁都大梁（前364年）→ 五代后梁定都开封（907年）→ 赵匡胤陈桥兵变建宋（960年）→ 北宋东京极盛期人口过百万 → 靖康之变（1127年）金军破城 → 此后开封不复为大一统王朝首都
