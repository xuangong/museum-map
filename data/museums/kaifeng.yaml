artifacts:
  - name: 北宋"开封府题名记"碑
    description: 北宋（960-1127年）。碑上刻有历任开封府知府的姓名和任期，包括包拯、欧阳修、范仲淹等名臣。包拯名下石面凹陷，相传是后人仰慕其清廉正直，不断触摸所致。
    image_url: /img/wikimedia/wikipedia/commons/2/24/20241025_Stele_of_the_Namelist_of_the_Governors_of_Kaifeng_Fu.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Windmemories
  - name: 北宋鎏金铜塔
    description: 北宋（11世纪）。塔身鎏金，做工精细，层次分明，是宋代金属工艺和佛教文化的代表。
  - name: 石守信墓志
    description: 北宋（979年）。石守信是参与陈桥兵变的功臣之一，也是"杯酒释兵权"的当事人。其墓志详细记载了生平，是研究宋初政治的重要实物。
  - name: 宋代陶瓷器
    description: 北宋。开封作为都城，汇集了各大窑口的精品瓷器。虽然宋代开封地层深埋，出土品不多，但每一件都具有重要的断代和审美价值。
    image_url: https://upload.wikimedia.org/wikipedia/commons/e/ed/%E6%B1%9D%E7%AA%AF_%E9%9D%92%E7%93%B7%E8%93%AE%E8%8A%B1%E5%BC%8F%E6%BA%AB%E7%A2%97_%E7%B4%B0%E7%AF%80.png?utm_source=commons.wikimedia.org&utm_campaign=imageinfo&utm_content=original
    image_license: CC-BY-4.0
    image_attribution: 國立故宮博物院
  - name: 繁塔宋代石刻佛像
    description: 北宋（977年）。繁塔是开封现存最古老的建筑，塔壁嵌有大量宋代石刻佛像，风格质朴。
  - name: 明代万历青花五彩大罐
    description: 明万历（16世纪末）。体量大，纹饰繁缛，色彩艳丽，是明晚期景德镇五彩瓷的代表作。
  - name: 朱仙镇木版年画
    description: 明清。朱仙镇（开封南）是中国木版年画的发源地之一，画风古朴，色彩浓烈，对天津杨柳青等年画产地有重要影响。
    image_url: /img/wikimedia/wikipedia/commons/9/98/20241025_Black_Wood_Block_for_Nianhua_Printing%2C_ROC_Period_%281912-1949%29_01.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Windmemories
dynasty_connections:
  - dynasty: 北宋（960-1127年）
    description: 这是开封历史上最辉煌的时期。北宋东京是当时世界上最大的城市，人口超过百万，商业繁荣，文化昌盛。    - **城市文明**：张择端《清明上河图》（藏故宫博物院）描绘的就是北宋东京的市井生活。东京打破了唐代坊市分离的城市格局，出现了开放式的街市和夜市，是中国城市史上的革命性变化。    - **文化巅峰**：北宋东京是中国古代文化的巅峰时期之一。活字印刷、火药、指南针在此时成熟并传播；宋词达到极盛；宋代五大名窑（汝、官、哥、定、钧）代表了中国陶瓷美学的最高成就。    - **靖康之变**：1127年金军攻破东京，掳走宋徽宗、宋钦宗及宗室后妃数千人北去，北宋灭亡。这是中国历史上最惨痛的事件之一，"靖康耻"成为此后南宋乃至后世的集体记忆。
  - dynasty: 黄河与开封
    description: 开封的悲剧在于黄河。历史上黄河多次在开封附近决口泛滥，宋代以来的开封城层层叠压地下，形成"城摞城"的独特现象。地下6-8米处是宋代地层，这使得考古发掘极为困难，也让每一件出土文物都弥足珍贵。
sources:
