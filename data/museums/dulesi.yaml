id: dulesi
name: 蓟州独乐寺
lat: 40.0464
lng: 117.407
location: 天津市蓟州区武定北街41号
level: 第一批全国重点文物保护单位（1961年）
core_period: 辽统和二年（984年）
specialty: 八大辽构之一。山门为现存最早的庑殿顶山门，观音阁为现存最早的木结构楼阁，二者皆建于辽统和二年（984年）。1932 年梁思成在此完成中国营造学社首次大型测绘。
dynasty_coverage: 辽（主体）、明、清
timeline: 辽统和二年重建山门与观音阁（984年）→ 明清多次修缮 → 1932年梁思成测绘 → 1961年第一批国保 → 1976年唐山大地震完好幸存
treasures:
  - name: 山门（辽，984年，最早庑殿顶山门）
  - name: 观音阁（辽，984年，最早木构楼阁）
  - name: 十一面观音立像（辽代彩塑，高16.08米）
  - name: 山门内辽代天王彩塑
  - name: 观音阁内辽代壁画
halls:
  - name: 山门
  - name: 观音阁
  - name: 韦驮亭
  - name: 报恩院
artifacts:
  - name: 观音阁
    period: 辽，984年
    description: —面阔五间，进深四间，外观二层而内部实为三层（含暗层），通高约23米，全木榫卯。歇山顶，斗栱雄浑，整体造型与雕饰直承唐风。1976年唐山地震中虽距震中近，结构仍完好——梁思成称其"独高古之美，在国内现存木建筑中无与伦比"。
    image_url: /img/f7728cfb5aa1ee0b.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Xin
  - name: 山门
    period: 辽，984年
    description: —面阔三间，进深两间，单檐庑殿顶，是中国现存最早的庑殿顶山门，也是现存唐辽样式之最完整者。门内塑哼哈二将，为辽代原作。
    image_url: /img/962a29f5cfb225fc.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Xin
  - name: 十一面观音立像
    period: 辽，984年
    description: —观音阁主像，高16.08米，是中国现存最高的辽代彩塑立像。头顶十一面（象征观音的十一种化身），通过观音阁三层贯通的中空结构容纳。
  - name: 观音阁辽代壁画
    period: 辽（部分明代重描）
    description: —阁内四壁绘十六罗汉与二明王，构图古朴，线条厚重，是辽代寺观壁画的珍贵遗存（明代曾覆盖重绘，1972年揭出辽代底层）。
sources:
  - source: 国家文物局：全国重点文物保护单位（第一批，1961年）
  - source: 梁思成《蓟县独乐寺观音阁山门考》，《中国营造学社汇刊》1932年
  - source: https://zh.wikipedia.org/wiki/%E7%8B%AC%E4%B9%90%E5%AF%BA
