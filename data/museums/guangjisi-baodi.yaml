id: guangjisi-baodi
name: 宝坻广济寺
lat: 39.717
lng: 117.311
location: 天津市宝坻区城关镇（原址，2005年仿古复建）
level: 原"八大辽构"之一（已毁，仿建）
core_period: 辽太平五年（1025年）
specialty: 原八大辽构之一。三大士殿建于辽太平五年（1025年），1932 年梁思成、刘敦桢实地测绘并发表专题论文，确认其为辽代官式建筑标本。1947 年三大士殿被拆毁，2005 年在原址按梁思成测绘图仿古复建。原构虽毁，但梁思成留下的详尽图纸使其成为研究辽代官式建筑的关键文献资料。
dynasty_coverage: 辽（原构）、现代仿建
timeline: 辽太平五年三大士殿建成（1025年）→ 1932年梁思成、刘敦桢实地测绘 → 1947年三大士殿被拆毁 → 2005年在原址按梁思成图纸仿古复建
treasures:
  - name: 三大士殿（原辽构，1947年毁）
  - name: 梁思成《宝坻广济寺三大士殿》测绘图（1932）
  - name: 复建殿宇（2005年）
halls:
  - name: 山门
  - name: 三大士殿（仿建）
  - name: 配殿
artifacts:
  - name: 原三大士殿（已毁）
    period: 辽，1025年
    description: —面阔五间、进深四间，单檐庑殿顶，殿内供文殊、普贤、观音三大士菩萨。梁思成 1932 年测绘后撰文："广济寺三大士殿……出檐深远、斗栱雄大，与日本平等院凤凰堂一脉相承。"该殿 1947 年被拆毁。
  - name: 梁思成测绘图与论文
    period: 中华民国，1932年
    description: —梁思成、刘敦桢实地测绘后发表《宝坻广济寺三大士殿》（《中国营造学社汇刊》第三卷第四期），是中国营造学社最早的辽构专题报告之一，留下了原构最完整的图像与尺寸记录。
  - name: 复建三大士殿
    period: 当代，2005年
    description: —按梁思成 1932 年测绘图纸在原址仿古复建，材料与工艺尽量贴近辽代原制。
sources:
  - source: 梁思成、刘敦桢《宝坻广济寺三大士殿》，《中国营造学社汇刊》1932年
  - source: 天津市文物局：广济寺三大士殿历史与复建资料
  - source: https://zh.wikipedia.org/wiki/%E5%AE%9D%E5%9D%BB%E5%BB%A3%E6%B5%8E%E5%AF%BA
