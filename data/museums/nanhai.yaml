id: nanhai
name: 广东海上丝绸之路博物馆（南海一号）
lat: 21.58
lng: 111.92
location: 广东省阳江市海陵岛十里银滩
level: 国家一级博物馆
core_period: 南宋（约1183年）
specialty: 中国乃至世界水下考古的里程碑。"南海一号"是一艘南宋时期的远洋贸易商船，1987年发现，2007年整体打捞出水（世界首次沉船整体打捞），2013年起全面保护发掘。共出水文物18万余件，其中瓷器约16万件套，铁器凝结物124吨。沉船残长约21.91m，最大船宽约9.87m，属"福船"类型，估计排水量600吨、载重近800吨。2025年11月"水晶宫"首次对公众开放。
dynasty_coverage: 南宋（约1183年，淳熙年间）
timeline: 南海一号是南宋海上丝绸之路的"时间胶囊"。船上货物以瓷器和铁器为主，瓷器涵盖景德镇、龙泉、德化、磁灶等南宋主要外销瓷窑口。部分陶瓷带有阿拉伯风格，部分铁器凝结物含有标记"梁宅"等印文——考古已确认部分陶瓷器产自广东南海的奇石窑和文头岭窑。始发港为泉州，曾停靠广州，目的地为东南亚或中东。
treasures:
  - name: 1. 南海一号沉船船体 — 南宋远洋商船
  - name: 世界首次整体打捞
halls:
  - name: 水晶宫"（沉船原址保护展示）
  - name: 南海一号出水文物陈列
artifacts:
  - name: 南海一号沉船船体
    period: 南宋，约1183年
    description: 残长21.91m，最大宽9.87m。14道隔舱壁，属福船类型。采用了升降船舵和"可倒桅"技术（中国发明，14世纪才传入欧洲）。宋代造船史上的"活标本"
  - name: 外销瓷器（约16万件套）
    period: 南宋孝宗1174-1189年
    description: 船上最晚年号铜钱，结合德化瓷罐上"癸卯"（1183年）墨书，推定沉船出航约在1183年
sources:
