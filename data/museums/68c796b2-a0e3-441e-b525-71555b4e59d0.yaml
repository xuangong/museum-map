  - name: 玑衡抚辰仪
    period: 清乾隆十九年（1754年）
    description: 由德国人戴进贤、斯洛文尼亚人刘松龄设计监制，重5145千克，高3.379米，代表清代工艺技术的最高成就
  - name: 嫦娥五号月球样品
    period: 2020年（现代）
    description: 嫦娥五号任务带回的月壤，馆藏0.6克，是重要的现代天文科普展品
    image_url: /img/823544fda928234f.jpg
    image_license: CC-BY-4.0
    image_attribution: China News Service · CC-BY-4.0 · Commons
dynasty_connections:
  - dynasty: 元
    description: 元至元十六年（1279年），天文学家王恂、郭守敬在此建立司天台，奠定古观象台选址基础
  - dynasty: 明
    description: 明正统七年（1442年）改筑为观星台，隶属钦天监；正统十一年增修晷景堂等建筑
  - dynasty: 清
    description: 清顺治元年接收钦天监并改称观象台；康熙年间由南怀仁设计增置6架西式铜制天文仪器；乾隆十九年（1754年）铸造玑衡抚辰仪；光绪年间8件仪器被八国联军劫走后陆续归还
  - dynasty: 民国
    description: 民国十年仪器复原，民国十八年改为国立天文陈列馆，民国二十年后部分仪器转移至南京
