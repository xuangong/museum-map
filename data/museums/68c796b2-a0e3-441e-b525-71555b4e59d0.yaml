id: 68c796b2-a0e3-441e-b525-71555b4e59d0
name: 北京天文馆
lat: 39.9375
lng: 116.3449
location: 北京市西城区西直门外大街138号（主馆）；北京市东城区建国门内大街东裱褙胡同2号（古观象台）
level: 国家一级博物馆、国家AAAA级旅游景区（主馆）；全国重点文物保护单位（古观象台）
core_period: 1957年正式对外开放至今（主馆）；明正统七年（1442年）建立至今（古观象台）
specialty: 天文科普教育、天文展览与科普剧场；集现代天文馆与历史皇家天文台于一体，是亚洲大陆第一座大型天文馆
dynasty_coverage: 元、明、清、民国、现代
timeline: 元至元十六年（1279年）郭守敬于此建司天台；明正统七年（1442年）改筑为观星台；清代增置西方天文仪器；1957年北京天文馆主馆对外开放；2004年在原址扩建新馆（B馆）
treasures:
  - name: 嫦娥五号月壤样品（0.6克月球样品）
  - name: 世界上唯一保存完整、配套齐全的大型天文青铜仪器群（古观象台八架清代仪器）
  - name: 傅科摆
  - name: 南丹陨石
  - name: 月球陨石
  - name: 天球仪
halls:
  - name: A馆展厅
  - name: B馆展厅
  - name: 天象厅
  - name: 宇宙剧场
  - name: 4D剧场
  - name: 3D剧场
  - name: 古观象台·紫微殿
  - name: 古观象台·东厢房
  - name: 古观象台·西厢房
artifacts:
