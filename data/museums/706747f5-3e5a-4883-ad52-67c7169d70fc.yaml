id: 706747f5-3e5a-4883-ad52-67c7169d70fc
name: 天坛公园
lat: 39.8814
lng: 116.4074
location: 北京市东城区天坛内东里7号
level: 全国重点文物保护单位（1961年）、世界文化遗产（1998年）
core_period: 明清时期
specialty: 中国现存规模最大、保存最完整的古代皇家祭天建筑群，明清两代皇帝举行祭天、祈谷典礼的场所
dynasty_coverage: 明、清两代（1420—1911年）
timeline: 1420年（明永乐十八年）建成北京天地坛；1530年（明嘉靖九年）天地分祀，建圜丘，天坛由此得名；1751年（清乾隆十六年）改大享殿为祈年殿；1889年（清光绪十五年）祈年殿毁于雷火后重建；1918年辟为公园对外开放；1998年列入世界文化遗产名录
treasures:
