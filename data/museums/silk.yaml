id: silk
name: 中国丝绸博物馆
lat: 30.2244
lng: 120.1575
location: 浙江省杭州市西湖区玉皇山路73-1号
level: 国家一级博物馆
core_period: 新石器时代至明清（中国丝绸五千年通史）
specialty: 世界上最大的丝绸专题博物馆。占地42286㎡，建筑面积22999㎡，建筑整体为蚕的造型。馆藏文物70246件/套（截至2022年），珍贵文物5093件/套。设有中国纺织品鉴定保护中心和纺织品文物保护国家文物局重点科研基地。丝绸之路沿线出土的汉唐织物、辽金服饰、宋代服饰、明清官机产品为核心收藏。
dynasty_coverage: 新石器时代（浙江出土距今5000余年丝线）→ 商周（丝织起步）→ 秦汉（丝路开通）→ 魏晋南北朝（绞缬工艺）→ 隋唐（丝路繁荣高峰）→ 宋元（织锦技术革新）→ 明清（官营织造/缂丝/刺绣高峰）
timeline: 中国是世界上最早发明丝绸的国家。浙江余姚河姆渡和钱山漾遗址出土了距今约5000年的丝线和丝织物残片。丝绸之路即因中国丝绸而得名。从先秦到明清，丝绸始终是中国最重要的出口商品和文化符号。
treasures:
  - name: 1. 战国对龙对风纹锦 — 中国早期丝织技术代表
halls:
  - name: 丝绸故事陈列"（丝绸厅→丝绸之路连廊→服饰厅）
  - name: 丝绸工艺陈列"（蚕桑厅→染织厅→织造坊
  - name: 含古代织机操作演示）
  - name: 纺织品文物修复展示馆
  - name: 时装馆
artifacts:
  - name: 战国对龙对风纹锦
    period: 战国
    description: 中国早期丝织技术的代表作，图案对称精美
  - name: 汉晋长葆子孙锦
    period: 北朝
    description: 长192cm，宽72cm，交领大袖，面料用绞缬工艺染出黄色小点纹。是中国目前所知最早的绞缬（扎染）丝绸服饰实物之一
  - name: 唐朵花纹蓝地蜡缬绢
    period: 唐代
    description: 长78cm，宽51cm，蜡缬是唐代"三缬"（绞缬/蜡缬/夹缬）之一
    image_url: /img/89f8f46c3cd3c3ee.png
    image_license: fair-use
    image_attribution: 来源：百度百科 · https://baike.baidu.com/item/%E5%94%90%E6%9C%B5%E8%8A%B1%E7%BA%B9%E8%93%9D%E5%9C%B0%E8%9C%A1%E7%BC%AC%E7%BB%A2
  - name: 唐立狮宝花纹锦
    period: 唐代
    description: 典型的"陵阳公样"（联珠环内动物纹与中国花卉纹的结合），反映丝路文化交融
  - name: 元代菱地飞鸟纹绫海青衣
    period: 元代
    description: 衣长119cm，袖长224cm，右衽交领，肩部可伸出手臂，后襟开衩便于骑马。袖肩有钉金高绣，是元代游牧民族服饰与中原丝绸工艺结合的杰作
    image_url: /img/5394d8729bc3fbdf.png
    image_license: fair-use
    image_attribution: 来源：百度百科 · https://baike.baidu.com/item/%E5%85%83%E4%BB%A3%E8%8F%B1%E5%9C%B0%E9%A3%9E%E9%B8%9F%E7%BA%B9%E7%BB%AB%E6%B5%B7%E9%9D%92%E8%A1%A3
  - name: 宋代花罗裙裤
    period: 宋代
    description: 江南出土的宋代丝绸服饰，反映宋代丝织工艺的精细
dynasty_connections:
  - dynasty: 起源（新石器-商周）
    description: 浙江出土的距今5000年丝线证明中国是丝绸的发源地
  - dynasty: 丝路时代（秦汉-唐）
    description: 汉代张骞通西域后，丝绸成为连接东西方的纽带。馆藏大量丝路出土的汉唐织物是这一辉煌时代的实物证据
  - dynasty: 技术高峰（宋元明清）
    description: 宋代花罗、元代织金、明清缂丝和刺绣将丝织技艺推向新高度。明清官营织造（江宁/苏州/杭州三织造）产出了最精美的丝绸制品
sources:
  - source: 百度百科·中国丝绸博物馆（详细词条，含馆藏数据、展厅描述、文物详情）
