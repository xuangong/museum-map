artifacts:
  - name: 文殊殿
    period: 辽，应历十六年（966年）
    description: —面阔三间、进深三间，平面近方形，单檐歇山顶。是中国现存有确切纪年的最早辽代木构建筑，比独乐寺早 18 年、比应县木塔早 90 年。斗栱用材硕大，整体气韵直追唐代风范。门窗格扇为辽代柏木原物，国内罕见。
    image_url: /img/1b1d5c643b891680.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Patrick20242023 · CC-BY-SA-4.0 · Commons
  - name: 辽代铁钟
    period: 辽寿昌五年（1099年）
    description: —高约 1.6 米，重约 1500 公斤，钟身铸有飞天图像与汉文、契丹文铭文，是研究辽代金属铸造与契丹文字的重要实物。
    image_url: /img/fe24ad8107bf7c2a.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: 陳寅恪 · CC-BY-SA-4.0 · Commons
  - name: 殿内辽代彩塑残件
    period: 辽
    description: —文殊殿原供文殊菩萨与胁侍像，现存辽代塑像基础与少量残件，明代曾在原基础上重塑。
  - name: 明代壁画
    period: 明，成化年间
    description: —文殊殿四壁绘佛教题材壁画，构图严整，色彩仍存原貌，是研究明代北方寺观壁画的重要遗存。
    image_url: /img/66e88553b8ef001b.jpg
    image_license: PD
    image_attribution: Unknown authorUnknown author · PD · Commons
