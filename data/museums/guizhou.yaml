id: guizhou
name: 贵州省博物馆
lat: 26.6152
lng: 106.6246
location: 贵州省贵阳市观山湖区林城东路107号
level: 国家一级博物馆（2020年第四批）
core_period: 夜郎/古滇文化（先秦至汉）、西南少数民族文化
specialty: 馆藏8万余件，民族文物在国内独树一帜。中国苗族服饰库和苗族银饰库位居全国第一。贵州古生物化石（三叠纪海洋爬行动物化石群）也是一大特色。新馆设"民族贵州""历史贵州""古生物王国"三大主题展厅。
dynasty_coverage: 旧石器（观音洞，距今约24万年）→ 先秦夜郎 → 秦汉（夜郎国归附）→ 唐宋（土司制度）→ 明清（改土归流/建省）→ 近现代（红军长征过贵州）
timeline: 贵州是中国旧石器时代遗址最丰富的省份之一（观音洞、穿洞等）。先秦"夜郎国"是西南最大的方国之一，汉武帝开发西南时夜郎归附。明永乐十一年（1413年）贵州建省。近现代，红军长征四渡赤水和遵义会议是贵州最重要的革命历史。
treasures:
  - name: 1. 东汉铜车马 — 镇馆之宝
halls:
  - name: 历史贵州"（探访观音洞→夜郎寻踪→建省之路→文教兴延→黔山红迹）
  - name: 民族贵州"（苗族/布依族/侗族民族文化
  - name: 苗族服饰和银饰精品）
  - name: 古生物王国"（瓮安生物群
  - name: 关岭三叠纪海洋爬行动物化石）
artifacts:
  - name: 东汉铜车马
    period: 东汉
    description: 镇馆之宝，铜铸车马组合，反映汉代贵州地区的冶铸技术和交通制度
    image_url: https://upload.wikimedia.org/wikipedia/commons/0/02/%E8%B4%B5%E5%B7%9E%E7%9C%81%E5%8D%9A%E7%89%A9%E9%A6%86%E9%93%9C%E8%BD%A6%E9%A9%AC.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Ycxr2007
  - name: 立虎辫耳大铜釜
    period: 先秦至汉
    description: 夜郎/古滇文化的标志性青铜重器
  - name: 石寨山铜鼓
    period: 宋代，1987年平坝棺材洞出土
    description: 裙腰麻质，裙身棉质土布，蜡染鹭鸟纹，中国古代蜡染工艺的珍贵实物
  - name: 明刻花龙头金手镯
    period: 明代，1954年遵义高坪明墓出土
    description: 直径6.9cm，重79.9g，圆梗形式，两端龙头相对
  - name: 苗族银饰精品
    period: 清至近代
    description: 国内最大的苗族银饰收藏，包括银冠、银项圈、银锁等
  - name: 萨斯特鱼龙化石
    period: 三叠纪，约2.2亿年前
    description: 关岭出土，体型较大，保存完整
  - name: 苗族服饰库
    period: 历代
    description: 全国第一的苗族服饰收藏，反映苗族支系的多样性
sources:
  - source: 百度百科·贵州省博物馆（详细词条，含馆藏数据、展厅描述、文物信息）
