id: chongqing
name: 重庆中国三峡博物馆（重庆博物馆）
lat: 29.5537
lng: 106.5466
location: 重庆市渝中区人民路236号
level: 首批国家一级博物馆、中央地方共建国家级博物馆
core_period: 先秦巴文化、三峡文明、抗战时期
specialty: 占地5万㎡，建筑面积7.17万㎡，展厅面积3.1万㎡。馆藏文物11.5万余件/套，珍贵古籍善本1.8万余册，涵盖23个文物门类。由主馆、白鹤梁水下博物馆、宋庆龄纪念馆、涂山窑遗址、三峡文物科技保护中心五个场馆组成。与人民大礼堂、人民广场形成"三位一体"城市标志性建筑群。设有4个基本陈列、6个专题陈列和360度全周电影。
dynasty_coverage: 旧石器时代 → 先秦巴国 → 秦汉 → 六朝 → 唐宋 → 元明清（明玉珍大夏国）→ 近现代（抗战首都）
timeline: 巴文化与蜀文化并称"巴蜀文化"，是中国西南文明的两大源流。三峡地区自旧石器时代就有人类活动，巴国在春秋战国时期与楚国长期对峙。三峡工程蓄水前的大规模抢救性考古发掘，使大量珍贵文物得以保存。抗战时期重庆作为陪都，留下了丰富的近代史料。
treasures:
  - name: 1. 偏将军印章（汉）— 巴蜀地区出土
halls:
  - name: 壮丽三峡"（三峡自然与文化通史
  - name: 含360度全周电影）
  - name: 远古巴渝"（石器/青铜时代巴文明）
  - name: 抗战岁月"（重庆作为战时首都的历史）
  - name: 巴蜀汉代雕塑艺术展"（近160件汉代雕塑类文物）
artifacts:
  - name: 白鹤梁题刻
    period: 唐至清，涪陵长江江心
    description: 被称为"世界第一古代水文站"，石梁上有自唐代以来的163段题刻、3万余字，记录了1200年间长江枯水位变化，是世界水文史的珍贵遗产。三峡蓄水后建成白鹤梁水下博物馆原址保护
    image_url: https://upload.wikimedia.org/wikipedia/commons/e/e9/%E7%99%BD%E9%B9%A4%E6%A2%81%E5%94%90%E5%88%BB%E3%80%81%E6%B8%85%E5%88%BB%E7%9F%B3%E9%B1%BC.jpg
    image_license: PD
    image_attribution: 萧星珙
  - name: 巴蜀青铜器
    period: 先秦
    description: 包括巴式柳叶剑、铜钲、虎纽錞于等巴文化标志性器物，与中原和楚国青铜器风格迥异
  - name: 汉代画像石棺和画像砖
    period: 东汉
    description: 巴蜀地区汉代雕塑艺术的精品，题材涵盖生产劳动、宴饮乐舞、神话故事、建筑等，展厅含一级文物47件（套）
  - name: 偏将军印章
    period: 汉代
    description: 军事官印
  - name: 明玉珍墓出土文物
    period: 明初，1366年
    description: 明玉珍为元末农民起义军领袖，在重庆建立大夏国，其墓葬出土的文物反映了元末明初的政治格局
  - name: 锁江铁柱
    period: 宋
    description: 三峡地区水道军事防御设施
  - name: 秦良玉"太子太保总镇关防"印
    period: 明末
    description: 秦良玉是中国历史上唯一正式列入正史将相传的女将军
  - name: 朐忍令景云神道碑
    period: 东汉
    description: 重要的汉代碑刻
    image_url: https://upload.wikimedia.org/wikipedia/commons/c/cb/%E6%BC%A2%E5%B7%B4%E9%83%A1%E6%9C%90%E5%BF%8D%E4%BB%A4%E6%99%AF%E9%9B%B2%E7%A2%91.jpg
    image_license: CC-BY-SA-4.0
    image_attribution: Urga
sources:
  - source: 百度百科·重庆中国三峡博物馆（详细词条，含馆藏数据、展厅描述、历史沿革）
