论语》"], "halls": ["金色海昏"基本陈列", "刘贺主墓展厅", "车马坑展示", "遗址现场展示区"], "dynastyCoverage": "西汉（核心）", "timeline": "刘贺（前92-前59年），汉武帝之孙，昌邑王刘髆之子。前74年被霍光拥立为帝，在位仅27天即被废黜，后贬为庶人，前63年封海昏侯，前59年去世。其一生折射了西汉中晚期宫廷政治的激烈博弈", "artifacts": [{"name": ""刘贺"玉印", "description": "西汉（前1世纪）。白玉质，龟钮，阴刻"刘贺"二字，是确认墓主身份的铁证。印文端庄，是西汉私印中的精品。"}, {"name": "马蹄金与麟趾金", "description": "西汉（前1世纪）。共出土马蹄金48枚、麟趾金25枚、金饼385枚、金板20块，总重超120公斤。马蹄金和麟趾金是汉武帝为庆祝天降祥瑞而特铸，上嵌琉璃，是目前考古发现数量最多的汉代黄金。"}, {"name": "孔子屏风（衣镜架）", "description": "西汉。漆木屏风上绘有孔子及弟子画像并附传记文字，是目前已知最早的孔子画像实物，对研究西汉儒学传播和孔子形象演变具有极高价值。"}, {"name": "竹简（约五千枚）", "description": "西汉。包含《论语》《易经》《礼记》等儒家经典以及医书、方术类文献。其中的《论语》版本可能包含失传的《齐论语》内容，是学术史上的重大发现。"}, {"name": "青铜当卢（马面饰）", "description": "西汉。鎏金青铜马面装饰，工艺极精，纹饰包含凤鸟和云气纹，反映了西汉贵族出行的排场。"}, {"name": "青铜雁鱼灯", "description": "西汉。造型为大雁回首衔鱼，鱼腹为灯罩，烟气通过雁颈导入雁腹水中过滤，设计精巧环保，是汉代灯具设计的杰作。"}, {"name": "编钟编磬", "description": "西汉。完整的礼乐器组合，反映了列侯级别的丧葬礼仪规格。"}, {"name": "五铢钱（约200万枚，重10余吨）", "description": "西汉。数量惊人，按串整齐码放，直观展现了西汉列侯的财富规模。"}], "dynastyConnections": [{"dynasty": "西汉", "description": "海昏侯墓是理解西汉中晚期政治、经济、文化的一把钥匙。    - **政治**：刘贺27天皇帝生涯折射了霍光专权时代的宫廷斗争。他被废黜的理由是"荒淫无道"，但出土的大量儒经竹简表明他可能是一个受过良好教育的贵族，历史叙事可能有偏。    - **经济**：出土的巨量黄金和铜钱直观展示了西汉诸侯的经济实力。马蹄金上"上""中""下"的字样可能与酎金制度有关（诸侯定期向朝廷贡金的制度）。    - **文化**：孔子屏风和儒经竹简证明西汉贵族已深受儒学影响。《论语》竹简可能改写对汉代经学传承的认知。    - **丧葬**：墓园布局完整，包含主墓、夫人墓、祔葬墓、车马坑等，是研究西汉列侯丧葬制度的标准样本。"}], "sources": ["海昏侯国遗址博物馆官网: https://www.haihunhou.cn/"]}, {"id": "hainan", "name": "海南省博物馆", "lat": 19.989, "lng": 110.369, "location": "海南省海口市琼山区国兴大道68号", "level": "国家一级博物馆", "corePeriod": "宋元明（南海水下考古）", "specialty": "以南海水下考古出水文物为最大亮点，"华光礁I号"沉船特展曾获全国博物馆十大陈列展览精品奖。同时展现海南黎族、苗族独特民族文化。", "treasures": ["华光礁I号沉船出水青白瓷", "越王亓北古剑（战国）", "黎族龙被（明清）", "宋代青白釉花口碟", "南海出水铜钱串"], "halls": ["南溟奇甸"（海南历史陈列", "含华光礁I号出水文物展区）", "海南少数民族陈列"], "dynastyCoverage": "先秦（越王剑）→ 汉（珠崖郡）→ 唐宋（海上丝路/华光礁沉船）→ 明清（黎族文化）", "timeline": "汉武帝设珠崖郡（前110年）标志海南纳入中原版图；宋代华光礁I号沉船是南海航线繁荣的直接证据", "artifacts": [{"name": "华光礁I号出水青白瓷", "period": "南宋", "description": "2007年发掘出水，大批景德镇青白瓷和福建窑系产品，是古代海上丝绸之路南海航线的直接物证"}, {"name": "越王亓北古剑", "period": "战国", "description": "极为罕见的越王剑，剑身铭文"越王亓北自作用剑"，保存完好，先秦铸剑技术杰作"}, {"name": "黎族龙被", "period": "明清", "description": "黎族织锦最高等级作品，以棉线织成，图案精美色彩绚丽，黎族纺织技艺巅峰"}, {"name": "宋代青白釉花口碟", "period": "南宋", "description": "华光礁I号出水，釉色温润，反映宋代瓷器外销的高超水准"}, {"name": "南海出水铜钱串", "period": "宋代", "description": "大量宋代铜钱从海底打捞而出，反映宋代海上贸易以铜钱为重要交易媒介"}, {"name": "唐三彩陶马", "period": "唐代", "description": "海南出土，说明唐代海南与中原文化交流密切"}], "dynastyConnections": [], "sources": ["海南省博物馆官网: https://www.hainanmuseum.org/", ""大海的方向——华光礁I号沉船特展": https://www.hainanmuseum.org/hnbwgcms/info/621"]}, {"id": "hebei", "name": "河北博物院", "lat": 38.0505, "lng": 114.5146, "location": "河北省石家庄市长安区东大街4号", "level": "国家一级博物馆", "corePeriod": "西汉（满城汉墓）、战国（中山国）", "specialty": "以满城汉墓出土文物为镇馆核心，金缕玉衣和长信宫灯是中国考古标志性文物。中山靖王刘胜墓出土品之精美，是西汉王侯生活的最佳实物见证。", "treasures": ["西汉金缕玉衣", "长信宫灯", "错金博山炉", "透雕双龙高钮谷纹白玉壁", "铜羊尊灯"], "halls": ["大汉绝唱——满城汉墓", "战国雄风——古中山国", "北朝壁画"], "dynastyCoverage": "战国、西汉、北朝、唐、宋、元", "timeline": "战国中山国（前414-前296年）→ 西汉中山国（刘胜，前154年封王）→ 北朝邺城文化", "artifacts": [{"name": "西汉金缕玉衣", "period": "西汉，约前113年", "description": "—中山靖王刘胜的殓服，由2498片岫岩玉用金丝编缀而成，是中国出土年代最早、最完整的金缕玉衣，直接印证了文献记载的汉代丧葬制度。"}, {"name": "长信宫灯", "period": "西汉，约前172年前后", "description": "—窦绾墓出土，宫女跪坐执灯造型，灯罩可调节光照方向，烟气通过袖管导入体内净化。兼具实用性与艺术性，被誉为"中华第一灯"。"}, {"name": "错金博山炉", "period": "西汉", "description": "—刘胜墓出土，炉身以金丝错出山峦、云气、人物、走兽，山间有猎人与虎豹，炉盖镂空出烟，点燃香料后云雾缭绕如仙山。是汉代错金工艺的巅峰之作。"}, {"name": "透雕双龙高钮谷纹白玉壁", "period": "西汉", "description": "—刘胜墓出土，玉质温润，双龙造型生动，谷纹规整。是汉代玉壁中的极品，体现了西汉王侯用玉的最高规格。"}, {"name": "错金银四龙四凤铜方案座", "period": "战国", "description": "—中山国王墓出土，四条龙蜷曲成案座支撑，四只凤鸟展翅，工艺极其复杂。是战国中山国高超铸造技术的代表，也是中山国非华夏族群（白狄鲜虞）艺术风格的体现。"}, {"name": "中山王铁足铜鼎", "period": "战国", "description": "—铭文469字，是目前所见战国铭文最长的铜器之一，记载了中山国的政治事件，是研究中山国历史的第一手文献。"}, {"name": "十五连盏铜灯", "period": "战国", "description": "—中山国出土，树形灯架上分布十五个灯盏，有猴戏、鸟栖等装饰，是战国青铜灯具中造型最复杂的一件。"}, {"name": "北齐高洋墓壁画", "period": "北齐，约550-559年", "description": "—磁县湾漳出土，绘有仪仗出行图，人物众多、色彩鲜艳，是北朝壁画艺术的重要遗存。"}], "dynastyConnections": [], "sources": ["河北博物院官网: https://www.hebeimuseum.org.cn/"]}, {"id": "heilongjiang", "name": "黑龙江省博物馆", "lat": 45.7656, "lng": 126.628, "location": "黑龙江省哈尔滨市南岗区红军街64号", "level": "国家一级博物馆", "corePeriod": "渤海国（698-926年）、金代（1115-1234年）、自然历史", "specialty": "是中国最早的博物馆之一，馆舍本身即为全国重点文物保护单位（新艺术运动风格建筑）。金代文物和渤海国遗物是核心考古收藏，同时以恐龙化石（满洲龙）和自然标本著称，兼具自然与人文。", "treasures": ["金代铜坐龙", "渤海石灯幢", "满洲龙化石", "铜镜系列", "阿城金代铜人"], "halls": ["黑龙江历史文物陈列", "自然陈列", "哈尔滨城史"], "dynastyCoverage": "新石器时代、渤海国、辽、金、元、清（黑龙江流域开发）", "timeline": "靺鞨文化 → 渤海国（698-926年）→ 女真崛起·金建国（1115年）→ 金上京（阿城）→ 元代东北 → 清代流放地 → 中东铁路时代", "artifacts": [{"name": "金代铜坐龙", "period": "金代，12世纪", "description": "—阿城金上京遗址出土，龙呈蹲坐状，集龙、麒麟、狮、犬等形象于一身，造型别致。已成为哈尔滨市的城市标志，体现了金代女真民族独特的艺术审美。"}, {"name": "满洲龙化石", "period": "白垩纪晚期，约6600万年前", "description": "—嘉荫县出土，1902年由俄国古生物学家发现，是中国最早发现的恐龙化石。嘉荫因此被称为"恐龙之乡"。"}, {"name": "渤海石灯幢", "period": "渤海国，8-9世纪", "description": "—宁安渤海上京遗址出土，石质灯塔造型，雕刻精美，体现了渤海国佛教建筑艺术。渤海上京龙泉府仿唐长安布局，是当时东北亚最大的城市之一。"}, {"name": "金代"上京路"铜印", "period": "金代", "description": "—官方印信，上京路为金代行政区划（治所在今阿城），此印是金代地方行政制度的实物证据。"}, {"name": "金代铜人", "period": "金代", "description": "—阿城出土，人物造型具有女真族特征，面部表情生动。是研究金代女真人形象和服饰的重要资料。"}, {"name": "清代"龙兴之地"碑刻", "period": "清代", "description": "—反映了清朝对东北地区"发祥地"的特殊管理，包括封禁政策等。"}, {"name": "中东铁路历史文物", "period": "清末民初", "description": "—哈尔滨因中东铁路（1898年始建）而兴起，馆藏大量中东铁路时期的文物，展示了这座城市独特的近代史。"}], "dynastyConnections": [], "sources": ["黑龙江省博物馆官网: https://www.hljmuseum.com/"]}, {"id": "henan", "name": "河南博物院", "lat": 34.7879, "lng": 113.672, "location": "河南省郑州市金水区农业路8号", "level": "国家一级博物馆", "corePeriod": "夏商周(中原文明核心区)", "specialty": "地处中原腹地,夏商周三代文物收藏无可比拟。"泱泱华夏 择中建都"基本陈列以"中原"为视角重述中国文明史。贾湖骨笛改写了世界音乐史。", "treasures": ["1. 贾湖骨笛(新石器,约前7000年)- 世界上最早的可吹奏乐器"], "halls": ["泱泱华夏 择中建都"(通史主线)", "夏商周展厅(精华)"], "dynastyCoverage": "新石器(裴李岗、仰韶)、夏、商、西周、春秋为核心,唐宋亦有亮点", "timeline": "河南是中国文明的摇篮--夏都二里头、商都郑州和安阳、西周东都洛邑、东周都洛阳,再到北宋都开封。中国八大古都河南占四个。河南博物院是理解中原文明核心地位的最佳场所。", "artifacts": [{"name": "贾湖骨笛", "period": "约前7000年", "description": "用鹤骨制成,7孔,可吹奏七声音阶。将人类音乐史推前了数千年"}, {"name": "杜岭方鼎", "period": "商早期,约前1400年", "description": "郑州出土,高87cm,是商代早期都城在郑州的证据"}, {"name": "妇好鸮尊", "period": "商晚期", "description": "鸮(猫头鹰)形青铜酒器,妇好是商王武丁之妻,中国最早的女将军"}, {"name": "莲鹤方壶", "period": "春秋,约前6世纪", "description": "器盖上莲瓣托起展翅仙鹤,被郭沫若称为"时代精神的象征""}, {"name": "武则天金简", "period": "唐·700年", "description": "武则天在嵩山封禅时投放,祈求除罪消灾"}, {"name": "汝窑天青釉瓷器", "period": "北宋", "description": "存世极少的汝窑精品"}, {"name": "四神云气图", "period": "西汉", "description": "梁国王陵壁画,描绘青龙白虎朱雀玄武"}], "dynastyConnections": [{"dynasty": "新石器", "description": "贾湖文化(骨笛、龟甲符号)可能是文字和音乐的源头"}, {"dynasty": "夏", "description": "二里头遗址的证据使"夏"从传说走向考古"}, {"dynasty": "商", "description": "郑州商城和安阳殷墟分别代表商代早期和晚期,甲骨文在此诞生"}, {"dynasty": "西周/春秋", "description": "洛邑作为东都,莲鹤方壶标志着从凝重到活泼的艺术转型  河南博物院是理解“中原为什么是中心”这个问题的最佳答案。"}], "sources": ["河南博物院官网: https://www.chnmus.net/", "贾湖骨笛约前7000年（多源核实）"]}, {"id": "hubei", "name": "湖北省博物馆", "lat": 30.5674, "lng": 114.373, "location": "湖北省武汉市武昌区东湖路160号", "level": "国家一级博物馆", "corePeriod": "先秦（楚文化）、春秋战国", "specialty": "曾侯乙墓出土文物是镇馆之基，尤其是编钟——改写了世界音乐史。楚文化收藏全国最强，漆器、丝绣、青铜器系统完整。", "treasures": ["1. 曾侯乙编钟（战国早期）— 65件青铜编钟", "可演奏完整音阶", "2400年前的乐器奇迹"], "halls": ["曾侯乙展厅（核心）", "楚文化展", "编钟演奏（每日定时）", "梁庄王墓展"], "dynastyCoverage": "春秋战国（楚国、曾国）为核心，秦（云梦秦简）、元明亦有精品", "timeline": "曾侯乙墓（前433年）是战国早期最重要的考古发现之一。曾国（随国）地处楚国北界，墓葬反映了楚文化圈的辐射范围和先秦礼乐制度的实物面貌。", "artifacts": [{"name": "曾侯乙编钟", "period": "前433年", "description": "总重2567kg，音域跨五个半八度，可演奏中外乐曲。铭文2828字，记载了先秦乐律学体系"}, {"name": "越王勾践剑", "period": "春秋，约前5世纪", "description": "剑长55.7cm，锡青铜铸造，剑身菱形暗纹，千年不锈"}, {"name": "曾侯乙尊盘", "period": "前433年", "description": "尊与盘套合，镂空附饰用失蜡法铸造，铜器铸造工艺的极限"}, {"name": "云梦睡虎地秦简", "period": "秦，前217年入葬", "description": "1155枚竹简，包含秦律、日书等，是了解秦代法律和社会的第一手资料"}, {"name": "曾侯乙外棺", "period": "战国", "description": "彩绘漆棺，纹饰为神话人物和窗格纹"}, {"name": "虎座鸟架鼓", "period": "战国·楚", "description": "楚文化标志性器物造型"}, {"name": "元青花四爱图梅瓶", "period": "元", "description": "画面描绘王羲之爱兰、陶渊明爱菊、林和靖爱梅鹤、周敦颐爱莲"}], "dynastyConnections": [], "sources": ["湖北省博物馆官网: https://www.hbww.org/", "曾侯乙编钟总重2567kg（多源核实）"]}, {"id": "hunan", "name": "湖南省博物馆（湖南博物院）", "lat": 28.2126, "lng": 112.9834, "location": "湖南省长沙市开福区东风路50号", "level": "国家一级博物馆", "corePeriod": "西汉（马王堆）、商周青铜", "specialty": "马王堆汉墓出土文物是世界级的考古发现——保存完好的2000年女尸、精美绝伦的T形帛画、最早的帛书。2017年重新开馆后展陈设计一流。", "treasures": ["1. 辛追夫人遗体（西汉）— 保存2100多年的湿尸", "世界考古奇迹"], "halls": ["长沙马王堆汉墓陈列"（核心展）", "湖南人——三湘历史文化陈列"], "dynastyCoverage": "西汉（马王堆）为核心，商周青铜器（皿方罍等），近现代湖湘文化", "timeline": "马王堆汉墓是了解西汉初年贵族生活的最完整窗口——墓主辛追是长沙国丞相利苍之妻。出土文物覆盖了饮食、服饰、医学、哲学、天文等方方面面。", "artifacts": [{"name": "辛追夫人遗体", "period": "西汉，约前163年下葬", "description": "皮肤仍有弹性，关节可活动，是世界上保存最好的古代湿尸"}, {"name": "T形帛画", "period": "西汉", "description": "覆盖在棺上的招魂帛画，分天界（日月升龙）、人间（辛追宴饮）、地下（巨人托举大地）三层"}, {"name": "素纱襌衣", "period": "西汉", "description": "长128cm，仅重49g，代表汉代丝织技术巅峰"}, {"name": "马王堆帛书", "period": "西汉", "description": "12万字，包含《老子》乙本（目前最早版本）、《五星占》（最早天文著作之一）"}, {"name": "皿方罍", "period": "商晚期", "description": "器盖1919年出土后与器身分离近百年，2014年从纽约拍卖市场回归"}, {"name": "漆棺", "period": "西汉", "description": "四层套棺，漆画精美，外黑内朱"}, {"name": "导引图", "period": "西汉", "description": "最早的健身运动图谱"}], "dynastyConnections": [], "sources": ["马王堆汉墓考古发掘报告", "湖南博物院官网: https://www.hnmuseum.com/"]}, {"id": "jiangsu", "name": "南京六朝博物馆", "lat": 32.0472, "lng": 118.796, "location": "江苏省南京市玄武区长江路302号（总统府旁）", "level": "国家一级博物馆", "corePeriod": "六朝（222-589年：东吴、东晋、宋、齐、梁、陈）", "specialty": "中国唯一的六朝专题博物馆，建于六朝建康城遗址之上，由贝聿铭弟子齐欣设计。展示了六朝近四百年间南京作为都城的辉煌，是理解魏晋南北朝——中国历史上最富文化创造力的分裂时期——的核心场馆。", "treasures": ["六朝青瓷莲花尊", "人面纹瓦当", "青瓷釉下彩羽人纹盘口壶", ""竹林七贤与荣启期"砖印壁画（复制品", "原件藏南京博物院）", "建康城遗址夯土城墙"], "halls": ["六朝帝都"基本陈列", "六朝风采（人物与社会）", "建康城遗址展示区", "六朝青瓷专题"], "dynastyCoverage": "东吴（222-280）→ 东晋（317-420）→ 南朝宋（420-479）→ 南朝齐（479-502）→ 南朝梁（502-557）→ 南朝陈（557-589）", "timeline": "222年孙权建都建业（南京）→ 317年东晋衣冠南渡 → 420-589年南朝宋齐梁陈更替 → 589年隋灭陈统一。六朝近四百年间，建康（南京）是中国南方的政治、经济、文化中心，也是当时世界上最大的城市之一", "artifacts": [{"name": "六朝青瓷莲花尊", "description": "南朝（6世纪）。高大端庄，通体饰以莲花瓣纹，是六朝青瓷中的巅峰之作。莲花纹饰反映了佛教在六朝的深刻影响。"}, {"name": "人面纹瓦当", "description": "六朝。建康城遗址出土，瓦当上塑有人面形象，表情生动，是六朝建筑装饰的特色，在中国古代瓦当中独具一格。"}, {"name": "青瓷釉下彩羽人纹盘口壶", "description": "三国东吴（3世纪）。在青瓷釉下绘以褐彩羽人和佛像纹饰，是中国最早的釉下彩瓷器之一，在陶瓷史上具有重要地位。"}, {"name": "建康城遗址夯土城墙", "description": "六朝。博物馆地下层展示了六朝建康城的夯土城墙遗址，观众可以直接看到1700年前的都城基础，是博物馆"建在遗址上"的直观体现。"}, {"name": ""竹林七贤与荣启期"模印砖画", "description": "南朝（约5世纪）。南京及周边六朝墓葬中多次出土，以模印砖拼成大型壁画，描绘嵇康、阮籍等竹林七贤的形象。原件藏南京博物院，六朝博物馆有高精度复制品。这是理解魏晋名士风度的标志性图像。"}, {"name": "六朝铜镜", "description": "六朝。有神兽镜、变形四叶镜等类型，纹饰融合汉代传统和南方新风格，反映了六朝工艺美术的特点。"}, {"name": "六朝墓志与碑刻拓片", "description": "六朝。南京出土的六朝墓志书法兼具隶书遗韵和楷书新意，是中国书法从隶到楷转变的关键时期的实物。"}], "dynastyConnections": [{"dynasty": "东吴（222-280年）", "description": "孙权以建业（南京）为都，开启了南京作为都城的历史。东吴开发江南，发展海上交通，奠定了南方经济基础。青瓷釉下彩等工艺创新也始于此时。"}, {"dynasty": "东晋（317-420年）", "description": "永嘉之乱后，西晋灭亡，司马睿在建康重建朝廷，史称"衣冠南渡"。大量北方士族南迁，带来先进的文化和技术，催生了中国文化史上最富创造力的时期之一。王羲之的书法、顾恺之的绘画、陶渊明的诗歌都诞生于此时。"}, {"dynasty": "南朝（420-589年）", "description": "宋、齐、梁、陈四朝更替频繁但文化延续。南朝建康城人口达百万，是当时世界最大的城市。文学理论（刘勰《文心雕龙》、钟嵘《诗品》）、史学（范晔《后汉书》、沈约《宋书》）、佛教（梁武帝崇佛、达摩东渡）在此时达到新高度。"南朝四百八十寺，多少楼台烟雨中"正是这一时期的写照。"}, {"dynasty": "文化遗产", "description": "六朝是中国文化从古典向中世纪转变的关键时期。文学自觉、书法成为独立艺术、山水画兴起、佛教中国化、士族门阀制度确立——这些深刻影响后世的文化现象都始于或成熟于六朝。南京六朝博物馆是理解这一伟大转型的最佳入口。"}], "sources": ["南京六朝博物馆"]}, {"id": "jiangxi", "name": "江西省博物馆", "lat": 28.682, "lng": 115.8935, "location": "江西省南昌市赣江新区/东湖区", "level": "国家一级博物馆", "corePeriod": "西汉（海昏侯墓）、宋元明（景德镇瓷器）、商代（新干大洋洲）", "specialty": "以海昏侯墓出土文物和江西陶瓷为两大核心，同时拥有新干大洋洲商代青铜器群。2020年新馆开放，展陈全面升级，是理解赣鄱文明和中国瓷器发展的重要窗口。", "treasures": ["商代伏鸟双尾青铜虎", "海昏侯刘贺玉印", "景德镇元青花瓷器", "商代双面神人青铜头像", "西汉马蹄金"], "halls": ["惊世大发现——南昌汉代海昏侯国考古成果展", "赣鄱文明"通史展", "陶瓷文化展"], "dynastyCoverage": "商代（新干大洋洲）→ 西汉（海昏侯）→ 东晋南朝 → 唐宋（洪州窑、景德镇）→ 元明清（景德镇御窑）", "timeline": "新干大洋洲（约前13世纪）揭示了南方商代青铜文明独立于中原的发展路径；海昏侯墓（前59年下葬）是西汉列侯墓中保存最完整的；景德镇自宋代起成为"瓷都"，元明清时期为官窑所在", "artifacts": [{"name": "商代伏鸟双尾青铜虎", "description": "商代晚期（约前13世纪）。新干大洋洲出土，造型独特，虎背伏鸟，双尾上翘，是南方青铜文明区别于中原风格的标志性器物。"}, {"name": "商代双面神人青铜头像", "description": "商代晚期。新干大洋洲出土，一器两面，表情各异，反映了赣江流域独特的宗教信仰，常与三星堆青铜面具比较。"}, {"name": "海昏侯刘贺玉印"刘贺"", "description": "西汉（前1世纪）。直接确认墓主身份的关键证据，也是研究西汉印章制度的重要实物。"}, {"name": "西汉马蹄金、麟趾金", "description": "西汉（前1世纪）。海昏侯墓出土大量金器，马蹄金和麟趾金是武帝时期为庆祝祥瑞而铸的纪念金，数量之多为考古之最。"}, {"name": "海昏侯墓竹简、木牍", "description": "西汉。出土约五千枚竹简，包含《论语》《易经》等儒家经典，对研究西汉经学和思想史具有重大价值。"}, {"name": "元青花釉里红楼阁式谷仓", "description": "元代（14世纪）。将青花与釉里红两种技法结合，造型复杂，是元代景德镇瓷器的巅峰之作。"}, {"name": "商代青铜大铙", "description": "商代晚期。新干出土的大型打击乐器，体量在同期器物中罕见，反映了南方商代礼乐文化。"}], "dynastyConnections": [{"dynasty": "商代", "description": "1989年新干大洋洲发现的商代大墓出土青铜器、玉器近2000件，揭示了赣江流域存在一个与中原殷商并行的高度发达的青铜文明，改写了"商代文明仅限中原"的认知。"}, {"dynasty": "西汉", "description": "海昏侯刘贺是汉武帝之孙，当过27天皇帝即被废黜，后封海昏侯。其墓2011年发现，出土金器、竹简、车马器等一万余件，是21世纪中国最重要的考古发现之一。"}, {"dynasty": "宋元明清（瓷器）", "description": "江西是中国瓷器的核心产区。洪州窑（南朝-唐）、吉州窑（宋）为早期名窑；景德镇自宋真宗景德年间（1004-1007年）得名，元代创烧青花瓷，明清时期为御窑所在地，是世界制瓷业的中心。"}], "sources": ["江西省博物馆官网: https://www.jxmuseum.cn/"]}, {"id": "jilin", "name": "吉林省博物院", "lat": 43.8241, "lng": 125.3506, "location": "吉林省长春市南关区永顺路1666号", "level": "国家一级博物馆", "corePeriod": "高句丽（前37年-668年）、渤海国（698-926年）、近现代书画", "specialty": "高句丽和渤海国文物收藏是最大特色，吉林省集安市是高句丽早期都城所在。近现代书画收藏也较丰富，藏有张大千、齐白石等名家作品。", "treasures": ["高句丽好太王碑拓本", "渤海三彩", "契丹金银器", "《洞庭春色赋·中山松醪赋》（苏轼）"], "halls": ["白山松水的记忆——吉林省历史陈列", "破晓——吉林人民革命斗争史"], "dynastyCoverage": "新石器时代、高句丽、渤海国、辽、金、清（东北边疆）", "timeline": "高句丽建国（前37年）→ 丸都城/国内城（集安，3年-427年）→ 渤海国（698-926年）→ 辽金东北经略 → 清代柳条边外", "artifacts": [{"name": "好太王碑拓本", "period": "高句丽，414年", "description": "—原碑在吉林省集安市，高6.39米，四面刻字1775字，记载了高句丽好太王（广开土王，391-412年在位）的功绩和征战事迹。是研究高句丽历史和东北亚古代关系的最重要文字资料。碑文涉及高句丽与百济、新罗、倭的战争。"}, {"name": "渤海三彩釉陶", "period": "渤海国，8-9世纪", "description": "—仿唐三彩烧制，但釉色和造型有渤海地方特点。渤海国被称为"海东盛国"，其文化深受唐文化影响，三彩器是这种文化交流的直接证据。"}, {"name": "苏轼《洞庭春色赋·中山松醪赋》", "period": "北宋，1091年", "description": "—苏轼晚年手书两赋合卷，笔力遒劲，是苏轼存世书法中的重要作品。此件原为清宫旧藏，后流散至东北。"}, {"name": "高句丽金铜佛造像", "period": "高句丽，约5-6世纪", "description": "—集安出土，体现了佛教在高句丽传播的实况。高句丽佛教艺术受中原北朝影响，同时向朝鲜半岛和日本传播。"}, {"name": "青花云龙纹高足碗", "period": "元代", "description": "—元代青花瓷精品，体现了元代东北地区与中原的密切联系。"}, {"name": "辽代鎏金铜观音像", "period": "辽代", "description": "—造型端庄，工艺精湛，反映了辽代佛教在东北地区的兴盛。"}], "dynastyConnections": [], "sources": ["吉林省博物院官网: https://www.jlmuseum.org/"]}, {"id": "jingdezhen", "name": "景德镇中国陶瓷博物馆", "lat": 29.2932, "lng": 117.2068, "location": "江西省景德镇市昌江区", "level": "国家一级博物馆", "corePeriod": "宋元明清（瓷器通史，尤以明清御窑为核心）", "specialty": "全球唯一系统展示景德镇千年制瓷史的专题博物馆，藏品从五代至现代，涵盖官窑民窑，品类齐全。是理解中国瓷器如何从一种材料变成一种世界性文化的最佳场馆。", "treasures": ["元青花缠枝牡丹纹梅瓶", "明永乐甜白釉暗刻龙纹梅瓶", "清雍正粉彩蝠桃纹橄榄瓶", "宋影青瓷注壶注碗", "明成化斗彩瓷"], "halls": ["瓷业千年"通史陈列", "历代名窑展", "御窑精品展", "现当代陶瓷艺术展"], "dynastyCoverage": "五代（南方白瓷兴起）→ 宋代（影青瓷/青白瓷）→ 元代（青花瓷诞生）→ 明代（御窑厂建立、五彩斗彩）→ 清代（粉彩珐琅彩、瓷器巅峰）", "timeline": "宋真宗景德年间（1004-1007）赐名景德镇；元代创烧成熟青花瓷，改变世界陶瓷格局；明洪武二年（1369）设御器厂，此后五百年景德镇为皇家御窑所在；清康雍乾三朝为制瓷技术巅峰", "artifacts": [{"name": "元青花缠枝牡丹纹梅瓶", "description": "元代（14世纪）。青花瓷是景德镇对世界文明最重要的贡献，元青花存世极少，此瓶造型饱满，青花发色浓艳，纹饰层次丰富。"}, {"name": "明永乐甜白釉暗刻龙纹梅瓶", "description": "明永乐（15世纪初）。甜白釉是永乐朝的独创，釉色温润如凝脂，暗刻龙纹若隐若现，代表了明初御窑的最高水平。"}, {"name": "清雍正粉彩蝠桃纹橄榄瓶", "description": "清雍正（18世纪初）。粉彩在雍正朝达到巅峰，此瓶色彩雅致，绘画精细，蝠（福）桃（寿）寓意吉祥。"}, {"name": "宋影青（青白瓷）注壶注碗", "description": "宋代（11-12世纪）。青白瓷是景德镇宋代的代表品种，釉色介于青白之间，如冰似玉，此套注壶注碗造型典雅，是宋人饮酒器具的代表。"}, {"name": "明成化斗彩鸡缸杯", "description": "明成化（15世纪晚期）。斗彩技法将釉下青花与釉上彩结合，鸡缸杯小巧精致，自古被视为瓷中极品，明代即已价值连城。"}, {"name": "清乾隆各种釉彩大瓶（瓷母）", "description": "清乾隆（18世纪中期）。集十余种釉彩于一身，是清代制瓷技术的"炫技"之作，虽有争议但确为技术巅峰。"}, {"name": "五代白瓷", "description": "五代（10世纪）。景德镇制瓷的起点，南方白瓷的代表，为后来青白瓷的发展奠定基础。"}, {"name": "明宣德青花瓷", "description": "明宣德（15世纪）。宣德青花被公认为明代青花的巅峰，使用进口苏麻离青料，发色浓重有铁锈斑，气韵生动。"}], "dynastyConnections": [{"dynasty": "宋代", "description": "景德镇因宋真宗赐年号为名，影青（青白瓷）是宋代景德镇的标志产品，质地细腻、釉色淡雅，深受文人喜爱。此时景德镇已成为全国重要窑场之一。"}, {"dynasty": "元代", "description": "蒙古帝国的全球贸易网络带来了波斯钴蓝料，催生了成熟的青花瓷。青花瓷结合了中国的瓷器技术与伊斯兰的审美趣味，迅速成为全球最受欢迎的商品之一，彻底改变了世界陶瓷贸易格局。"}, {"dynasty": "明清（御窑）", "description": "明洪武二年设御器厂（后称御窑厂），景德镇成为皇家瓷器的唯一产地。永乐甜白、宣德青花、成化斗彩、嘉万五彩，至清代康熙五彩、雍正粉彩、乾隆各色釉彩，技术不断攀升。御窑制度持续近六百年，是人类制瓷史的奇迹。"}], "sources": ["景德镇中国陶瓷博物馆官网: https://www.jdztcbwg.com/"]}, {"id": "jinsha", "name": "金沙遗址博物馆", "lat": 30.6774, "lng": 104.013, "location": "四川省成都市青羊区金沙遗址路2号", "level": "国家一级博物馆", "corePeriod": "古蜀文明后期（商代晚期至春秋早期，约前1200-前650年）", "specialty": "2001年在成都市区施工时偶然发现，是继三星堆之后古蜀文明最重要的考古发现。太阳神鸟金饰已被确定为中国文化遗产标志。遗址出土金器、铜器、玉器、象牙等珍贵文物6000余件，大量象牙的出土尤为引人注目。博物馆由遗迹馆（保护原始发掘现场）和陈列馆两部分组成。", "treasures": ["1. 太阳神鸟金饰（商周）— 中国文化遗产标志", "外径12.5cm", "厚0.02cm"], "halls": ["遗迹馆（原始发掘现场保护展示）", "陈列馆"走进金沙"（五个展厅：远古家园→王都剪影→天地不绝→千载遗珍→解读金沙）"], "dynastyCoverage": "商代晚期 → 西周 → 春秋早期", "timeline": "金沙遗址（约前1200-前650年）是三星堆文明衰落后古蜀政治中心南迁至成都的证据。三星堆→金沙构成了古蜀文明的完整序列。金沙的衰落与开明王朝的兴起（之后秦灭蜀）相衔接。", "artifacts": [{"name": "太阳神鸟金饰", "period": "商周，约前1200-前900年", "description": "外径12.5cm，内径5.29cm，厚仅0.02cm，重20g。用自然砂金加工而成，含金量94.2%。图案为四只逆时针飞行的神鸟围绕十二道旋转的太阳光芒，被认为是古蜀人太阳崇拜的象征。2005年被国家文物局确定为中国文化遗产标志。"}, {"name": "黄金面具", "period": "商周", "description": "金面具宽19.5cm，高11cm，厚约0.04cm，重46g。与三星堆出土的黄金面罩风格一致，证明金沙与三星堆属于同一文化传统。"}, {"name": "十节玉琮", "period": "新石器时代良渚文化风格，出土于金沙商周地层", "description": "这件玉琮的形制和纹饰与浙江良渚文化玉琮高度相似（带有简化人面纹），说明古蜀与远在千里之外的长三角存在文化交流或传承。这是考古学上的重大发现。"}, {"name": "铜立人像", "period": "商周", "description": "小型铜立人，双手持物姿态与三星堆大立人相似，但尺寸更小、风格更简化，展现了古蜀造像传统的演变。"}, {"name": "石虎", "period": "商周", "description": "圆雕石虎，姿态为俯卧状，造型生动，体现古蜀人对虎的崇拜。"}, {"name": "象牙", "period": "商周", "description": "金沙遗址出土了大量象牙（数以吨计），说明商周时期成都平原有大量野生象群，与今天的气候和生态完全不同。"}, {"name": "玉璋群", "period": "商周", "description": "大量玉璋出土，其中"肩扛象牙人形纹玉璋"图案描绘了人物肩扛象牙的祭祀场景。"}, {"name": "兽面纹玉钺", "period": "商周", "description": "浮雕兽面纹与商代中原青铜器纹饰相似，是中原文化影响古蜀的证据。"}], "dynastyConnections": [], "sources": ["百度百科·成都金沙遗址博物馆（馆藏玉器详细数据）", "太阳神鸟金饰数据: 国家文物局2005年公布"]}, {"id": "kaifeng", "name": "开封博物馆", "lat": 34.7872, "lng": 114.3076, "location": "河南省开封市鼓楼区", "level": "国家一级博物馆", "corePeriod": "北宋（960-1127年，东京汴梁）", "specialty": "开封（古称汴梁、东京）是北宋都城，当时世界最大、最繁华的城市。开封博物馆以北宋文物为核心，结合战国魏国大梁、唐五代汴州等历史层次，展现这座"八朝古都"的文化积淀。因黄河多次泛滥，宋代地层深埋地下数米，考古发掘难度极大，使得每一件出土文物都格外珍贵。", "treasures": ["北宋"开封府题名记"碑", "宋代汝窑瓷片", "北宋鎏金铜塔", "石守信墓志", "明代万历青花五彩大罐"], "halls": ["八朝古都——开封古代文明"通史陈列", "宋代文化专题展", "开封犹太人历史展（特色）", "朱仙镇木版年画展"], "dynastyCoverage": "战国（魏国大梁）→ 唐代（汴州）→ 五代（后梁、后晋、后汉、后周都城）→ 北宋（东京）→ 金代（南京） → 明清", "timeline": "战国魏惠王迁都大梁（前364年）→ 五代后梁定都开封（907年）→ 赵匡胤陈桥兵变建宋（960年）→ 北宋东京极盛期人口过百万 → 靖康之变（1127年）金军破城 → 此后开封不复为大一统王朝首都", "artifacts": [{"name": "北宋"开封府题名记"碑", "description": "北宋（960-1127年）。碑上刻有历任开封府知府的姓名和任期，包括包拯、欧阳修、范仲淹等名臣。包拯名下石面凹陷，相传是后人仰慕其清廉正直，不断触摸所致。"}, {"name": "北宋鎏金铜塔", "description": "北宋（11世纪）。塔身鎏金，做工精细，层次分明，是宋代金属工艺和佛教文化的代表。"}, {"name": "石守信墓志", "description": "北宋（979年）。石守信是参与陈桥兵变的功臣之一，也是"杯酒释兵权"的当事人。其墓志详细记载了生平，是研究宋初政治的重要实物。"}, {"name": "宋代陶瓷器", "description": "北宋。开封作为都城，汇集了各大窑口的精品瓷器。虽然宋代开封地层深埋，出土品不多，但每一件都具有重要的断代和审美价值。"}, {"name": "繁塔宋代石刻佛像", "description": "北宋（977年）。繁塔是开封现存最古老的建筑，塔壁嵌有大量宋代石刻佛像，风格质朴。"}, {"name": "明代万历青花五彩大罐", "description": "明万历（16世纪末）。体量大，纹饰繁缛，色彩艳丽，是明晚期景德镇五彩瓷的代表作。"}, {"name": "朱仙镇木版年画", "description": "明清。朱仙镇（开封南）是中国木版年画的发源地之一，画风古朴，色彩浓烈，对天津杨柳青等年画产地有重要影响。"}], "dynastyConnections": [{"dynasty": "北宋（960-1127年）", "description": "这是开封历史上最辉煌的时期。北宋东京是当时世界上最大的城市，人口超过百万，商业繁荣，文化昌盛。    - **城市文明**：张择端《清明上河图》（藏故宫博物院）描绘的就是北宋东京的市井生活。东京打破了唐代坊市分离的城市格局，出现了开放式的街市和夜市，是中国城市史上的革命性变化。    - **文化巅峰**：北宋东京是中国古代文化的巅峰时期之一。活字印刷、火药、指南针在此时成熟并传播；宋词达到极盛；宋代五大名窑（汝、官、哥、定、钧）代表了中国陶瓷美学的最高成就。    - **靖康之变**：1127年金军攻破东京，掳走宋徽宗、宋钦宗及宗室后妃数千人北去，北宋灭亡。这是中国历史上最惨痛的事件之一，"靖康耻"成为此后南宋乃至后世的集体记忆。"}, {"dynasty": "黄河与开封", "description": "开封的悲剧在于黄河。历史上黄河多次在开封附近决口泛滥，宋代以来的开封城层层叠压地下，形成"城摞城"的独特现象。地下6-8米处是宋代地层，这使得考古发掘极为困难，也让每一件出土文物都弥足珍贵。"}], "sources": ["开封博物馆官网: https://www.kfsbwg.com/"]}, {"id": "liangzhu", "name": "良渚博物院", "lat": 30.3966, "lng": 119.993, "location": "浙江省杭州市余杭区良渚街道美丽洲路1号", "level": "国家一级博物馆 / 良渚古城遗址为世界文化遗产(2019年)", "corePeriod": "新石器时代晚期(约前3300-前2300年)", "specialty": "良渚文明是实证中华5000年文明史的圣地。2019年申遗成功,被认定为世界最早的国家形态之一。玉器工艺登峰造极,城市规划令人惊叹(300万平方米古城+大型水利系统)。", "treasures": ["1. 玉琮王(良渚文化)- 最大最重的玉琮,刻有"神人兽面纹""], "halls": ["良渚博物院全部展厅 + 良渚古城遗址公园(城墙", "宫殿区", "反山王陵", "莫角山)"], "dynastyCoverage": "新石器时代(良渚文化,前3300-前2300年)", "timeline": "良渚文明(前3300-前2300年)比夏朝早一千年,拥有城市、水利、等级社会、统一信仰符号(神人兽面纹),是判定中国文明起源时间的关键证据。其衰落原因可能是洪水,之后长三角地区文明一度中断。", "artifacts": [{"name": "玉琮王", "period": "约前3000年", "description": "重6.5kg,高8.8cm,刻有完整的"神人兽面纹"--头戴羽冠的神人骑在神兽之上,是良渚信仰体系的核心图案"}, {"name": "玉钺王", "period": "约前3000年", "description": "钺是斧形礼器,象征军权。此件两面刻有神人兽面纹,是目前发现的最高等级玉钺"}, {"name": "反山M12玉器群", "period": "约前3000年", "description": "一座墓出土玉器数百件,包括琮、钺、璧、三叉形器等完整组合,墓主可能是良渚"王""}, {"name": "玉璧", "period": "良渚", "description": "大量出土,可能是财富或礼仪用途"}, {"name": "玉三叉形器", "period": "良渚", "description": "插在发冠上,是贵族身份标识"}, {"name": "刻符陶罐", "period": "良渚", "description": "陶器上的刻划符号,可能是原始文字的前身"}, {"name": "碳化稻谷", "period": "良渚", "description": "大量水稻遗存,证明良渚是稻作农业高度发达的社会"}], "dynastyConnections": [{"dynasty": "与中原的关系", "description": "良渚的玉琮、玉璧形制后来被夏商周继承("以苍璧礼天,以黄琮礼地"),说明良渚对后世礼制有深远影响"}, {"dynasty": "文明要素", "description": "城市(古城面积290万平方米)、水利系统(11条水坝)、等级分化(王陵与平民墓差距悬殊)、统一信仰(神人兽面纹),符合"文明"的判定标准"}, {"dynasty": "衰落之谜", "description": "约前2300年突然衰落,可能与大规模洪水有关。之后长三角进入文化低谷,直到商周时期才重新崛起  良渚是回答“中华文明到底有多久”这个问题的关键节点。"}], "sources": ["良渚博物院官网: https://www.lzmuseum.cn/", "UNESCO世界文化遗产名录（2019年）"]}, {"id": "liaoning", "name": "辽宁省博物馆", "lat": 41.7312, "lng": 123.4689, "location": "辽宁省沈阳市浑南区智慧三街157号", "level": "国家一级博物馆", "corePeriod": "古代书画（唐宋元明清全序列）、辽金时期", "specialty": "古代书画收藏为全国顶级，与故宫博物院、上海博物馆并称"三大书画收藏重镇"。大量藏品源自清宫散佚的溥仪出宫文物（"东北货"）。辽金文物收藏也极为丰富，是了解契丹-女真文化的最佳去处。", "treasures": ["《簪花仕女图》", "《虢国夫人游春图》", "《万岁通天帖》", "《瑞鹤图》", "鸭形玻璃注"], "halls": ["中国古代书画", "辽河文明", "满族民俗", "古代辽宁"], "dynastyCoverage": "红山文化、战国燕、汉、三燕（前燕/后燕/北燕）、辽、金、元、明、清", "timeline": "红山文化（前4700-前2900年）→ 燕国东拓 → 三燕政权 → 契丹建辽（907/916年）→ 女真建金（1115年）→ 清朝发祥地", "artifacts": [{"name": "《簪花仕女图》", "period": "唐代，传周昉", "description": "—绢本设色，描绘贵族妇女赏花游园的闲适场景，人物丰腴华贵，是唐代仕女画的代表作。此画曾入清宫收藏，后随溥仪流散东北，最终入藏辽博。（近年有学者考证为五代摹本，但不影响其艺术价值。）"}, {"name": "《虢国夫人游春图》", "period": "唐代，传张萱，宋摹本", "description": "—描绘杨贵妃之姐虢国夫人率众骑马出行的场景，不画背景而春意自现，构图精妙。是了解盛唐贵族生活的经典图像。"}, {"name": "《万岁通天帖》", "period": "唐代，697年摹本", "description": "—武则天万岁通天二年，命人摹写王羲之家族书法真迹而成。包含王羲之《姨母帖》、王献之《廿九日帖》等，是现存最接近王氏书法原貌的唐摹本，书法史价值极高。"}, {"name": "《瑞鹤图》", "period": "北宋，赵佶/宋徽宗", "description": "—绢本设色，描绘群鹤翔集于汴京宣德门上空的祥瑞景象。色彩典雅，构图独特，是宋徽宗存世最重要的绘画作品之一。"}, {"name": "鸭形玻璃注", "period": "北燕，约5世纪初", "description": "—朝阳北票冯素弗墓出土，淡绿色玻璃制成的鸭形容器，通体晶莹。经检测为罗马帝国钠钙玻璃，是丝绸之路东端的重要物证，证明了东北地区与西方的早期贸易联系。"}, {"name": "契丹文铜镜", "period": "辽代", "description": "—镜背铸有契丹大字，是研究已基本失传的契丹文字的珍贵实物。辽博收藏的契丹文物在全国最为系统完整。"}, {"name": "金代铜坐龙", "period": "金代", "description": "—阿城（金上京）出土，龙呈蹲坐状，造型独特，与中原传统龙形有明显区别，体现了女真文化的审美特点。"}, {"name": "红山文化玉猪龙", "period": "新石器时代，约前3500年", "description": "—辽西地区出土，C形玉龙，是红山文化的标志性器物，也是中国龙文化的重要早期形态。"}], "dynastyConnections": [], "sources": ["辽宁省博物馆官网: https://www.lnmuseum.com.cn/"]}, {"id": "longmen", "name": "龙门石窟", "lat": 34.4653, "lng": 112.471, "location": "河南省洛阳市洛龙区龙门镇,伊河两岸", "level": "全国重点文物保护单位 / UNESCO世界文化遗产(2000年)", "corePeriod": "北魏(5-6世纪)、唐代(7-8世纪)", "specialty": "中国三大石窟之一(与敦煌莫高窟、大同云冈石窟并列),现存窟龛2345个、造像近11万尊、碑刻题记2860余品。北魏造像秀骨清像,唐代造像丰腴雄健,两种风格对比鲜明,是理解中国佛教艺术风格演变的最佳实地课堂。", "treasures": ["奉先寺卢舍那大佛", "宾阳中洞"帝后礼佛图"(原作流失海外)", "古阳洞造像题记", "莲花洞天顶大莲花", "药方洞石刻药方"], "halls": ["奉先寺(卢舍那大佛)", "宾阳三洞(北魏皇家窟)", "古阳洞(最早的窟)", "万佛洞(唐代)", "莲花洞", "龙门石窟研究院数字展示中心"], "dynastyCoverage": "北魏 → 东西魏 → 北齐 → 隋代 → 唐代 → 五代 → 北宋", "timeline": "493年北魏孝文帝迁都洛阳,开始营造龙门石窟(接续云冈石窟的皇家营造传统);唐高宗和武则天时期(650-705年)是龙门第二个营造高峰,奉先寺卢舍那大佛即此时所造", "artifacts": [{"name": "奉先寺卢舍那大佛", "description": "唐代(675年完工)。通高17.14米,面容丰满端庄,传说以武则天为蓝本,是龙门石窟的标志,也是唐代雕塑艺术的巅峰。"卢舍那"意为"光明遍照",为报身佛。"}, {"name": "宾阳中洞"帝后礼佛图"", "description": "北魏(约520年代)。原为北魏宣武帝为孝文帝和文昭皇太后营造的功德窟,浮雕帝后礼佛场景。1930年代被盗凿,现分藏于美国纽约大都会博物馆和堪萨斯城纳尔逊-阿特金斯博物馆,是中国文物流失的痛史。"}, {"name": "古阳洞造像题记(龙门二十品)", "description": "北魏(5-6世纪)。古阳洞是龙门最早开凿的洞窟,窟内造像题记书法被誉为"龙门二十品",是北魏书法(魏碑)的代表,对中国书法史影响深远。"}, {"name": "莲花洞天顶大莲花", "description": "北魏。洞顶浮雕直径达3米的大莲花,周围环绕飞天,雕刻精美,是北魏装饰艺术的杰作。"}, {"name": "药方洞石刻药方", "description": "唐代(约7世纪)。洞口两壁刻有140余个药方,涉及内科、外科、小儿科等,是中国现存最早的石刻药方,具有重要的医学史价值。"}, {"name": "万佛洞", "description": "唐代(680年)。南北两壁密布一万五千尊小佛像,主佛阿弥陀佛端坐莲台,洞口力士像肌肉刚健,是唐代石窟造像的代表。"}, {"name": "宾阳南洞阿弥陀佛像", "description": "唐代。面相丰满,衣纹流畅,是唐代佛教雕塑的典范之作。"}], "dynastyConnections": [{"dynasty": "北魏(493-534年)", "description": "孝文帝拓跋宏迁都洛阳后推行全面汉化,龙门石窟是汉化政策在宗教艺术上的直接体现。北魏造像从早期的云冈风格(雄健厚重、西域色彩浓)转变为龙门风格(秀骨清像、褒衣博带),反映了鲜卑贵族主动融入汉文化的进程。古阳洞、宾阳三洞为皇家主导的工程。"}, {"dynasty": "唐代(618-907年)", "description": "唐代是龙门石窟的第二个营造高峰期,造像数量约占总数的三分之二。唐代造像丰腴雄健,充满自信与活力,与北魏的清瘦风格形成鲜明对比。奉先寺卢舍那大佛集唐代雕塑之大成,是中国古代雕塑的里程碑。唐代龙门的营造与武则天关系密切--她曾捐"脂粉钱"两万贯资助奉先寺工程。"}, {"dynasty": "书法史（魏碑）", "description": "龙门石窟的造像题记是“魏碑”书法的核心资源。“龙门二十品”方劲雄强，与晋唐帖学并列为中国书法的两大传统。清代碑学运动重新发现魏碑价值，龙门题记成为书法家的圣地。"}], "sources": ["龙门石窟官网: http://www.lmsk.cn/", "UNESCO世界文化遗产名录（2000年）", "现存窟龛2345个、造像近11万尊（多源核实）"]}, {"id": "luoyang", "name": "洛阳博物馆", "lat": 34.619, "lng": 112.454, "location": "河南省洛阳市洛龙区聂泰路", "level": "国家一级博物馆", "corePeriod": "夏商周（二里头-东周王城）、东汉、魏晋北朝、隋唐（东都洛阳）", "specialty": "洛阳是中国建都朝代最多的城市（夏、商、西周、东周、东汉、曹魏、西晋、北魏、隋、唐、后梁、后唐、后晋，十三朝古都），洛阳博物馆以其跨越数千年的通史藏品展现了这座都城的全部辉煌。唐三彩和北魏陶俑收藏尤为突出。", "treasures": ["夏代乳钉纹青铜爵（中国最早的青铜酒器之一）", "东汉石辟邪", "曹魏白玉杯", "唐三彩黑釉马", "清代金丝楠木塔"], "halls": ["河洛文明"通史陈列", "宫廷文物展", "唐三彩专题展", "石刻馆", "二里头夏都遗址博物馆（关联场馆）"], "dynastyCoverage": "夏代（二里头）→ 商代 → 西周（成周）→ 东周（王城）→ 东汉 → 曹魏西晋 → 北魏 → 隋唐（东都）→ 五代", "timeline": "二里头（约前1750-前1530年）被认为是夏朝晚期都城；周公营建洛邑（前1040年代），东周迁都洛阳（前770年）；东汉光武帝定都洛阳（25年）；北魏孝文帝迁都洛阳（493年）；隋唐以洛阳为东都，武则天时一度为首都", "artifacts": [{"name": "夏代乳钉纹青铜爵", "description": "夏代（约前18世纪）。二里头遗址出土，是中国已知最早的青铜容器之一，造型朴素，但标志着中国青铜时代的开端。"}, {"name": "东汉石辟邪", "description": "东汉（2世纪）。青石雕刻的辟邪（天禄），体型庞大，昂首挺胸，造型雄浑有力，是东汉石刻艺术的代表作。"}, {"name": "曹魏白玉杯", "description": "三国曹魏（3世纪）。纯白玉质，素面无纹，造型简洁高雅，是三国时期极罕见的玉器精品。"}, {"name": "唐三彩黑釉马", "description": "唐代（8世纪）。唐三彩以黄、绿、白三色为主，黑釉极为罕见。此马造型雄健，黑釉光亮如漆，是唐三彩中的极品。"}, {"name": "北魏泥塑人面像", "description": "北魏（5-6世纪）。永宁寺塔基遗址出土，面容温和慈祥，彩绘保存良好，是北魏佛教塑像的代表。永宁寺塔高约百米，是古代中国最高的建筑之一。"}, {"name": "清代金丝楠木塔", "description": "清代（18世纪）。高约1.8米，以金丝楠木精工雕刻，层层飞檐，密布佛像，是清代木雕工艺的巅峰。"}, {"name": "东周错金银铜鼎", "description": "东周（战国）。以金银丝嵌入青铜器表面形成精美纹饰，反映了东周洛阳作为天子之都的工艺水平。"}], "dynastyConnections": [{"dynasty": "夏代", "description": "二里头遗址（洛阳偃师）是探索夏文明的核心遗址，出土了中国最早的宫殿建筑基址、青铜礼器和绿松石龙形器。虽然"二里头=夏都"仍有学术讨论，但它无疑是中华文明从新石器时代向青铜时代转变的关键节点。"}, {"dynasty": "东周", "description": "前770年周平王东迁洛邑，开启东周（春秋战国）五百余年。虽然周天子实权渐失，但洛阳作为天下共主的象征地位始终存在。"问鼎中原"的成语即来自楚庄王向周使询问九鼎轻重的典故。"}, {"dynasty": "东汉与魏晋", "description": "光武帝刘秀定都洛阳，东汉近200年以洛阳为政治中心。曹魏、西晋继承这一格局。洛阳太学、白马寺（中国第一座佛寺）、"洛阳纸贵"的典故都出自这一时期。"}, {"dynasty": "北魏", "description": "493年孝文帝迁都洛阳推行汉化，开凿龙门石窟，建造永宁寺塔。北魏洛阳城极盛时人口超60万，杨衒之《洛阳伽蓝记》记录了这座城市的繁华与衰落。"}, {"dynasty": "隋唐", "description": "隋炀帝营建东都洛阳，修建大运河以洛阳为中心。唐代洛阳为东都，武则天时期改称"神都"，是事实上的首都。洛阳在中国历史上反复担任都城角色，其地位之持久无出其右。"}], "sources": ["洛阳博物馆官网: https://www.lymuseum.com/"]}, {"id": "mogao", "name": "敦煌莫高窟", "lat": 40.0359, "lng": 94.8097, "location": "甘肃省敦煌市东南25公里鸣沙山东麓", "level": "世界文化遗产 / 国家一级博物馆（敦煌研究院）", "corePeriod": "十六国至元（366-1368年），跨越千年", "specialty": "世界上现存规模最大、内容最丰富的佛教艺术宝库。735个洞窟、4.5万平方米壁画、2415尊彩塑。是丝绸之路文化交汇的缩影，融合了中原、印度、中亚、西域多种艺术风格。", "treasures": ["1. 第45窟彩塑群（盛唐）— 唐代佛教雕塑的巅峰"], "halls": ["藏经洞（第17窟）", "第45窟", "第96窟九层楼（标志性建筑", "内有35米大佛）", "第148窟涅槃像"], "dynastyCoverage": "十六国、北魏、西魏、北周、隋、唐、五代、宋、西夏、元", "timeline": "莫高窟的开凿跨越十个朝代千余年，壁画风格的演变本身就是一部中国美术通史——从北朝的印度-犍陀罗风格到唐代的完全中国化，再到宋元的程式化。", "artifacts": [{"name": "藏经洞文书", "period": "4-11世纪", "description": "1900年道士王圆箓发现。含佛经、道经、儒家经典、社会经济文书、多种文字（汉、藏、梵、回鹘、粟特等），是研究中古时期的第一手资料"}, {"name": "第45窟彩塑", "period": "盛唐", "description": "一佛二弟子二菩萨二天王，每尊神态各异，被誉为"东方雕塑的极致""}, {"name": "第220窟壁画", "period": "初唐，642年", "description": "药师经变、维摩诘经变，色彩鲜艳，人物生动"}, {"name": "第257窟九色鹿本生", "period": "北魏", "description": "连环画式叙事，从右向左展开故事"}, {"name": "第158窟涅槃像", "period": "中唐", "description": "卧佛长15.8米，表情安详"}, {"name": "第130窟弥勒大佛", "period": "盛唐", "description": "高26米，依崖而凿"}, {"name": "飞天形象", "period": "历代", "description": "莫高窟共有4500余身飞天，风格随朝代演变"}], "dynastyConnections": [{"dynasty": "北朝**（十六国、北魏、西魏、北周）：早期洞窟，印度和中亚风格明显，人物面相丰圆，有犍陀罗痕迹
- **隋", "description": "过渡期，开始中国化，构图趋于对称"}, {"dynasty": "唐**（初唐-中唐-晚唐）：巅峰期，壁画和彩塑达到最高水平。经变画展现了想象中的佛国世界，实则反映了唐代社会的繁华
- **五代/宋", "description": "归义军时期，敦煌成为半独立政权，壁画趋于程式化但仍有精品"}, {"dynasty": "西夏/元", "description": "藏传佛教影响显现  莫高窟是理解佛教在中国本土化过程的最佳实物教材。同时，藏经洞文书揭示了丝路贸易、多民族交往、中古社会生活的方方面面。"}], "sources": ["敦煌研究院官网: https://www.dha.ac.cn/", "UNESCO世界文化遗产名录（1987年）", "735个洞窟、4.5万平方米壁画、2415尊彩塑（多源核实）"]}, {"id": "nanhai", "name": "广东海上丝绸之路博物馆（南海一号）", "lat": 21.58, "lng": 111.92, "location": "广东省阳江市海陵岛十里银滩", "level": "国家一级博物馆", "corePeriod": "南宋（约1183年）", "specialty": "中国乃至世界水下考古的里程碑。"南海一号"是一艘南宋时期的远洋贸易商船，1987年发现，2007年整体打捞出水（世界首次沉船整体打捞），2013年起全面保护发掘。共出水文物18万余件，其中瓷器约16万件套，铁器凝结物124吨。沉船残长约21.91m，最大船宽约9.87m，属"福船"类型，估计排水量600吨、载重近800吨。2025年11月"水晶宫"首次对公众开放。", "treasures": ["1. 南海一号沉船船体 — 南宋远洋商船", "世界首次整体打捞"], "halls": ["水晶宫"（沉船原址保护展示）", "南海一号出水文物陈列"], "dynastyCoverage": "南宋（约1183年，淳熙年间）", "timeline": "南海一号是南宋海上丝绸之路的"时间胶囊"。船上货物以瓷器和铁器为主，瓷器涵盖景德镇、龙泉、德化、磁灶等南宋主要外销瓷窑口。部分陶瓷带有阿拉伯风格，部分铁器凝结物含有标记"梁宅"等印文——考古已确认部分陶瓷器产自广东南海的奇石窑和文头岭窑。始发港为泉州，曾停靠广州，目的地为东南亚或中东。", "artifacts": [{"name": "南海一号沉船船体", "period": "南宋，约1183年", "description": "残长21.91m，最大宽9.87m。14道隔舱壁，属福船类型。采用了升降船舵和"可倒桅"技术（中国发明，14世纪才传入欧洲）。宋代造船史上的"活标本""}, {"name": "外销瓷器（约16万件套）** — 碗、盘、罐、盒、壶、瓶等种类繁多。景德镇窑青白瓷、龙泉窑青瓷、德化窑白瓷、磁灶窑酱釉器，部分造型带阿拉伯风格。是研究南宋外销瓷贸易的最大单批实物
3. **铁器（124吨凝结物）** — 铁锅和铁坯件（条状/片状/楔形）为大宗。铁器是南宋重要的出口商品，装载量甚至超过瓷器的重量
4. **"淳熙元宝"铜钱", "period": "南宋孝宗1174-1189年", "description": "船上最晚年号铜钱，结合德化瓷罐上"癸卯"（1183年）墨书，推定沉船出航约在1183年"}], "dynastyConnections": [], "sources": ["百度百科·南海一号（详细词条，含沉船尺寸、出水文物数据、考古历程）"]}, {"id": "nanjing", "name": "南京博物院", "lat": 32.0569, "lng": 118.8228, "location": "江苏省南京市玄武区中山东路321号", "level": "国家一级博物馆（中国三大博物馆之一）", "corePeriod": "六朝、明代、民国", "specialty": "中国最早的公立博物馆之一，"一院六馆"模式（历史馆、艺术馆、特展馆、数字馆、民国馆、非遗馆）。民国馆沉浸式还原1930年代南京街景。", "treasures": ["1. 金缕玉衣（西汉）— 徐州楚王墓出土"], "halls": ["历史馆（通史主线）", "民国馆（沉浸体验）", "艺术馆（书画瓷器）"], "dynastyCoverage": "六朝（东吴、东晋、宋齐梁陈）、明、民国为特色，兼顾通史", "timeline": "南京是六朝古都和明初都城。南博以六朝文物见长，竹林七贤砖画是六朝文化的标志。民国馆则补上了中国近现代史的重要一环。", "artifacts": [{"name": "竹林七贤与荣启期砖画", "period": "南朝", "description": "用数百块砖拼合而成的大型壁画，表现魏晋名士风度"}, {"name": "金缕玉衣", "period": "西汉", "description": "用金丝穿缀玉片制成的殓服，体现汉代丧葬制度和玉文化"}, {"name": "明洪武釉里红岁寒三友纹梅瓶", "period": "明初", "description": "釉里红工艺难度极高，此件品相完美"}, {"name": "错银铜牛灯", "period": "东汉", "description": "灯烟通过牛体导入水中过滤，古代"环保"设计"}, {"name": "银缕玉衣", "period": "东汉", "description": "玉衣等级制度的实物证据"}, {"name": "透雕人鸟兽玉饰件", "period": "西周", "description": "玉器工艺精品"}, {"name": "青瓷釉下彩羽人纹盘口壶", "period": "三国·吴", "description": "最早的釉下彩瓷"}], "dynastyConnections": [], "sources": ["南京博物院官网: https://www.njmuseum.com/", "核心文物数据已多源交叉核实"]}, {"id": "nanyue", "name": "南越王博物院", "lat": 23.1375, "lng": 113.259, "location": "广东省广州市越秀区（王墓展区）/ 北京路（王宫展区）", "level": "国家一级博物馆", "corePeriod": "秦汉（南越国，前203-前111年）", "specialty": "建于南越国第二代王赵眜（赵胡）墓原址之上，是华南地区发现的规模最大、保存最完好的汉代彩绘石室墓。王宫展区展示南越国宫署遗址和御苑遗迹，两个展区合为完整的南越国都城图景。", "treasures": ["丝缕玉衣", ""文帝行玺"金印", "角形玉杯", "铜屏风构件", "船纹铜提筒"], "halls": ["主墓室原址展示", "玉器专题展", "南越王宫署遗址", "曲流石渠御苑遗迹"], "dynastyCoverage": "秦代（赵佗南征）→ 西汉（南越国五代王）→ 东汉至六朝（岭南开发）", "timeline": "秦始皇统一岭南（前214年）→ 赵佗建南越国（前203年）→ 赵眜继位（约前137年）→ 汉武帝灭南越（前111年）。南越国存续近百年，是岭南从百越部落社会向汉文化圈转型的关键时期", "artifacts": [{"name": ""文帝行玺"金印", "description": "西汉（前2世纪）。纯金铸造，龙钮，印文"文帝行玺"，是迄今发现的最大的汉代金印。直接证明墓主为南越文帝赵眜，也是研究南越国政治制度的关键实物——南越王自称"帝"而非"王"，反映了其与汉朝的微妙关系。"}, {"name": "丝缕玉衣", "description": "西汉（前2世纪）。以丝线穿缀2291块玉片而成，是目前发现年代最早、保存最完整的丝缕玉衣。比中原的金缕玉衣等级略低，反映了南越国对汉制的模仿和调适。"}, {"name": "角形玉杯", "description": "西汉。以整块青玉雕成犀角形，杯口沿浮雕一只矫健的夔龙，造型独特，兼具中原玉器和草原风格，是汉代玉器中的孤品。"}, {"name": "铜屏风构件（朱雀、人操蛇等）", "description": "西汉。大型铜铸鎏金屏风的构件，有朱雀衔环、人操蛇等造型，工艺精湛，反映了南越宫廷的审美趣味。"}, {"name": "船纹铜提筒", "description": "西汉。越式铜器，筒壁刻有战船、羽人等纹饰，与越南东山文化铜鼓风格相似，是南越国海洋文化和百越传统的直接证据。"}, {"name": "银盒（波斯风格）", "description": "西汉。锤揲工艺制作的银盒，造型和纹饰具有明显的西亚波斯风格，是早期海上丝绸之路的实物证据。"}, {"name": "南越国宫署遗址"万岁"瓦当", "description": "西汉。"万岁"文字瓦当，与闽越国类似，反映了南方诸越国的政治自主性。"}], "dynastyConnections": [{"dynasty": "秦代", "description": "秦始皇于前214年发兵五十万征服岭南，设南海、桂林、象郡三郡。秦将赵佗被任命为南海郡龙川县令，这是中原政权首次有效管辖岭南。"}, {"dynasty": "西汉（南越国）", "description": "秦末乱世，赵佗据南海郡自立，前203年建南越国，定都番禺（广州）。南越国传五代王，前后近百年。赵眜（第二代王）墓的发现揭示了南越国的文化面貌：既大量采用中原汉制（玉衣、印玺、编钟），又保留了浓厚的百越传统（铜提筒、人操蛇屏风），同时通过海上贸易接触了西亚文化（银盒），呈现出多元融合的特色。前111年汉武帝灭南越，岭南正式纳入汉帝国版图。"}, {"dynasty": "海上丝绸之路", "description": "南越国的银盒等外来器物证明，早在西汉早期，岭南地区已经通过海上通道与东南亚、南亚乃至西亚有贸易往来，广州是中国最早的海上丝绸之路起点之一。"}], "sources": ["南越王博物院官网: https://www.nywmuseum.com/"]}, {"id": "neimenggu", "name": "内蒙古博物院", "lat": 40.8427, "lng": 111.7588, "location": "内蒙古自治区呼和浩特市新城区新华东街27号", "level": "国家一级博物馆", "corePeriod": "匈奴至蒙元（北方游牧文化全谱系）", "specialty": "中国收藏北方草原文化文物最丰富的博物馆。从匈奴到鲜卑、突厥、契丹、蒙古，草原帝国的兴衰在这里一览无余。匈奴鹰顶金冠饰是中国草原文物的至高杰作。恐龙化石收藏也很突出。", "treasures": ["匈奴鹰顶金冠饰", "许季姜青铜簋", "金银器"胡人牵驼"", "契丹女尸（辽代）", "查干诺尔恐龙化石"], "halls": ["远古世界"（恐龙）", "草原雄风"（北方民族）", "大辽契丹", "天骄蒙古"], "dynastyCoverage": "新石器时代（红山文化）、匈奴、鲜卑、突厥、回鹘、契丹（辽）、蒙古（元）、清", "timeline": "红山文化（前4700-前2900年）→ 匈奴帝国（前3世纪-1世纪）→ 鲜卑崛起（1-4世纪）→ 契丹建辽（907/916年）→ 蒙古帝国（1206年）→ 清代归绥", "artifacts": [{"name": "匈奴鹰顶金冠饰", "period": "战国晚期，约前4-前3世纪", "description": "—鄂尔多斯杭锦旗阿鲁柴登出土，由鹰形冠顶和黄金冠带组成。冠顶为一只展翅雄鹰俯瞰大地，冠带浮雕虎、马、羊等草原动物。是目前所见唯一的匈奴王金冠，被誉为"草原瑰宝"，是中国考古发现的标志性文物之一。"}, {"name": "鄂尔多斯式青铜器群", "period": "春秋至汉代", "description": "—以动物纹饰为特征的青铜短剑、带扣、牌饰等，是北方草原游牧文化的典型器物。虎噬羊、盘角羊、奔鹿等造型充满草原生命力，与中原青铜器风格截然不同。"}, {"name": "许季姜青铜簋", "period": "西周中期", "description": "—铭文记载了周王室与北方的关系，是研究西周北方边疆的重要材料。"}, {"name": "契丹贵族墓葬出土文物", "period": "辽代，10-12世纪", "description": "—包括金银器、玻璃器、丝织品等，辽代契丹贵族墓葬在内蒙古东部大量发现，出土的鎏金银冠、银靴、金面具等展示了契丹贵族的丧葬习俗。"}, {"name": "辽代契丹女尸", "period": "辽代", "description": "—通辽奈曼旗出土，保存状态良好，身着丝绸，佩戴金银饰品。是了解辽代契丹贵族生活和丧葬制度的重要实物。"}, {"name": "元代铜权", "period": "元代", "description": "—元上都遗址出土，体现了蒙古帝国的度量衡制度。元上都（今锡林郭勒盟正蓝旗）是忽必烈的夏都，已列入世界遗产。"}, {"name": "查干诺尔龙化石", "period": "白垩纪", "description": "—锡林郭勒盟出土，巨型蜥脚类恐龙，是内蒙古恐龙化石的代表。"}, {"name": "金银器"胡人牵驼"摆件", "period": "唐代", "description": "—展现了丝绸之路上的贸易场景，体现了草原在东西方交流中的桥梁作用。"}], "dynastyConnections": [], "sources": ["内蒙古博物院官网: https://www.nmgbwy.com/"]}, {"id": "ningxia", "name": "宁夏回族自治区博物馆", "lat": 38.468, "lng": 106.2584, "location": "宁夏回族自治区银川市金凤区人民广场东路", "level": "国家一级博物馆（2012年获批）", "corePeriod": "西夏（1038-1227）、北方游牧民族", "specialty": "中国唯一系统展示西夏文明的省级博物馆。新馆总建筑面积30258平方米，建筑平面呈"回"字型，呼应回族自治区特色。馆藏近5万件，三级以上珍贵文物4000余件，国家一级文物159件。鎏金铜牛、胡旋舞石刻墓门、力士志文支座为三件国宝级文物。贺兰山岩画实物收藏也是一大特色。", "treasures": ["1. 鎏金铜牛（西夏）— 西夏王陵出土", "国宝级"], "halls": ["朔色长天——宁夏通史陈列"（五篇：文明曙光→农牧家园→丝路重镇→大夏寻踪→塞北江南）", "大夏寻踪"（西夏专题", "300余件文物精品）", "石刻史书"（贺兰山岩画", "实物约150块", "拓片约300幅）", "回乡漫步"（回族民俗）"], "dynastyCoverage": "旧石器时代（水洞沟）→ 新石器（菜园文化/马家窑/齐家）→ 春秋战国（戎族青铜器）→ 秦汉 → 北朝隋唐（丝路重镇固原、灵州）→ 西夏 → 元明清", "timeline": "宁夏地处丝绸之路北线和农牧交界地带。北朝至隋唐时期，固原是丝路孔道上的重镇，大量中西文化交流遗物在此出土。西夏党项政权（1038-1227年）定都兴庆府（银川），创制西夏文字，留下了丰富的独立文明遗存。", "artifacts": [{"name": "鎏金铜牛", "period": "西夏，西夏王陵出土", "description": "国宝级文物，铜牛通体鎏金，体态健壮，铸造工艺精湛，是西夏金属工艺的最高水平代表"}, {"name": "胡旋舞石刻墓门", "period": "唐代，盐池县出土", "description": "国宝级文物，两扇石门上浮雕胡旋舞男子形象，舞姿优美，是研究唐代中亚胡旋舞东传的珍贵实物"}, {"name": "力士志文支座", "period": "西夏，西夏王陵出土", "description": "国宝级文物，男性力士形象的石刻建筑构件，身刻西夏文字，是西夏陵寝建筑制度的重要证据"}, {"name": "贺兰山岩画", "period": "旧石器至青铜时代", "description": "贺兰山东麓发现大量岩画，以人面像和动物形象为主，时间跨度数千年，是北方游牧民族精神生活的直接记录"}, {"name": "透雕青铜牌饰", "period": "战国至汉", "description": "北方草原风格的鄂尔多斯式青铜器，反映宁夏地区戎族与中原的文化交流"}, {"name": "西夏文陶范", "period": "西夏", "description": "用于铸造西夏文字钱币的模具，是西夏货币制度和铸造工艺的直接证据"}, {"name": "彩绘泥塑罗汉像", "period": "西夏", "description": "体态丰满，神态怡然，纹饰上贴金箔，是西夏佛教艺术的精品"}, {"name": "竹雕", "period": "西夏", "description": "细浅阴刻中原人物生活场景，说明西夏与中原文化的交流互鉴"}], "dynastyConnections": [], "sources": ["百度百科·宁夏回族自治区博物馆（详细词条，含建筑数据、展厅描述、馆藏信息）"]}, {"id": "qinghai", "name": "青海省博物馆", "lat": 36.62, "lng": 101.75, "location": "青海省西宁市城西区新宁广场东侧", "level": "国家一级博物馆（2017年第三批）", "corePeriod": "新石器彩陶（马家窑/齐家）、唐蕃古道、藏传佛教", "specialty": "青海第一座现代化大型综合博物馆。馆藏15742件/套，珍贵文物2079件/套。以新石器彩陶和民族宗教类文物最具特色。设主侧展厅10个，展厅面积9146㎡。"1+3"主题展览体系。旧址为军阀马步芳宅邸"馨庐"。", "treasures": ["1. 舞蹈纹彩陶盆（宗日文化）— 青海同德宗日遗址出土", "盆内壁绘两组手拉手群舞人物（11人和13人）"], "halls": ["江河源文明——青海历史文物展"（510余件/套", "史前文明遗珍"和"历史文物精粹"两部分）", "青海考古成果展"（含都兰热水大墓出土文物首次亮相）", "藏传佛教金铜造像艺术展"（78件鎏金铜造像）", "唐卡艺术展"（50幅）"], "dynastyCoverage": "新石器（马家窑/齐家/宗日文化）→ 青铜时代（卡约/辛店/诺木洪文化）→ 秦汉（河湟设郡）→ 南北朝隋唐（吐谷浑/唐蕃古道）→ 宋元明清（藏传佛教）", "timeline": "青海地处三江之源（黄河/长江/澜沧江），是中华文明多元一体的交汇地带。新石器时代马家窑文化在此繁荣，齐家文化的铜镜是中国铜镜史的起点。唐蕃古道（唐代通往吐蕃的官方通道）经过青海，使其成为汉藏文化交流的桥梁。", "artifacts": [{"name": "舞蹈纹彩陶盆", "period": "新石器时代·宗日文化，青海同德宗日遗址出土", "description": "泥质红陶，口沿内壁绘两组手拉手群舞人物，分别为11人和13人。是中国史前彩陶中最生动的人物活动场景之一，与青海大通出土的另一件舞蹈纹盆齐名"}, {"name": "弦纹网纹彩陶壶", "period": "马家窑文化，青海民和核桃庄拱北台遗址出土", "description": "侈口长颈鼓腹平底，从上至下通体绘彩，颈部弦纹，肩腹部网纹、圆圈十字纹和波纹。色彩艳丽，代表马家窑彩陶最高水平"}, {"name": "铜镜", "period": "齐家文化，约4000年前，贵南尕马台墓葬出土", "description": "正面磨光，背面有半圆形钮，饰羽状七角星纹。齐家文化铜镜是中国铜镜史的开端"}, {"name": "石磬", "period": "约4000年前", "description": "长96cm，宽61cm，厚4cm。打击乐器，也是古代祭祀礼器。"八音"中"石"的代表乐器"}, {"name": "唐黄地联珠团窠对马锦", "period": "唐代", "description": "黄地织锦，联珠圈纹内绘蓝彩对马，对马昂首，饰飘带。典型的唐代丝路风格织锦"}, {"name": "明永乐铜鎏金观音像", "period": "明代", "description": "站立莲花座上，发髻高耸，头戴五花冠，双手各牵莲花一枝，帔帛卷曲而下，是一代金铜造像的典范"}, {"name": "玄武砚滴", "period": "魏晋，互助高寨汉墓出土", "description": "龟蛇合体造型，龟头前伸口衔小铜碗，兼具实用性和艺术性"}, {"name": "唐手书"羯摩经"", "period": "唐代", "description": "全长约17米，用34张纸粘连，共933行。珍贵的唐代手写佛教经卷"}], "dynastyConnections": [], "sources": ["百度百科·青海省博物馆（详细词条，含馆藏数据、展厅描述、文物详情）"]}, {"id": "qingzhou", "name": "青州博物馆", "lat": 36.6907, "lng": 118.4755, "location": "山东省潍坊市青州市范公亭西路1号（新馆2023年开放）", "level": "国家一级博物馆（2008年，首批县级市国家一级博物馆）", "corePeriod": "南北朝（龙兴寺佛教造像）、汉代（香山汉墓）", "specialty": "中国首批国家一级博物馆中唯一的县级市博物馆，有"小 6. **北齐贴金彩绘石雕菩萨立像", "period": "北齐", "description": "通高165cm，360度圆雕。头戴透雕花蔓冠，璎珞华丽，裙带上装饰九方浅浮雕图案"}, {"name": "铜鎏金碧霞元君坐像", "period": "明代", "description": "通高180cm，青铜鎏金"}], "dynastyConnections": [], "sources": ["百度百科·青州博物馆（详细词条，含馆藏数据、展厅描述、文物详情）"]}, {"id": "quanzhou", "name": "泉州海外交通史博物馆", "lat": 24.9091, "lng": 118.606, "location": "福建省泉州市丰泽区东湖街425号", "level": "国家一级博物馆", "corePeriod": "宋元（泉州为"东方第一大港"）", "specialty": "中国最早也是唯一以海外交通史为专题的博物馆。2021年"泉州：宋元中国的世界海洋商贸中心"申遗成功，海交馆是核心展示中心。馆藏宋代沉船、宗教石刻、外销瓷等珍贵文物，集中反映古代海上丝绸之路的繁荣。", "treasures": ["宋代海船（后渚港出土）", "印度教石刻（宋元）", "伊斯兰教碑刻", "阿拉伯商人墓碑", "外销瓷器"], "halls": ["泉州：宋元中国的世界海洋商贸中心", "泉州宗教石刻陈列", "泉州湾古船陈列馆", "泉州伊斯兰文化陈列馆"（2003年建成）"], "dynastyCoverage": "唐（泉州港兴起）→ 宋元（东方第一大港、刺桐城）→ 明（郑和下西洋）→ 清", "timeline": "泉州（古称刺桐）在宋元时期是世界最大的港口之一，马可·波罗称其为"世界上最大的港口之一"。2021年联合国教科文组织将"泉州：宋元中国的世界海洋商贸中心"列入世界遗产", "artifacts": [{"name": "宋代海船", "period": "南宋，1974年后渚港出土", "description": "残长24.2米，宽9.15米，是当时中国出土的最大古船之一。船体采用水密隔舱技术，是中国古代造船术的实物证据"}, {"name": "印度教石刻", "period": "宋元", "description": "泉州出土的大量印度教神像石刻（毗湿奴、湿婆等），证明宋元时期印度商人社区在泉州的存在"}, {"name": "伊斯兰教碑刻", "period": "宋元", "description": "阿拉伯文、波斯文墓碑和清真寺碑刻，反映泉州穆斯林社区的规模和影响力"}, {"name": "基督教（景教）石刻", "period": "元代", "description": "十字架石刻，证明元代泉州存在景教/天主教社区"}, {"name": "外销瓷器", "period": "宋元", "description": "德化窑白瓷、磁灶窑彩瓷等，是泉州作为陶瓷外销港的直接证据"}, {"name": "摩尼教石刻", "period": "宋元", "description": "泉州是中国摩尼教（明教）保存最完整的地区"}], "dynastyConnections": [], "sources": ["泉州海交馆官网: http://www.qzhjg.cn/", "泉州海交馆简介: http://www.qzhjg.cn/html/hjgjj.html", "百度百科·泉州海外交通史博物馆", "UNESCO世界遗产: "泉州：宋元中国的世界海洋商贸中心"（2021年列入）"]}, {"id": "sanxingdui", "name": "三星堆博物馆", "lat": 31.0007, "lng": 104.2073, "location": "四川省广汉市西安路133号", "level": "国家一级博物馆", "corePeriod": "古蜀文明(约前1600-前1100年,相当于商代)", "specialty": "中国考古史上最具颠覆性的发现之一。巨大的青铜纵目面具、黄金面罩、青铜神树等完全不同于中原商文明的风格,揭示了一个平行于商朝的独立文明体系。2020-2022年新坑发掘引发全球关注。", "treasures": ["1. 青铜纵目面具(商)- 眼球突出16cm的巨型面具,可能代表蜀王蚕丛"], "halls": ["新馆全部(2023年开放的新展馆设计一流)", "祭祀坑出土物展区"], "dynastyCoverage": "古蜀文明(商代同时期),与中原商文明平行", "timeline": "三星堆文明(前1600-前1100年)与商文明同期但风格迥异,证明中国文明并非单一中原起源,而是多元并起。三星堆衰落后,文明中心转移至成都金沙(前1200-前600年)。", "artifacts": [{"name": "青铜纵目面具", "period": "商,前1300-前1100年", "description": "宽1.38米,眼球柱状外突16cm。可能是传说中蜀王蚕丛"纵目"的写照,也可能是巫师通神的面具"}, {"name": "青铜大立人像", "period": "商", "description": "全高2.62米,双手呈环形持物(持物已佚),头戴冠,身着三层衣。可能是大祭司或蜀王"}, {"name": "青铜神树", "period": "商", "description": "残高3.96米(完整约5米),树上9枝、9鸟(太阳鸟),可能是扶桑树或建木的写照"}, {"name": "金杖", "period": "商", "description": "长1.42米,可能是王权象征。纹饰为鱼、鸟、箭,可能讲述蜀王传说"}, {"name": "黄金面罩", "period": "商,2021年出土", "description": "重280g,覆盖青铜头像面部"}, {"name": "青铜人头像群", "period": "商", "description": "数十件大小各异的青铜人头像,可能代表不同等级的祭祀参与者"}, {"name": "玉璋", "period": "商", "description": "大量玉璋出土,与中原二里头文化有联系"}, {"name": "象牙", "period": "商", "description": "大量象牙出土,说明当时四川盆地有大象"}], "dynastyConnections": [], "sources": ["三星堆博物馆官网: https://www.sxd.cn/", "百度百科·三星堆博物馆"]}, {"id": "shaanxi", "name": "陕西历史博物馆", "lat": 34.222, "lng": 108.9554, "location": "陕西省西安市雁塔区小寨东路91号", "level": "国家一级博物馆（中国第一座大型现代化博物馆）", "corePeriod": "周、秦、汉、唐", "specialty": "地处十三朝古都西安，藏品170余万件，以周秦汉唐四大盛世文物最为系统完整。唐代金银器和壁画收藏为全国之冠。", "treasures": ["1. 兽首玛瑙杯（唐）— 海内孤品", "可能为中亚传入的珍贵酒器"], "halls": ["基本陈列（周秦汉唐通史）", "唐代壁画珍品馆（需另购票）", "大唐遗宝展"], "dynastyCoverage": "西周、秦、西汉、唐为核心，上溯蓝田人，下至明清", "timeline": "西安（长安）是西周、秦、西汉、隋唐的都城。陕历博以都城视角串联了中国古代最辉煌的几个时期。", "artifacts": [{"name": "兽首玛瑙杯", "period": "唐", "description": "用整块红色缠丝玛瑙雕成，兽首形杯口，可能是从中亚丝路传入的异域珍品"}, {"name": "鎏金舞马衔杯纹银壶", "period": "唐", "description": "唐玄宗生日宴上舞马衔杯祝寿的故事在此壶上得到实物印证"}, {"name": "唐三彩骆驼载乐俑", "period": "唐", "description": "骆驼背上载有胡人乐队，丝路文化融合的标志"}, {"name": "五祀卫鼎", "period": "西周共王", "description": "铭文207字，记载了一起完整的土地诉讼案"}, {"name": "皇后之玺", "period": "西汉", "description": "迄今发现唯一的皇后玉玺，可能属于吕后"}, {"name": "鸳鸯莲瓣纹金碗", "period": "唐", "description": "唐代金器工艺巅峰"}, {"name": "杜虎符", "period": "战国·秦", "description": "虎形铜符，调兵凭证，铭文40字"}, {"name": "黑釉油滴碗", "period": "宋", "description": "建窑精品"}], "dynastyConnections": [{"dynasty": "西周", "description": "礼乐制度、青铜铭文"}, {"dynasty": "秦", "description": "统一、法制、军事"}, {"dynasty": "西汉", "description": "汉承秦制、丝绸之路起点"}, {"dynasty": "唐", "description": "开放包容、国际化大都市长安  唐代部分最为璀璨，壁画馆保存了大量唐墓壁画原件，是其他博物馆无法替代的。"}], "sources": ["陕西历史博物馆官网: https://www.sxhm.com/", "百度百科·陕西历史博物馆（馆藏170余万件）"]}, {"id": "shandong", "name": "山东博物馆", "lat": 36.6488, "lng": 117.101, "location": "山东省济南市历下区经十路11899号", "level": "国家一级博物馆", "corePeriod": "新石器时代（大汶口-龙山文化）、先秦（齐鲁文化）、明代（鲁王府/衡王府）", "specialty": "以史前考古收藏见长，蛋壳黑陶杯是龙山文化的巅峰之作。齐鲁文化是中华文明的核心源头之一，馆内对齐国和鲁国有系统展示。明代鲁王府旧藏的大量文物也是重要特色。", "treasures": ["蛋壳黑陶高柄杯", "红陶兽形壶", "鲁国大玉璧", "亚丑钺", "明衡王府九旒冕"], "halls": ["史前文明", "齐鲁文化", "佛教造像艺术", "明代鲁王展"], "dynastyCoverage": "新石器时代（大汶口、龙山文化）、商、西周、春秋战国（齐鲁）、汉、北朝、明", "timeline": "大汶口文化（前4100-前2600年）→ 龙山文化（前2600-前2000年）→ 齐鲁立国（前1046年分封）→ 汉代儒学中心", "artifacts": [{"name": "蛋壳黑陶高柄杯", "period": "龙山文化，约前2500-前2000年", "description": "—日照出土，器壁最薄处仅0.2毫米，重量不足50克，"薄如蛋壳、黑如漆、亮如镜"。是龙山文化制陶工艺的巅峰之作，代表了史前陶器技术的最高水平，无法在现代条件下完美复制。"}, {"name": "红陶兽形壶", "period": "大汶口文化，约前4000年", "description": "—泰安大汶口出土，猪形（一说狗形），造型憨态可掬，是大汶口文化的标志性器物，体现了先民的生活情趣和艺术想象力。"}, {"name": "鲁国大玉璧", "period": "战国", "description": "—曲阜鲁国故城出土，直径32.8厘米，是目前所见战国玉壁中最大的一件。纹饰精美复杂，分内外区，体现了鲁国"周礼尽在鲁"的用玉传统。"}, {"name": "亚丑钺", "period": "商代晚期", "description": "—青州苏埠屯出土，铜钺上有"亚丑"铭文和人面纹饰，造型威严狰狞。是商代晚期东方方国的重要遗物，"亚丑"可能是商代的一个重要族群。"}, {"name": "颂簋", "period": "西周晚期", "description": "—传世品，铭文152字，记载周王册命颂的事迹。是西周青铜器铭文学研究的重要材料。"}, {"name": "明衡王府九旒冕", "period": "明代", "description": "—青州明衡王墓出土，是目前国内唯一保存完整的明代亲王冕冠实物。金丝编制，九旒各缀玉珠，完整再现了明代亲王的冕服制度。"}, {"name": "东平汉墓壁画", "period": "东汉", "description": "—东平出土，保存完好，绘有宴饮、车马出行等场面。是山东地区汉代壁画的重要发现，填补了该区域汉代墓葬壁画的空白。"}, {"name": "甲骨文", "period": "商代", "description": "—馆藏甲骨数量丰富，是研究商代后期历史的重要文字资料。"}], "dynastyConnections": [], "sources": ["山东博物馆官网: https://www.sdmuseum.com/"]}, {"id": "shanghai", "name": "上海博物馆", "lat": 31.2286, "lng": 121.4747, "location": "上海市浦东新区世博大道（东馆）/ 黄浦区人民大道201号（人民广场馆）", "level": "国家一级博物馆", "corePeriod": "青铜器（商周）、书画（唐宋元明清）、陶瓷（全时期）", "specialty": "以青铜器、书画、陶瓷三大收藏闻名世界。文物系统性极强，是学术研究型博物馆的典范。2022年起东馆陆续开放，展览面积大幅扩展。", "treasures": ["1. 大克鼎（西周）— 铭文290字", "与大盂鼎并称"海内三宝"之二"], "halls": ["中国古代青铜馆", "中国历代书法馆", "中国历代绘画馆", "中国历代陶瓷馆"], "dynastyCoverage": "商周（青铜）、唐宋元明清（书画）、全时期（陶瓷）", "timeline": "上博的青铜器收藏构成了从商到战国的完整序列，是理解中国青铜时代的最佳场所之一。书画收藏则覆盖唐至清的核心脉络。", "artifacts": [{"name": "大克鼎", "period": "西周孝王", "description": "膳夫克为祭祖而铸，铭文记载西周土地制度"}, {"name": "商鞅方升", "period": "战国·秦孝公十八年", "description": "刻有秦始皇统一度量衡诏书，跨越两个时代的实物"}, {"name": "晋侯稣钟", "period": "西周厉王", "description": "16件编钟，铭文记载西周晚期战争"}, {"name": "《高逸图》", "period": "唐·孙位", "description": "描绘竹林七贤，现存最可靠的唐代人物画之一"}, {"name": "《淳化阁帖》最善本", "period": "北宋", "description": "中国法帖之祖，上博藏本为最佳版本"}, {"name": "牺尊", "period": "春秋", "description": "动物形青铜酒器，工艺精湛"}, {"name": "越窑青瓷莲花碗", "period": "五代", "description": "秘色瓷代表作"}], "dynastyConnections": [], "sources": ["上海博物馆官网: https://www.shanghaimuseum.net/", "核心文物数据已多源交叉核实"]}, {"id": "shanxi-datong", "name": "大同市博物馆", "lat": 40.0769, "lng": 113.2971, "location": "山西省大同市平城区御河西路南段", "level": "国家一级博物馆", "corePeriod": "北魏平城时代（398-494年）", "specialty": "大同是北魏都城平城，历时近百年（398-494年迁洛阳）。大同博物馆集中展示了这一时期鲜卑拓跋氏政权从草原到中原的文化转型，是了解北魏前期最重要的博物馆。辽金西京大同府的文物也是重要收藏。", "treasures": ["司马金龙墓漆画屏风", "北魏石雕柱础", "封和突墓出土品", "宋绍祖墓石椁", "琅琊王墓出土品"], "halls": ["魏都平城", "辽金西京", "大同恐龙"], "dynastyCoverage": "北魏、东魏、北齐、辽、金", "timeline": "拓跋鲜卑南迁 → 北魏建国（386年）→ 迁都平城（398年）→ 太武帝统一北方（439年）→ 孝文帝迁洛（494年）→ 辽代西京大同府 → 金代西京", "artifacts": [{"name": "司马金龙墓漆画屏风", "period": "北魏，484年", "description": "—大同石家寨出土。木板上以漆绘列女、孝子等故事，人物线条流畅，色彩鲜艳，构图源自汉代画像传统。司马金龙是晋朝宗室后裔，娶北魏皇族拓跋氏女。此屏风是北魏绘画遗存中最精美的作品，展示了北魏汉化进程中的文化融合。（为国宝级文物）"}, {"name": "北魏石雕柱础", "period": "北魏，5世纪", "description": "—大同城内出土，浮雕忍冬纹、莲花纹等装饰，风格兼具中原和西域特色。是北魏宫殿建筑构件的重要实物。"}, {"name": "封和突墓出土品", "period": "北魏，504年", "description": "—封和突为鲜卑贵族，墓中出土陶俑、铜器等。陶俑面部特征和服饰反映了鲜卑族的形象特点，部分俑已穿汉式服装，体现了孝文帝改革后的文化变化。"}, {"name": "宋绍祖墓石椁", "period": "北魏，477年", "description": "—石椁仿木结构建筑，屋顶、门窗俱全，雕刻精美。是了解北魏建筑形式的重要实物资料，反映了北魏时期丧葬制度对中原传统的吸收。"}, {"name": "琅琊王司马金龙墓志", "period": "北魏", "description": "—墓志铭文书法工整，是北魏书法的重要遗存，对研究北碑书法有重要意义。"}, {"name": "辽代壁画墓壁画", "period": "辽代，10-11世纪", "description": "—大同地区发现多座辽代壁画墓，绘有宴饮、出行、侍奉等场面，人物服饰兼具契丹和汉族特征，是辽代社会生活的生动写照。"}, {"name": "北魏彩绘人物陶俑群", "period": "北魏", "description": "—成组出土的彩绘陶俑，包括武士俑、文官俑、侍女俑、胡人俑等，面部特征多样，反映了平城时期多民族杂居的社会面貌。"}], "dynastyConnections": [], "sources": ["大同市博物馆官网: http://www.dtbwg.com/"]}, {"id": "shanxi", "name": "山西博物院", "lat": 37.8636, "lng": 112.5226, "location": "山西省太原市万柏林区滨河西路北段13号", "level": "国家一级博物馆", "corePeriod": "西周至春秋（晋文化）、北朝至隋唐（佛教艺术）", "specialty": "晋国青铜器收藏全国首屈一指，鸟尊为镇馆之宝。佛教造像从北魏到唐代形成完整序列，侯马盟书是春秋晚期政治史的珍贵文字资料。山西作为"中国古建筑博物馆"，馆内对古建筑也有专题展示。", "treasures": ["晋侯鸟尊", "侯马盟书", "龙形觥", "兽形觥", "庙底沟彩陶"], "halls": ["晋国霸业", "佛风遗韵", "土木华章", "文明摇篮"], "dynastyCoverage": "新石器时代（庙底沟）、商、西周、春秋、北魏、北齐、唐、宋、辽金", "timeline": "庙底沟文化（前4000年）→ 晋国（前1033-前376年）→ 北魏平城/洛阳时代 → 唐代佛教兴盛", "artifacts": [{"name": "晋侯鸟尊", "period": "西周，约前9世纪", "description": "—曲沃天马-曲村晋侯墓地114号墓出土，凤鸟回首造型，背上有盖，尾部有象鼻形鋬。是晋侯燮父时期的青铜礼器，造型独特，已成为山西博物院的标志。"}, {"name": "侯马盟书", "period": "春秋晚期，约前497-前489年", "description": "—侯马晋国遗址出土，用毛笔写在玉石片上的盟誓文书，共5000余片。记载了晋国赵氏内部及赵氏与其他卿族的盟誓活动，是研究春秋晚期政治斗争的第一手资料，也是目前所见最早的毛笔书写文字实物之一。"}, {"name": "龙形觥", "period": "商代晚期", "description": "—山西石楼出土，整器为龙形，龙首张口为流，通体饰鼍纹、夔龙纹。造型在商代青铜器中极为罕见，体现了晋陕高原青铜文化的独特面貌。"}, {"name": "兽形觥", "period": "商代晚期", "description": "—灵石旌介出土，整体呈四足兽形，兽背上有盖，造型浑厚生动。是商代晚期青铜酒器的杰出代表。"}, {"name": "庙底沟彩陶", "period": "新石器时代，约前4000年", "description": "—以花瓣纹、旋涡纹为典型装饰，代表了仰韶文化庙底沟类型，这一文化类型从山西、陕西扩展至黄河中游广大地区，被认为是华夏文化早期扩张的考古学证据。"}, {"name": "虞弘墓汉白玉石椁", "period": "北齐-隋，592年", "description": "—太原出土，石椁浮雕表现了大量中亚祆教风格的宴饮、狩猎、乐舞场面，墓主虞弘为鱼国（中亚）人。是丝绸之路文化交融的重要实物。"}, {"name": "司马金龙墓漆画屏风", "period": "北魏，484年", "description": "—大同司马金龙墓出土，以漆画描绘列女故事，线条流畅，色彩鲜艳。是北魏绘画遗存中最精美的作品之一（此件现存大同市博物馆，山西博物院有部分展示）。"}, {"name": "木雕彩绘观音像", "period": "宋代", "description": "—山西古建筑中流出的木雕精品，体现了山西宋代佛教造像的高超水平。"}], "dynastyConnections": [], "sources": ["山西博物院官网: https://www.shanximuseum.com/"]}, {"id": "shenyang-gugong", "name": "沈阳故宫博物院", "lat": 41.7957, "lng": 123.4553, "location": "辽宁省沈阳市沈河区沈阳路171号", "level": "世界文化遗产（2004年作为明清皇宫扩展项目）、第一批全国重点文物保护单位（1961年）、国家一级博物馆（2017年）", "corePeriod": "清代前期（后金/清入关前，1625-1644年）", "specialty": "中国现存仅次于北京故宫的第二大古代宫殿建筑群。始建于努尔哈赤，续建于皇太极，乾隆时期大规模扩建。分东路（大政殿+十王亭，体现八旗制度）、中路（大清门→崇政殿→凤凰楼→清宁宫，前朝后寝）、西路（文溯阁，藏《四库全书》）。宫殿建筑融合满族、汉族和蒙藏建筑风格。曾是与北京宫苑、承德避暑山庄齐名的清代三大文物宝库之一。2024年接待观众突破500万人次，2025年达585万人次。", "treasures": ["1. 宫殿建筑群本身 — 清入关前皇宫", "满族建筑风格的最高代表"], "halls": ["大政殿与十王亭（八旗制度建筑化身）", "崇政殿（皇太极朝政之所）", "凤凰楼/清宁宫（后寝区", "高台城堡式）", "文溯阁（藏书楼）"], "dynastyCoverage": "后金/清（1625-清末）；建筑营建跨天命至乾隆", "timeline": "1625年努尔哈赤迁都沈阳，始建大政殿。1626年皇太极继位后扩建中路。1636年皇太极在此改国号"大清"。1644年顺治在此登基后迁都北京，沈阳故宫成为"陪都宫殿"。康熙至道光四帝先后10次东巡驻跸于此。", "artifacts": [{"name": "大政殿", "period": "1625年始建", "description": "八角重檐攒尖式建筑，殿顶满铺黄琉璃瓦镶绿剪边，正中相轮火焰珠顶，宝顶八条铁链连力士。殿前双金龙盘柱，殿内梵文天花和降龙藻井。这是清太祖举行大典之所，顺治帝在此登基"}, {"name": "十王亭", "period": "天命年间", "description": "大政殿两侧八字形排列10座亭子，分属八旗和左右翼王。是满族八旗制度在建筑上的直接体现，脱胎于游牧民族的帐殿形制——"帐篷的固化""}, {"name": "凤凰楼/清宁宫", "period": "天聪年间", "description": "中路高台建筑，寝宫区建于正方形高台之上，形成"城堡式"寝区。清宁宫保留了满族传统的口袋房（万字炕/烟囱建在山墙外侧等满族居住习俗）"}, {"name": "文溯阁", "period": "乾隆四十六年/1781年建", "description": "藏《四库全书》的藏书楼。外观两层、内部三层（含暗层），仿宁波天一阁。与北京文渊阁等并列为"北四阁"之一"}], "dynastyConnections": [{"dynasty": "后金/清初（1625-1644年）", "description": "大政殿+十王亭的布局完美体现了满族八旗制度——一殿统八旗，这是其他任何宫殿都没有的。中路"前低后高"的寝宫区保留了满族筑城居高的传统"}, {"dynasty": "清中期（康熙-乾隆东巡）", "description": "150年间四帝十次东巡，乾隆增建行宫和文溯阁，并从北京运来大量皇家珍宝贮藏，使沈阳故宫成为清代三大文物宝库之一"}, {"dynasty": "近代离散", "description": "1914年11万余件藏品被迁北平，1933年部分随故宫文物南迁，1948年部分被运至台湾。原藏于沈阳故宫的文物如今分散在国内多家博物馆"}], "sources": ["百度百科·沈阳故宫（详细词条，含建筑布局、历史沿革、文物详情）"]}, {"id": "sichuan", "name": "四川博物院", "lat": 30.65, "lng": 104.03, "location": "四川省成都市浣花南路251号（浣花溪历史文化风景区内）", "level": "国家一级博物馆（2012年）、中央地方共建国家级博物馆候选", "corePeriod": "古蜀文明（先秦）、汉代、藏传佛教", "specialty": "西南地区最大的综合性博物馆。馆藏35万余件，珍贵文物7万余件。14个展厅，展厅面积约12635㎡。张大千临摹敦煌壁画收藏（183幅）为全球最大规模。万佛寺石刻南朝造像独具特色。巴蜀青铜器汇聚了三星堆、金沙等系列重大考古出土文物。", "treasures": ["1. 张大千临摹敦煌壁画（183幅）— 全球最大单批张大千敦煌壁画收藏"], "halls": ["巴蜀青铜馆"（三星堆/金沙/涪陵小田溪等出土青铜器）", "张大千书画馆"（183幅临摹敦煌壁画）", "万佛寺石刻馆"（南朝至唐代石刻造像）", "汉代陶石艺术展", "藏传佛教文物馆", "四川民族文物展"], "dynastyCoverage": "新石器 → 古蜀（三星堆/金沙）→ 秦汉（画像砖/陶俑）→ 南朝至唐（万佛寺石刻/佛教造像）→ 宋元明清 → 近现代（抗战/红军长征）", "timeline": "四川是"天府之国"，从古蜀文明到秦统一、再到汉代富庶、唐代佛教艺术繁荣、直至近代抗战大后方，四川的文化积淀极其深厚。四川博物院的藏品时间跨度和门类广度堪称西南之最。", "artifacts": [{"name": "张大千临摹敦煌壁画", "period": "1941-1943年绘制，1963年家属捐赠", "description": "183幅，张大千在敦煌近3年系统临摹莫高窟壁画的成果。大部分为未完稿，包含北魏、西魏、隋、唐、五代等各时期壁画临摹，是研究敦煌壁画和张大千艺术的珍贵资料"}, {"name": "巴蜀青铜器", "period": "商周至战国", "description": "汇集三星堆、金沙、新繁水观音、巴县冬笋坝、彭州竹瓦街、新都马家乡、涪陵小田溪等重大考古出土。巴蜀青铜器以多样的锋刃器（兵器/工具）为特色，器上常有巴蜀特殊符号铭文"}, {"name": "万佛寺石刻造像", "period": "南朝梁至唐代，约200余件", "description": "万佛寺（成都西门外）自清光绪八年（1882年）以来先后四次出土大批石刻造像，包括佛像、菩萨像、造像碑、伎乐像。南朝造像风格秀美，是长江流域佛教艺术的高峰"}, {"name": "汉代画像砖", "period": "东汉", "description": "四川汉代画像砖题材极为丰富（盐井、市集、宴饮、车马出行、播种收获等），是汉代社会生活的图像百科全书"}, {"name": "新都马家乡大墓出土铜器", "period": "战国", "description": "礼器形制和纹饰与楚器相似，反映巴蜀与楚文化的交流"}, {"name": "格萨尔唐卡", "period": "清至近代", "description": "描绘藏族英雄史诗《格萨尔》故事的唐卡系列，川西藏区文化的珍贵遗产"}], "dynastyConnections": [], "sources": ["百度百科·四川博物院（详细词条，含馆藏数据、展厅描述、历史沿革）"]}, {"id": "silk", "name": "中国丝绸博物馆", "lat": 30.2244, "lng": 120.1575, "location": "浙江省杭州市西湖区玉皇山路73-1号", "level": "国家一级博物馆", "corePeriod": "新石器时代至明清（中国丝绸五千年通史）", "specialty": "世界上最大的丝绸专题博物馆。占地42286㎡，建筑面积22999㎡，建筑整体为蚕的造型。馆藏文物70246件/套（截至2022年），珍贵文物5093件/套。设有中国纺织品鉴定保护中心和纺织品文物保护国家文物局重点科研基地。丝绸之路沿线出土的汉唐织物、辽金服饰、宋代服饰、明清官机产品为核心收藏。", "treasures": ["1. 战国对龙对风纹锦 — 中国早期丝织技术代表"], "halls": ["丝绸故事陈列"（丝绸厅→丝绸之路连廊→服饰厅）", "丝绸工艺陈列"（蚕桑厅→染织厅→织造坊", "含古代织机操作演示）", "纺织品文物修复展示馆", "时装馆"], "dynastyCoverage": "新石器时代（浙江出土距今5000余年丝线）→ 商周（丝织起步）→ 秦汉（丝路开通）→ 魏晋南北朝（绞缬工艺）→ 隋唐（丝路繁荣高峰）→ 宋元（织锦技术革新）→ 明清（官营织造/缂丝/刺绣高峰）", "timeline": "中国是世界上最早发明丝绸的国家。浙江余姚河姆渡和钱山漾遗址出土了距今约5000年的丝线和丝织物残片。丝绸之路即因中国丝绸而得名。从先秦到明清，丝绸始终是中国最重要的出口商品和文化符号。", "artifacts": [{"name": "战国对龙对风纹锦", "period": "战国", "description": "中国早期丝织技术的代表作，图案对称精美"}, {"name": "汉晋长葆子孙锦** — 丝绸之路出土，织有"长葆子孙"吉语，是汉代织锦工艺的典型代表
3. **北朝绞缬绢衣", "period": "北朝", "description": "长192cm，宽72cm，交领大袖，面料用绞缬工艺染出黄色小点纹。是中国目前所知最早的绞缬（扎染）丝绸服饰实物之一"}, {"name": "唐朵花纹蓝地蜡缬绢", "period": "唐代", "description": "长78cm，宽51cm，蜡缬是唐代"三缬"（绞缬/蜡缬/夹缬）之一"}, {"name": "唐立狮宝花纹锦", "period": "唐代", "description": "典型的"陵阳公样"（联珠环内动物纹与中国花卉纹的结合），反映丝路文化交融"}, {"name": "元代菱地飞鸟纹绫海青衣", "period": "元代", "description": "衣长119cm，袖长224cm，右衽交领，肩部可伸出手臂，后襟开衩便于骑马。袖肩有钉金高绣，是元代游牧民族服饰与中原丝绸工艺结合的杰作"}, {"name": "宋代花罗裙裤", "period": "宋代", "description": "江南出土的宋代丝绸服饰，反映宋代丝织工艺的精细"}], "dynastyConnections": [{"dynasty": "起源（新石器-商周）", "description": "浙江出土的距今5000年丝线证明中国是丝绸的发源地"}, {"dynasty": "丝路时代（秦汉-唐）", "description": "汉代张骞通西域后，丝绸成为连接东西方的纽带。馆藏大量丝路出土的汉唐织物是这一辉煌时代的实物证据"}, {"dynasty": "技术高峰（宋元明清）", "description": "宋代花罗、元代织金、明清缂丝和刺绣将丝织技艺推向新高度。明清官营织造（江宁/苏州/杭州三织造）产出了最精美的丝绸制品"}], "sources": ["百度百科·中国丝绸博物馆（详细词条，含馆藏数据、展厅描述、文物详情）"]}, {"id": "suzhou", "name": "苏州博物馆", "lat": 31.323, "lng": 120.6318, "location": "江苏省苏州市姑苏区东北街", "level": "国家一级博物馆", "corePeriod": "春秋（吴国）、五代宋元（丝织、书画）、明清（文人文化）", "specialty": "建筑本身即为最大展品——贝聿铭封刀之作，将现代建筑与苏州传统园林完美融合。馆藏以吴文化文物、宋元明清书画和苏作工艺为核心，是文人江南美学的集中体现。", "treasures": ["五代秘色瓷莲花碗", "明代真珠舍利宝幢", "北宋黄庭坚草书（局部）", "吴王余眜剑", "明代文徵明手卷"], "halls": ["吴地遗珍（吴文化考古）", "吴门书画（明四家）", "吴中风雅（文人生活）", "现代艺术厅", "贝聿铭建筑本体"], "dynastyCoverage": "新石器时代（草鞋山）→ 春秋（吴国）→ 六朝 → 唐宋 → 明清（苏州为经济文化中心）", "timeline": "吴国（约前12世纪-前473年）以姑苏为都，是春秋五霸之一；苏州自唐代起即为中国最繁华的城市之一，明清时期苏州府赋税占全国十分之一，是全国经济文化重心", "artifacts": [{"name": "五代秘色瓷莲花碗", "description": "五代（10世纪）。1956年苏州虎丘云岩寺塔发现，碗托与碗身合为莲花形，釉色青翠如湖水，是存世秘色瓷中的极品，也是确认秘色瓷概念的关键实物。"}, {"name": "明代真珠舍利宝幢", "description": "北宋（1013年）。虎丘云岩寺塔出土，高1.22米，以珍珠、玛瑙、水晶等七宝装饰，工艺极其繁复，是宋代佛教艺术的巅峰之作。"}, {"name": "吴王余眜剑", "description": "春秋（约前6世纪）。铸有铭文"攻吾王余眜自作用剑"，是吴国青铜兵器的代表，反映了吴国高超的铸剑技术。"}, {"name": "明代文徵明书画", "description": "明代（16世纪）。苏州是"吴门画派"的大本营，文徵明、沈周、唐寅、仇英合称"明四家"，苏博收藏丰富。"}, {"name": "宋代碑刻《天文图》《地理图》《帝王绍运图》《平江图》", "description": "南宋。苏州文庙"四大宋碑"，其中《平江图》是现存最古老的苏州城市地图，展示了宋代苏州的城市格局。"}, {"name": "明清苏作家具", "description": "明清。苏作家具以黄花梨、紫檀为材，造型简约雅致，是中国古典家具的最高代表，深刻影响了世界家具设计。"}, {"name": "草鞋山出土纺织品残片", "description": "新石器时代（约前4000年）。是中国已知最早的葛布残片之一，证明苏州地区纺织传统源远流长。"}], "dynastyConnections": [{"dynasty": "春秋（吴国）", "description": "阖闾、夫差以姑苏为都城，伍子胥筑城，孙武练兵。吴国铸剑技术冠绝诸侯，干将莫邪的传说即出于此。苏博的吴国青铜器是理解吴文化军事和礼仪的核心。"}, {"dynasty": "明代（吴门画派）", "description": "明中期苏州经济繁荣，文人荟萃，诞生了以沈周、文徵明为代表的吴门画派，以及昆曲、苏绣、苏作家具等文化艺术形式。苏州博物馆是吴门书画收藏的重镇。"}, {"dynasty": "建筑本身的时代意义", "description": "贝聿铭（1917-2019）是苏州望族后人，苏博新馆是他的收官之作。建筑以白墙灰瓦、几何山水呼应苏州传统，同时用现代材料和光影手法创造了全新的空间体验，本身就是一件连接古今的艺术品。"}], "sources": ["苏州博物馆官网: https://www.szmuseum.com/"]}, {"id": "taipei-gugong", "name": "台北故宫博物院", "lat": 25.1024, "lng": 121.5485, "location": "台湾省台北市士林区至善路二段221号", "level": "世界级博物馆（与北京故宫、大英博物馆等并列）", "corePeriod": "宋元明清（中国古代书画/瓷器/青铜器/玉器精品）", "specialty": "中国三大博物馆之一。截至2021年馆藏698854件/册，源自紫禁城、沈阳故宫、避暑山庄、颐和园等皇家旧藏精华。1948-1949年分三批从南京迁台：故宫2972箱、中央博物院筹备处852箱。瓷器25595件、绘画6744件、书法3741件、玉器13478件、铜器6241件、善本图书216507册、档案文献395551册件。甲骨档案2万余片（世界第二）。建筑为宫殿式，淡蓝色琉璃瓦覆顶。2015年南部院区（嘉义）开馆。", "treasures": ["1. 西周毛公鼎 — 铭文497字", "现存青铜器铭文最长"], "halls": ["书画厅（轮换展出历代名家真迹）", "瓷器厅（汝窑/官窑/哥窑等宋瓷精品）", "青铜器厅（毛公鼎/散氏盘等）", "玉器厅（翠玉白菜等）"], "dynastyCoverage": "商周（甲骨/青铜器）→ 秦汉 → 魏晋南北朝 → 唐 → 宋（书画/瓷器高峰）→ 元明清（宫廷收藏鼎盛）", "timeline": "台北故宫的藏品是中国皇家收藏历经千年积淀的精华。从1933年故宫文物南迁避日军，到抗战期间辗转巴县、峨眉、乐山，再到1948-1949年迁台——这批文物经历了中国近代史上最大规模的文物迁移，也是国家分裂的文化缩影。", "artifacts": [{"name": "毛公鼎", "period": "西周晚期", "description": "铭文497字，是现存商周青铜器中铭文最长的一件，记录了周宣王对毛公的册命，是研究西周政治制度的第一手资料"}, {"name": "翠玉白菜", "period": "清代", "description": "以一块半白半绿的翠玉雕琢成白菜造型，菜叶上伏螽斯和蝗虫，寓意多子多孙。原置于紫禁城永和宫，据传为光绪妃嫔嫁妆"}, {"name": "王羲之《快雪时晴帖》", "period": "东晋/唐摹本", "description": "乾隆"三希堂"三件珍宝之首。帖文仅28字，但被乾隆帝视为至宝"}, {"name": "黄公望《富春山居图》（无用师卷）", "period": "元代", "description": "中国十大传世名画之一的后半卷（前半卷"剩山图"藏于浙江省博物馆）"}, {"name": "汝窑瓷器", "period": "北宋", "description": "台北故宫藏21件，全球存世仅约90件。汝窑釉色"天青"被誉为宋瓷之冠"}, {"name": "怀素《自叙帖》", "period": "唐代", "description": "狂草极致，中国书法史巅峰之作"}, {"name": "苏轼《寒食帖》", "period": "北宋", "description": ""天下第三行书""}, {"name": "散氏盘", "period": "西周晚期", "description": "铭文357字，记录西周土地契约"}], "dynastyConnections": [{"dynasty": "商周青铜器", "description": "毛公鼎、散氏盘等西周重器，是中国金石学的核心实物"}, {"dynasty": "宋代书画与瓷器", "description": "宋代是中国文人艺术的巅峰。台北故宫的宋画收藏（范宽/郭熙/李唐等）和汝窑瓷器为全球之冠"}, {"dynasty": "元明清", "description": "元四家、明四家到清代宫廷画家的作品完整呈现了中国绘画史的后半段。善本《四库全书》（文渊阁本）是清代文化工程的顶峰"}], "sources": ["百度百科·台北故宫博物院（详细词条，含馆藏统计、文物迁移史、建筑布局）"]}, {"id": "tianjin", "name": "天津博物馆", "lat": 39.0836, "lng": 117.2258, "location": "天津市河西区平江道62号（天津文化中心内）", "level": "国家一级博物馆", "corePeriod": "清代至近代（书画、瓷器、文房收藏）", "specialty": "以清代书画和瓷器收藏见长，得益于天津近代作为北方商贸中心和文化重镇的地位，大量清宫旧藏和民间珍品汇聚于此。天津开埠后中西文化交融的近代史也是重要展示内容。", "treasures": ["范宽《雪景寒林图》", "青花釉里红开光贴花大罐（元）", "西周太保鼎", "清乾隆珐琅彩芍药雉鸡纹玉壶春瓶"], "halls": ["耀世奇珍——馆藏文物精品陈列", "中华百年看天津"], "dynastyCoverage": "商周、宋、元、明、清、近代", "timeline": "西周燕国 → 金代直沽寨 → 明永乐筑城设卫（1404年）→ 清代漕运重镇 → 1860年开埠 → 近代"百年中国看天津"", "artifacts": [{"name": "范宽《雪景寒林图》", "period": "北宋，约11世纪初", "description": "—三联幅绢本水墨，描绘北方冬日的雄浑山水。范宽是北宋山水画三大家之一，此画气势磅礴，是宋代山水画的巅峰之作。此画传世仅此一件，极为珍贵。"}, {"name": "元青花釉里红开光贴花盖罐", "period": "元代，14世纪", "description": "—罐身以青花和釉里红两种釉下彩装饰，开光内贴塑花卉。元代青花釉里红器物存世极少，此罐工艺复杂、保存完好，是元代瓷器的绝世珍品。"}, {"name": "西周太保鼎", "period": "西周早期", "description": "—"太保"即召公奭，为西周开国重臣。鼎形制庄重，四足呈柱形，腹部及足部有扉棱装饰。是西周早期青铜礼器的重要代表，也是研究周初政治的实物材料。"}, {"name": "清乾隆珐琅彩芍药雉鸡纹玉壶春瓶", "period": "清乾隆", "description": "—珐琅彩瓷器中的精品，画工细腻，色彩绚丽。珐琅彩瓷是清代宫廷瓷器中最珍贵的品种，存世数量极少。"}, {"name": "翡翠蝈蝈白菜", "period": "清代", "description": "—利用翡翠天然色彩巧雕而成，白菜叶片上蝈蝈栩栩如生。与台北故宫翠玉白菜齐名，是清代玉雕工艺的杰出代表。"}, {"name": "北宋范宽款山水**以外的书画——天津博物馆藏有大量明清书画，包括仇英、董其昌、八大山人、石涛等名家作品，构成了系统的中国书画收藏体系。

7. **清代宫廷钟表", "period": "清代", "description": "—天津博物馆收藏有多件清宫旧藏的欧洲和中国制造钟表，反映了清代宫廷对西方机械工艺的浓厚兴趣。"}], "dynastyConnections": [], "sources": ["天津博物馆官网: https://www.tjbwg.com/"]}, {"id": "wenzi", "name": "中国文字博物馆", "lat": 36.099, "lng": 114.3928, "location": "河南省安阳市人民大道东段656号", "level": "国家一级博物馆", "corePeriod": "商代（甲骨文）至当代（汉字发展全史）", "specialty": "全球首座以文字为主题的国家级博物馆，位于甲骨文故乡安阳殷墟旁。由主体馆"宣文馆"、东馆"徽文馆"、西馆"博文馆"和汉字公园组成，总占地470.4亩。从甲骨文到信息时代，完整呈现汉字及中国少数民族文字的发展历程。", "treasures": ["甲骨文实物", "青铜器铭文拓片", "秦代诏版（统一文字证据）", "历代碑帖善本", "少数民族文字文物"], "halls": ["中国文字发展史"常设展（宣文馆）", "一片甲骨惊天下"甲骨文专题展", "字书琼林"（徽文馆）"], "dynastyCoverage": "商（甲骨文）→ 西周（金文）→ 秦（小篆/统一文字）→ 汉（隶书）→ 魏晋（楷书）→ 唐宋元明清（印刷术）→ 当代", "timeline": "安阳殷墟出土的甲骨文是中国发现的年代最早的成熟文字系统，把中国信史向上推进了约1000年。文字博物馆在殷墟旁建馆，形成"文字+考古"的完整体验", "artifacts": [{"name": "甲骨文实物", "period": "商代晚期，约前1300-前1046年", "description": "龟甲和兽骨上的刻辞，是商王室占卜的记录。自1899年王懿荣首次发现以来，累计出土约16万片，已识别字形约4500个，可释读约1500字"}, {"name": "青铜器铭文", "period": "西周", "description": "展示金文（钟鼎文）的发展，字形比甲骨文更规整，内容涉及册命、赏赐、战争等，是西周社会的直接文献"}, {"name": "秦代诏版", "period": "秦，前221年后", "description": "刻有秦始皇统一度量衡诏书的铜版/铁版，是"书同文"政策的实物证据"}], "dynastyConnections": [], "sources": ["中国文字博物馆官网: https://www.wzbwg.com/", "百度百科·中国文字博物馆", "维基百科·中国文字博物馆", "国家民委报道: https://www.neac.gov.cn/seac/xwzx/202603/1187705.shtml"]}, {"id": "xinjiang", "name": "新疆维吾尔自治区博物馆", "lat": 43.81, "lng": 87.5775, "location": "新疆维吾尔自治区乌鲁木齐市西北路581号", "level": "国家一级博物馆（2008年首批）", "corePeriod": "青铜时代至唐代（丝绸之路西域段）", "specialty": "中国唯一全面展示西域文明的省级博物馆。馆藏3.2万件，一级品288件。以古代干尸（楼兰美女等）、多语言文书（汉文、回鹘文、佉卢文、吐火罗文、梵文、粟特文等9种文字）、汉唐丝织品为三大独特收藏。2022年二期投用后，展览面积从6178㎡增至1.13万㎡。2023年设立"国博厅"和"故宫厅"。", "treasures": ["1. "五星出东方利中国"锦护膊（汉代）— 长18.5cm", "宽12.5cm", "1995年出土", "织有汉字"五星出东方利中国""], "halls": ["新疆历史文物展"（700余件文物", "12个单元", "2022年获全国十大陈列展览精品特别奖）", "逝而不朽惊天下——新疆古代干尸展"（7个单元）", "瀚海霓裳——西域服饰的记忆"（3800年跨度）", "新疆民族风情陈列"（12个民族民俗）"], "dynastyCoverage": "青铜时代（小河/楼兰）→ 汉（西域都护府，前60年）→ 魏晋南北朝（高昌/龟兹）→ 唐（安西都护府）→ 宋元（回鹘/西辽）→ 清（新疆建省）", "timeline": "前60年汉设西域都护府，新疆正式纳入中国版图。此后历经东汉班超经营西域、唐代安西都护府管辖、清代新疆建省，新疆始终是丝绸之路的核心段和东西方文明交汇之地。", "artifacts": [{"name": ""五星出东方利中国"锦护膊", "period": "汉代，1995年尼雅遗址出土", "description": "长18.5cm，宽12.5cm，织有汉字"五星出东方利中国"和凤凰、鸾鸟、白虎等纹样。是目前所知汉代织锦中工艺最复杂、色彩最丰富的品种之一，被列为首批禁止出国展览文物"}, {"name": "楼兰女尸", "period": "约3800年前，1980年罗布泊铁板河出土", "description": "身长152cm，生前约155.8cm，死亡年龄40-45岁。栗色直发，尖高鼻梁，眼睛深凹，皮肤呈古铜色。是世界上保存最好的古尸之一"}, {"name": "营盘男尸", "period": "汉晋，1995年尉犁县营盘遗址15号墓出土", "description": "男性，约25岁，身高约1.8米。面覆金箔面具，身穿红地对人兽树纹罽袍（毛织物，图案含人物、狮鹫和石榴树），具有强烈的希腊化艺术风格，是东西方文化交融的标本"}, {"name": "小河墓地女性干尸", "period": "约3800年前", "description": "身长158cm，灰棕色头发自然中分，保存极为完好。小河墓地"千口棺材"的发现震惊考古界"}, {"name": "汉唐丝织品", "period": "汉至唐", "description": "包括锦、绮、绫、罗、纱等大量丝织品，以及毯、毡、绦带等毛织品，是研究中国古代纺织史和丝路贸易的第一手实物"}], "dynastyConnections": [], "sources": ["百度百科·新疆维吾尔自治区博物馆（详细词条，含馆藏数据、展厅描述、文物详情）", "新疆博物馆官网"]}, {"id": "xizang", "name": "西藏博物馆", "lat": 29.65, "lng": 91.1, "location": "西藏自治区拉萨市城关区罗布林卡路19号", "level": "国家一级博物馆", "corePeriod": "吐蕃王朝（7-9世纪）、藏传佛教艺术（元明清至今）", "specialty": "西藏唯一集典藏、展示、研究、教育为一体的现代化综合博物馆。新馆占地6.5万㎡，馆藏52万余件，珍贵文物4万余件（套）。以藏传佛教艺术（唐卡、佛像、法器）、历代中央政府颁赐金印金册、贝叶经和藏文典籍为核心收藏。"西藏历史文化"基本陈列获1999年全国十大陈列展览精品。", "treasures": ["1. 双体陶罐（新石器时代·卡若文化）— 镇馆之宝", "卡若先民制陶最高水平"], "halls": ["雪域长歌——西藏历史与文化"（2022年新馆基本陈列）", "离太阳最近的人——西藏民俗文化", "元明清玉器精品馆"], "dynastyCoverage": "新石器时代（卡若文化/曲贡文化）→ 吐蕃王朝（7-9世纪）→ 分裂割据 → 萨迦/帕竹/甘丹颇章 → 清代（金瓶掣签制度）→ 近现代", "timeline": "7世纪松赞干布统一吐蕃并迁都拉萨，与唐朝联姻（文成公主、金城公主入藏）。13世纪西藏纳入元朝版图，此后历经明清两代中央政府持续管辖。清乾隆时期建立金瓶掣签制度。", "artifacts": [{"name": "双体陶罐", "period": "新石器时代·卡若文化，昌都卡若遗址出土", "description": "镇馆之宝。两个圆形陶罐通过桥状提手连为一体，造型独特，制作工艺纯熟，代表了卡若文化的最高制陶水平，也是新石器时代西藏陶器的标志作品"}, {"name": "贝叶经", "period": "古代印度传入", "description": "用南亚贝多罗树叶制作的梵文佛经，经特殊药物处理不干裂、不虫蛀、不霉变，是研究早期佛教史和佛教文化的第一手资料"}, {"name": "桦树皮书写经", "period": "吐蕃时代", "description": "世界上唯一完整的桦树皮经，采用桦树内层树皮双面墨书手写，历经千年文字仍清晰可读"}, {"name": "金瓶", "period": "清·乾隆", "description": "清乾隆帝颁赐，用于金瓶掣签制度认定活佛转世灵童。将候选灵童名字写在象牙签牌上放入金瓶，由呼图克图和驻藏大臣在大昭寺共同抽签认定"}, {"name": "历代达赖喇嘛金印金册", "period": "清代", "description": "清帝册封达赖喇嘛时颁布，金印为金或玉质，书写汉、藏、满、蒙四种文字；金册将诏书直接刻于金箔之上"}, {"name": "唐卡精品", "period": "历代", "description": "博物馆收藏大量勉唐画派、齐岗画派、尼泊尔画派唐卡，题材涉及历史、宗教、文化和社会生活"}, {"name": "青花缠枝莲纹花觚", "period": "清·乾隆", "description": "督窑官唐英监制，造型高大精美，成对保存，是中央政府赏赐给西藏的宫廷瓷器"}, {"name": "元明清玉器", "period": "元至清", "description": "107件历代中央政府赏赐给西藏地方政府的玉器"}], "dynastyConnections": [], "sources": ["百度百科·西藏博物馆（详细词条，含建馆历程、馆藏数据、文物详情）", "西藏博物馆官方信息"]}, {"id": "xuzhou", "name": "徐州博物馆", "lat": 34.2554, "lng": 117.1847, "location": "江苏省徐州市云龙区和平路118号（云龙山北麓）", "level": "国家一级博物馆", "corePeriod": "西汉（楚国/彭城，诸侯王陵墓群）", "specialty": "徐州是西汉楚国都城，出土了大量汉代诸侯王墓葬文物。狮子山楚王陵是中国规模最大的西汉诸侯王崖洞墓之一，出土金缕玉衣等珍贵文物。汉画像石收藏也是一大特色。", "treasures": ["金缕玉衣（狮子山楚王陵出土）", "S形玉龙佩（西汉）", "银缕玉衣", "汉画像石", "铜牛灯"], "halls": ["汉室遗珍——徐州汉代文物陈列"（核心）", "天工汉玉"（汉代玉器专题）", "俑偶华彩"（汉俑）"], "dynastyCoverage": "新石器（大墩子遗址）→ 先秦（宋国/楚国）→ 西汉（楚国，核心）→ 三国（徐州争夺战）→ 唐宋", "timeline": "西汉分封楚国于徐州（彭城），传12代楚王。狮子山楚王陵（约第3代楚王刘戊）是理解西汉"郡国并行"制度和诸侯王奢华生活的重要窗口", "artifacts": [{"name": "金缕玉衣", "period": "西汉，约前154年", "description": "狮子山楚王陵出土，由4248片玉片以金丝编缀，是目前出土年代较早、玉片数量较多的金缕玉衣之一。与河北满城汉墓的金缕玉衣互为参照"}, {"name": "S形玉龙佩", "period": "西汉", "description": "以整块玉料雕成S形飞龙，线条流畅，动感十足，是汉代玉雕艺术的杰作"}, {"name": "银缕玉衣", "period": "西汉", "description": "玉衣等级低于金缕，用银丝编缀，反映汉代严格的丧葬等级制度"}, {"name": "汉画像石", "period": "东汉", "description": "徐州地区出土大量画像石，题材涵盖车马出行、宴饮乐舞、神话故事、历史故事等，是汉代社会生活的图像百科"}, {"name": "铜牛灯", "period": "西汉", "description": "牛形铜灯，烟气通过牛角导入牛体内水中过滤，与南京博物院的错银铜牛灯异曲同工"}, {"name": "彩绘兵马俑", "period": "西汉", "description": "狮子山楚王陵附近出土数千件汉代兵马俑，虽小于秦俑但数量可观"}, {"name": "玉棺", "period": "西汉", "description": "狮子山楚王陵出土，以玉片镶嵌的棺椁"}], "dynastyConnections": [], "sources": ["核心信息基于AI知识库", "狮子山楚王陵考古报告"]}, {"id": "yangzhou", "name": "扬州博物馆 / 中国大运河博物馆", "lat": 32.3942, "lng": 119.435, "location": "扬州博物馆：江苏省扬州市邗江区；中国大运河博物馆：扬州市广陵区三湾古运河畔", "level": "均为国家一级博物馆", "corePeriod": "隋唐（大运河开凿、唐代扬州极盛）、清代（盐商文化）", "specialty": "扬州博物馆以地方通史和雕版印刷为特色；中国大运河博物馆是唯一全面展示大运河2500年历史的国家级专题馆，建筑恢宏，沉浸式体验突出。两馆配合可完整理解运河与扬州的共生关系。", "treasures": ["元代霁蓝釉白龙纹梅瓶（扬博）", "隋炀帝墓出土蹀躞金玉带（扬博）", "唐代长沙窑瓷器（大运河博物馆）", "雕版印刷古籍"], "halls": ["扬博"广陵潮——扬州城市故事", "大运河博物馆"大运河——中国的世界文化遗产", "运河上的舟楫"（1:1复原古船）", "河之恋"沉浸式体验厅"], "dynastyCoverage": "春秋（吴王夫差开邗沟）→ 隋代（开凿大运河）→ 唐代（扬州为国际都会）→ 宋元 → 明清（盐商文化、扬州学派）", "timeline": "邗沟（前486年）是大运河最早的河段；隋炀帝（605-610年）贯通南北大运河，扬州为起点；唐代扬州是中国最富庶的城市之一，"扬一益二"；2014年大运河列入世界遗产", "artifacts": [{"name": "元代霁蓝釉白龙纹梅瓶", "description": "元代（14世纪）。扬博镇馆之宝，全球仅存三件同类器之一。钴蓝釉上以白泥堆塑游龙，气势磅礴，是元代景德镇瓷器的极品。"}, {"name": "隋炀帝墓出土蹀躞金玉带", "description": "隋代（7世纪初）。2013年扬州曹庄发现隋炀帝墓，出土的十三环蹀躞金玉带是确认墓主帝王身份的关键证据。"}, {"name": "隋炀帝墓铜编钟铜编磬", "description": "隋代。随葬礼乐器，虽经缩小制作但规制完整，反映了隋代宫廷礼仪制度。"}, {"name": "唐代长沙窑青釉褐彩瓷器", "description": "唐代（9世纪）。大运河沿线出土的外销瓷，证明运河作为南北商品流通大动脉的角色。"}, {"name": "清代扬州雕版印刷版片", "description": "清代。扬州是中国雕版印刷的重镇，清代刻印了《全唐诗》等大型丛书，版片保存至今。"}, {"name": "唐代铜镜", "description": "唐代。扬州是唐代最重要的铜镜产地之一，出土的铜镜纹饰精美，反映了唐代扬州手工业的繁荣。"}, {"name": "汉代广陵王刘胥墓出土漆器", "description": "西汉。扬州（古称广陵）汉墓出土的漆器工艺精湛，反映了汉代扬州作为漆器生产中心的地位。"}], "dynastyConnections": [{"dynasty": "春秋（邗沟）", "description": "前486年吴王夫差为北伐齐国，开凿邗沟连接长江与淮河，这是大运河最早的河段，也是扬州因运河而生的起点。"}, {"dynasty": "隋代（大运河贯通）", "description": "隋炀帝以洛阳为中心贯通南北大运河，三下江都（扬州）。大运河全长近2700公里，是世界最长的人工运河。2013年扬州发现隋炀帝真墓，推翻了此前多处"伪墓"的说法。"}, {"dynasty": "唐代（扬州极盛）", "description": "唐代扬州是长江与运河交汇处的国际都会，人口超百万，"天下之盛，扬为首"。鉴真从扬州东渡日本，阿拉伯商人聚居于此。李白"烟花三月下扬州"即咏此盛况。"}, {"dynasty": "明清（盐商文化）", "description": "两淮盐运使驻扬州，盐商富甲天下，资助了扬州八怪等艺术流派，建造了精美的私家园林，形成了独特的扬州文化。"}], "sources": ["中国大运河博物馆官网: https://www.canal-museum.cn/"]}, {"id": "yinxu", "name": "殷墟博物馆", "lat": 36.1272, "lng": 114.3131, "location": "河南省安阳市殷都区小屯村", "level": "全国重点文物保护单位 / UNESCO世界文化遗产（2006年）", "corePeriod": "商代晚期（约前1300-前1046年）", "specialty": "中国考古学的诞生地，甲骨文的发现地，商代晚期都城遗址。殷墟的发掘开启了中国现代考古学，甲骨文的释读将中国有文字记载的历史上推至3300年前。2024年新馆是目前全面展示商文明的最现代化场馆。", "treasures": ["甲骨文卜辞", "妇好墓青铜器群", "司母辛鼎（后母辛鼎）", "亚长牛尊", "玉凤"], "halls": ["甲骨文专题展", "妇好墓原址及随葬品展示", "青铜器展厅", "车马坑展示", "宫殿宗庙遗址区"], "dynastyCoverage": "商代晚期（盘庚迁殷至纣王灭国，约270年）", "timeline": "约前1300年盘庚迁殷，此后殷墟作为商都约270年。前1046年（一说前1045年）周武王克商，商朝灭亡。殷墟是商代最后也是最辉煌的都城，甲骨文、青铜器、玉器代表了商文明的最高成就", "artifacts": [{"name": "甲骨文卜辞", "description": "商代晚期（前13-前11世纪）。1899年被发现，是中国已知最早的成熟文字系统。殷墟出土甲骨约15万片，内容涉及祭祀、战争、农业、天象等，是研究商代社会的第一手资料。甲骨文的发现改变了世界对中国古代文明的认识。"}, {"name": "司母辛鼎（后母辛鼎）", "description": "商代晚期。妇好墓出土，与中国国家博物馆的后母戊鼎形制相近但略小，铭文"司母辛"（或"后母辛"），是妇好之子为其所铸的祭器。"}, {"name": "妇好鸮尊", "description": "商代晚期。妇好墓出土的猫头鹰形青铜酒器，造型独特威武，是商代青铜器的代表作之一（原件藏河南博物院，殷墟有复制品及其他妇好墓青铜器）。"}, {"name": "亚长牛尊", "description": "商代晚期。以青铜铸成的写实水牛形酒器，体态浑圆，造型生动，出土于殷墟亚长墓，是商代动物形青铜器的杰作。"}, {"name": "玉凤", "description": "商代晚期。妇好墓出土，以和田玉雕成的凤鸟，造型简洁而优美，是商代玉器的标志性作品。"}, {"name": "甲骨文"天象记录"", "description": "商代晚期。部分甲骨记录了日食、月食、新星等天文现象，是世界最早的天文记录之一。"}, {"name": "车马坑", "description": "商代晚期。殷墟发现的车马坑是中国最早的马车实物证据，对研究商代交通和军事制度有重要价值。"}, {"name": "人殉与人牲遗存", "description": "商代晚期。殷墟王陵区发现大量殉人和祭祀坑，虽然令人不安，但这是理解商代宗教和社会等级制度不可回避的实物证据。"}], "dynastyConnections": [{"dynasty": "商代", "description": "殷墟是商代研究的基石，也是中国考古学的起点。    - **甲骨文与文字起源**：甲骨文有约4500个单字，已释读约1500字。它是汉字的直系祖先，从甲骨文到金文、篆书、隶书、楷书，一脉相承三千余年。2017年甲骨文入选UNESCO"世界记忆名录"。    - **妇好与商代女性**：妇好是商王武丁的王后，甲骨卜辞记载她曾领兵征伐、主持祭祀，是中国有文字记载的第一位女军事家。1976年其墓被完整发掘，出土随葬品1928件（含青铜器468件、玉器755件），是殷墟唯一未被盗掘的王室墓葬。    - **青铜文明巅峰**：商代晚期是中国青铜文明的巅峰。后母戊鼎（重832.84公斤，现藏国家博物馆）是世界已知最重的青铜器。殷墟出土的青铜器铸造工艺精湛，代表了人类早期金属冶铸的最高水平。    - **与三星堆的对话**：殷墟与四川三星堆是同时期的两大文明中心，风格截然不同。殷墟青铜器以礼器为主，三星堆以神像和面具为主，两者对比揭示了商代中国文明的多元面貌。"}], "sources": ["殷墟博物馆官网: https://www.ayyx.com/", "UNESCO世界文化遗产名录（2006年）"]}, {"id": "yungang", "name": "云冈石窟", "lat": 40.1113, "lng": 113.132, "location": "山西省大同市云冈区云冈镇", "level": "世界文化遗产(2001年)、全国重点文物保护单位、国家5A级景区", "corePeriod": "北魏(460-524年)", "specialty": "中国四大石窟之一(与敦煌莫高窟、洛阳龙门石窟、天水麦积山石窟并列)。云冈石窟是北魏皇家主持开凿的佛教石窟群,现存主要洞窟45个,大小造像59000余尊。开凿时间集中于北魏平城时代,风格融合了印度犍陀罗、中亚和中原艺术,是佛教艺术中国化的里程碑。", "treasures": ["昙曜五窟大佛(第16-20窟)", "第6窟释迦佛传故事雕刻", "第5窟17米大佛", "第12窟"音乐窟""], "halls": ["昙曜五窟(第16-20窟)", "第5-6窟(双窟)", "第9-13窟(中期洞窟)", "云冈博物馆"], "dynastyCoverage": "北魏(为主体)、唐、辽", "timeline": "太武帝灭佛(446年)→ 文成帝复法·昙曜开窟(460年)→ 早期(460-470年,昙曜五窟)→ 中期(471-494年,孝文帝时期大规模营造)→ 迁洛后晚期(494-524年)", "artifacts": [{"name": "第20窟露天大佛", "period": "北魏,约460-465年", "description": "-高13.7米,结跏趺坐,面容丰满,两耳垂肩,薄衣贴体(犍陀罗风格),神态庄严安详。因前壁崩塌而露天,成为云冈石窟的标志性形象。此像被认为是以北魏太武帝或文成帝为原型,体现了"帝佛合一"的政治理念--昙曜向文成帝提议"令如帝身"造佛像。"}, {"name": "第16-20窟(昙曜五窟)", "period": "北魏,460-470年", "description": "-云冈最早开凿的五个大窟,每窟一尊大佛,分别象征北魏五位皇帝(从道武帝到文成帝)。大佛高13-17米,风格统一而各具特色,体现了印度犍陀罗艺术与凉州佛教艺术的融合。这是中国石窟寺"以帝王之身造佛"的首创。"}, {"name": "第6窟释迦佛传浮雕", "period": "北魏,约471-494年", "description": "-中期代表洞窟,中心塔柱四面及窟壁雕刻了释迦牟尼一生的故事,从诞生到涅槃共33幅连续画面。雕刻精细繁复,是中国石窟叙事浮雕的巅峰之作。中心塔柱高达15米,四面雕满佛像和装饰。"}, {"name": "第5窟大佛", "period": "北魏", "description": "-高17米,是云冈最大的佛像。面容慈祥,衣纹流畅,已开始呈现中国化的审美特征(与昙曜五窟的西域风格相比)。前有清代修建的四层木构阁楼保护。"}, {"name": "第12窟"音乐窟"", "period": "北魏,约471-494年", "description": "-前室壁面雕刻了大量伎乐天人,手持各种乐器(琵琶、筚篥、排箫、细腰鼓等),是研究北魏音乐和乐器的珍贵图像资料,也是中国古代音乐图像最集中的石窟。"}, {"name": "第9-10窟(双窟)", "period": "北魏中期", "description": "-窟门雕刻中国式的殿堂建筑形式,窟内天花板雕飞天、莲花。是云冈中期洞窟中西合璧风格的典型代表。"}, {"name": "第3窟(灵岩寺洞)", "period": "北魏至唐辽", "description": "-云冈最大的洞窟,可能原计划开凿为大型塔庙窟但未完工。后壁有唐代补刻的一佛二菩萨像。"}], "dynastyConnections": [], "sources": ["云冈石窟官网: https://www.yungang.org/", "UNESCO世界文化遗产名录（2001年）", "现存45个主要洞窟、59000余尊造像（多源核实）"]}, {"id": "yunnan", "name": "云南省博物馆", "lat": 24.963, "lng": 102.748, "location": "云南省昆明市官渡区广福路6393号", "level": "国家一级博物馆", "corePeriod": "古滇国（战国至西汉）、南诏/大理（唐宋）", "specialty": "云南唯一的省级综合性博物馆。馆藏文物22万余件，其中一级文物509件。以古滇国青铜器（晋宁石寨山/江川李家山出土）为核心特色，是中国青铜文化中独立于中原的重要一支。南诏大理国时期佛教艺术和云南少数民族文物也极为丰富。", "treasures": ["1. 牛虎铜案（战国·古滇）— 晋宁石寨山出土", "一虎扑牛", "牛腹下藏小牛", "中国古代青铜艺术杰作"], "halls": ["远古云南——史前时期的云南", "文明之光——青铜时代的云南"（古滇青铜器核心展）", "妙香佛国——南诏大理历史文化", "百年风云——近现代时期的云南"], "dynastyCoverage": "旧石器（元谋人，距今约170万年）→ 新石器 → 青铜时代（古滇国，战国至西汉）→ 东汉至隋 → 南诏（唐）→ 大理（宋）→ 元明清（改土归流）→ 近现代（滇越铁路/西南联大/抗战）", "timeline": "元谋人（约170万年前）是中国境内已知最早的古人类化石之一。古滇国（约前5世纪-前109年）以晋宁石寨山为王墓所在地，汉武帝赐滇王金印后纳入版图。南诏（738-902年）和大理（937-1253年）是云南地方政权的高峰期。", "artifacts": [{"name": "牛虎铜案", "period": "战国·古滇国，晋宁石寨山出土", "description": "一只大牛四足立地，背部为承物的浅盘，牛尾立一猛虎，虎口咬住牛尾，大牛腹下藏一小牛犊。构图大胆，充满生命力，是中国青铜艺术的杰作和云南省博的标志"}, {"name": "四牛鎏金骑士贮贝器", "period": "西汉·古滇，石寨山出土", "description": "贮贝器是古滇国特有的器型（用于储存海贝货币），器盖上有一鎏金骑士和四牛。古滇国以海贝为货币，贮贝器是滇文化的标识"}, {"name": "战争场面叠鼓形贮贝器", "period": "西汉·古滇", "description": "器盖上铸有数十个人物的战争场面群雕，包括骑马的将领、持兵器的步兵、被俘的敌人等，是古滇社会军事生活的微缩场景"}, {"name": "滇王金印", "period": "西汉，复制品/相关文物", "description": "汉武帝元封二年（前109年）赐滇王尝羌金印，原印出土于石寨山，现藏中国国家博物馆。是云南纳入中央版图的里程碑"}, {"name": "银鎏金镶珠金翅鸟", "period": "大理国，大理崇圣寺三塔出土", "description": "佛教中的迦楼罗鸟造型，银鎏金工艺，镶嵌宝珠，是大理国佛教艺术的代表"}, {"name": "大理国写经和佛像** — 大理国时期（937-1253年）佛教极为兴盛（"妙香佛国"），留下了大量写经和佛教造像
7. **聂耳小提琴", "period": "近代", "description": "国歌《义勇军进行曲》曲作者、云南玉溪人聂耳使用的小提琴，近现代革命文物中的珍品"}], "dynastyConnections": [], "sources": ["核心数据基于AI知识库，牛虎铜案等核心文物数据已多源交叉核实", "百度百科·云南省博物馆词条因多义词页面未能完整获取"]}, {"id": "zhejiang", "name": "浙江省博物馆", "lat": 30.2518, "lng": 120.144, "location": "浙江省杭州市西湖区（孤山馆区）/ 拱墅区（之江馆区）", "level": "国家一级博物馆", "corePeriod": "新石器时代（良渚文化）、五代十国（吴越国）、宋代", "specialty": "以良渚文化玉器、越窑青瓷和宋代文物为三大支柱，是理解长江下游文明起源和江南文化高峰的核心场馆。之江新馆2023年开放，展陈面积大幅扩展。", "treasures": ["良渚文化玉琮王", "战国越王者旨於睗剑", "五代吴越鎏金银阿育王塔", "元代黄公望《富春山居图》（剩山图卷）", "宁波万工轿"], "halls": ["越地长歌"通史陈列", "良渚文化专题展", "青瓷展厅", "宋韵文化展区"], "dynastyCoverage": "新石器时代（河姆渡、良渚）→ 春秋战国（越国）→ 三国两晋（越窑）→ 五代（吴越国）→ 宋代 → 元明清", "timeline": "良渚文化（约前3300-前2000年）是中华五千年文明的实证，2019年列入世界遗产；越国和越窑代表了浙江先秦至中古的工艺传统；南宋定都临安（杭州），使浙江成为中国文化经济重心", "artifacts": [{"name": "良渚文化玉琮王", "description": "新石器时代（约前3000年）。体量最大、纹饰最精的良渚玉琮，刻有神人兽面纹，是良渚信仰体系的核心象征，证明了五千年前的复杂社会组织。"}, {"name": "战国越王者旨於睗剑", "description": "战国（约前5世纪）。越王勾践之子所用青铜剑，铸造精良，铭文保存完好，是越国青铜兵器工艺的代表。"}, {"name": "五代吴越鎏金银阿育王塔", "description": "五代（10世纪）。雷峰塔地宫出土，纯银鎏金，工艺极精，是吴越国佛教文化的顶级遗物。"}, {"name": "元·黄公望《富春山居图》（剩山图卷）", "description": "元代（约1350年）。中国山水画史上的巅峰之作，现存前半卷"剩山图"藏于浙博，后半卷在台北故宫。"}, {"name": "宁波万工轿（花轿）", "description": "清末民初。耗时万工制作的朱金木雕花轿，代表浙东民间工艺的极致，是民俗文物的经典。"}, {"name": "越窑青瓷莲花碗", "description": "五代（10世纪）。釉色如玉，造型典雅，是"秘色瓷"审美的代表作。"}, {"name": "河姆渡文化双鸟朝阳纹象牙蝶形器", "description": "新石器时代（约前5000年）。河姆渡遗址出土，雕刻精细，是长江流域早期艺术的杰作。"}], "dynastyConnections": [{"dynasty": "新石器时代（良渚文化）", "description": "浙博是全球了解良渚文明的最佳窗口。良渚的玉器、城址、水利系统证明了中国五千年文明史，2019年良渚古城遗址列入UNESCO世界遗产。馆藏良渚玉器数量和质量首屈一指。"}, {"dynasty": "春秋战国（越国）", "description": "越国以会稽（绍兴）为中心，越王勾践卧薪尝胆的故事家喻户晓。浙博藏有多柄越王剑，是理解越国军事和青铜工艺的关键。"}, {"dynasty": "五代十国（吴越国）", "description": "钱氏吴越国偏安杭州，大兴佛教，雷峰塔等遗存丰富。鎏金银阿育王塔等佛教文物反映了这一时期江南的信仰与工艺。"}, {"dynasty": "宋代（南宋）", "description": "南宋定都临安，杭州成为世界最大城市之一。浙博的宋代文物涵盖官窑瓷器、书画、文房等，展现了宋代文化的精致与雅趣。"}], "sources": ["浙江省博物馆官网: https://www.zhejiangmuseum.com/"]}, {"id": "zhongshanguo", "name": "中山古城遗址·中山国王陵陈列馆", "lat": 38.334, "lng": 114.142, "location": "河北省石家庄市平山县三汲乡", "level": "全国重点文物保护单位，遗址类博物馆", "corePeriod": "战国中山国（前414年-前296年）", "specialty": "中国唯一专门展示战国中山国历史的遗址博物馆。中山国是战国"千乘之国"，由白狄鲜虞族建立，虽非"七雄"却创造了令人惊叹的青铜文明。遗址包括中山国都城灵寿和王陵区，出土文物精美绝伦。", "treasures": ["错金银四龙四凤铜方案座", "中山王铁足铜鼎（刻铭469字）", "错金银虎噬鹿铜屏风座", "十五连盏铜灯", "中山王"兆域图"铜版"], "halls": ["王陵区（1号墓", "6号墓出土品）", "中山古城遗址展示"], "dynastyCoverage": "战国", "timeline": "白狄鲜虞（春秋，前6世纪）→ 中山国建立（前414年）→ 鼎盛期（前4世纪中后期）→ 被赵国所灭（前296年）", "artifacts": [{"name": "错金银四龙四凤铜方案座", "period": "战国中期，前4世纪", "description": "—1号墓出土，案座底部四只梅花鹿伏卧承托，中间四条蟠龙翼然腾起，龙身之间四只凤鸟展翅。整器用失蜡法铸造，工艺极其复杂，是中国青铜铸造技术的巅峰之作。"}, {"name": "中山王铁足铜鼎", "period": "战国中期", "description": "—鼎腹刻铭文469字，为目前所见铭文最长的战国铜鼎之一。铭文记载中山王讨伐燕国的胜利及对嗣子的告诫，语言文辞典雅，内容涉及中山国与燕、赵等国的政治军事关系，是研究中山国历史的第一手资料。"}, {"name": "错金银虎噬鹿铜屏风座", "period": "战国中期", "description": "—猛虎咬住小鹿的瞬间造型，虎身错金银斑纹，鹿做挣扎状。构图紧张生动，是战国动物题材青铜器的杰作，可能受到了北方草原文化"动物搏斗"题材的影响。"}, {"name": "十五连盏铜灯", "period": "战国中期", "description": "—树形灯架分三层，共十五个灯盏。树上有猿猴攀缘、群鸟栖息，底座有两个人形力士。是战国灯具中造型最复杂、最精美的一件。"}, {"name": "中山王"兆域图"铜版", "period": "战国中期", "description": "—一块铜版上刻有王陵区的建筑规划图，标注了各建筑的名称和尺寸。是中国目前所见最早的建筑平面设计图，也是世界上最古老的铜版建筑规划图之一。"}, {"name": "错银双翼神兽", "period": "战国中期", "description": "—有翼神兽造型，错银装饰。造型融合了中原与北方草原的审美元素，体现了中山国作为非华夏族裔国家的独特文化气质。"}, {"name": "山字形器", "period": "战国", "description": "—中山国特有的器物，用途不明（可能是仪仗或旗座），已成为中山国的标志性符号，现为平山县县标。"}, {"name": "中山王方壶", "period": "战国中期", "description": "—壶腹刻铭文450字，内容与铁足铜鼎铭文相呼应，记载了中山国的政治理念和历史事件。"}], "dynastyConnections": [], "sources": ["中山古城遗址（河北省文物局）"]}], "dynasties": [{"id": "neolithic", "center": [34.0, 109.0], "name": "远古与新石器时代（约公元前10000年—前2070年）", "period": "约公元前10000年—前2070年", "overview": "中国的远古与新石器时代是中华文明的孕育期，从约一万年前的农业萌芽到夏朝建立前夕，跨越近八千年。这一时期中国大地上出现了多个相互独立又有交流的文化区系，形成了"满天星斗"式的文明起源格局。苏秉琦提出的"区系类型"理论揭示了这种多元并进的面貌。

                        <div class="modal-section-title">📜 朝代关联</div>
                        ${museum.dynastyConnections.map(conn => `
                            <div class="connection-item">
                                <div class="artifact-name">${conn.dynasty}</div>
                                <div style="font-size: 12px; color: #adb5bd; margin-top: 4px;">${conn.description}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 关键文物
            if (museum.artifacts && museum.artifacts.length > 0) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">💎 关键文物</div>
                        ${museum.artifacts.slice(0, 6).map(art => `
                            <div class="artifact-item">
                                <div class="artifact-name">${art.name}</div>
                                <div style="font-size: 12px; color: #adb5bd; margin-top: 4px;">${art.description || ''}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 信源
            if (museum.sources && museum.sources.length > 0) {
                bodyHTML += `
                    <div class="sources-toggle" onclick="toggleSources(this)">
                        <div class="sources-toggle-header">
                            📚 信源 <span style="font-size: 12px; color: #6c757d;">(点击展开)</span>
                        </div>
                        <div class="sources-content">
                            ${museum.sources.map(src => `
                                <div style="margin-bottom: 4px;">• <a href="${src}" target="_blank">${src}</a></div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            bodyEl.innerHTML = bodyHTML;
            modal.classList.add('show');

            // 飞到博物馆
            if (museum.lat && museum.lng) {
                map.flyTo([museum.lat, museum.lng], 10, { duration: 1.5 });
            }
        }

        // ============ 关闭博物馆弹窗 ============
        function closeMuseumModal() {
            document.getElementById('museum-modal').classList.remove('show');
        }

        function closeModalOnBackdrop(e) {
            if (e.target.id === 'museum-modal') {
                closeMuseumModal();
            }
        }

        // ============ 切换信源展示 ============
        function toggleSources(el) {
            const content = el.querySelector('.sources-content');
            content.classList.toggle('show');
        }

        // ============ 聊天机器人 ============
        function toggleChat() {
            const chatbot = document.getElementById('chatbot');
            const toggleBtn = document.getElementById('toggle-chat');
            chatbot.classList.toggle('minimized');
            toggleBtn.textContent = chatbot.classList.contains('minimized') ? '+' : '−';
        }

        function handleChatKeyPress(e) {
            if (e.key === 'Enter') {
                sendChat();
            }
        }

        function askQuestion(question) {
            document.getElementById('chat-input').value = question;
            sendChat();
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const question = input.value.trim();
            if (!question) return;

            const messagesEl = document.getElementById('chatbot-messages');
            const sendBtn = document.getElementById('send-chat');

            // 添加用户消息
            addMessage('user', question);
            input.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '思考中...';

            try {
                // 构建 system prompt
                const systemPrompt = buildSystemPrompt();

                // 调用 API
                const response = await fetch('https://token.xianliao.de5.net/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': '59b42259051e8b69dc50acbf9237a13bf04d5fe3fb0f9105bc96aafc3f6d1d09'
                    },
                    body: JSON.stringify({
                        model: 'claude-haiku-4.5',
                        max_tokens: 1024,
                        system: systemPrompt,
                        messages: [
                            ...chatHistory,
                            { role: 'user', content: question }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const answer = data.content?.[0]?.text || '抱歉，我无法回答这个问题。';

                // 添加助手消息
                addMessage('assistant', answer);

                // 更新历史
                chatHistory.push(
                    { role: 'user', content: question },
                    { role: 'assistant', content: answer }
                );

                // 限制历史长度
                if (chatHistory.length > 10) {
                    chatHistory = chatHistory.slice(-10);
                }

            } catch (error) {
                console.error('Chat error:', error);
                addMessage('system', '❌ 网络错误，请稍后重试');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }

        function addMessage(role, content) {
            const messagesEl = document.getElementById('chatbot-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${role}`;
            msgDiv.textContent = content;
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function buildSystemPrompt() {
            // 构建数据摘要
            const dynastiesSummary = EMBEDDED_DATA.dynasties.map(d =>
                `${d.name}（${d.period}）`
            ).join('、');

            const museumsSummary = EMBEDDED_DATA.museums.slice(0, 20).map(m =>
                `${m.name}（${m.corePeriod}）`
            ).join('、');

            return `你是一位专业的中国历史顾问，熟悉中国各朝代历史和博物馆馆藏。

数据库包含：
- 朝代：${dynastiesSummary}
- 主要博物馆：${museumsSummary}等

回答要求：
1. 基于提供的数据回答问题
2. 推荐博物馆时说明推荐理由
3. 提及文物时说明其历史价值
4. 回答简洁专业，200字以内
5. 如果数据中没有相关信息，诚实告知用户

注意：所有数据来自官方博物馆网站和历史文献。`;
        }

        // ============ 工具函数 ============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ 启动 ============
        window.addEventListener('load', init);
    </script>
</body>
</html>
