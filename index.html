<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国历史博物馆地图 v2.0 - 朝代·事件·博物馆时空导览</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --bg-card: #0f3460;
            --accent-gold: #f4a261;
            --accent-amber: #e76f51;
            --text-primary: #e9ecef;
            --text-secondary: #adb5bd;
            --border: rgba(244, 162, 97, 0.3);
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        /* 左侧面板 */
        #sidebar {
            width: 400px;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--bg-panel) 0%, var(--bg-card) 100%);
        }

        #sidebar-header h1 {
            font-size: 20px;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        #sidebar-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 朝代选择器 */
        #dynasty-tabs {
            display: flex;
            overflow-x: auto;
            padding: 12px 15px;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
        }

        #dynasty-tabs::-webkit-scrollbar {
            height: 4px;
        }

        #dynasty-tabs::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 2px;
        }

        .dynasty-tab {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .dynasty-tab:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .dynasty-tab.active {
            background: var(--accent-gold);
            color: var(--bg-dark);
            border-color: var(--accent-gold);
        }

        /* 内容区域 */
        #content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        #content-area::-webkit-scrollbar {
            width: 6px;
        }

        #content-area::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 3px;
        }

        /* 朝代信息卡片 */
        .dynasty-overview {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .dynasty-overview h2 {
            font-size: 18px;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .dynasty-overview .period {
            font-size: 13px;
            color: var(--accent-amber);
            margin-bottom: 12px;
        }

        .dynasty-overview .overview-text {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        /* 事件列表 */
        .events-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            color: var(--accent-gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-card {
            background: var(--bg-card);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-amber);
            cursor: pointer;
            transition: all 0.3s;
        }

        .event-card:hover {
            background: rgba(15, 52, 96, 0.8);
            transform: translateX(4px);
        }

        .event-date {
            font-size: 12px;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .event-desc {
            font-size: 13px;
            color: var(--text-primary);
            margin-top: 4px;
        }

        /* 博物馆推荐 */
        .museum-recommendations {
            margin-top: 20px;
        }

        .museum-rec-card {
            background: var(--bg-card);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .museum-rec-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .museum-rec-name {
            font-size: 14px;
            color: var(--accent-gold);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .museum-rec-reason {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* 地图区域 */
        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 聊天机器人 */
        #chatbot {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 360px;
            max-height: 500px;
            background: var(--bg-panel);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        #chatbot.minimized {
            max-height: 56px;
        }

        #chatbot-header {
            padding: 16px;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-panel) 100%);
            border-bottom: 1px solid var(--border);
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        #chatbot-header h3 {
            font-size: 14px;
            color: var(--accent-gold);
        }

        #toggle-chat {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
        }

        #chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            max-height: 300px;
        }

        #chatbot-messages::-webkit-scrollbar {
            width: 4px;
        }

        #chatbot-messages::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 2px;
        }

        .chat-message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .chat-message.user {
            background: var(--bg-card);
            color: var(--text-primary);
            margin-left: 20px;
        }

        .chat-message.assistant {
            background: rgba(244, 162, 97, 0.1);
            color: var(--text-secondary);
            margin-right: 20px;
            border-left: 3px solid var(--accent-gold);
        }

        .chat-message.system {
            background: transparent;
            color: var(--text-secondary);
            text-align: center;
            font-size: 12px;
        }

        #quick-questions {
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        .quick-btn {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-dark);
            border-color: var(--accent-gold);
        }

        #chatbot-input-area {
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 0 0 12px 12px;
            display: flex;
            gap: 8px;
        }

        #chat-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }

        #chat-input:focus {
            border-color: var(--accent-gold);
        }

        #send-chat {
            padding: 10px 20px;
            background: var(--accent-gold);
            border: none;
            border-radius: 20px;
            color: var(--bg-dark);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        #send-chat:hover {
            background: var(--accent-amber);
        }

        #send-chat:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 博物馆详情弹窗 */
        #museum-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        #museum-modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-panel);
            border-radius: 16px;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            position: relative;
        }

        .modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 3px;
        }

        .modal-header {
            padding: 24px;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-panel) 100%);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            font-size: 20px;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        .modal-header .museum-level {
            font-size: 12px;
            color: var(--accent-amber);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-section {
            margin-bottom: 24px;
        }

        .modal-section-title {
            font-size: 16px;
            color: var(--accent-gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-section-content {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .hall-item, .artifact-item, .connection-item {
            background: var(--bg-card);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent-amber);
        }

        .artifact-name, .hall-name {
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .sources-toggle {
            margin-top: 16px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .sources-toggle-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--accent-gold);
        }

        .sources-content {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .sources-content.show {
            display: block;
        }

        .sources-content a {
            color: var(--accent-amber);
            text-decoration: none;
            font-size: 12px;
        }

        .sources-content a:hover {
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            #app {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: 40vh;
            }

            #chatbot {
                width: calc(100% - 40px);
                max-height: 300px;
            }

            .modal-content {
                margin: 20px;
                max-width: calc(100% - 40px);
            }
        }

        /* Leaflet 自定义样式 */
        .event-marker {
            background: var(--accent-amber);
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            width: 12px;
            height: 12px;
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg-panel);
            color: var(--text-primary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .leaflet-popup-tip {
            background: var(--bg-panel);
        }

        .popup-event-title {
            color: var(--accent-gold);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .popup-event-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .popup-museums {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .popup-museum-item {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 4px;
            background: var(--bg-card);
            border-radius: 4px;
            cursor: pointer;
        }

        .popup-museum-item:hover {
            color: var(--accent-gold);
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

<script>const EMBEDDED_DATA = {"museums": [{"id": "anhui", "name": "安徽博物院", "lat": 31.8206, "lng": 117.2272, "location": "安徽省合肥市蜀山区（新馆）/ 庐阳区（老馆）", "level": "国家一级博物馆", "corePeriod": "新石器时代（凌家滩文化）、春秋战国（楚文化）、明清（徽文化）", "specialty": "安徽地跨淮河、长江两大流域，文化兼具南北特色。馆藏以凌家滩玉器、楚国青铜器和徽州文化三大板块见长，是理解皖南徽商文化和长江中下游古代文明的重要场馆。", "treasures": ["楚大鼎（铸客大鼎）", "凌家滩玉鹰", "战国鄂君启金节", "明代徽州砖雕", "北宋金棺银椁"], "halls": ["安徽文明史陈列", "徽州古建筑专题展", "楚文化青铜器展厅", "凌家滩玉器展区"], "dynastyCoverage": "新石器时代（凌家滩）→ 商周（皖南铜矿）→ 春秋战国（楚、吴越）→ 三国（曹魏、东吴争夺）→ 宋元 → 明清（徽文化鼎盛）", "timeline": "凌家滩（约前3600-前3300年）是良渚文化的重要源头之一；战国时期安徽为楚国东部重地，寿春（寿县）为楚晚期都城；明清时期徽商崛起，\"无徽不成镇\"，深刻影响了中国商业与文化", "artifacts": [{"name": "楚大鼎（铸客大鼎）", "description": "战国（约前4世纪）。中国现存最大的先秦圆鼎之一，重约400公斤，出土于寿县楚王墓，铸有\"铸客\"铭文，是楚国国力与青铜铸造技术的象征。"}, {"name": "凌家滩玉鹰", "description": "新石器时代（约前3500年）。玉雕展翅飞鹰，造型抽象而有力，是凌家滩文化的标志性文物，反映了史前先民的精神信仰和高超玉作工艺。"}, {"name": "战国鄂君启金节", "description": "战国（前323年）。楚怀王颁发给鄂君启的免税通行凭证，分车节和舟节，金质错铭，是研究楚国交通、商业和政治制度的珍贵实物。"}, {"name": "凌家滩玉人", "description": "新石器时代（约前3500年）。站立玉人像，双手置于胸前，是中国最早的玉雕人像之一，对理解史前社会等级和宗教仪式有重要价值。"}, {"name": "北宋金棺银椁", "description": "北宋（11世纪）。出土于寿县报恩寺，工艺精湛，是宋代佛教舍利瘗埋制度的重要实物。"}, {"name": "吴王光剑", "description": "春秋（约前5世纪）。安徽南陵出土，铸有铭文\"吴王光自作用剑\"，证明了安徽在吴楚争霸中的前线地位。"}, {"name": "明代徽州三雕（砖雕、木雕、石雕）", "description": "明清。精美的建筑装饰构件，展现徽派建筑的艺术成就和徽商的文化品位。"}], "dynastyConnections": [{"dynasty": "新石器时代（凌家滩文化）", "description": "凌家滩遗址（含山县）出土的玉器在年代上早于良渚，被认为是良渚玉器文化的重要源头之一。玉鹰、玉龟、玉人等文物展示了长江流域早期文明的高度发展。"}, {"dynasty": "春秋战国（楚国）", "description": "战国晚期楚国迁都寿春（今寿县），安徽成为楚文化的核心区域。铸客大鼎等重器反映了楚国的强盛与衰亡。鄂君启金节则揭示了楚国发达的水陆交通网络。"}, {"dynasty": "明清（徽文化）", "description": "明中期至清中期，徽商是中国最强大的商帮之一，经营盐业、茶叶、木材等。徽商\"贾而好儒\"，推动了徽派建筑、新安画派、徽墨歙砚等文化成就。安徽博物院是理解徽文化全貌的最佳场馆。"}], "sources": ["安徽博物院官网: https://www.ahm.cn/"]}, {"id": "banpo", "name": "西安半坡博物馆", "lat": 34.2784, "lng": 109.0336, "location": "陕西省西安市灞桥区半坡路155号", "level": "国家一级博物馆（2008年评定）", "corePeriod": "新石器时代仰韶文化半坡类型（约前4800-前4300年）", "specialty": "中国建国后第一座史前遗址博物馆。1953年发现，1954-1957年进行五次大规模发掘，清理出房屋遗迹40多座、窖穴200多座、墓葬170多座、陶窑6座，出土近万件文物。遗址大厅保存原始村落面貌约3000㎡。人面鱼纹彩陶盆是仰韶文化的标志性文物。馆藏文物3万多件，一级品200多件，其中陶器1.4万件。", "treasures": ["1. 人面鱼纹彩陶盆（仰韶文化）— 高16.5cm", "口径39.5cm", "1955年出土", "半坡文化标志"], "halls": ["遗址大厅（3000㎡原始村落遗迹保护展示", "含房屋", "窖穴", "墓葬）", "第一/第二展室（出土石器/骨器/陶器陈列）"], "dynastyCoverage": "新石器时代仰韶文化半坡类型（约前4800-前4300年）", "timeline": "半坡遗址是黄河中游仰韶文化的典型代表，距今约6000-6700年。半坡先民以粟作农业为主、渔猎为辅，已有成熟的制陶技术和原始艺术，居住在半地穴式房屋中，形成了有防御沟壕的聚落。", "artifacts": [{"name": "人面鱼纹彩陶盆", "period": "约前4800年，1955年出土", "description": "高16.5cm，口径39.5cm。盆内壁绘有对称的两个人面和两条鱼纹。人面圆形，头顶三角形发髻，嘴部以留空法表现，左右各衔一条变形鱼纹，双耳处有两条小鱼，构成人鱼合体图案。其含义自出土以来有图腾说、神话说、祖先形象说、面具说等20余种解释。1961年遗址即被列为全国第一批重点文物保护单位。"}, {"name": "鱼纹彩陶盆", "period": "约前4800年", "description": "高17cm，红陶底，外壁绘三条互相追逐的游鱼，眼圆睁、嘴大张，线条流畅比例准确。鱼纹是半坡彩陶最核心的纹饰主题。"}, {"name": "小口尖底瓶", "period": "约前4800-前4300年", "description": "半坡文化最典型器物。细泥或细砂硬陶，红色，小口短颈鼓腹尖底，腹侧有双耳。最初被认为是汲水器（利用力学原理自动灌水），后经实验考古证明无法自动灌满，功能至今有争议（酒器说、祭器说等）。"}, {"name": "陶器刻划符号", "period": "约前4800年", "description": "出土陶器上发现22种刻划符号，有些学者认为是中国文字的最早萌芽，但也有学者认为只是工匠标记。"}], "dynastyConnections": [], "sources": ["百度百科·西安半坡博物馆（详细词条，含发掘数据、文物详情、建筑布局）", "《西安半坡》考古发掘报告"]}, {"id": "beilin", "name": "西安碑林博物馆", "lat": 34.2535, "lng": 108.953, "location": "陕西省西安市碑林区三学街15号", "level": "国家一级博物馆、全国重点文物保护单位", "corePeriod": "汉代至清代（历代碑刻书法）", "specialty": "中国收藏碑石最多的博物馆，现藏碑石、墓志4000余方，是中国书法艺术和文字学的宝库。从秦代《峄山刻石》到清代碑刻，历代名家书法汇聚于此。碑林始建于北宋，最初为保存唐代《开成石经》而设，历经900余年不断扩充。", "treasures": ["《开成石经》（唐）", "《大秦景教流行中国碑》（唐）", "颜真卿《多宝塔碑》《颜家庙碑》", "怀素《千字文》碑", "昭陵六骏（其中四骏）"], "halls": ["第一展室（《开成石经》）", "第二展室（唐代名碑）", "第三展室（历代书法）", "石刻艺术室（昭陵六骏）"], "dynastyCoverage": "秦、汉、魏晋、北朝、隋、唐、宋、元、明、清", "timeline": "秦统一文字 → 汉隶成熟 → 魏晋书法自觉 → 北碑南帖分流 → 唐代楷书极盛·开成石经（837年）→ 北宋移碑建林（1087年）→ 历代增补", "artifacts": [{"name": "《开成石经》", "period": "唐代，837年", "description": "—唐文宗开成二年刻成，共114石228面，刻《周易》《尚书》《诗经》《周礼》《仪礼》《礼记》《春秋左传》《春秋公羊传》《春秋穀梁传》《论语》《孝经》《尔雅》十二部儒家经典，共65万余字。是保存最完整的唐代石经，也是碑林创建的缘起。在印刷术尚未普及的时代，石经是国家级的\"教科书标准版本\"。"}, {"name": "《大秦景教流行中国碑》", "period": "唐代，781年", "description": "—记载了基督教聂斯脱里派（景教）在唐代中国的传播历程，碑文以汉文为主，旁有叙利亚文。是东西方宗教文化交流的重要物证，在世界宗教史上具有极高地位。1625年出土后引起来华传教士极大关注。"}, {"name": "颜真卿《多宝塔碑》", "period": "唐代，752年", "description": "—颜真卿44岁时所书，楷书端庄秀丽，结构严谨。是学习颜体楷书的经典范本，也是唐代楷书的代表作之一。"}, {"name": "颜真卿《颜家庙碑》", "period": "唐代，780年", "description": "—颜真卿晚年力作，笔力雄浑苍劲，气势磅礴。与早期的《多宝塔碑》对比，可以清晰看到颜体书法的演变轨迹。"}, {"name": "怀素《千字文》碑", "period": "唐代", "description": "—草书大家怀素的代表作之一，笔势奔放连绵。碑林藏有多种怀素作品的刻石。"}, {"name": "《曹全碑》", "period": "东汉，185年", "description": "—隶书精品，笔画秀润流丽，结体扁平匀称。是汉隶的经典代表之一，历代书法家临习隶书的必选范本。"}, {"name": "昭陵六骏石刻", "period": "唐代，约636年", "description": "—唐太宗李世民昭陵前的六块骏马浮雕，分别记录了李世民征战天下时所骑的六匹战马。其中\"飒露紫\"和\"拳毛騧\"两骏于1914年被盗卖至美国（现藏宾夕法尼亚大学博物馆），其余四骏现存碑林。浮雕造型生动有力，是唐代石刻艺术的巅峰。"}, {"name": "《皇甫诞碑》", "period": "唐代，欧阳询书", "description": "—欧阳询楷书代表作之一，笔力险劲，结构精密。欧体、颜体、柳体、赵体并称楷书四大家，碑林集中收藏了这些名家的碑刻真迹。"}], "dynastyConnections": [], "sources": ["西安碑林博物馆官网: https://www.beilin-museum.com/"]}, {"id": "bingmayong", "name": "秦始皇兵马俑博物馆（秦始皇帝陵博物院）", "lat": 34.3841, "lng": 109.2785, "location": "陕西省西安市临潼区秦陵北路", "level": "国家一级博物馆 / 世界文化遗产", "corePeriod": "秦（前221-前207）", "specialty": "世界第八大奇迹。三个兵马俑坑出土陶俑8000余件，每个面孔都不同。是秦始皇陵的陪葬坑，展现了秦帝国的军事力量和工匠技艺。", "treasures": ["1. 一号坑兵马俑军阵（秦）— 6000余件陶俑排列成实战军阵"], "halls": ["一号坑（最大", "军阵全景）", "铜车马展厅", "二号坑（多兵种混编）", "三号坑（指挥部）"], "dynastyCoverage": "秦", "timeline": "秦始皇陵始建于前246年（始皇13岁即位时），动用70万人修建近40年。兵马俑坑是陵园外围的军事陪葬，整个陵园面积56平方公里，大部分尚未发掘。", "artifacts": [{"name": "一号坑军阵", "period": "秦", "description": "长230米、宽62米，6000余陶俑排列成前锋、主体、侧翼的实战阵型"}, {"name": "铜车马", "period": "秦", "description": "两乘：立车（高车）和安车（轿车），用3000多个零件组装，最细的金丝直径仅0.5mm"}, {"name": "将军俑", "period": "秦", "description": "戴鹖冠、穿彩色铠甲，面部表情沉着威严"}, {"name": "跪射俑", "period": "秦", "description": "单膝跪地持弩射击姿态，鞋底纹路清晰可见"}, {"name": "青铜剑", "period": "秦", "description": "出土时仍锋利，表面经过铬盐氧化处理（比西方早2000年）"}, {"name": "石铠甲", "period": "秦", "description": "用石片穿缀的铠甲，每件由数百片石片组成"}, {"name": "彩绘陶俑", "period": "秦", "description": "原本兵马俑都是彩色的，少数保留了颜料痕迹"}], "dynastyConnections": [], "sources": ["秦始皇帝陵博物院官网: https://www.bmy.com.cn/", "UNESCO世界文化遗产名录（1987年）"]}, {"id": "chengdu", "name": "成都博物馆", "lat": 30.657, "lng": 104.0635, "location": "四川省成都市青羊区小河街1号（天府广场西侧）", "level": "国家一级博物馆", "corePeriod": "古蜀至近现代（成都城市通史）", "specialty": "成都城市史的完整叙事，从古蜀到当代。2012年老官山汉墓出土的织机模型是世界纺织史重大发现。新馆建筑面积约6.5万平方米，是西南地区规模最大的城市博物馆之一。", "treasures": ["老官山汉墓织机模型（西汉）", "石犀（秦汉）", "经穴漆人（西汉）", "皮影戏藏品"], "halls": ["花重锦官城——成都历史文化陈列\"（通史主线）", "影舞万象·偶戏大千——中国皮影木偶展"], "dynastyCoverage": "古蜀（宝墩文化/三星堆/金沙）→ 秦汉（蜀郡/老官山）→ 三国（蜀汉）→ 唐宋（繁荣期）→ 明清 → 近现代", "timeline": "成都建城2300余年，城址未迁。秦李冰修都江堰使成都平原成为\"天府之国\"。老官山汉墓织机证明蜀锦技术在西汉就已高度发达。", "artifacts": [{"name": "老官山汉墓织机模型", "period": "西汉，约前1世纪", "description": "2012年天回镇老官山汉墓出土4部织机模型，是世界上发现最早的提花织机模型，证明蜀锦技术在西汉就达到相当高度。填补了中国纺织史的重大空白"}, {"name": "石犀", "period": "秦汉", "description": "2012年天府广场出土，长3.3米、高1.7米、重约8.5吨。可能与李冰治水传说中\"作石犀以镇水精\"有关"}, {"name": "经穴漆人", "period": "西汉", "description": "老官山汉墓出土，漆人身上标注经络和穴位，是目前发现最早最完整的人体经穴模型，对中医学史研究意义重大"}, {"name": "医简", "period": "西汉", "description": "老官山汉墓出土920余支竹简，含多部医书，部分内容与《黄帝内经》相关"}, {"name": "皮影戏藏品", "period": "东汉", "description": "成都地区出土的画像砖，描绘宴饮、车马出行、农耕等场景，是了解汉代四川社会生活的图像资料"}], "dynastyConnections": [], "sources": ["核心信息基于AI知识库", "老官山汉墓织机: 2013年考古发掘报道"]}, {"id": "chongqing", "name": "重庆中国三峡博物馆（重庆博物馆）", "lat": 29.5537, "lng": 106.5466, "location": "重庆市渝中区人民路236号", "level": "首批国家一级博物馆、中央地方共建国家级博物馆", "corePeriod": "先秦巴文化、三峡文明、抗战时期", "specialty": "占地5万㎡，建筑面积7.17万㎡，展厅面积3.1万㎡。馆藏文物11.5万余件/套，珍贵古籍善本1.8万余册，涵盖23个文物门类。由主馆、白鹤梁水下博物馆、宋庆龄纪念馆、涂山窑遗址、三峡文物科技保护中心五个场馆组成。与人民大礼堂、人民广场形成\"三位一体\"城市标志性建筑群。设有4个基本陈列、6个专题陈列和360度全周电影。", "treasures": ["1. 偏将军印章（汉）— 巴蜀地区出土"], "halls": ["壮丽三峡\"（三峡自然与文化通史", "含360度全周电影）", "远古巴渝\"（石器/青铜时代巴文明）", "抗战岁月\"（重庆作为战时首都的历史）", "巴蜀汉代雕塑艺术展\"（近160件汉代雕塑类文物）"], "dynastyCoverage": "旧石器时代 → 先秦巴国 → 秦汉 → 六朝 → 唐宋 → 元明清（明玉珍大夏国）→ 近现代（抗战首都）", "timeline": "巴文化与蜀文化并称\"巴蜀文化\"，是中国西南文明的两大源流。三峡地区自旧石器时代就有人类活动，巴国在春秋战国时期与楚国长期对峙。三峡工程蓄水前的大规模抢救性考古发掘，使大量珍贵文物得以保存。抗战时期重庆作为陪都，留下了丰富的近代史料。", "artifacts": [{"name": "白鹤梁题刻", "period": "唐至清，涪陵长江江心", "description": "被称为\"世界第一古代水文站\"，石梁上有自唐代以来的163段题刻、3万余字，记录了1200年间长江枯水位变化，是世界水文史的珍贵遗产。三峡蓄水后建成白鹤梁水下博物馆原址保护"}, {"name": "巴蜀青铜器", "period": "先秦", "description": "包括巴式柳叶剑、铜钲、虎纽錞于等巴文化标志性器物，与中原和楚国青铜器风格迥异"}, {"name": "汉代画像石棺和画像砖", "period": "东汉", "description": "巴蜀地区汉代雕塑艺术的精品，题材涵盖生产劳动、宴饮乐舞、神话故事、建筑等，展厅含一级文物47件（套）"}, {"name": "偏将军印章", "period": "汉代", "description": "军事官印"}, {"name": "明玉珍墓出土文物", "period": "明初，1366年", "description": "明玉珍为元末农民起义军领袖，在重庆建立大夏国，其墓葬出土的文物反映了元末明初的政治格局"}, {"name": "锁江铁柱", "period": "宋", "description": "三峡地区水道军事防御设施"}, {"name": "秦良玉\"太子太保总镇关防\"印", "period": "明末", "description": "秦良玉是中国历史上唯一正式列入正史将相传的女将军"}, {"name": "朐忍令景云神道碑", "period": "东汉", "description": "重要的汉代碑刻"}], "dynastyConnections": [], "sources": ["百度百科·重庆中国三峡博物馆（详细词条，含馆藏数据、展厅描述、历史沿革）"]}, {"id": "dingzhou", "name": "定州博物馆", "lat": 38.5132, "lng": 114.9902, "location": "河北省定州市中山东路南侧", "level": "国家二级博物馆", "corePeriod": "西汉中山国、北宋（定窑白瓷、静志寺/净众院塔基地宫）", "specialty": "定州是西汉中山国都城（卢奴）、北宋定窑所在地，两大文化高峰在此交汇。静志寺塔基地宫出土的大批北宋定窑白瓷和佛教文物，质量之高、数量之多为全国罕见。虽为县级市博物馆，但藏品质量极高。", "treasures": ["东汉龙螭衔环谷纹青玉壁", "北宋白釉刻花龙首净瓶", "\"只此青绿\"定窑绿釉", "透影白瓷", "西汉错金银铜车伞铤"], "halls": ["汉家陵阙", "北朝佛陀", "天下大白——定窑", "尘外千年——静志寺·净众院塔基地宫"], "dynastyCoverage": "西汉（中山国）、东汉、北朝、隋唐、北宋（定窑）", "timeline": "战国中山国灭亡（前296年）→ 西汉中山国重建（前154年）→ 东汉中山国 → 北朝佛教兴盛 → 唐宋定窑发展（晚唐-金代为盛期）→ 北宋静志寺塔（977年建）", "artifacts": [{"name": "北宋白釉刻花龙首净瓶", "period": "北宋", "description": "—静志寺塔基地宫出土，瓶口为龙首造型，通体白釉，刻花精美。是定窑白瓷中的极品，也是佛教法器的精品。净瓶是佛教僧人盛水器具，此件工艺之精在宋代瓷器中罕有其匹。"}, {"name": "东汉龙螭衔环谷纹青玉壁", "period": "东汉", "description": "—直径约25厘米，双面浮雕龙螭纹和谷纹，龙螭衔环悬挂。玉质温润，雕工精细，是东汉玉壁中的上乘之作。"}, {"name": "定窑白瓷群", "period": "北宋，10-11世纪", "description": "—静志寺和净众院两处塔基地宫共出土定窑白瓷等器物700余件，包括碗、盘、瓶、炉、盒等各种器形，许多为定窑精品中的精品。定窑是宋代五大名窑之一，以白瓷著称，\"定州花瓷瑕不见\"即指此窑。"}, {"name": "西汉错金银铜车伞铤", "period": "西汉", "description": "—定州中山王墓出土，车伞的支撑构件，以错金银工艺装饰。体现了西汉中山国的手工业水平，与满城汉墓出土品风格相近。"}, {"name": "北宋定窑绿釉划花净瓶", "period": "北宋", "description": "—极为稀有的定窑绿釉品种，世所罕见。定窑以白瓷为主，彩釉产品极少，此件绿釉净瓶是定窑色釉瓷的珍贵孤品。"}, {"name": "透影白瓷杯", "period": "北宋", "description": "—薄胎白瓷，迎光可透影，有\"薄如纸\"之称。体现了定窑白瓷工艺的极致追求。"}, {"name": "北朝佛教造像", "period": "北朝，5-6世纪", "description": "—定州在北朝时期是佛教重镇，出土大量白石造像，风格独特，被称为\"定州样式\"，对中国佛教造像艺术有重要影响。"}], "dynastyConnections": [], "sources": ["定州博物馆官网: https://www.dzmuseum.com/"]}, {"id": "erlitou", "name": "二里头夏都遗址博物馆", "lat": 34.694, "lng": 112.683, "location": "河南省洛阳市偃师区翟镇镇二里头村", "level": "国家\"十三五\"重大文化工程", "corePeriod": "夏代中晚期（二里头文化，约前1750-前1530年）", "specialty": "二里头遗址被学界称为\"最早的中国\"，是夏王朝中晚期都城遗址。博物馆占地246亩，总建筑面积3.2万㎡，馆藏文物2000余件。建筑外观暗含\"钥匙\"形象，寓意二里头是打开中华文明的钥匙。设有五个基本陈列展厅：\"第一王朝\"\"赫赫夏都\"\"世纪探索\"。", "treasures": ["1. 乳钉纹青铜爵（夏）— \"华夏第一爵\"", "高26.5cm", "中国目前发现最早的青铜容器之一"], "halls": ["第一王朝\"（夏朝发展脉络）", "国之大事\"（祭祀与战争", "二里头精品器物）", "建中立极\"（都城环境和手工业）", "数字馆（全面复原二里头文化面貌）"], "dynastyCoverage": "夏代中晚期（二里头文化一至四期，约前1750-前1530年）", "timeline": "二里头遗址（约前1750-前1530年）是目前考古学上能确认的最早的具有明确城市规划的都邑遗址。其宫殿区、铸铜作坊、绿松石器作坊等证明了王权和国家机器的存在。二里头文化的辐射范围远超中原，其牙璋传播到南中国和越南，反映了广域王权的影响。", "artifacts": [{"name": "乳钉纹青铜爵", "period": "夏，二里头遗址出土", "description": "高26.5cm，总长31.5cm。束腰平底，三锥足细长，槽状长流，被誉为\"华夏第一爵\"，是中国目前发现时代最早的青铜容器之一。造型夸张，形态修长，极富美感"}, {"name": "绿松石龙形器", "period": "夏，高等级贵族墓葬出土", "description": "长64.5cm，由2000余片各种形状的绿松石片拼合而成，每片仅0.2-0.9cm大小，厚约0.1cm。龙身略呈波状，菱形主纹象征鳞纹，白玉为睛。是中国早期龙形象的杰出代表"}, {"name": "七孔玉刀", "period": "夏，1975年出土", "description": "长60.4-65cm，宽9.5cm，墨绿色玉料。两面以交叉直线阴纹组成网状和几何图形，刀背有七个等距圆孔。二里头遗址出土最大的玉器"}, {"name": "网格纹青铜鼎", "period": "夏", "description": "通高20cm，口径15.3cm。造型承自龙山文化陶鼎，但材质为青铜——中国考古发现最早的青铜鼎，是王权礼制萌生的象征"}, {"name": "镶嵌绿松石兽面纹铜牌饰", "period": "夏", "description": "长16.5cm，宽8-11cm。青铜框架上以数百片绿松石拼合镶嵌兽面纹，历经三四千年无一松动脱落。出土时置于墓主人胸前"}, {"name": "龙形牙璋", "period": "夏", "description": "长48.1cm，造型精美。牙璋是二里头文化典型的玉礼器，随二里头文化扩张传播到南中国和东南亚"}, {"name": "铜圆形器", "period": "夏", "description": "直径17cm，周边镶嵌61块绿松石，中间两圈各13个十字形绿松石。有专家认为与夏历历法天数相关"}], "dynastyConnections": [{"dynasty": "城市规划", "description": "二里头是中国最早的具有明确中轴线布局的宫城。宫殿区、手工业作坊区、贵族居住区和一般居住区的分化，说明国家机器已经形成"}, {"dynasty": "青铜文明起点", "description": "青铜爵和青铜鼎的出土，标志着中国青铜时代的正式开始。铸铜作坊的发现说明二里头掌握了先进的青铜铸造技术"}, {"dynasty": "绿松石手工业", "description": "绿松石龙形器和铜牌饰等展现了极高的工艺水平，绿松石可能来自远方（甘肃等地），说明二里头有远距离资源调配能力  **与前后文化的关系**: 二里头文化承接龙山文化晚期（如新砦遗址、王湾三期文化），并对后来的偃师商城（早商文化）产生了直接影响。从二里头到殷墟，构成了夏商文明的完整过渡序列。"}], "sources": ["百度百科·二里头夏都遗址博物馆（详细词条，含文物尺寸、展厅描述）", "二里头夏都遗址博物馆官网"]}, {"id": "famensi", "name": "法门寺博物馆（法门寺珍宝馆）", "lat": 34.4439, "lng": 107.9016, "location": "陕西省宝鸡市扶风县法门镇", "level": "国家一级博物馆", "corePeriod": "唐代（皇家佛教供奉）", "specialty": "1987年法门寺唐代地宫开启，出土2000余件唐代皇室重宝和4枚佛指舍利，被列为\"20世纪中国考古重大发现\"。地宫封闭于公元874年（唐僖宗），至1987年重现世间，封存长达1113年。秘色瓷的发现解开了困扰学界千年的谜题。", "treasures": ["佛指舍利（4枚", "含1枚真身舍利）", "八重宝函", "鎏金银茶具（中国最早宫廷茶具套件）", "秘色瓷（13件）", "鎏金双蛾团花纹银香囊"], "halls": ["法门寺地宫珍宝展", "佛指舍利展区", "唐代金银器展区"], "dynastyCoverage": "唐代（核心），东汉末年始建寺院", "timeline": "法门寺始建于东汉末年。唐高宗至唐僖宗，先后8位皇帝6次迎请佛骨舍利至长安供奉。874年唐僖宗最后一次送还舍利并封闭地宫，直至1987年重见天日。", "artifacts": [{"name": "佛指舍利", "period": "释迦牟尼真身舍利", "description": "4枚佛指骨舍利（1枚真身+3枚影骨），以八重宝函层层供奉。唐代先后8位皇帝6次迎奉，是佛教界至高圣物"}, {"name": "八重宝函", "period": "唐·咸通年间", "description": "供奉佛指舍利的层层嵌套容器，从外到内分别为檀木函、鎏金函、金函等八层，每层均有精美装饰"}, {"name": "鎏金银茶具套件", "period": "唐·咸通年间", "description": "包括茶碾、茶罗、银风炉、银盐台等，是中国乃至世界上发现最早最完整的宫廷茶具，反映唐代宫廷茶文化"}, {"name": "秘色瓷", "period": "唐", "description": "13件越窑秘色瓷，地宫《衣物帐》碑上明确记载\"瓷秘色\"三字，解开了\"秘色瓷到底是什么\"这一困扰学界千年的谜题。产自浙江慈溪上林湖窑址"}, {"name": "鎏金双蛾团花纹银香囊", "period": "唐", "description": "球形镂空银香囊，内部常平装置使香盂始终保持水平（类似陀螺仪原理），体现唐代精密机械工艺"}, {"name": "鎏金四天王盝顶银宝函", "period": "唐", "description": "錾刻四大天王像，工艺精湛"}, {"name": "琉璃器", "period": "东罗马/伊斯兰", "description": "地宫出土的20件琉璃器，来自东罗马帝国和伊斯兰世界，是丝路贸易的实物证据"}], "dynastyConnections": [{"dynasty": "政教关系", "description": "唐代帝王\"三十年一开\"佛骨的制度，反映了佛教在唐代政治中的特殊地位。韩愈《谏迎佛骨表》与唐宪宗的冲突，是儒佛之争的标志性事件"}, {"dynasty": "物质文化", "description": "金银器工艺代表唐代最高水平；茶具套件是唐代饮茶风俗\"从煮到煎\"转变的实物见证"}, {"dynasty": "国际交流", "description": "琉璃器来自东罗马和伊斯兰世界，秘色瓷产自浙江，说明唐代皇室能调动全国乃至国际资源供奉佛教  法门寺与陕西历史博物馆互为补充：陕历博展示唐代世俗生活，法门寺展示唐代皇家宗教生活。"}], "sources": ["百度百科·法门国宝", "1987年法门寺地宫考古发掘报告", "\"秘色瓷\"相关研究: 法门寺地宫《衣物帐》碑记载"]}, {"id": "fujian", "name": "福建博物院", "lat": 26.0998, "lng": 119.2812, "location": "福建省福州市鼓楼区西湖公园旁", "level": "国家一级博物馆", "corePeriod": "秦汉（闽越国）、宋元明（海上丝绸之路）、近代（船政文化）", "specialty": "以闽越文化、海上丝绸之路和船政文化为三大特色，是理解中国东南沿海海洋文明的核心场馆。馆藏德化白瓷、寿山石雕等福建特色工艺品也十分丰富。", "treasures": ["闽越国\"万岁\"瓦当", "南宋建窑兔毫盏", "云纹青铜大铙", "寿山石田黄冻雕件", "德化白瓷观音"], "halls": ["福建古代文明之光\"通史陈列", "丝路帆远——海上丝绸之路\"专题展", "船政文化展", "闽越王城专题"], "dynastyCoverage": "新石器时代（昙石山文化）→ 秦汉（闽越国）→ 唐宋（海上丝绸之路兴盛）→ 宋代（建窑）→ 元明清（德化窑、海外贸易）→ 近代（福建船政）", "timeline": "闽越国（前334-前110年）是东南沿海最重要的地方政权；泉州在宋元时期是世界最大港口之一（2021年列入世界遗产）；马尾船政局（1866年）是中国近代海军的摇篮", "artifacts": [{"name": "闽越国\"万岁\"瓦当", "description": "西汉（前2世纪）。福州冶山闽越王城遗址出土，\"万岁\"二字反映闽越国的政治野心，是闽越国存在的重要物证。"}, {"name": "南宋建窑兔毫盏", "description": "南宋（12-13世纪）。建窑（建阳）黑釉茶盏，兔毫纹自然天成，是宋代点茶文化的代表器物，深受日本茶道推崇。"}, {"name": "云纹青铜大铙", "description": "西周（约前10世纪）。福建出土的大型青铜乐器，证明商周时期中原文化已向东南沿海传播。"}, {"name": "宋代沉船出水瓷器", "description": "宋代。福建沿海发现的海上丝绸之路沉船出水的大量外销瓷，是海上贸易繁荣的直接证据。"}, {"name": "德化窑白釉观音像", "description": "明代（16-17世纪）。何朝宗款白瓷观音，釉色温润如玉，被欧洲称为\"中国白\"（Blanc de Chine），代表了德化瓷塑的最高水平。"}, {"name": "寿山石田黄冻印章", "description": "明清。田黄石产于福州寿山，有\"石帝\"之称，质地温润，是中国印石文化的极品。"}, {"name": "闽越国铁器和建筑构件", "description": "西汉。武夷山城村闽越王城遗址出土，展现了闽越国发达的城市建设和冶铁技术。"}], "dynastyConnections": [{"dynasty": "秦汉（闽越国）", "description": "闽越是百越族群的一支，秦统一后设闽中郡，汉初封无诸为闽越王。闽越国在福州、武夷山等地建有宫殿城池，前110年被汉武帝灭国。福建博物院是了解闽越历史的首要场馆。"}, {"dynasty": "宋元（海上丝绸之路）", "description": "宋元时期，泉州（刺桐港）是世界最大的港口之一，马可·波罗称其为\"光明之城\"。福建的建窑、德化窑、磁灶窑大量生产外销瓷器。\"丝路帆远\"展是理解中国海洋贸易史的经典展览。"}, {"dynasty": "近代（船政文化）", "description": "1866年左宗棠在福州马尾创办福建船政局，是中国第一个现代造船厂和海军学堂。培养了严复、邓世昌等近代人物，是中国近代化的重要起点。"}], "sources": ["福建博物院官网: https://www.fjbwg.com/"]}, {"id": "gansu", "name": "甘肃省博物馆", "lat": 36.0611, "lng": 103.8343, "location": "甘肃省兰州市七里河区西津西路3号", "level": "国家一级博物馆（2012年升级）", "corePeriod": "新石器彩陶、汉代丝绸之路、佛教艺术", "specialty": "馆藏8万余件，以甘肃彩陶（时跨7000-3000年，体系最完整）、汉代简牍文书、汉唐丝绸之路珍品、佛教艺术萃宝为四大特色。铜奔马（马踏飞燕）是中国旅游标志。总面积43000平方米，平面呈\"山\"字形。国宝级文物16件（组），国家一级文物720余件（组）。", "treasures": ["1. 铜奔马（东汉）— 武威雷台汉墓出土", "通高34.5cm", "长45cm", "重7.3kg", "中国旅游标志"], "halls": ["甘肃丝绸之路文明展\"（420余件丝路文物）", "甘肃彩陶展\"（大地湾→仰韶→马家窑→青铜时代）", "庄严妙相——甘肃佛教艺术展\"（十六国至明清佛教艺术）"], "dynastyCoverage": "新石器时代（大地湾/仰韶/马家窑/齐家）→ 先秦 → 秦汉（丝路/简牍）→ 魏晋（壁画砖）→ 十六国至隋唐（佛教艺术）→ 宋元明清", "timeline": "甘肃是彩陶之乡（马家窑彩陶代表中国新石器彩陶最高成就）和丝绸之路的黄金段。河西走廊是连接中原与西域的唯一通道，武威、张掖、酒泉、敦煌四郡自汉代设置以来就是丝路重镇。", "artifacts": [{"name": "铜奔马", "period": "东汉，武威雷台汉墓出土", "description": "通高34.5cm，长45cm，重7.3kg。三足腾空，一足踏飞鸟（鹰），塑造奔马超掠飞鹰的瞬间。着力点集中在踏鸟的一足上，精确掌握力学平衡。1983年被确定为中国旅游标志。集西域马和蒙古马优点于一身，展现河西走马的对侧步特征。"}, {"name": "人头形器口彩陶瓶", "period": "仰韶文化，约5000年前", "description": "瓶口塑为人头形，齐刘海发型，耳有耳洞，身上绘三角茎叶纹与飞鸟纹，是新石器时代最具人文气息的彩陶作品之一"}, {"name": "铜车马仪仗队", "period": "东汉，武威雷台汉墓", "description": "含铜奔马在内的成组铜车马群，是了解汉代车马制度和军事仪仗的实物资料"}, {"name": "莲花形玻璃托盏", "period": "元代，漳县汪世显家族墓出土", "description": "普蓝色半透明玻璃，盏为七瓣莲花形，托为八瓣莲花形，迄今出土最完整的元代玻璃器"}, {"name": "彩绘木博戏俑", "period": "西汉，武威磨嘴子汉墓出土", "description": "两位老者对弈博戏，高29cm，生动刻画蓄势待发的对弈场面"}, {"name": "绢底平绣人像", "period": "西汉，武威磨嘴子汉墓", "description": "红色绢底，用多色丝线平绣二人像，是极珍贵的汉代丝绣实物"}, {"name": "魏晋壁画砖", "period": "魏晋，嘉峪关墓出土", "description": "烫鸡、烤肉煮肉等日常生活场景画像砖，生动反映河西地区魏晋社会生活"}, {"name": "葫芦形网纹彩陶壶", "period": "马家窑文化半山类型，约4500年前", "description": "高46.7cm，红黑彩绘葫芦形网纹，马家窑彩陶代表作"}], "dynastyConnections": [], "sources": ["百度百科·甘肃省博物馆（含馆藏数据、文物尺寸、展厅信息）", "甘肃省博物馆官网: http://www.gansumuseum.com/"]}, {"id": "guangdong", "name": "广东省博物馆", "lat": 23.1175, "lng": 113.3253, "location": "广东省广州市天河区珠江东路2号（珠江新城）", "level": "国家一级博物馆", "corePeriod": "宋元明清（海上丝绸之路与对外贸易）", "specialty": "以海上丝绸之路为主线，系统展示广东作为中国对外贸易门户的千年历史。外销瓷、外销画、广绣和潮州木雕是特色收藏，完整呈现了岭南文化从百越时代到近代开埠的演变脉络。", "treasures": ["南宋陈容《墨龙图》", "清乾隆广彩瓷大碗", "潮州金漆木雕蟹篓", "北宋木雕罗汉像", "西汉铜提筒"], "halls": ["广东历史文化陈列", "海洋出水文物展", "潮州木雕艺术展", "广珐琅特展"], "dynastyCoverage": "先秦百越、秦汉南越、唐宋海贸、明清外销", "timeline": "先秦百越文化 → 秦汉南越国（前203-前111年）→ 唐宋广州港崛起 → 明清一口通商（1757-1842年）→ 近代开埠", "artifacts": [{"name": "南宋陈容《墨龙图》", "period": "南宋，约1235-1262年", "description": "—陈容是南宋画龙名家，开创\"所翁龙\"画法，此图以水墨渲染龙腾云雾的气势，笔法苍劲奔放，是中国龙画的巅峰之作，对日本水墨画影响深远。"}, {"name": "清乾隆广彩人物纹大碗", "period": "清，约1750年", "description": "—广州织金彩瓷的代表，色彩浓艳，满工装饰，是专为欧洲市场定制的外销瓷精品，反映了十八世纪中西贸易的繁荣景象。"}, {"name": "潮州金漆木雕蟹篓", "period": "清末民初", "description": "—整块樟木镂空雕成，螃蟹、篓筐层层透雕，玲珑剔透至极。是潮州木雕多层镂空技艺的巅峰之作，被誉为\"木雕之王\"。"}, {"name": "西汉铜提筒", "period": "西汉", "description": "—广州出土，筒身刻有羽人划船纹饰，风格与越南东山文化铜鼓相近。是南越国时期海上文化交流的实物证据，体现了环南海文化圈的联系。"}, {"name": "北宋木雕罗汉像", "period": "北宋", "description": "—南华寺旧藏，造型写实、神态各异，保存状况极佳。是中国现存最早的大型木雕罗汉组像之一，对研究宋代佛教雕塑具有重要价值。"}, {"name": "明万历端砚", "period": "明，1573-1620年", "description": "—取材肇庆端溪老坑，石质细腻如婴儿肌肤，有青花、鱼脑冻等珍贵石品。是文房四宝中端砚的顶级藏品。"}, {"name": "元代广州港铜钟", "period": "元代", "description": "—铸有多语文铭文，反映了元代广州作为国际港口的多元文化面貌。"}], "dynastyConnections": [], "sources": ["广东省博物馆官网: https://www.gdmuseum.com/"]}, {"id": "guangxi", "name": "广西壮族自治区博物馆", "lat": 22.8155, "lng": 108.366, "location": "广西壮族自治区南宁市青秀区民族大道34号", "level": "国家一级博物馆", "corePeriod": "先秦至汉代（百越文化与铜鼓文明）", "specialty": "拥有世界上数量最多、类型最齐全的铜鼓收藏，是研究中国南方及东南亚铜鼓文化的核心机构。合浦汉墓出土文物系统展示了汉代海上丝绸之路始发港的繁荣面貌，百越民族文化与中原文明的交融是贯穿始终的主题。", "treasures": ["翔鹭纹铜鼓（云雷纹大铜鼓）", "西汉羽纹铜凤灯", "东汉大铜马", "合浦出土罗马玻璃碗", "西汉铜牛"], "halls": ["瓯骆遗粹——广西百越文化", "铜鼓文化", "合浦汉代文化"], "dynastyCoverage": "先秦百越、秦汉、东汉、唐宋、明清", "timeline": "先秦骆越/西瓯文化 → 秦设桂林郡 → 西汉合浦郡（海丝始发港）→ 唐代邕州 → 明清土司制度", "artifacts": [{"name": "翔鹭纹铜鼓", "period": "战国至西汉", "description": "—面径超过160厘米，鼓面有翔鹭纹和太阳纹，体型巨大，铸造精良。铜鼓在百越社会中是权力和财富的象征，此鼓是广西乃至全世界已知最大的铜鼓之一。"}, {"name": "西汉羽纹铜凤灯", "period": "西汉", "description": "—合浦望牛岭汉墓出土，凤鸟回首衔灯，灯盘可蓄油点燃，凤身中空导烟。造型优美、设计巧妙，与长信宫灯异曲同工，是百越地区汉代青铜灯具的杰出代表。"}, {"name": "合浦出土罗马玻璃碗", "period": "东汉，约1-2世纪", "description": "—合浦汉墓出土，深蓝色半透明玻璃，钠钙玻璃成分证实为罗马帝国制品。是汉代海上丝绸之路连通罗马帝国的直接物证，极为珍贵。"}, {"name": "东汉大铜马", "period": "东汉", "description": "—体量巨大、造型雄健，四肢比例准确。是岭南地区出土的最大青铜马，反映了汉代合浦地区的经济实力和铸造水平。"}, {"name": "西汉铜牛", "period": "西汉", "description": "—贵县（今贵港）罗泊湾汉墓出土，牛身壮硕、刻有花纹，是用于祭祀的礼器。体现了骆越人与农耕文化的密切关系。"}, {"name": "合浦出土琥珀饰件", "period": "汉代", "description": "—数量多、品种丰富，包括狮形、蛙形等造型，原料来自缅甸。是汉代南海贸易网络的重要物证。"}, {"name": "铜鼓王（北流型大铜鼓）", "period": "汉代", "description": "—北流出土，面径达165厘米，重约300公斤，是世界上已知最大的铜鼓，被称为\"铜鼓王\"，现为广西博物馆标志性藏品。"}], "dynastyConnections": [], "sources": ["广西壮族自治区博物馆官网: https://www.gxmuseum.cn/"]}, {"id": "gugong", "name": "故宫博物院", "lat": 39.9163, "lng": 116.3972, "location": "北京市东城区景山前街4号", "level": "国家一级博物馆", "corePeriod": "明清（1368-1912）", "specialty": "世界上现存规模最大、保存最完整的木质结构古建筑群。藏品180余万件（套），涵盖书画、陶瓷、青铜、玉器、宫廷用品。建筑本身即是最大的展品。", "treasures": ["1. 《清明上河图》（北宋·张择端）— 中国十大传世名画之首"], "halls": ["珍宝馆（宁寿宫区）", "钟表馆（奉先殿）", "书画馆", "陶瓷馆"], "dynastyCoverage": "明、清为主，藏品横跨新石器至清末", "timeline": "明永乐帝迁都北京（1420年建成）→ 明清两代24位皇帝居所 → 1925年建院。宫廷收藏的集大成者。", "artifacts": [{"name": "《清明上河图》", "period": "北宋", "description": "5米长卷描绘汴京繁华，社会史百科全书"}, {"name": "《千里江山图》", "period": "北宋", "description": "王希孟18岁所作，青绿山水绝唱"}, {"name": "各种釉彩大瓶", "period": "清乾隆", "description": "融合15种釉彩技法，工艺极限"}, {"name": "金瓯永固杯", "period": "清乾隆", "description": "皇帝元旦开笔仪式用杯"}, {"name": "大禹治水图玉山", "period": "清乾隆", "description": "重5吨，中国最大玉雕"}, {"name": "郎窑红釉穿带直口瓶", "period": "清康熙", "description": "红釉瓷器巅峰"}, {"name": "酗亚方樽", "period": "商晚期", "description": "青铜酒器精品"}, {"name": "张成造款雕漆云纹盘", "period": "元", "description": "漆器工艺巅峰"}], "dynastyConnections": [], "sources": ["故宫博物院官网·藏品: https://www.dpm.org.cn/explore/collections.html（藏品180余万件/套）", "故宫博物院官网·历史: https://www.dpm.org.cn/classify/architecture.html"]}, {"id": "guizhou", "name": "贵州省博物馆", "lat": 26.6152, "lng": 106.6246, "location": "贵州省贵阳市观山湖区林城东路107号", "level": "国家一级博物馆（2020年第四批）", "corePeriod": "夜郎/古滇文化（先秦至汉）、西南少数民族文化", "specialty": "馆藏8万余件，民族文物在国内独树一帜。中国苗族服饰库和苗族银饰库位居全国第一。贵州古生物化石（三叠纪海洋爬行动物化石群）也是一大特色。新馆设\"民族贵州\"\"历史贵州\"\"古生物王国\"三大主题展厅。", "treasures": ["1. 东汉铜车马 — 镇馆之宝"], "halls": ["历史贵州\"（探访观音洞→夜郎寻踪→建省之路→文教兴延→黔山红迹）", "民族贵州\"（苗族/布依族/侗族民族文化", "苗族服饰和银饰精品）", "古生物王国\"（瓮安生物群", "关岭三叠纪海洋爬行动物化石）"], "dynastyCoverage": "旧石器（观音洞，距今约24万年）→ 先秦夜郎 → 秦汉（夜郎国归附）→ 唐宋（土司制度）→ 明清（改土归流/建省）→ 近现代（红军长征过贵州）", "timeline": "贵州是中国旧石器时代遗址最丰富的省份之一（观音洞、穿洞等）。先秦\"夜郎国\"是西南最大的方国之一，汉武帝开发西南时夜郎归附。明永乐十一年（1413年）贵州建省。近现代，红军长征四渡赤水和遵义会议是贵州最重要的革命历史。", "artifacts": [{"name": "东汉铜车马", "period": "东汉", "description": "镇馆之宝，铜铸车马组合，反映汉代贵州地区的冶铸技术和交通制度"}, {"name": "立虎辫耳大铜釜", "period": "先秦至汉", "description": "夜郎/古滇文化的标志性青铜重器"}, {"name": "石寨山铜鼓", "period": "宋代，1987年平坝棺材洞出土", "description": "裙腰麻质，裙身棉质土布，蜡染鹭鸟纹，中国古代蜡染工艺的珍贵实物"}, {"name": "明刻花龙头金手镯", "period": "明代，1954年遵义高坪明墓出土", "description": "直径6.9cm，重79.9g，圆梗形式，两端龙头相对"}, {"name": "苗族银饰精品", "period": "清至近代", "description": "国内最大的苗族银饰收藏，包括银冠、银项圈、银锁等"}, {"name": "萨斯特鱼龙化石", "period": "三叠纪，约2.2亿年前", "description": "关岭出土，体型较大，保存完整"}, {"name": "苗族服饰库", "period": "历代", "description": "全国第一的苗族服饰收藏，反映苗族支系的多样性"}], "dynastyConnections": [], "sources": ["百度百科·贵州省博物馆（详细词条，含馆藏数据、展厅描述、文物信息）"]}, {"id": "guobo", "name": "中国国家博物馆", "lat": 39.9046, "lng": 116.4035, "location": "北京市东城区东长安街16号（天安门广场东侧）", "level": "国家一级博物馆", "corePeriod": "通史（远古至近现代）", "specialty": "中国最大的综合性博物馆，建筑面积近20万平方米。\"古代中国\"基本陈列是了解中国通史的最佳单一展览，从远古到明清一气呵成。", "treasures": ["1. 后母戊鼎（商）— 世界最重青铜器", "832.84公斤"], "halls": ["古代中国\"常设展（通史主线）", "复兴之路\"（近现代史）", "青铜器展厅"], "dynastyCoverage": "全覆盖，从远古到现代", "timeline": "如果只能选一个博物馆了解中国历史全貌，就是这里。\"古代中国\"展用文物串起从170万年前到清末的完整叙事。", "artifacts": [{"name": "后母戊鼎", "period": "商后期", "description": "重832.84kg，商王为祭祀母亲\"戊\"而铸，体现商代国力与青铜铸造技术"}, {"name": "四羊方尊", "period": "商晚期", "description": "四角各铸一卷角羊头，湖南宁乡出土，商代南方青铜文明证据"}, {"name": "大盂鼎", "period": "西周康王", "description": "铭文详述分封制度，是研究西周政治的一手史料"}, {"name": "人面鱼纹彩陶盆", "period": "约6000年前", "description": "仰韶文化代表，可能与原始巫术或图腾崇拜有关"}, {"name": "击鼓说唱俑", "period": "东汉", "description": "四川出土，表现民间艺人表演\"说唱\"的瞬间"}, {"name": "虢季子白盘", "period": "西周", "description": "铭文111字，记载周宣王时的战争"}, {"name": "红山文化玉龙", "period": "约5000年前", "description": "\"中华第一龙\""}, {"name": "彩绘鹳鱼石斧图缸", "period": "新石器·仰韶", "description": "中国最早的彩绘画之一"}], "dynastyConnections": [], "sources": ["中国国家博物馆官网: https://www.chnmuseum.cn/", "后母戊鼎重832.84kg（国博官网核实）"]}, {"id": "haihunhou", "name": "南昌汉代海昏侯国遗址博物馆", "lat": 28.875, "lng": 115.73, "location": "江西省南昌市新建区大塘坪乡", "level": "国家一级博物馆", "corePeriod": "西汉（公元前1世纪）", "specialty": "中国迄今发现的保存最好、结构最完整、功能布局最清晰的西汉列侯墓园，也是21世纪中国最重要的考古发现之一。墓主刘贺身份极其传奇——历经王、帝、民、侯四种身份转换。出土文物逾万件，含大量黄金和竹简。", "treasures": ["\"刘贺\"玉印", "马蹄金与麟趾金", "当卢（青铜马饰）", "孔子屏风", "竹简《论语》"], "halls": ["金色海昏\"基本陈列", "刘贺主墓展厅", "车马坑展示", "遗址现场展示区"], "dynastyCoverage": "西汉（核心）", "timeline": "刘贺（前92-前59年），汉武帝之孙，昌邑王刘髆之子。前74年被霍光拥立为帝，在位仅27天即被废黜，后贬为庶人，前63年封海昏侯，前59年去世。其一生折射了西汉中晚期宫廷政治的激烈博弈", "artifacts": [{"name": "\"刘贺\"玉印", "description": "西汉（前1世纪）。白玉质，龟钮，阴刻\"刘贺\"二字，是确认墓主身份的铁证。印文端庄，是西汉私印中的精品。"}, {"name": "马蹄金与麟趾金", "description": "西汉（前1世纪）。共出土马蹄金48枚、麟趾金25枚、金饼385枚、金板20块，总重超120公斤。马蹄金和麟趾金是汉武帝为庆祝天降祥瑞而特铸，上嵌琉璃，是目前考古发现数量最多的汉代黄金。"}, {"name": "孔子屏风（衣镜架）", "description": "西汉。漆木屏风上绘有孔子及弟子画像并附传记文字，是目前已知最早的孔子画像实物，对研究西汉儒学传播和孔子形象演变具有极高价值。"}, {"name": "竹简（约五千枚）", "description": "西汉。包含《论语》《易经》《礼记》等儒家经典以及医书、方术类文献。其中的《论语》版本可能包含失传的《齐论语》内容，是学术史上的重大发现。"}, {"name": "青铜当卢（马面饰）", "description": "西汉。鎏金青铜马面装饰，工艺极精，纹饰包含凤鸟和云气纹，反映了西汉贵族出行的排场。"}, {"name": "青铜雁鱼灯", "description": "西汉。造型为大雁回首衔鱼，鱼腹为灯罩，烟气通过雁颈导入雁腹水中过滤，设计精巧环保，是汉代灯具设计的杰作。"}, {"name": "编钟编磬", "description": "西汉。完整的礼乐器组合，反映了列侯级别的丧葬礼仪规格。"}, {"name": "五铢钱（约200万枚，重10余吨）", "description": "西汉。数量惊人，按串整齐码放，直观展现了西汉列侯的财富规模。"}], "dynastyConnections": [{"dynasty": "西汉", "description": "海昏侯墓是理解西汉中晚期政治、经济、文化的一把钥匙。    - **政治**：刘贺27天皇帝生涯折射了霍光专权时代的宫廷斗争。他被废黜的理由是\"荒淫无道\"，但出土的大量儒经竹简表明他可能是一个受过良好教育的贵族，历史叙事可能有偏。    - **经济**：出土的巨量黄金和铜钱直观展示了西汉诸侯的经济实力。马蹄金上\"上\"\"中\"\"下\"的字样可能与酎金制度有关（诸侯定期向朝廷贡金的制度）。    - **文化**：孔子屏风和儒经竹简证明西汉贵族已深受儒学影响。《论语》竹简可能改写对汉代经学传承的认知。    - **丧葬**：墓园布局完整，包含主墓、夫人墓、祔葬墓、车马坑等，是研究西汉列侯丧葬制度的标准样本。"}], "sources": ["海昏侯国遗址博物馆官网: https://www.haihunhou.cn/"]}, {"id": "hainan", "name": "海南省博物馆", "lat": 19.989, "lng": 110.369, "location": "海南省海口市琼山区国兴大道68号", "level": "国家一级博物馆", "corePeriod": "宋元明（南海水下考古）", "specialty": "以南海水下考古出水文物为最大亮点，\"华光礁I号\"沉船特展曾获全国博物馆十大陈列展览精品奖。同时展现海南黎族、苗族独特民族文化。", "treasures": ["华光礁I号沉船出水青白瓷", "越王亓北古剑（战国）", "黎族龙被（明清）", "宋代青白釉花口碟", "南海出水铜钱串"], "halls": ["南溟奇甸\"（海南历史陈列", "含华光礁I号出水文物展区）", "海南少数民族陈列"], "dynastyCoverage": "先秦（越王剑）→ 汉（珠崖郡）→ 唐宋（海上丝路/华光礁沉船）→ 明清（黎族文化）", "timeline": "汉武帝设珠崖郡（前110年）标志海南纳入中原版图；宋代华光礁I号沉船是南海航线繁荣的直接证据", "artifacts": [{"name": "华光礁I号出水青白瓷", "period": "南宋", "description": "2007年发掘出水，大批景德镇青白瓷和福建窑系产品，是古代海上丝绸之路南海航线的直接物证"}, {"name": "越王亓北古剑", "period": "战国", "description": "极为罕见的越王剑，剑身铭文\"越王亓北自作用剑\"，保存完好，先秦铸剑技术杰作"}, {"name": "黎族龙被", "period": "明清", "description": "黎族织锦最高等级作品，以棉线织成，图案精美色彩绚丽，黎族纺织技艺巅峰"}, {"name": "宋代青白釉花口碟", "period": "南宋", "description": "华光礁I号出水，釉色温润，反映宋代瓷器外销的高超水准"}, {"name": "南海出水铜钱串", "period": "宋代", "description": "大量宋代铜钱从海底打捞而出，反映宋代海上贸易以铜钱为重要交易媒介"}, {"name": "唐三彩陶马", "period": "唐代", "description": "海南出土，说明唐代海南与中原文化交流密切"}], "dynastyConnections": [], "sources": ["海南省博物馆官网: https://www.hainanmuseum.org/", "\"大海的方向——华光礁I号沉船特展\": https://www.hainanmuseum.org/hnbwgcms/info/621"]}, {"id": "hebei", "name": "河北博物院", "lat": 38.0505, "lng": 114.5146, "location": "河北省石家庄市长安区东大街4号", "level": "国家一级博物馆", "corePeriod": "西汉（满城汉墓）、战国（中山国）", "specialty": "以满城汉墓出土文物为镇馆核心，金缕玉衣和长信宫灯是中国考古标志性文物。中山靖王刘胜墓出土品之精美，是西汉王侯生活的最佳实物见证。", "treasures": ["西汉金缕玉衣", "长信宫灯", "错金博山炉", "透雕双龙高钮谷纹白玉壁", "铜羊尊灯"], "halls": ["大汉绝唱——满城汉墓", "战国雄风——古中山国", "北朝壁画"], "dynastyCoverage": "战国、西汉、北朝、唐、宋、元", "timeline": "战国中山国（前414-前296年）→ 西汉中山国（刘胜，前154年封王）→ 北朝邺城文化", "artifacts": [{"name": "西汉金缕玉衣", "period": "西汉，约前113年", "description": "—中山靖王刘胜的殓服，由2498片岫岩玉用金丝编缀而成，是中国出土年代最早、最完整的金缕玉衣，直接印证了文献记载的汉代丧葬制度。"}, {"name": "长信宫灯", "period": "西汉，约前172年前后", "description": "—窦绾墓出土，宫女跪坐执灯造型，灯罩可调节光照方向，烟气通过袖管导入体内净化。兼具实用性与艺术性，被誉为\"中华第一灯\"。"}, {"name": "错金博山炉", "period": "西汉", "description": "—刘胜墓出土，炉身以金丝错出山峦、云气、人物、走兽，山间有猎人与虎豹，炉盖镂空出烟，点燃香料后云雾缭绕如仙山。是汉代错金工艺的巅峰之作。"}, {"name": "透雕双龙高钮谷纹白玉壁", "period": "西汉", "description": "—刘胜墓出土，玉质温润，双龙造型生动，谷纹规整。是汉代玉壁中的极品，体现了西汉王侯用玉的最高规格。"}, {"name": "错金银四龙四凤铜方案座", "period": "战国", "description": "—中山国王墓出土，四条龙蜷曲成案座支撑，四只凤鸟展翅，工艺极其复杂。是战国中山国高超铸造技术的代表，也是中山国非华夏族群（白狄鲜虞）艺术风格的体现。"}, {"name": "中山王铁足铜鼎", "period": "战国", "description": "—铭文469字，是目前所见战国铭文最长的铜器之一，记载了中山国的政治事件，是研究中山国历史的第一手文献。"}, {"name": "十五连盏铜灯", "period": "战国", "description": "—中山国出土，树形灯架上分布十五个灯盏，有猴戏、鸟栖等装饰，是战国青铜灯具中造型最复杂的一件。"}, {"name": "北齐高洋墓壁画", "period": "北齐，约550-559年", "description": "—磁县湾漳出土，绘有仪仗出行图，人物众多、色彩鲜艳，是北朝壁画艺术的重要遗存。"}], "dynastyConnections": [], "sources": ["河北博物院官网: https://www.hebeimuseum.org.cn/"]}, {"id": "heilongjiang", "name": "黑龙江省博物馆", "lat": 45.7656, "lng": 126.628, "location": "黑龙江省哈尔滨市南岗区红军街64号", "level": "国家一级博物馆", "corePeriod": "渤海国（698-926年）、金代（1115-1234年）、自然历史", "specialty": "是中国最早的博物馆之一，馆舍本身即为全国重点文物保护单位（新艺术运动风格建筑）。金代文物和渤海国遗物是核心考古收藏，同时以恐龙化石（满洲龙）和自然标本著称，兼具自然与人文。", "treasures": ["金代铜坐龙", "渤海石灯幢", "满洲龙化石", "铜镜系列", "阿城金代铜人"], "halls": ["黑龙江历史文物陈列", "自然陈列", "哈尔滨城史"], "dynastyCoverage": "新石器时代、渤海国、辽、金、元、清（黑龙江流域开发）", "timeline": "靺鞨文化 → 渤海国（698-926年）→ 女真崛起·金建国（1115年）→ 金上京（阿城）→ 元代东北 → 清代流放地 → 中东铁路时代", "artifacts": [{"name": "金代铜坐龙", "period": "金代，12世纪", "description": "—阿城金上京遗址出土，龙呈蹲坐状，集龙、麒麟、狮、犬等形象于一身，造型别致。已成为哈尔滨市的城市标志，体现了金代女真民族独特的艺术审美。"}, {"name": "满洲龙化石", "period": "白垩纪晚期，约6600万年前", "description": "—嘉荫县出土，1902年由俄国古生物学家发现，是中国最早发现的恐龙化石。嘉荫因此被称为\"恐龙之乡\"。"}, {"name": "渤海石灯幢", "period": "渤海国，8-9世纪", "description": "—宁安渤海上京遗址出土，石质灯塔造型，雕刻精美，体现了渤海国佛教建筑艺术。渤海上京龙泉府仿唐长安布局，是当时东北亚最大的城市之一。"}, {"name": "金代\"上京路\"铜印", "period": "金代", "description": "—官方印信，上京路为金代行政区划（治所在今阿城），此印是金代地方行政制度的实物证据。"}, {"name": "金代铜人", "period": "金代", "description": "—阿城出土，人物造型具有女真族特征，面部表情生动。是研究金代女真人形象和服饰的重要资料。"}, {"name": "清代\"龙兴之地\"碑刻", "period": "清代", "description": "—反映了清朝对东北地区\"发祥地\"的特殊管理，包括封禁政策等。"}, {"name": "中东铁路历史文物", "period": "清末民初", "description": "—哈尔滨因中东铁路（1898年始建）而兴起，馆藏大量中东铁路时期的文物，展示了这座城市独特的近代史。"}], "dynastyConnections": [], "sources": ["黑龙江省博物馆官网: https://www.hljmuseum.com/"]}, {"id": "henan", "name": "河南博物院", "lat": 34.7879, "lng": 113.672, "location": "河南省郑州市金水区农业路8号", "level": "国家一级博物馆", "corePeriod": "夏商周(中原文明核心区)", "specialty": "地处中原腹地,夏商周三代文物收藏无可比拟。\"泱泱华夏 择中建都\"基本陈列以\"中原\"为视角重述中国文明史。贾湖骨笛改写了世界音乐史。", "treasures": ["1. 贾湖骨笛(新石器,约前7000年)- 世界上最早的可吹奏乐器"], "halls": ["泱泱华夏 择中建都\"(通史主线)", "夏商周展厅(精华)"], "dynastyCoverage": "新石器(裴李岗、仰韶)、夏、商、西周、春秋为核心,唐宋亦有亮点", "timeline": "河南是中国文明的摇篮--夏都二里头、商都郑州和安阳、西周东都洛邑、东周都洛阳,再到北宋都开封。中国八大古都河南占四个。河南博物院是理解中原文明核心地位的最佳场所。", "artifacts": [{"name": "贾湖骨笛", "period": "约前7000年", "description": "用鹤骨制成,7孔,可吹奏七声音阶。将人类音乐史推前了数千年"}, {"name": "杜岭方鼎", "period": "商早期,约前1400年", "description": "郑州出土,高87cm,是商代早期都城在郑州的证据"}, {"name": "妇好鸮尊", "period": "商晚期", "description": "鸮(猫头鹰)形青铜酒器,妇好是商王武丁之妻,中国最早的女将军"}, {"name": "莲鹤方壶", "period": "春秋,约前6世纪", "description": "器盖上莲瓣托起展翅仙鹤,被郭沫若称为\"时代精神的象征\""}, {"name": "武则天金简", "period": "唐·700年", "description": "武则天在嵩山封禅时投放,祈求除罪消灾"}, {"name": "汝窑天青釉瓷器", "period": "北宋", "description": "存世极少的汝窑精品"}, {"name": "四神云气图", "period": "西汉", "description": "梁国王陵壁画,描绘青龙白虎朱雀玄武"}], "dynastyConnections": [{"dynasty": "新石器", "description": "贾湖文化(骨笛、龟甲符号)可能是文字和音乐的源头"}, {"dynasty": "夏", "description": "二里头遗址的证据使\"夏\"从传说走向考古"}, {"dynasty": "商", "description": "郑州商城和安阳殷墟分别代表商代早期和晚期,甲骨文在此诞生"}, {"dynasty": "西周/春秋", "description": "洛邑作为东都,莲鹤方壶标志着从凝重到活泼的艺术转型  河南博物院是理解“中原为什么是中心”这个问题的最佳答案。"}], "sources": ["河南博物院官网: https://www.chnmus.net/", "贾湖骨笛约前7000年（多源核实）"]}, {"id": "hubei", "name": "湖北省博物馆", "lat": 30.5674, "lng": 114.373, "location": "湖北省武汉市武昌区东湖路160号", "level": "国家一级博物馆", "corePeriod": "先秦（楚文化）、春秋战国", "specialty": "曾侯乙墓出土文物是镇馆之基，尤其是编钟——改写了世界音乐史。楚文化收藏全国最强，漆器、丝绣、青铜器系统完整。", "treasures": ["1. 曾侯乙编钟（战国早期）— 65件青铜编钟", "可演奏完整音阶", "2400年前的乐器奇迹"], "halls": ["曾侯乙展厅（核心）", "楚文化展", "编钟演奏（每日定时）", "梁庄王墓展"], "dynastyCoverage": "春秋战国（楚国、曾国）为核心，秦（云梦秦简）、元明亦有精品", "timeline": "曾侯乙墓（前433年）是战国早期最重要的考古发现之一。曾国（随国）地处楚国北界，墓葬反映了楚文化圈的辐射范围和先秦礼乐制度的实物面貌。", "artifacts": [{"name": "曾侯乙编钟", "period": "前433年", "description": "总重2567kg，音域跨五个半八度，可演奏中外乐曲。铭文2828字，记载了先秦乐律学体系"}, {"name": "越王勾践剑", "period": "春秋，约前5世纪", "description": "剑长55.7cm，锡青铜铸造，剑身菱形暗纹，千年不锈"}, {"name": "曾侯乙尊盘", "period": "前433年", "description": "尊与盘套合，镂空附饰用失蜡法铸造，铜器铸造工艺的极限"}, {"name": "云梦睡虎地秦简", "period": "秦，前217年入葬", "description": "1155枚竹简，包含秦律、日书等，是了解秦代法律和社会的第一手资料"}, {"name": "曾侯乙外棺", "period": "战国", "description": "彩绘漆棺，纹饰为神话人物和窗格纹"}, {"name": "虎座鸟架鼓", "period": "战国·楚", "description": "楚文化标志性器物造型"}, {"name": "元青花四爱图梅瓶", "period": "元", "description": "画面描绘王羲之爱兰、陶渊明爱菊、林和靖爱梅鹤、周敦颐爱莲"}], "dynastyConnections": [], "sources": ["湖北省博物馆官网: https://www.hbww.org/", "曾侯乙编钟总重2567kg（多源核实）"]}, {"id": "hunan", "name": "湖南省博物馆（湖南博物院）", "lat": 28.2126, "lng": 112.9834, "location": "湖南省长沙市开福区东风路50号", "level": "国家一级博物馆", "corePeriod": "西汉（马王堆）、商周青铜", "specialty": "马王堆汉墓出土文物是世界级的考古发现——保存完好的2000年女尸、精美绝伦的T形帛画、最早的帛书。2017年重新开馆后展陈设计一流。", "treasures": ["1. 辛追夫人遗体（西汉）— 保存2100多年的湿尸", "世界考古奇迹"], "halls": ["长沙马王堆汉墓陈列\"（核心展）", "湖南人——三湘历史文化陈列"], "dynastyCoverage": "西汉（马王堆）为核心，商周青铜器（皿方罍等），近现代湖湘文化", "timeline": "马王堆汉墓是了解西汉初年贵族生活的最完整窗口——墓主辛追是长沙国丞相利苍之妻。出土文物覆盖了饮食、服饰、医学、哲学、天文等方方面面。", "artifacts": [{"name": "辛追夫人遗体", "period": "西汉，约前163年下葬", "description": "皮肤仍有弹性，关节可活动，是世界上保存最好的古代湿尸"}, {"name": "T形帛画", "period": "西汉", "description": "覆盖在棺上的招魂帛画，分天界（日月升龙）、人间（辛追宴饮）、地下（巨人托举大地）三层"}, {"name": "素纱襌衣", "period": "西汉", "description": "长128cm，仅重49g，代表汉代丝织技术巅峰"}, {"name": "马王堆帛书", "period": "西汉", "description": "12万字，包含《老子》乙本（目前最早版本）、《五星占》（最早天文著作之一）"}, {"name": "皿方罍", "period": "商晚期", "description": "器盖1919年出土后与器身分离近百年，2014年从纽约拍卖市场回归"}, {"name": "漆棺", "period": "西汉", "description": "四层套棺，漆画精美，外黑内朱"}, {"name": "导引图", "period": "西汉", "description": "最早的健身运动图谱"}], "dynastyConnections": [], "sources": ["马王堆汉墓考古发掘报告", "湖南博物院官网: https://www.hnmuseum.com/"]}, {"id": "jiangsu", "name": "南京六朝博物馆", "lat": 32.0472, "lng": 118.796, "location": "江苏省南京市玄武区长江路302号（总统府旁）", "level": "国家一级博物馆", "corePeriod": "六朝（222-589年：东吴、东晋、宋、齐、梁、陈）", "specialty": "中国唯一的六朝专题博物馆，建于六朝建康城遗址之上，由贝聿铭弟子齐欣设计。展示了六朝近四百年间南京作为都城的辉煌，是理解魏晋南北朝——中国历史上最富文化创造力的分裂时期——的核心场馆。", "treasures": ["六朝青瓷莲花尊", "人面纹瓦当", "青瓷釉下彩羽人纹盘口壶", "\"竹林七贤与荣启期\"砖印壁画（复制品", "原件藏南京博物院）", "建康城遗址夯土城墙"], "halls": ["六朝帝都\"基本陈列", "六朝风采（人物与社会）", "建康城遗址展示区", "六朝青瓷专题"], "dynastyCoverage": "东吴（222-280）→ 东晋（317-420）→ 南朝宋（420-479）→ 南朝齐（479-502）→ 南朝梁（502-557）→ 南朝陈（557-589）", "timeline": "222年孙权建都建业（南京）→ 317年东晋衣冠南渡 → 420-589年南朝宋齐梁陈更替 → 589年隋灭陈统一。六朝近四百年间，建康（南京）是中国南方的政治、经济、文化中心，也是当时世界上最大的城市之一", "artifacts": [{"name": "六朝青瓷莲花尊", "description": "南朝（6世纪）。高大端庄，通体饰以莲花瓣纹，是六朝青瓷中的巅峰之作。莲花纹饰反映了佛教在六朝的深刻影响。"}, {"name": "人面纹瓦当", "description": "六朝。建康城遗址出土，瓦当上塑有人面形象，表情生动，是六朝建筑装饰的特色，在中国古代瓦当中独具一格。"}, {"name": "青瓷釉下彩羽人纹盘口壶", "description": "三国东吴（3世纪）。在青瓷釉下绘以褐彩羽人和佛像纹饰，是中国最早的釉下彩瓷器之一，在陶瓷史上具有重要地位。"}, {"name": "建康城遗址夯土城墙", "description": "六朝。博物馆地下层展示了六朝建康城的夯土城墙遗址，观众可以直接看到1700年前的都城基础，是博物馆\"建在遗址上\"的直观体现。"}, {"name": "\"竹林七贤与荣启期\"模印砖画", "description": "南朝（约5世纪）。南京及周边六朝墓葬中多次出土，以模印砖拼成大型壁画，描绘嵇康、阮籍等竹林七贤的形象。原件藏南京博物院，六朝博物馆有高精度复制品。这是理解魏晋名士风度的标志性图像。"}, {"name": "六朝铜镜", "description": "六朝。有神兽镜、变形四叶镜等类型，纹饰融合汉代传统和南方新风格，反映了六朝工艺美术的特点。"}, {"name": "六朝墓志与碑刻拓片", "description": "六朝。南京出土的六朝墓志书法兼具隶书遗韵和楷书新意，是中国书法从隶到楷转变的关键时期的实物。"}], "dynastyConnections": [{"dynasty": "东吴（222-280年）", "description": "孙权以建业（南京）为都，开启了南京作为都城的历史。东吴开发江南，发展海上交通，奠定了南方经济基础。青瓷釉下彩等工艺创新也始于此时。"}, {"dynasty": "东晋（317-420年）", "description": "永嘉之乱后，西晋灭亡，司马睿在建康重建朝廷，史称\"衣冠南渡\"。大量北方士族南迁，带来先进的文化和技术，催生了中国文化史上最富创造力的时期之一。王羲之的书法、顾恺之的绘画、陶渊明的诗歌都诞生于此时。"}, {"dynasty": "南朝（420-589年）", "description": "宋、齐、梁、陈四朝更替频繁但文化延续。南朝建康城人口达百万，是当时世界最大的城市。文学理论（刘勰《文心雕龙》、钟嵘《诗品》）、史学（范晔《后汉书》、沈约《宋书》）、佛教（梁武帝崇佛、达摩东渡）在此时达到新高度。\"南朝四百八十寺，多少楼台烟雨中\"正是这一时期的写照。"}, {"dynasty": "文化遗产", "description": "六朝是中国文化从古典向中世纪转变的关键时期。文学自觉、书法成为独立艺术、山水画兴起、佛教中国化、士族门阀制度确立——这些深刻影响后世的文化现象都始于或成熟于六朝。南京六朝博物馆是理解这一伟大转型的最佳入口。"}], "sources": ["南京六朝博物馆"]}, {"id": "jiangxi", "name": "江西省博物馆", "lat": 28.682, "lng": 115.8935, "location": "江西省南昌市赣江新区/东湖区", "level": "国家一级博物馆", "corePeriod": "西汉（海昏侯墓）、宋元明（景德镇瓷器）、商代（新干大洋洲）", "specialty": "以海昏侯墓出土文物和江西陶瓷为两大核心，同时拥有新干大洋洲商代青铜器群。2020年新馆开放，展陈全面升级，是理解赣鄱文明和中国瓷器发展的重要窗口。", "treasures": ["商代伏鸟双尾青铜虎", "海昏侯刘贺玉印", "景德镇元青花瓷器", "商代双面神人青铜头像", "西汉马蹄金"], "halls": ["惊世大发现——南昌汉代海昏侯国考古成果展", "赣鄱文明\"通史展", "陶瓷文化展"], "dynastyCoverage": "商代（新干大洋洲）→ 西汉（海昏侯）→ 东晋南朝 → 唐宋（洪州窑、景德镇）→ 元明清（景德镇御窑）", "timeline": "新干大洋洲（约前13世纪）揭示了南方商代青铜文明独立于中原的发展路径；海昏侯墓（前59年下葬）是西汉列侯墓中保存最完整的；景德镇自宋代起成为\"瓷都\"，元明清时期为官窑所在", "artifacts": [{"name": "商代伏鸟双尾青铜虎", "description": "商代晚期（约前13世纪）。新干大洋洲出土，造型独特，虎背伏鸟，双尾上翘，是南方青铜文明区别于中原风格的标志性器物。"}, {"name": "商代双面神人青铜头像", "description": "商代晚期。新干大洋洲出土，一器两面，表情各异，反映了赣江流域独特的宗教信仰，常与三星堆青铜面具比较。"}, {"name": "海昏侯刘贺玉印\"刘贺\"", "description": "西汉（前1世纪）。直接确认墓主身份的关键证据，也是研究西汉印章制度的重要实物。"}, {"name": "西汉马蹄金、麟趾金", "description": "西汉（前1世纪）。海昏侯墓出土大量金器，马蹄金和麟趾金是武帝时期为庆祝祥瑞而铸的纪念金，数量之多为考古之最。"}, {"name": "海昏侯墓竹简、木牍", "description": "西汉。出土约五千枚竹简，包含《论语》《易经》等儒家经典，对研究西汉经学和思想史具有重大价值。"}, {"name": "元青花釉里红楼阁式谷仓", "description": "元代（14世纪）。将青花与釉里红两种技法结合，造型复杂，是元代景德镇瓷器的巅峰之作。"}, {"name": "商代青铜大铙", "description": "商代晚期。新干出土的大型打击乐器，体量在同期器物中罕见，反映了南方商代礼乐文化。"}], "dynastyConnections": [{"dynasty": "商代", "description": "1989年新干大洋洲发现的商代大墓出土青铜器、玉器近2000件，揭示了赣江流域存在一个与中原殷商并行的高度发达的青铜文明，改写了\"商代文明仅限中原\"的认知。"}, {"dynasty": "西汉", "description": "海昏侯刘贺是汉武帝之孙，当过27天皇帝即被废黜，后封海昏侯。其墓2011年发现，出土金器、竹简、车马器等一万余件，是21世纪中国最重要的考古发现之一。"}, {"dynasty": "宋元明清（瓷器）", "description": "江西是中国瓷器的核心产区。洪州窑（南朝-唐）、吉州窑（宋）为早期名窑；景德镇自宋真宗景德年间（1004-1007年）得名，元代创烧青花瓷，明清时期为御窑所在地，是世界制瓷业的中心。"}], "sources": ["江西省博物馆官网: https://www.jxmuseum.cn/"]}, {"id": "jilin", "name": "吉林省博物院", "lat": 43.8241, "lng": 125.3506, "location": "吉林省长春市南关区永顺路1666号", "level": "国家一级博物馆", "corePeriod": "高句丽（前37年-668年）、渤海国（698-926年）、近现代书画", "specialty": "高句丽和渤海国文物收藏是最大特色，吉林省集安市是高句丽早期都城所在。近现代书画收藏也较丰富，藏有张大千、齐白石等名家作品。", "treasures": ["高句丽好太王碑拓本", "渤海三彩", "契丹金银器", "《洞庭春色赋·中山松醪赋》（苏轼）"], "halls": ["白山松水的记忆——吉林省历史陈列", "破晓——吉林人民革命斗争史"], "dynastyCoverage": "新石器时代、高句丽、渤海国、辽、金、清（东北边疆）", "timeline": "高句丽建国（前37年）→ 丸都城/国内城（集安，3年-427年）→ 渤海国（698-926年）→ 辽金东北经略 → 清代柳条边外", "artifacts": [{"name": "好太王碑拓本", "period": "高句丽，414年", "description": "—原碑在吉林省集安市，高6.39米，四面刻字1775字，记载了高句丽好太王（广开土王，391-412年在位）的功绩和征战事迹。是研究高句丽历史和东北亚古代关系的最重要文字资料。碑文涉及高句丽与百济、新罗、倭的战争。"}, {"name": "渤海三彩釉陶", "period": "渤海国，8-9世纪", "description": "—仿唐三彩烧制，但釉色和造型有渤海地方特点。渤海国被称为\"海东盛国\"，其文化深受唐文化影响，三彩器是这种文化交流的直接证据。"}, {"name": "苏轼《洞庭春色赋·中山松醪赋》", "period": "北宋，1091年", "description": "—苏轼晚年手书两赋合卷，笔力遒劲，是苏轼存世书法中的重要作品。此件原为清宫旧藏，后流散至东北。"}, {"name": "高句丽金铜佛造像", "period": "高句丽，约5-6世纪", "description": "—集安出土，体现了佛教在高句丽传播的实况。高句丽佛教艺术受中原北朝影响，同时向朝鲜半岛和日本传播。"}, {"name": "青花云龙纹高足碗", "period": "元代", "description": "—元代青花瓷精品，体现了元代东北地区与中原的密切联系。"}, {"name": "辽代鎏金铜观音像", "period": "辽代", "description": "—造型端庄，工艺精湛，反映了辽代佛教在东北地区的兴盛。"}], "dynastyConnections": [], "sources": ["吉林省博物院官网: https://www.jlmuseum.org/"]}, {"id": "jingdezhen", "name": "景德镇中国陶瓷博物馆", "lat": 29.2932, "lng": 117.2068, "location": "江西省景德镇市昌江区", "level": "国家一级博物馆", "corePeriod": "宋元明清（瓷器通史，尤以明清御窑为核心）", "specialty": "全球唯一系统展示景德镇千年制瓷史的专题博物馆，藏品从五代至现代，涵盖官窑民窑，品类齐全。是理解中国瓷器如何从一种材料变成一种世界性文化的最佳场馆。", "treasures": ["元青花缠枝牡丹纹梅瓶", "明永乐甜白釉暗刻龙纹梅瓶", "清雍正粉彩蝠桃纹橄榄瓶", "宋影青瓷注壶注碗", "明成化斗彩瓷"], "halls": ["瓷业千年\"通史陈列", "历代名窑展", "御窑精品展", "现当代陶瓷艺术展"], "dynastyCoverage": "五代（南方白瓷兴起）→ 宋代（影青瓷/青白瓷）→ 元代（青花瓷诞生）→ 明代（御窑厂建立、五彩斗彩）→ 清代（粉彩珐琅彩、瓷器巅峰）", "timeline": "宋真宗景德年间（1004-1007）赐名景德镇；元代创烧成熟青花瓷，改变世界陶瓷格局；明洪武二年（1369）设御器厂，此后五百年景德镇为皇家御窑所在；清康雍乾三朝为制瓷技术巅峰", "artifacts": [{"name": "元青花缠枝牡丹纹梅瓶", "description": "元代（14世纪）。青花瓷是景德镇对世界文明最重要的贡献，元青花存世极少，此瓶造型饱满，青花发色浓艳，纹饰层次丰富。"}, {"name": "明永乐甜白釉暗刻龙纹梅瓶", "description": "明永乐（15世纪初）。甜白釉是永乐朝的独创，釉色温润如凝脂，暗刻龙纹若隐若现，代表了明初御窑的最高水平。"}, {"name": "清雍正粉彩蝠桃纹橄榄瓶", "description": "清雍正（18世纪初）。粉彩在雍正朝达到巅峰，此瓶色彩雅致，绘画精细，蝠（福）桃（寿）寓意吉祥。"}, {"name": "宋影青（青白瓷）注壶注碗", "description": "宋代（11-12世纪）。青白瓷是景德镇宋代的代表品种，釉色介于青白之间，如冰似玉，此套注壶注碗造型典雅，是宋人饮酒器具的代表。"}, {"name": "明成化斗彩鸡缸杯", "description": "明成化（15世纪晚期）。斗彩技法将釉下青花与釉上彩结合，鸡缸杯小巧精致，自古被视为瓷中极品，明代即已价值连城。"}, {"name": "清乾隆各种釉彩大瓶（瓷母）", "description": "清乾隆（18世纪中期）。集十余种釉彩于一身，是清代制瓷技术的\"炫技\"之作，虽有争议但确为技术巅峰。"}, {"name": "五代白瓷", "description": "五代（10世纪）。景德镇制瓷的起点，南方白瓷的代表，为后来青白瓷的发展奠定基础。"}, {"name": "明宣德青花瓷", "description": "明宣德（15世纪）。宣德青花被公认为明代青花的巅峰，使用进口苏麻离青料，发色浓重有铁锈斑，气韵生动。"}], "dynastyConnections": [{"dynasty": "宋代", "description": "景德镇因宋真宗赐年号为名，影青（青白瓷）是宋代景德镇的标志产品，质地细腻、釉色淡雅，深受文人喜爱。此时景德镇已成为全国重要窑场之一。"}, {"dynasty": "元代", "description": "蒙古帝国的全球贸易网络带来了波斯钴蓝料，催生了成熟的青花瓷。青花瓷结合了中国的瓷器技术与伊斯兰的审美趣味，迅速成为全球最受欢迎的商品之一，彻底改变了世界陶瓷贸易格局。"}, {"dynasty": "明清（御窑）", "description": "明洪武二年设御器厂（后称御窑厂），景德镇成为皇家瓷器的唯一产地。永乐甜白、宣德青花、成化斗彩、嘉万五彩，至清代康熙五彩、雍正粉彩、乾隆各色釉彩，技术不断攀升。御窑制度持续近六百年，是人类制瓷史的奇迹。"}], "sources": ["景德镇中国陶瓷博物馆官网: https://www.jdztcbwg.com/"]}, {"id": "jinsha", "name": "金沙遗址博物馆", "lat": 30.6774, "lng": 104.013, "location": "四川省成都市青羊区金沙遗址路2号", "level": "国家一级博物馆", "corePeriod": "古蜀文明后期（商代晚期至春秋早期，约前1200-前650年）", "specialty": "2001年在成都市区施工时偶然发现，是继三星堆之后古蜀文明最重要的考古发现。太阳神鸟金饰已被确定为中国文化遗产标志。遗址出土金器、铜器、玉器、象牙等珍贵文物6000余件，大量象牙的出土尤为引人注目。博物馆由遗迹馆（保护原始发掘现场）和陈列馆两部分组成。", "treasures": ["1. 太阳神鸟金饰（商周）— 中国文化遗产标志", "外径12.5cm", "厚0.02cm"], "halls": ["遗迹馆（原始发掘现场保护展示）", "陈列馆\"走进金沙\"（五个展厅：远古家园→王都剪影→天地不绝→千载遗珍→解读金沙）"], "dynastyCoverage": "商代晚期 → 西周 → 春秋早期", "timeline": "金沙遗址（约前1200-前650年）是三星堆文明衰落后古蜀政治中心南迁至成都的证据。三星堆→金沙构成了古蜀文明的完整序列。金沙的衰落与开明王朝的兴起（之后秦灭蜀）相衔接。", "artifacts": [{"name": "太阳神鸟金饰", "period": "商周，约前1200-前900年", "description": "外径12.5cm，内径5.29cm，厚仅0.02cm，重20g。用自然砂金加工而成，含金量94.2%。图案为四只逆时针飞行的神鸟围绕十二道旋转的太阳光芒，被认为是古蜀人太阳崇拜的象征。2005年被国家文物局确定为中国文化遗产标志。"}, {"name": "黄金面具", "period": "商周", "description": "金面具宽19.5cm，高11cm，厚约0.04cm，重46g。与三星堆出土的黄金面罩风格一致，证明金沙与三星堆属于同一文化传统。"}, {"name": "十节玉琮", "period": "新石器时代良渚文化风格，出土于金沙商周地层", "description": "这件玉琮的形制和纹饰与浙江良渚文化玉琮高度相似（带有简化人面纹），说明古蜀与远在千里之外的长三角存在文化交流或传承。这是考古学上的重大发现。"}, {"name": "铜立人像", "period": "商周", "description": "小型铜立人，双手持物姿态与三星堆大立人相似，但尺寸更小、风格更简化，展现了古蜀造像传统的演变。"}, {"name": "石虎", "period": "商周", "description": "圆雕石虎，姿态为俯卧状，造型生动，体现古蜀人对虎的崇拜。"}, {"name": "象牙", "period": "商周", "description": "金沙遗址出土了大量象牙（数以吨计），说明商周时期成都平原有大量野生象群，与今天的气候和生态完全不同。"}, {"name": "玉璋群", "period": "商周", "description": "大量玉璋出土，其中\"肩扛象牙人形纹玉璋\"图案描绘了人物肩扛象牙的祭祀场景。"}, {"name": "兽面纹玉钺", "period": "商周", "description": "浮雕兽面纹与商代中原青铜器纹饰相似，是中原文化影响古蜀的证据。"}], "dynastyConnections": [], "sources": ["百度百科·成都金沙遗址博物馆（馆藏玉器详细数据）", "太阳神鸟金饰数据: 国家文物局2005年公布"]}, {"id": "kaifeng", "name": "开封博物馆", "lat": 34.7872, "lng": 114.3076, "location": "河南省开封市鼓楼区", "level": "国家一级博物馆", "corePeriod": "北宋（960-1127年，东京汴梁）", "specialty": "开封（古称汴梁、东京）是北宋都城，当时世界最大、最繁华的城市。开封博物馆以北宋文物为核心，结合战国魏国大梁、唐五代汴州等历史层次，展现这座\"八朝古都\"的文化积淀。因黄河多次泛滥，宋代地层深埋地下数米，考古发掘难度极大，使得每一件出土文物都格外珍贵。", "treasures": ["北宋\"开封府题名记\"碑", "宋代汝窑瓷片", "北宋鎏金铜塔", "石守信墓志", "明代万历青花五彩大罐"], "halls": ["八朝古都——开封古代文明\"通史陈列", "宋代文化专题展", "开封犹太人历史展（特色）", "朱仙镇木版年画展"], "dynastyCoverage": "战国（魏国大梁）→ 唐代（汴州）→ 五代（后梁、后晋、后汉、后周都城）→ 北宋（东京）→ 金代（南京） → 明清", "timeline": "战国魏惠王迁都大梁（前364年）→ 五代后梁定都开封（907年）→ 赵匡胤陈桥兵变建宋（960年）→ 北宋东京极盛期人口过百万 → 靖康之变（1127年）金军破城 → 此后开封不复为大一统王朝首都", "artifacts": [{"name": "北宋\"开封府题名记\"碑", "description": "北宋（960-1127年）。碑上刻有历任开封府知府的姓名和任期，包括包拯、欧阳修、范仲淹等名臣。包拯名下石面凹陷，相传是后人仰慕其清廉正直，不断触摸所致。"}, {"name": "北宋鎏金铜塔", "description": "北宋（11世纪）。塔身鎏金，做工精细，层次分明，是宋代金属工艺和佛教文化的代表。"}, {"name": "石守信墓志", "description": "北宋（979年）。石守信是参与陈桥兵变的功臣之一，也是\"杯酒释兵权\"的当事人。其墓志详细记载了生平，是研究宋初政治的重要实物。"}, {"name": "宋代陶瓷器", "description": "北宋。开封作为都城，汇集了各大窑口的精品瓷器。虽然宋代开封地层深埋，出土品不多，但每一件都具有重要的断代和审美价值。"}, {"name": "繁塔宋代石刻佛像", "description": "北宋（977年）。繁塔是开封现存最古老的建筑，塔壁嵌有大量宋代石刻佛像，风格质朴。"}, {"name": "明代万历青花五彩大罐", "description": "明万历（16世纪末）。体量大，纹饰繁缛，色彩艳丽，是明晚期景德镇五彩瓷的代表作。"}, {"name": "朱仙镇木版年画", "description": "明清。朱仙镇（开封南）是中国木版年画的发源地之一，画风古朴，色彩浓烈，对天津杨柳青等年画产地有重要影响。"}], "dynastyConnections": [{"dynasty": "北宋（960-1127年）", "description": "这是开封历史上最辉煌的时期。北宋东京是当时世界上最大的城市，人口超过百万，商业繁荣，文化昌盛。    - **城市文明**：张择端《清明上河图》（藏故宫博物院）描绘的就是北宋东京的市井生活。东京打破了唐代坊市分离的城市格局，出现了开放式的街市和夜市，是中国城市史上的革命性变化。    - **文化巅峰**：北宋东京是中国古代文化的巅峰时期之一。活字印刷、火药、指南针在此时成熟并传播；宋词达到极盛；宋代五大名窑（汝、官、哥、定、钧）代表了中国陶瓷美学的最高成就。    - **靖康之变**：1127年金军攻破东京，掳走宋徽宗、宋钦宗及宗室后妃数千人北去，北宋灭亡。这是中国历史上最惨痛的事件之一，\"靖康耻\"成为此后南宋乃至后世的集体记忆。"}, {"dynasty": "黄河与开封", "description": "开封的悲剧在于黄河。历史上黄河多次在开封附近决口泛滥，宋代以来的开封城层层叠压地下，形成\"城摞城\"的独特现象。地下6-8米处是宋代地层，这使得考古发掘极为困难，也让每一件出土文物都弥足珍贵。"}], "sources": ["开封博物馆官网: https://www.kfsbwg.com/"]}, {"id": "liangzhu", "name": "良渚博物院", "lat": 30.3966, "lng": 119.993, "location": "浙江省杭州市余杭区良渚街道美丽洲路1号", "level": "国家一级博物馆 / 良渚古城遗址为世界文化遗产(2019年)", "corePeriod": "新石器时代晚期(约前3300-前2300年)", "specialty": "良渚文明是实证中华5000年文明史的圣地。2019年申遗成功,被认定为世界最早的国家形态之一。玉器工艺登峰造极,城市规划令人惊叹(300万平方米古城+大型水利系统)。", "treasures": ["1. 玉琮王(良渚文化)- 最大最重的玉琮,刻有\"神人兽面纹\""], "halls": ["良渚博物院全部展厅 + 良渚古城遗址公园(城墙", "宫殿区", "反山王陵", "莫角山)"], "dynastyCoverage": "新石器时代(良渚文化,前3300-前2300年)", "timeline": "良渚文明(前3300-前2300年)比夏朝早一千年,拥有城市、水利、等级社会、统一信仰符号(神人兽面纹),是判定中国文明起源时间的关键证据。其衰落原因可能是洪水,之后长三角地区文明一度中断。", "artifacts": [{"name": "玉琮王", "period": "约前3000年", "description": "重6.5kg,高8.8cm,刻有完整的\"神人兽面纹\"--头戴羽冠的神人骑在神兽之上,是良渚信仰体系的核心图案"}, {"name": "玉钺王", "period": "约前3000年", "description": "钺是斧形礼器,象征军权。此件两面刻有神人兽面纹,是目前发现的最高等级玉钺"}, {"name": "反山M12玉器群", "period": "约前3000年", "description": "一座墓出土玉器数百件,包括琮、钺、璧、三叉形器等完整组合,墓主可能是良渚\"王\""}, {"name": "玉璧", "period": "良渚", "description": "大量出土,可能是财富或礼仪用途"}, {"name": "玉三叉形器", "period": "良渚", "description": "插在发冠上,是贵族身份标识"}, {"name": "刻符陶罐", "period": "良渚", "description": "陶器上的刻划符号,可能是原始文字的前身"}, {"name": "碳化稻谷", "period": "良渚", "description": "大量水稻遗存,证明良渚是稻作农业高度发达的社会"}], "dynastyConnections": [{"dynasty": "与中原的关系", "description": "良渚的玉琮、玉璧形制后来被夏商周继承(\"以苍璧礼天,以黄琮礼地\"),说明良渚对后世礼制有深远影响"}, {"dynasty": "文明要素", "description": "城市(古城面积290万平方米)、水利系统(11条水坝)、等级分化(王陵与平民墓差距悬殊)、统一信仰(神人兽面纹),符合\"文明\"的判定标准"}, {"dynasty": "衰落之谜", "description": "约前2300年突然衰落,可能与大规模洪水有关。之后长三角进入文化低谷,直到商周时期才重新崛起  良渚是回答“中华文明到底有多久”这个问题的关键节点。"}], "sources": ["良渚博物院官网: https://www.lzmuseum.cn/", "UNESCO世界文化遗产名录（2019年）"]}, {"id": "liaoning", "name": "辽宁省博物馆", "lat": 41.7312, "lng": 123.4689, "location": "辽宁省沈阳市浑南区智慧三街157号", "level": "国家一级博物馆", "corePeriod": "古代书画（唐宋元明清全序列）、辽金时期", "specialty": "古代书画收藏为全国顶级，与故宫博物院、上海博物馆并称\"三大书画收藏重镇\"。大量藏品源自清宫散佚的溥仪出宫文物（\"东北货\"）。辽金文物收藏也极为丰富，是了解契丹-女真文化的最佳去处。", "treasures": ["《簪花仕女图》", "《虢国夫人游春图》", "《万岁通天帖》", "《瑞鹤图》", "鸭形玻璃注"], "halls": ["中国古代书画", "辽河文明", "满族民俗", "古代辽宁"], "dynastyCoverage": "红山文化、战国燕、汉、三燕（前燕/后燕/北燕）、辽、金、元、明、清", "timeline": "红山文化（前4700-前2900年）→ 燕国东拓 → 三燕政权 → 契丹建辽（907/916年）→ 女真建金（1115年）→ 清朝发祥地", "artifacts": [{"name": "《簪花仕女图》", "period": "唐代，传周昉", "description": "—绢本设色，描绘贵族妇女赏花游园的闲适场景，人物丰腴华贵，是唐代仕女画的代表作。此画曾入清宫收藏，后随溥仪流散东北，最终入藏辽博。（近年有学者考证为五代摹本，但不影响其艺术价值。）"}, {"name": "《虢国夫人游春图》", "period": "唐代，传张萱，宋摹本", "description": "—描绘杨贵妃之姐虢国夫人率众骑马出行的场景，不画背景而春意自现，构图精妙。是了解盛唐贵族生活的经典图像。"}, {"name": "《万岁通天帖》", "period": "唐代，697年摹本", "description": "—武则天万岁通天二年，命人摹写王羲之家族书法真迹而成。包含王羲之《姨母帖》、王献之《廿九日帖》等，是现存最接近王氏书法原貌的唐摹本，书法史价值极高。"}, {"name": "《瑞鹤图》", "period": "北宋，赵佶/宋徽宗", "description": "—绢本设色，描绘群鹤翔集于汴京宣德门上空的祥瑞景象。色彩典雅，构图独特，是宋徽宗存世最重要的绘画作品之一。"}, {"name": "鸭形玻璃注", "period": "北燕，约5世纪初", "description": "—朝阳北票冯素弗墓出土，淡绿色玻璃制成的鸭形容器，通体晶莹。经检测为罗马帝国钠钙玻璃，是丝绸之路东端的重要物证，证明了东北地区与西方的早期贸易联系。"}, {"name": "契丹文铜镜", "period": "辽代", "description": "—镜背铸有契丹大字，是研究已基本失传的契丹文字的珍贵实物。辽博收藏的契丹文物在全国最为系统完整。"}, {"name": "金代铜坐龙", "period": "金代", "description": "—阿城（金上京）出土，龙呈蹲坐状，造型独特，与中原传统龙形有明显区别，体现了女真文化的审美特点。"}, {"name": "红山文化玉猪龙", "period": "新石器时代，约前3500年", "description": "—辽西地区出土，C形玉龙，是红山文化的标志性器物，也是中国龙文化的重要早期形态。"}], "dynastyConnections": [], "sources": ["辽宁省博物馆官网: https://www.lnmuseum.com.cn/"]}, {"id": "longmen", "name": "龙门石窟", "lat": 34.4653, "lng": 112.471, "location": "河南省洛阳市洛龙区龙门镇,伊河两岸", "level": "全国重点文物保护单位 / UNESCO世界文化遗产(2000年)", "corePeriod": "北魏(5-6世纪)、唐代(7-8世纪)", "specialty": "中国三大石窟之一(与敦煌莫高窟、大同云冈石窟并列),现存窟龛2345个、造像近11万尊、碑刻题记2860余品。北魏造像秀骨清像,唐代造像丰腴雄健,两种风格对比鲜明,是理解中国佛教艺术风格演变的最佳实地课堂。", "treasures": ["奉先寺卢舍那大佛", "宾阳中洞\"帝后礼佛图\"(原作流失海外)", "古阳洞造像题记", "莲花洞天顶大莲花", "药方洞石刻药方"], "halls": ["奉先寺(卢舍那大佛)", "宾阳三洞(北魏皇家窟)", "古阳洞(最早的窟)", "万佛洞(唐代)", "莲花洞", "龙门石窟研究院数字展示中心"], "dynastyCoverage": "北魏 → 东西魏 → 北齐 → 隋代 → 唐代 → 五代 → 北宋", "timeline": "493年北魏孝文帝迁都洛阳,开始营造龙门石窟(接续云冈石窟的皇家营造传统);唐高宗和武则天时期(650-705年)是龙门第二个营造高峰,奉先寺卢舍那大佛即此时所造", "artifacts": [{"name": "奉先寺卢舍那大佛", "description": "唐代(675年完工)。通高17.14米,面容丰满端庄,传说以武则天为蓝本,是龙门石窟的标志,也是唐代雕塑艺术的巅峰。\"卢舍那\"意为\"光明遍照\",为报身佛。"}, {"name": "宾阳中洞\"帝后礼佛图\"", "description": "北魏(约520年代)。原为北魏宣武帝为孝文帝和文昭皇太后营造的功德窟,浮雕帝后礼佛场景。1930年代被盗凿,现分藏于美国纽约大都会博物馆和堪萨斯城纳尔逊-阿特金斯博物馆,是中国文物流失的痛史。"}, {"name": "古阳洞造像题记(龙门二十品)", "description": "北魏(5-6世纪)。古阳洞是龙门最早开凿的洞窟,窟内造像题记书法被誉为\"龙门二十品\",是北魏书法(魏碑)的代表,对中国书法史影响深远。"}, {"name": "莲花洞天顶大莲花", "description": "北魏。洞顶浮雕直径达3米的大莲花,周围环绕飞天,雕刻精美,是北魏装饰艺术的杰作。"}, {"name": "药方洞石刻药方", "description": "唐代(约7世纪)。洞口两壁刻有140余个药方,涉及内科、外科、小儿科等,是中国现存最早的石刻药方,具有重要的医学史价值。"}, {"name": "万佛洞", "description": "唐代(680年)。南北两壁密布一万五千尊小佛像,主佛阿弥陀佛端坐莲台,洞口力士像肌肉刚健,是唐代石窟造像的代表。"}, {"name": "宾阳南洞阿弥陀佛像", "description": "唐代。面相丰满,衣纹流畅,是唐代佛教雕塑的典范之作。"}], "dynastyConnections": [{"dynasty": "北魏(493-534年)", "description": "孝文帝拓跋宏迁都洛阳后推行全面汉化,龙门石窟是汉化政策在宗教艺术上的直接体现。北魏造像从早期的云冈风格(雄健厚重、西域色彩浓)转变为龙门风格(秀骨清像、褒衣博带),反映了鲜卑贵族主动融入汉文化的进程。古阳洞、宾阳三洞为皇家主导的工程。"}, {"dynasty": "唐代(618-907年)", "description": "唐代是龙门石窟的第二个营造高峰期,造像数量约占总数的三分之二。唐代造像丰腴雄健,充满自信与活力,与北魏的清瘦风格形成鲜明对比。奉先寺卢舍那大佛集唐代雕塑之大成,是中国古代雕塑的里程碑。唐代龙门的营造与武则天关系密切--她曾捐\"脂粉钱\"两万贯资助奉先寺工程。"}, {"dynasty": "书法史（魏碑）", "description": "龙门石窟的造像题记是“魏碑”书法的核心资源。“龙门二十品”方劲雄强，与晋唐帖学并列为中国书法的两大传统。清代碑学运动重新发现魏碑价值，龙门题记成为书法家的圣地。"}], "sources": ["龙门石窟官网: http://www.lmsk.cn/", "UNESCO世界文化遗产名录（2000年）", "现存窟龛2345个、造像近11万尊（多源核实）"]}, {"id": "luoyang", "name": "洛阳博物馆", "lat": 34.619, "lng": 112.454, "location": "河南省洛阳市洛龙区聂泰路", "level": "国家一级博物馆", "corePeriod": "夏商周（二里头-东周王城）、东汉、魏晋北朝、隋唐（东都洛阳）", "specialty": "洛阳是中国建都朝代最多的城市（夏、商、西周、东周、东汉、曹魏、西晋、北魏、隋、唐、后梁、后唐、后晋，十三朝古都），洛阳博物馆以其跨越数千年的通史藏品展现了这座都城的全部辉煌。唐三彩和北魏陶俑收藏尤为突出。", "treasures": ["夏代乳钉纹青铜爵（中国最早的青铜酒器之一）", "东汉石辟邪", "曹魏白玉杯", "唐三彩黑釉马", "清代金丝楠木塔"], "halls": ["河洛文明\"通史陈列", "宫廷文物展", "唐三彩专题展", "石刻馆", "二里头夏都遗址博物馆（关联场馆）"], "dynastyCoverage": "夏代（二里头）→ 商代 → 西周（成周）→ 东周（王城）→ 东汉 → 曹魏西晋 → 北魏 → 隋唐（东都）→ 五代", "timeline": "二里头（约前1750-前1530年）被认为是夏朝晚期都城；周公营建洛邑（前1040年代），东周迁都洛阳（前770年）；东汉光武帝定都洛阳（25年）；北魏孝文帝迁都洛阳（493年）；隋唐以洛阳为东都，武则天时一度为首都", "artifacts": [{"name": "夏代乳钉纹青铜爵", "description": "夏代（约前18世纪）。二里头遗址出土，是中国已知最早的青铜容器之一，造型朴素，但标志着中国青铜时代的开端。"}, {"name": "东汉石辟邪", "description": "东汉（2世纪）。青石雕刻的辟邪（天禄），体型庞大，昂首挺胸，造型雄浑有力，是东汉石刻艺术的代表作。"}, {"name": "曹魏白玉杯", "description": "三国曹魏（3世纪）。纯白玉质，素面无纹，造型简洁高雅，是三国时期极罕见的玉器精品。"}, {"name": "唐三彩黑釉马", "description": "唐代（8世纪）。唐三彩以黄、绿、白三色为主，黑釉极为罕见。此马造型雄健，黑釉光亮如漆，是唐三彩中的极品。"}, {"name": "北魏泥塑人面像", "description": "北魏（5-6世纪）。永宁寺塔基遗址出土，面容温和慈祥，彩绘保存良好，是北魏佛教塑像的代表。永宁寺塔高约百米，是古代中国最高的建筑之一。"}, {"name": "清代金丝楠木塔", "description": "清代（18世纪）。高约1.8米，以金丝楠木精工雕刻，层层飞檐，密布佛像，是清代木雕工艺的巅峰。"}, {"name": "东周错金银铜鼎", "description": "东周（战国）。以金银丝嵌入青铜器表面形成精美纹饰，反映了东周洛阳作为天子之都的工艺水平。"}], "dynastyConnections": [{"dynasty": "夏代", "description": "二里头遗址（洛阳偃师）是探索夏文明的核心遗址，出土了中国最早的宫殿建筑基址、青铜礼器和绿松石龙形器。虽然\"二里头=夏都\"仍有学术讨论，但它无疑是中华文明从新石器时代向青铜时代转变的关键节点。"}, {"dynasty": "东周", "description": "前770年周平王东迁洛邑，开启东周（春秋战国）五百余年。虽然周天子实权渐失，但洛阳作为天下共主的象征地位始终存在。\"问鼎中原\"的成语即来自楚庄王向周使询问九鼎轻重的典故。"}, {"dynasty": "东汉与魏晋", "description": "光武帝刘秀定都洛阳，东汉近200年以洛阳为政治中心。曹魏、西晋继承这一格局。洛阳太学、白马寺（中国第一座佛寺）、\"洛阳纸贵\"的典故都出自这一时期。"}, {"dynasty": "北魏", "description": "493年孝文帝迁都洛阳推行汉化，开凿龙门石窟，建造永宁寺塔。北魏洛阳城极盛时人口超60万，杨衒之《洛阳伽蓝记》记录了这座城市的繁华与衰落。"}, {"dynasty": "隋唐", "description": "隋炀帝营建东都洛阳，修建大运河以洛阳为中心。唐代洛阳为东都，武则天时期改称\"神都\"，是事实上的首都。洛阳在中国历史上反复担任都城角色，其地位之持久无出其右。"}], "sources": ["洛阳博物馆官网: https://www.lymuseum.com/"]}, {"id": "mogao", "name": "敦煌莫高窟", "lat": 40.0359, "lng": 94.8097, "location": "甘肃省敦煌市东南25公里鸣沙山东麓", "level": "世界文化遗产 / 国家一级博物馆（敦煌研究院）", "corePeriod": "十六国至元（366-1368年），跨越千年", "specialty": "世界上现存规模最大、内容最丰富的佛教艺术宝库。735个洞窟、4.5万平方米壁画、2415尊彩塑。是丝绸之路文化交汇的缩影，融合了中原、印度、中亚、西域多种艺术风格。", "treasures": ["1. 第45窟彩塑群（盛唐）— 唐代佛教雕塑的巅峰"], "halls": ["藏经洞（第17窟）", "第45窟", "第96窟九层楼（标志性建筑", "内有35米大佛）", "第148窟涅槃像"], "dynastyCoverage": "十六国、北魏、西魏、北周、隋、唐、五代、宋、西夏、元", "timeline": "莫高窟的开凿跨越十个朝代千余年，壁画风格的演变本身就是一部中国美术通史——从北朝的印度-犍陀罗风格到唐代的完全中国化，再到宋元的程式化。", "artifacts": [{"name": "藏经洞文书", "period": "4-11世纪", "description": "1900年道士王圆箓发现。含佛经、道经、儒家经典、社会经济文书、多种文字（汉、藏、梵、回鹘、粟特等），是研究中古时期的第一手资料"}, {"name": "第45窟彩塑", "period": "盛唐", "description": "一佛二弟子二菩萨二天王，每尊神态各异，被誉为\"东方雕塑的极致\""}, {"name": "第220窟壁画", "period": "初唐，642年", "description": "药师经变、维摩诘经变，色彩鲜艳，人物生动"}, {"name": "第257窟九色鹿本生", "period": "北魏", "description": "连环画式叙事，从右向左展开故事"}, {"name": "第158窟涅槃像", "period": "中唐", "description": "卧佛长15.8米，表情安详"}, {"name": "第130窟弥勒大佛", "period": "盛唐", "description": "高26米，依崖而凿"}, {"name": "飞天形象", "period": "历代", "description": "莫高窟共有4500余身飞天，风格随朝代演变"}], "dynastyConnections": [{"dynasty": "北朝**（十六国、北魏、西魏、北周）：早期洞窟，印度和中亚风格明显，人物面相丰圆，有犍陀罗痕迹 - **隋", "description": "过渡期，开始中国化，构图趋于对称"}, {"dynasty": "唐**（初唐-中唐-晚唐）：巅峰期，壁画和彩塑达到最高水平。经变画展现了想象中的佛国世界，实则反映了唐代社会的繁华 - **五代/宋", "description": "归义军时期，敦煌成为半独立政权，壁画趋于程式化但仍有精品"}, {"dynasty": "西夏/元", "description": "藏传佛教影响显现  莫高窟是理解佛教在中国本土化过程的最佳实物教材。同时，藏经洞文书揭示了丝路贸易、多民族交往、中古社会生活的方方面面。"}], "sources": ["敦煌研究院官网: https://www.dha.ac.cn/", "UNESCO世界文化遗产名录（1987年）", "735个洞窟、4.5万平方米壁画、2415尊彩塑（多源核实）"]}, {"id": "nanhai", "name": "广东海上丝绸之路博物馆（南海一号）", "lat": 21.58, "lng": 111.92, "location": "广东省阳江市海陵岛十里银滩", "level": "国家一级博物馆", "corePeriod": "南宋（约1183年）", "specialty": "中国乃至世界水下考古的里程碑。\"南海一号\"是一艘南宋时期的远洋贸易商船，1987年发现，2007年整体打捞出水（世界首次沉船整体打捞），2013年起全面保护发掘。共出水文物18万余件，其中瓷器约16万件套，铁器凝结物124吨。沉船残长约21.91m，最大船宽约9.87m，属\"福船\"类型，估计排水量600吨、载重近800吨。2025年11月\"水晶宫\"首次对公众开放。", "treasures": ["1. 南海一号沉船船体 — 南宋远洋商船", "世界首次整体打捞"], "halls": ["水晶宫\"（沉船原址保护展示）", "南海一号出水文物陈列"], "dynastyCoverage": "南宋（约1183年，淳熙年间）", "timeline": "南海一号是南宋海上丝绸之路的\"时间胶囊\"。船上货物以瓷器和铁器为主，瓷器涵盖景德镇、龙泉、德化、磁灶等南宋主要外销瓷窑口。部分陶瓷带有阿拉伯风格，部分铁器凝结物含有标记\"梁宅\"等印文——考古已确认部分陶瓷器产自广东南海的奇石窑和文头岭窑。始发港为泉州，曾停靠广州，目的地为东南亚或中东。", "artifacts": [{"name": "南海一号沉船船体", "period": "南宋，约1183年", "description": "残长21.91m，最大宽9.87m。14道隔舱壁，属福船类型。采用了升降船舵和\"可倒桅\"技术（中国发明，14世纪才传入欧洲）。宋代造船史上的\"活标本\""}, {"name": "外销瓷器（约16万件套）", "period": "南宋孝宗1174-1189年", "description": "船上最晚年号铜钱，结合德化瓷罐上\"癸卯\"（1183年）墨书，推定沉船出航约在1183年"}], "dynastyConnections": [], "sources": ["百度百科·南海一号（详细词条，含沉船尺寸、出水文物数据、考古历程）"]}, {"id": "nanjing", "name": "南京博物院", "lat": 32.0569, "lng": 118.8228, "location": "江苏省南京市玄武区中山东路321号", "level": "国家一级博物馆（中国三大博物馆之一）", "corePeriod": "六朝、明代、民国", "specialty": "中国最早的公立博物馆之一，\"一院六馆\"模式（历史馆、艺术馆、特展馆、数字馆、民国馆、非遗馆）。民国馆沉浸式还原1930年代南京街景。", "treasures": ["1. 金缕玉衣（西汉）— 徐州楚王墓出土"], "halls": ["历史馆（通史主线）", "民国馆（沉浸体验）", "艺术馆（书画瓷器）"], "dynastyCoverage": "六朝（东吴、东晋、宋齐梁陈）、明、民国为特色，兼顾通史", "timeline": "南京是六朝古都和明初都城。南博以六朝文物见长，竹林七贤砖画是六朝文化的标志。民国馆则补上了中国近现代史的重要一环。", "artifacts": [{"name": "竹林七贤与荣启期砖画", "period": "南朝", "description": "用数百块砖拼合而成的大型壁画，表现魏晋名士风度"}, {"name": "金缕玉衣", "period": "西汉", "description": "用金丝穿缀玉片制成的殓服，体现汉代丧葬制度和玉文化"}, {"name": "明洪武釉里红岁寒三友纹梅瓶", "period": "明初", "description": "釉里红工艺难度极高，此件品相完美"}, {"name": "错银铜牛灯", "period": "东汉", "description": "灯烟通过牛体导入水中过滤，古代\"环保\"设计"}, {"name": "银缕玉衣", "period": "东汉", "description": "玉衣等级制度的实物证据"}, {"name": "透雕人鸟兽玉饰件", "period": "西周", "description": "玉器工艺精品"}, {"name": "青瓷釉下彩羽人纹盘口壶", "period": "三国·吴", "description": "最早的釉下彩瓷"}], "dynastyConnections": [], "sources": ["南京博物院官网: https://www.njmuseum.com/", "核心文物数据已多源交叉核实"]}, {"id": "nanyue", "name": "南越王博物院", "lat": 23.1375, "lng": 113.259, "location": "广东省广州市越秀区（王墓展区）/ 北京路（王宫展区）", "level": "国家一级博物馆", "corePeriod": "秦汉（南越国，前203-前111年）", "specialty": "建于南越国第二代王赵眜（赵胡）墓原址之上，是华南地区发现的规模最大、保存最完好的汉代彩绘石室墓。王宫展区展示南越国宫署遗址和御苑遗迹，两个展区合为完整的南越国都城图景。", "treasures": ["丝缕玉衣", "\"文帝行玺\"金印", "角形玉杯", "铜屏风构件", "船纹铜提筒"], "halls": ["主墓室原址展示", "玉器专题展", "南越王宫署遗址", "曲流石渠御苑遗迹"], "dynastyCoverage": "秦代（赵佗南征）→ 西汉（南越国五代王）→ 东汉至六朝（岭南开发）", "timeline": "秦始皇统一岭南（前214年）→ 赵佗建南越国（前203年）→ 赵眜继位（约前137年）→ 汉武帝灭南越（前111年）。南越国存续近百年，是岭南从百越部落社会向汉文化圈转型的关键时期", "artifacts": [{"name": "\"文帝行玺\"金印", "description": "西汉（前2世纪）。纯金铸造，龙钮，印文\"文帝行玺\"，是迄今发现的最大的汉代金印。直接证明墓主为南越文帝赵眜，也是研究南越国政治制度的关键实物——南越王自称\"帝\"而非\"王\"，反映了其与汉朝的微妙关系。"}, {"name": "丝缕玉衣", "description": "西汉（前2世纪）。以丝线穿缀2291块玉片而成，是目前发现年代最早、保存最完整的丝缕玉衣。比中原的金缕玉衣等级略低，反映了南越国对汉制的模仿和调适。"}, {"name": "角形玉杯", "description": "西汉。以整块青玉雕成犀角形，杯口沿浮雕一只矫健的夔龙，造型独特，兼具中原玉器和草原风格，是汉代玉器中的孤品。"}, {"name": "铜屏风构件（朱雀、人操蛇等）", "description": "西汉。大型铜铸鎏金屏风的构件，有朱雀衔环、人操蛇等造型，工艺精湛，反映了南越宫廷的审美趣味。"}, {"name": "船纹铜提筒", "description": "西汉。越式铜器，筒壁刻有战船、羽人等纹饰，与越南东山文化铜鼓风格相似，是南越国海洋文化和百越传统的直接证据。"}, {"name": "银盒（波斯风格）", "description": "西汉。锤揲工艺制作的银盒，造型和纹饰具有明显的西亚波斯风格，是早期海上丝绸之路的实物证据。"}, {"name": "南越国宫署遗址\"万岁\"瓦当", "description": "西汉。\"万岁\"文字瓦当，与闽越国类似，反映了南方诸越国的政治自主性。"}], "dynastyConnections": [{"dynasty": "秦代", "description": "秦始皇于前214年发兵五十万征服岭南，设南海、桂林、象郡三郡。秦将赵佗被任命为南海郡龙川县令，这是中原政权首次有效管辖岭南。"}, {"dynasty": "西汉（南越国）", "description": "秦末乱世，赵佗据南海郡自立，前203年建南越国，定都番禺（广州）。南越国传五代王，前后近百年。赵眜（第二代王）墓的发现揭示了南越国的文化面貌：既大量采用中原汉制（玉衣、印玺、编钟），又保留了浓厚的百越传统（铜提筒、人操蛇屏风），同时通过海上贸易接触了西亚文化（银盒），呈现出多元融合的特色。前111年汉武帝灭南越，岭南正式纳入汉帝国版图。"}, {"dynasty": "海上丝绸之路", "description": "南越国的银盒等外来器物证明，早在西汉早期，岭南地区已经通过海上通道与东南亚、南亚乃至西亚有贸易往来，广州是中国最早的海上丝绸之路起点之一。"}], "sources": ["南越王博物院官网: https://www.nywmuseum.com/"]}, {"id": "neimenggu", "name": "内蒙古博物院", "lat": 40.8427, "lng": 111.7588, "location": "内蒙古自治区呼和浩特市新城区新华东街27号", "level": "国家一级博物馆", "corePeriod": "匈奴至蒙元（北方游牧文化全谱系）", "specialty": "中国收藏北方草原文化文物最丰富的博物馆。从匈奴到鲜卑、突厥、契丹、蒙古，草原帝国的兴衰在这里一览无余。匈奴鹰顶金冠饰是中国草原文物的至高杰作。恐龙化石收藏也很突出。", "treasures": ["匈奴鹰顶金冠饰", "许季姜青铜簋", "金银器\"胡人牵驼\"", "契丹女尸（辽代）", "查干诺尔恐龙化石"], "halls": ["远古世界\"（恐龙）", "草原雄风\"（北方民族）", "大辽契丹", "天骄蒙古"], "dynastyCoverage": "新石器时代（红山文化）、匈奴、鲜卑、突厥、回鹘、契丹（辽）、蒙古（元）、清", "timeline": "红山文化（前4700-前2900年）→ 匈奴帝国（前3世纪-1世纪）→ 鲜卑崛起（1-4世纪）→ 契丹建辽（907/916年）→ 蒙古帝国（1206年）→ 清代归绥", "artifacts": [{"name": "匈奴鹰顶金冠饰", "period": "战国晚期，约前4-前3世纪", "description": "—鄂尔多斯杭锦旗阿鲁柴登出土，由鹰形冠顶和黄金冠带组成。冠顶为一只展翅雄鹰俯瞰大地，冠带浮雕虎、马、羊等草原动物。是目前所见唯一的匈奴王金冠，被誉为\"草原瑰宝\"，是中国考古发现的标志性文物之一。"}, {"name": "鄂尔多斯式青铜器群", "period": "春秋至汉代", "description": "—以动物纹饰为特征的青铜短剑、带扣、牌饰等，是北方草原游牧文化的典型器物。虎噬羊、盘角羊、奔鹿等造型充满草原生命力，与中原青铜器风格截然不同。"}, {"name": "许季姜青铜簋", "period": "西周中期", "description": "—铭文记载了周王室与北方的关系，是研究西周北方边疆的重要材料。"}, {"name": "契丹贵族墓葬出土文物", "period": "辽代，10-12世纪", "description": "—包括金银器、玻璃器、丝织品等，辽代契丹贵族墓葬在内蒙古东部大量发现，出土的鎏金银冠、银靴、金面具等展示了契丹贵族的丧葬习俗。"}, {"name": "辽代契丹女尸", "period": "辽代", "description": "—通辽奈曼旗出土，保存状态良好，身着丝绸，佩戴金银饰品。是了解辽代契丹贵族生活和丧葬制度的重要实物。"}, {"name": "元代铜权", "period": "元代", "description": "—元上都遗址出土，体现了蒙古帝国的度量衡制度。元上都（今锡林郭勒盟正蓝旗）是忽必烈的夏都，已列入世界遗产。"}, {"name": "查干诺尔龙化石", "period": "白垩纪", "description": "—锡林郭勒盟出土，巨型蜥脚类恐龙，是内蒙古恐龙化石的代表。"}, {"name": "金银器\"胡人牵驼\"摆件", "period": "唐代", "description": "—展现了丝绸之路上的贸易场景，体现了草原在东西方交流中的桥梁作用。"}], "dynastyConnections": [], "sources": ["内蒙古博物院官网: https://www.nmgbwy.com/"]}, {"id": "ningxia", "name": "宁夏回族自治区博物馆", "lat": 38.468, "lng": 106.2584, "location": "宁夏回族自治区银川市金凤区人民广场东路", "level": "国家一级博物馆（2012年获批）", "corePeriod": "西夏（1038-1227）、北方游牧民族", "specialty": "中国唯一系统展示西夏文明的省级博物馆。新馆总建筑面积30258平方米，建筑平面呈\"回\"字型，呼应回族自治区特色。馆藏近5万件，三级以上珍贵文物4000余件，国家一级文物159件。鎏金铜牛、胡旋舞石刻墓门、力士志文支座为三件国宝级文物。贺兰山岩画实物收藏也是一大特色。", "treasures": ["1. 鎏金铜牛（西夏）— 西夏王陵出土", "国宝级"], "halls": ["朔色长天——宁夏通史陈列\"（五篇：文明曙光→农牧家园→丝路重镇→大夏寻踪→塞北江南）", "大夏寻踪\"（西夏专题", "300余件文物精品）", "石刻史书\"（贺兰山岩画", "实物约150块", "拓片约300幅）", "回乡漫步\"（回族民俗）"], "dynastyCoverage": "旧石器时代（水洞沟）→ 新石器（菜园文化/马家窑/齐家）→ 春秋战国（戎族青铜器）→ 秦汉 → 北朝隋唐（丝路重镇固原、灵州）→ 西夏 → 元明清", "timeline": "宁夏地处丝绸之路北线和农牧交界地带。北朝至隋唐时期，固原是丝路孔道上的重镇，大量中西文化交流遗物在此出土。西夏党项政权（1038-1227年）定都兴庆府（银川），创制西夏文字，留下了丰富的独立文明遗存。", "artifacts": [{"name": "鎏金铜牛", "period": "西夏，西夏王陵出土", "description": "国宝级文物，铜牛通体鎏金，体态健壮，铸造工艺精湛，是西夏金属工艺的最高水平代表"}, {"name": "胡旋舞石刻墓门", "period": "唐代，盐池县出土", "description": "国宝级文物，两扇石门上浮雕胡旋舞男子形象，舞姿优美，是研究唐代中亚胡旋舞东传的珍贵实物"}, {"name": "力士志文支座", "period": "西夏，西夏王陵出土", "description": "国宝级文物，男性力士形象的石刻建筑构件，身刻西夏文字，是西夏陵寝建筑制度的重要证据"}, {"name": "贺兰山岩画", "period": "旧石器至青铜时代", "description": "贺兰山东麓发现大量岩画，以人面像和动物形象为主，时间跨度数千年，是北方游牧民族精神生活的直接记录"}, {"name": "透雕青铜牌饰", "period": "战国至汉", "description": "北方草原风格的鄂尔多斯式青铜器，反映宁夏地区戎族与中原的文化交流"}, {"name": "西夏文陶范", "period": "西夏", "description": "用于铸造西夏文字钱币的模具，是西夏货币制度和铸造工艺的直接证据"}, {"name": "彩绘泥塑罗汉像", "period": "西夏", "description": "体态丰满，神态怡然，纹饰上贴金箔，是西夏佛教艺术的精品"}, {"name": "竹雕", "period": "西夏", "description": "细浅阴刻中原人物生活场景，说明西夏与中原文化的交流互鉴"}], "dynastyConnections": [], "sources": ["百度百科·宁夏回族自治区博物馆（详细词条，含建筑数据、展厅描述、馆藏信息）"]}, {"id": "qinghai", "name": "青海省博物馆", "lat": 36.62, "lng": 101.75, "location": "青海省西宁市城西区新宁广场东侧", "level": "国家一级博物馆（2017年第三批）", "corePeriod": "新石器彩陶（马家窑/齐家）、唐蕃古道、藏传佛教", "specialty": "青海第一座现代化大型综合博物馆。馆藏15742件/套，珍贵文物2079件/套。以新石器彩陶和民族宗教类文物最具特色。设主侧展厅10个，展厅面积9146㎡。\"1+3\"主题展览体系。旧址为军阀马步芳宅邸\"馨庐\"。", "treasures": ["1. 舞蹈纹彩陶盆（宗日文化）— 青海同德宗日遗址出土", "盆内壁绘两组手拉手群舞人物（11人和13人）"], "halls": ["江河源文明——青海历史文物展\"（510余件/套", "史前文明遗珍\"和\"历史文物精粹\"两部分）", "青海考古成果展\"（含都兰热水大墓出土文物首次亮相）", "藏传佛教金铜造像艺术展\"（78件鎏金铜造像）", "唐卡艺术展\"（50幅）"], "dynastyCoverage": "新石器（马家窑/齐家/宗日文化）→ 青铜时代（卡约/辛店/诺木洪文化）→ 秦汉（河湟设郡）→ 南北朝隋唐（吐谷浑/唐蕃古道）→ 宋元明清（藏传佛教）", "timeline": "青海地处三江之源（黄河/长江/澜沧江），是中华文明多元一体的交汇地带。新石器时代马家窑文化在此繁荣，齐家文化的铜镜是中国铜镜史的起点。唐蕃古道（唐代通往吐蕃的官方通道）经过青海，使其成为汉藏文化交流的桥梁。", "artifacts": [{"name": "舞蹈纹彩陶盆", "period": "新石器时代·宗日文化，青海同德宗日遗址出土", "description": "泥质红陶，口沿内壁绘两组手拉手群舞人物，分别为11人和13人。是中国史前彩陶中最生动的人物活动场景之一，与青海大通出土的另一件舞蹈纹盆齐名"}, {"name": "弦纹网纹彩陶壶", "period": "马家窑文化，青海民和核桃庄拱北台遗址出土", "description": "侈口长颈鼓腹平底，从上至下通体绘彩，颈部弦纹，肩腹部网纹、圆圈十字纹和波纹。色彩艳丽，代表马家窑彩陶最高水平"}, {"name": "铜镜", "period": "齐家文化，约4000年前，贵南尕马台墓葬出土", "description": "正面磨光，背面有半圆形钮，饰羽状七角星纹。齐家文化铜镜是中国铜镜史的开端"}, {"name": "石磬", "period": "约4000年前", "description": "长96cm，宽61cm，厚4cm。打击乐器，也是古代祭祀礼器。\"八音\"中\"石\"的代表乐器"}, {"name": "唐黄地联珠团窠对马锦", "period": "唐代", "description": "黄地织锦，联珠圈纹内绘蓝彩对马，对马昂首，饰飘带。典型的唐代丝路风格织锦"}, {"name": "明永乐铜鎏金观音像", "period": "明代", "description": "站立莲花座上，发髻高耸，头戴五花冠，双手各牵莲花一枝，帔帛卷曲而下，是一代金铜造像的典范"}, {"name": "玄武砚滴", "period": "魏晋，互助高寨汉墓出土", "description": "龟蛇合体造型，龟头前伸口衔小铜碗，兼具实用性和艺术性"}, {"name": "唐手书\"羯摩经\"", "period": "唐代", "description": "全长约17米，用34张纸粘连，共933行。珍贵的唐代手写佛教经卷"}], "dynastyConnections": [], "sources": ["百度百科·青海省博物馆（详细词条，含馆藏数据、展厅描述、文物详情）"]}, {"id": "qingzhou", "name": "青州博物馆", "lat": 36.6907, "lng": 118.4755, "location": "山东省潍坊市青州市范公亭西路1号（新馆2023年开放）", "level": "国家一级博物馆（2008年，首批县级市国家一级博物馆）", "corePeriod": "南北朝（龙兴寺佛教造像）、汉代（香山汉墓）", "specialty": "中国首批国家一级博物馆中唯一的县级市博物馆，有\"小大博物馆\"之称。馆藏文物5万余件，国家珍贵文物3000余件。1996年龙兴寺遗址出土的400余尊佛教造像震惊世界，被誉为\"改写东方艺术史的杰作\"。新馆设8个展厅，汉唐风格建筑。博物馆渊源可追溯至1887年英国传教士怀恩光在培真书院设立的博物堂，是中国最早的博物馆之一。", "treasures": ["1. 龙兴寺佛教造像群（北魏至北齐", "400余尊）— \"青州微笑\"", "改写东方艺术史"], "halls": ["青州微笑——龙兴寺遗址出土佛教造像艺术展\"（核心展）", "汉梦华章——香山汉墓陪葬坑出土文物展", "信美东方第一州——青州历史陈列", "有邻衡王府——衡王府历史文化专题厅"], "dynastyCoverage": "史前 → 先秦 → 两汉（香山汉墓）→ 南北朝（龙兴寺/佛教高峰）→ 唐宋 → 明（衡王府/赵秉忠状元卷）→ 清", "timeline": "青州是古九州之一，东汉至南北朝时期是重要的政治文化中心。南北朝时期佛教在青州极为兴盛，形成了独特的\"青州风格\"佛教造像——面含微笑、衣薄贴体、彩绘贴金，与中原和南方风格均不同。", "artifacts": [{"name": "龙兴寺佛教造像群", "period": "北魏至北齐，1996年出土", "description": "400余尊佛教石雕造像，多为圆雕，保存了大量原始彩绘和贴金。\"青州微笑\"成为标志性形象。北齐贴金彩绘石雕菩萨立像（通高165cm）是其中杰出代表，被誉为\"改写东方艺术史的杰作\""}, {"name": "明万历赵秉忠殿试卷", "period": "1598年", "description": "中国目前发现的唯一一件存世状元卷原件（明万历二十六年状元赵秉忠的殿试策论），对研究明代科举制度价值极高"}, {"name": "东汉\"宜子孙\"玉璧", "period": "西汉，2006年发掘", "description": "2000余件彩绘陶俑和2000余件青铜/铁质武器，是了解汉代仪仗制度的珍贵实物。被评为当年全国重要考古发现"}, {"name": "战国玉人", "period": "北齐", "description": "通高165cm，360度圆雕。头戴透雕花蔓冠，璎珞华丽，裙带上装饰九方浅浮雕图案"}, {"name": "铜鎏金碧霞元君坐像", "period": "明代", "description": "通高180cm，青铜鎏金"}], "dynastyConnections": [], "sources": ["百度百科·青州博物馆（详细词条，含馆藏数据、展厅描述、文物详情）"]}, {"id": "quanzhou", "name": "泉州海外交通史博物馆", "lat": 24.9091, "lng": 118.606, "location": "福建省泉州市丰泽区东湖街425号", "level": "国家一级博物馆", "corePeriod": "宋元（泉州为\"东方第一大港\"）", "specialty": "中国最早也是唯一以海外交通史为专题的博物馆。2021年\"泉州：宋元中国的世界海洋商贸中心\"申遗成功，海交馆是核心展示中心。馆藏宋代沉船、宗教石刻、外销瓷等珍贵文物，集中反映古代海上丝绸之路的繁荣。", "treasures": ["宋代海船（后渚港出土）", "印度教石刻（宋元）", "伊斯兰教碑刻", "阿拉伯商人墓碑", "外销瓷器"], "halls": ["泉州：宋元中国的世界海洋商贸中心", "泉州宗教石刻陈列", "泉州湾古船陈列馆", "泉州伊斯兰文化陈列馆\"（2003年建成）"], "dynastyCoverage": "唐（泉州港兴起）→ 宋元（东方第一大港、刺桐城）→ 明（郑和下西洋）→ 清", "timeline": "泉州（古称刺桐）在宋元时期是世界最大的港口之一，马可·波罗称其为\"世界上最大的港口之一\"。2021年联合国教科文组织将\"泉州：宋元中国的世界海洋商贸中心\"列入世界遗产", "artifacts": [{"name": "宋代海船", "period": "南宋，1974年后渚港出土", "description": "残长24.2米，宽9.15米，是当时中国出土的最大古船之一。船体采用水密隔舱技术，是中国古代造船术的实物证据"}, {"name": "印度教石刻", "period": "宋元", "description": "泉州出土的大量印度教神像石刻（毗湿奴、湿婆等），证明宋元时期印度商人社区在泉州的存在"}, {"name": "伊斯兰教碑刻", "period": "宋元", "description": "阿拉伯文、波斯文墓碑和清真寺碑刻，反映泉州穆斯林社区的规模和影响力"}, {"name": "基督教（景教）石刻", "period": "元代", "description": "十字架石刻，证明元代泉州存在景教/天主教社区"}, {"name": "外销瓷器", "period": "宋元", "description": "德化窑白瓷、磁灶窑彩瓷等，是泉州作为陶瓷外销港的直接证据"}, {"name": "摩尼教石刻", "period": "宋元", "description": "泉州是中国摩尼教（明教）保存最完整的地区"}], "dynastyConnections": [], "sources": ["泉州海交馆官网: http://www.qzhjg.cn/", "泉州海交馆简介: http://www.qzhjg.cn/html/hjgjj.html", "百度百科·泉州海外交通史博物馆", "UNESCO世界遗产: \"泉州：宋元中国的世界海洋商贸中心\"（2021年列入）"]}, {"id": "sanxingdui", "name": "三星堆博物馆", "lat": 31.0007, "lng": 104.2073, "location": "四川省广汉市西安路133号", "level": "国家一级博物馆", "corePeriod": "古蜀文明(约前1600-前1100年,相当于商代)", "specialty": "中国考古史上最具颠覆性的发现之一。巨大的青铜纵目面具、黄金面罩、青铜神树等完全不同于中原商文明的风格,揭示了一个平行于商朝的独立文明体系。2020-2022年新坑发掘引发全球关注。", "treasures": ["1. 青铜纵目面具(商)- 眼球突出16cm的巨型面具,可能代表蜀王蚕丛"], "halls": ["新馆全部(2023年开放的新展馆设计一流)", "祭祀坑出土物展区"], "dynastyCoverage": "古蜀文明(商代同时期),与中原商文明平行", "timeline": "三星堆文明(前1600-前1100年)与商文明同期但风格迥异,证明中国文明并非单一中原起源,而是多元并起。三星堆衰落后,文明中心转移至成都金沙(前1200-前600年)。", "artifacts": [{"name": "青铜纵目面具", "period": "商,前1300-前1100年", "description": "宽1.38米,眼球柱状外突16cm。可能是传说中蜀王蚕丛\"纵目\"的写照,也可能是巫师通神的
