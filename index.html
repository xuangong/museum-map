面具"}, {"name": "青铜大立人像", "period": "商", "description": "全高2.62米,双手呈环形持物(持物已佚),头戴冠,身着三层衣。可能是大祭司或蜀王"}, {"name": "青铜神树", "period": "商", "description": "残高3.96米(完整约5米),树上9枝、9鸟(太阳鸟),可能是扶桑树或建木的写照"}, {"name": "金杖", "period": "商", "description": "长1.42米,可能是王权象征。纹饰为鱼、鸟、箭,可能讲述蜀王传说"}, {"name": "黄金面罩", "period": "商,2021年出土", "description": "重280g,覆盖青铜头像面部"}, {"name": "青铜人头像群", "period": "商", "description": "数十件大小各异的青铜人头像,可能代表不同等级的祭祀参与者"}, {"name": "玉璋", "period": "商", "description": "大量玉璋出土,与中原二里头文化有联系"}, {"name": "象牙", "period": "商", "description": "大量象牙出土,说明当时四川盆地有大象"}], "dynastyConnections": [], "sources": ["三星堆博物馆官网: https://www.sxd.cn/", "百度百科·三星堆博物馆"]}, {"id": "shaanxi", "name": "陕西历史博物馆", "lat": 34.222, "lng": 108.9554, "location": "陕西省西安市雁塔区小寨东路91号", "level": "国家一级博物馆（中国第一座大型现代化博物馆）", "corePeriod": "周、秦、汉、唐", "specialty": "地处十三朝古都西安，藏品170余万件，以周秦汉唐四大盛世文物最为系统完整。唐代金银器和壁画收藏为全国之冠。", "treasures": ["1. 兽首玛瑙杯（唐）— 海内孤品", "可能为中亚传入的珍贵酒器"], "halls": ["基本陈列（周秦汉唐通史）", "唐代壁画珍品馆（需另购票）", "大唐遗宝展"], "dynastyCoverage": "西周、秦、西汉、唐为核心，上溯蓝田人，下至明清", "timeline": "西安（长安）是西周、秦、西汉、隋唐的都城。陕历博以都城视角串联了中国古代最辉煌的几个时期。", "artifacts": [{"name": "兽首玛瑙杯", "period": "唐", "description": "用整块红色缠丝玛瑙雕成，兽首形杯口，可能是从中亚丝路传入的异域珍品"}, {"name": "鎏金舞马衔杯纹银壶", "period": "唐", "description": "唐玄宗生日宴上舞马衔杯祝寿的故事在此壶上得到实物印证"}, {"name": "唐三彩骆驼载乐俑", "period": "唐", "description": "骆驼背上载有胡人乐队，丝路文化融合的标志"}, {"name": "五祀卫鼎", "period": "西周共王", "description": "铭文207字，记载了一起完整的土地诉讼案"}, {"name": "皇后之玺", "period": "西汉", "description": "迄今发现唯一的皇后玉玺，可能属于吕后"}, {"name": "鸳鸯莲瓣纹金碗", "period": "唐", "description": "唐代金器工艺巅峰"}, {"name": "杜虎符", "period": "战国·秦", "description": "虎形铜符，调兵凭证，铭文40字"}, {"name": "黑釉油滴碗", "period": "宋", "description": "建窑精品"}], "dynastyConnections": [{"dynasty": "西周", "description": "礼乐制度、青铜铭文"}, {"dynasty": "秦", "description": "统一、法制、军事"}, {"dynasty": "西汉", "description": "汉承秦制、丝绸之路起点"}, {"dynasty": "唐", "description": "开放包容、国际化大都市长安  唐代部分最为璀璨，壁画馆保存了大量唐墓壁画原件，是其他博物馆无法替代的。"}], "sources": ["陕西历史博物馆官网: https://www.sxhm.com/", "百度百科·陕西历史博物馆（馆藏170余万件）"]}, {"id": "shandong", "name": "山东博物馆", "lat": 36.6488, "lng": 117.101, "location": "山东省济南市历下区经十路11899号", "level": "国家一级博物馆", "corePeriod": "新石器时代（大汶口-龙山文化）、先秦（齐鲁文化）、明代（鲁王府/衡王府）", "specialty": "以史前考古收藏见长，蛋壳黑陶杯是龙山文化的巅峰之作。齐鲁文化是中华文明的核心源头之一，馆内对齐国和鲁国有系统展示。明代鲁王府旧藏的大量文物也是重要特色。", "treasures": ["蛋壳黑陶高柄杯", "红陶兽形壶", "鲁国大玉璧", "亚丑钺", "明衡王府九旒冕"], "halls": ["史前文明", "齐鲁文化", "佛教造像艺术", "明代鲁王展"], "dynastyCoverage": "新石器时代（大汶口、龙山文化）、商、西周、春秋战国（齐鲁）、汉、北朝、明", "timeline": "大汶口文化（前4100-前2600年）→ 龙山文化（前2600-前2000年）→ 齐鲁立国（前1046年分封）→ 汉代儒学中心", "artifacts": [{"name": "蛋壳黑陶高柄杯", "period": "龙山文化，约前2500-前2000年", "description": "—日照出土，器壁最薄处仅0.2毫米，重量不足50克，\"薄如蛋壳、黑如漆、亮如镜\"。是龙山文化制陶工艺的巅峰之作，代表了史前陶器技术的最高水平，无法在现代条件下完美复制。"}, {"name": "红陶兽形壶", "period": "大汶口文化，约前4000年", "description": "—泰安大汶口出土，猪形（一说狗形），造型憨态可掬，是大汶口文化的标志性器物，体现了先民的生活情趣和艺术想象力。"}, {"name": "鲁国大玉璧", "period": "战国", "description": "—曲阜鲁国故城出土，直径32.8厘米，是目前所见战国玉壁中最大的一件。纹饰精美复杂，分内外区，体现了鲁国\"周礼尽在鲁\"的用玉传统。"}, {"name": "亚丑钺", "period": "商代晚期", "description": "—青州苏埠屯出土，铜钺上有\"亚丑\"铭文和人面纹饰，造型威严狰狞。是商代晚期东方方国的重要遗物，\"亚丑\"可能是商代的一个重要族群。"}, {"name": "颂簋", "period": "西周晚期", "description": "—传世品，铭文152字，记载周王册命颂的事迹。是西周青铜器铭文学研究的重要材料。"}, {"name": "明衡王府九旒冕", "period": "明代", "description": "—青州明衡王墓出土，是目前国内唯一保存完整的明代亲王冕冠实物。金丝编制，九旒各缀玉珠，完整再现了明代亲王的冕服制度。"}, {"name": "东平汉墓壁画", "period": "东汉", "description": "—东平出土，保存完好，绘有宴饮、车马出行等场面。是山东地区汉代壁画的重要发现，填补了该区域汉代墓葬壁画的空白。"}, {"name": "甲骨文", "period": "商代", "description": "—馆藏甲骨数量丰富，是研究商代后期历史的重要文字资料。"}], "dynastyConnections": [], "sources": ["山东博物馆官网: https://www.sdmuseum.com/"]}, {"id": "shanghai", "name": "上海博物馆", "lat": 31.2286, "lng": 121.4747, "location": "上海市浦东新区世博大道（东馆）/ 黄浦区人民大道201号（人民广场馆）", "level": "国家一级博物馆", "corePeriod": "青铜器（商周）、书画（唐宋元明清）、陶瓷（全时期）", "specialty": "以青铜器、书画、陶瓷三大收藏闻名世界。文物系统性极强，是学术研究型博物馆的典范。2022年起东馆陆续开放，展览面积大幅扩展。", "treasures": ["1. 大克鼎（西周）— 铭文290字", "与大盂鼎并称\"海内三宝\"之二"], "halls": ["中国古代青铜馆", "中国历代书法馆", "中国历代绘画馆", "中国历代陶瓷馆"], "dynastyCoverage": "商周（青铜）、唐宋元明清（书画）、全时期（陶瓷）", "timeline": "上博的青铜器收藏构成了从商到战国的完整序列，是理解中国青铜时代的最佳场所之一。书画收藏则覆盖唐至清的核心脉络。", "artifacts": [{"name": "大克鼎", "period": "西周孝王", "description": "膳夫克为祭祖而铸，铭文记载西周土地制度"}, {"name": "商鞅方升", "period": "战国·秦孝公十八年", "description": "刻有秦始皇统一度量衡诏书，跨越两个时代的实物"}, {"name": "晋侯稣钟", "period": "西周厉王", "description": "16件编钟，铭文记载西周晚期战争"}, {"name": "《高逸图》", "period": "唐·孙位", "description": "描绘竹林七贤，现存最可靠的唐代人物画之一"}, {"name": "《淳化阁帖》最善本", "period": "北宋", "description": "中国法帖之祖，上博藏本为最佳版本"}, {"name": "牺尊", "period": "春秋", "description": "动物形青铜酒器，工艺精湛"}, {"name": "越窑青瓷莲花碗", "period": "五代", "description": "秘色瓷代表作"}], "dynastyConnections": [], "sources": ["上海博物馆官网: https://www.shanghaimuseum.net/", "核心文物数据已多源交叉核实"]}, {"id": "shanxi-datong", "name": "大同市博物馆", "lat": 40.0769, "lng": 113.2971, "location": "山西省大同市平城区御河西路南段", "level": "国家一级博物馆", "corePeriod": "北魏平城时代（398-494年）", "specialty": "大同是北魏都城平城，历时近百年（398-494年迁洛阳）。大同博物馆集中展示了这一时期鲜卑拓跋氏政权从草原到中原的文化转型，是了解北魏前期最重要的博物馆。辽金西京大同府的文物也是重要收藏。", "treasures": ["司马金龙墓漆画屏风", "北魏石雕柱础", "封和突墓出土品", "宋绍祖墓石椁", "琅琊王墓出土品"], "halls": ["魏都平城", "辽金西京", "大同恐龙"], "dynastyCoverage": "北魏、东魏、北齐、辽、金", "timeline": "拓跋鲜卑南迁 → 北魏建国（386年）→ 迁都平城（398年）→ 太武帝统一北方（439年）→ 孝文帝迁洛（494年）→ 辽代西京大同府 → 金代西京", "artifacts": [{"name": "司马金龙墓漆画屏风", "period": "北魏，484年", "description": "—大同石家寨出土。木板上以漆绘列女、孝子等故事，人物线条流畅，色彩鲜艳，构图源自汉代画像传统。司马金龙是晋朝宗室后裔，娶北魏皇族拓跋氏女。此屏风是北魏绘画遗存中最精美的作品，展示了北魏汉化进程中的文化融合。（为国宝级文物）"}, {"name": "北魏石雕柱础", "period": "北魏，5世纪", "description": "—大同城内出土，浮雕忍冬纹、莲花纹等装饰，风格兼具中原和西域特色。是北魏宫殿建筑构件的重要实物。"}, {"name": "封和突墓出土品", "period": "北魏，504年", "description": "—封和突为鲜卑贵族，墓中出土陶俑、铜器等。陶俑面部特征和服饰反映了鲜卑族的形象特点，部分俑已穿汉式服装，体现了孝文帝改革后的文化变化。"}, {"name": "宋绍祖墓石椁", "period": "北魏，477年", "description": "—石椁仿木结构建筑，屋顶、门窗俱全，雕刻精美。是了解北魏建筑形式的重要实物资料，反映了北魏时期丧葬制度对中原传统的吸收。"}, {"name": "琅琊王司马金龙墓志", "period": "北魏", "description": "—墓志铭文书法工整，是北魏书法的重要遗存，对研究北碑书法有重要意义。"}, {"name": "辽代壁画墓壁画", "period": "辽代，10-11世纪", "description": "—大同地区发现多座辽代壁画墓，绘有宴饮、出行、侍奉等场面，人物服饰兼具契丹和汉族特征，是辽代社会生活的生动写照。"}, {"name": "北魏彩绘人物陶俑群", "period": "北魏", "description": "—成组出土的彩绘陶俑，包括武士俑、文官俑、侍女俑、胡人俑等，面部特征多样，反映了平城时期多民族杂居的社会面貌。"}], "dynastyConnections": [], "sources": ["大同市博物馆官网: http://www.dtbwg.com/"]}, {"id": "shanxi", "name": "山西博物院", "lat": 37.8636, "lng": 112.5226, "location": "山西省太原市万柏林区滨河西路北段13号", "level": "国家一级博物馆", "corePeriod": "西周至春秋（晋文化）、北朝至隋唐（佛教艺术）", "specialty": "晋国青铜器收藏全国首屈一指，鸟尊为镇馆之宝。佛教造像从北魏到唐代形成完整序列，侯马盟书是春秋晚期政治史的珍贵文字资料。山西作为\"中国古建筑博物馆\"，馆内对古建筑也有专题展示。", "treasures": ["晋侯鸟尊", "侯马盟书", "龙形觥", "兽形觥", "庙底沟彩陶"], "halls": ["晋国霸业", "佛风遗韵", "土木华章", "文明摇篮"], "dynastyCoverage": "新石器时代（庙底沟）、商、西周、春秋、北魏、北齐、唐、宋、辽金", "timeline": "庙底沟文化（前4000年）→ 晋国（前1033-前376年）→ 北魏平城/洛阳时代 → 唐代佛教兴盛", "artifacts": [{"name": "晋侯鸟尊", "period": "西周，约前9世纪", "description": "—曲沃天马-曲村晋侯墓地114号墓出土，凤鸟回首造型，背上有盖，尾部有象鼻形鋬。是晋侯燮父时期的青铜礼器，造型独特，已成为山西博物院的标志。"}, {"name": "侯马盟书", "period": "春秋晚期，约前497-前489年", "description": "—侯马晋国遗址出土，用毛笔写在玉石片上的盟誓文书，共5000余片。记载了晋国赵氏内部及赵氏与其他卿族的盟誓活动，是研究春秋晚期政治斗争的第一手资料，也是目前所见最早的毛笔书写文字实物之一。"}, {"name": "龙形觥", "period": "商代晚期", "description": "—山西石楼出土，整器为龙形，龙首张口为流，通体饰鼍纹、夔龙纹。造型在商代青铜器中极为罕见，体现了晋陕高原青铜文化的独特面貌。"}, {"name": "兽形觥", "period": "商代晚期", "description": "—灵石旌介出土，整体呈四足兽形，兽背上有盖，造型浑厚生动。是商代晚期青铜酒器的杰出代表。"}, {"name": "庙底沟彩陶", "period": "新石器时代，约前4000年", "description": "—以花瓣纹、旋涡纹为典型装饰，代表了仰韶文化庙底沟类型，这一文化类型从山西、陕西扩展至黄河中游广大地区，被认为是华夏文化早期扩张的考古学证据。"}, {"name": "虞弘墓汉白玉石椁", "period": "北齐-隋，592年", "description": "—太原出土，石椁浮雕表现了大量中亚祆教风格的宴饮、狩猎、乐舞场面，墓主虞弘为鱼国（中亚）人。是丝绸之路文化交融的重要实物。"}, {"name": "司马金龙墓漆画屏风", "period": "北魏，484年", "description": "—大同司马金龙墓出土，以漆画描绘列女故事，线条流畅，色彩鲜艳。是北魏绘画遗存中最精美的作品之一（此件现存大同市博物馆，山西博物院有部分展示）。"}, {"name": "木雕彩绘观音像", "period": "宋代", "description": "—山西古建筑中流出的木雕精品，体现了山西宋代佛教造像的高超水平。"}], "dynastyConnections": [], "sources": ["山西博物院官网: https://www.shanximuseum.com/"]}, {"id": "shenyang-gugong", "name": "沈阳故宫博物院", "lat": 41.7957, "lng": 123.4553, "location": "辽宁省沈阳市沈河区沈阳路171号", "level": "世界文化遗产（2004年作为明清皇宫扩展项目）、第一批全国重点文物保护单位（1961年）、国家一级博物馆（2017年）", "corePeriod": "清代前期（后金/清入关前，1625-1644年）", "specialty": "中国现存仅次于北京故宫的第二大古代宫殿建筑群。始建于努尔哈赤，续建于皇太极，乾隆时期大规模扩建。分东路（大政殿+十王亭，体现八旗制度）、中路（大清门→崇政殿→凤凰楼→清宁宫，前朝后寝）、西路（文溯阁，藏《四库全书》）。宫殿建筑融合满族、汉族和蒙藏建筑风格。曾是与北京宫苑、承德避暑山庄齐名的清代三大文物宝库之一。2024年接待观众突破500万人次，2025年达585万人次。", "treasures": ["1. 宫殿建筑群本身 — 清入关前皇宫", "满族建筑风格的最高代表"], "halls": ["大政殿与十王亭（八旗制度建筑化身）", "崇政殿（皇太极朝政之所）", "凤凰楼/清宁宫（后寝区", "高台城堡式）", "文溯阁（藏书楼）"], "dynastyCoverage": "后金/清（1625-清末）；建筑营建跨天命至乾隆", "timeline": "1625年努尔哈赤迁都沈阳，始建大政殿。1626年皇太极继位后扩建中路。1636年皇太极在此改国号\"大清\"。1644年顺治在此登基后迁都北京，沈阳故宫成为\"陪都宫殿\"。康熙至道光四帝先后10次东巡驻跸于此。", "artifacts": [{"name": "大政殿", "period": "1625年始建", "description": "八角重檐攒尖式建筑，殿顶满铺黄琉璃瓦镶绿剪边，正中相轮火焰珠顶，宝顶八条铁链连力士。殿前双金龙盘柱，殿内梵文天花和降龙藻井。这是清太祖举行大典之所，顺治帝在此登基"}, {"name": "十王亭", "period": "天命年间", "description": "大政殿两侧八字形排列10座亭子，分属八旗和左右翼王。是满族八旗制度在建筑上的直接体现，脱胎于游牧民族的帐殿形制——\"帐篷的固化\""}, {"name": "凤凰楼/清宁宫", "period": "天聪年间", "description": "中路高台建筑，寝宫区建于正方形高台之上，形成\"城堡式\"寝区。清宁宫保留了满族传统的口袋房（万字炕/烟囱建在山墙外侧等满族居住习俗）"}, {"name": "文溯阁", "period": "乾隆四十六年/1781年建", "description": "藏《四库全书》的藏书楼。外观两层、内部三层（含暗层），仿宁波天一阁。与北京文渊阁等并列为\"北四阁\"之一"}], "dynastyConnections": [{"dynasty": "后金/清初（1625-1644年）", "description": "大政殿+十王亭的布局完美体现了满族八旗制度——一殿统八旗，这是其他任何宫殿都没有的。中路\"前低后高\"的寝宫区保留了满族筑城居高的传统"}, {"dynasty": "清中期（康熙-乾隆东巡）", "description": "150年间四帝十次东巡，乾隆增建行宫和文溯阁，并从北京运来大量皇家珍宝贮藏，使沈阳故宫成为清代三大文物宝库之一"}, {"dynasty": "近代离散", "description": "1914年11万余件藏品被迁北平，1933年部分随故宫文物南迁，1948年部分被运至台湾。原藏于沈阳故宫的文物如今分散在国内多家博物馆"}], "sources": ["百度百科·沈阳故宫（详细词条，含建筑布局、历史沿革、文物详情）"]}, {"id": "sichuan", "name": "四川博物院", "lat": 30.65, "lng": 104.03, "location": "四川省成都市浣花南路251号（浣花溪历史文化风景区内）", "level": "国家一级博物馆（2012年）、中央地方共建国家级博物馆候选", "corePeriod": "古蜀文明（先秦）、汉代、藏传佛教", "specialty": "西南地区最大的综合性博物馆。馆藏35万余件，珍贵文物7万余件。14个展厅，展厅面积约12635㎡。张大千临摹敦煌壁画收藏（183幅）为全球最大规模。万佛寺石刻南朝造像独具特色。巴蜀青铜器汇聚了三星堆、金沙等系列重大考古出土文物。", "treasures": ["1. 张大千临摹敦煌壁画（183幅）— 全球最大单批张大千敦煌壁画收藏"], "halls": ["巴蜀青铜馆\"（三星堆/金沙/涪陵小田溪等出土青铜器）", "张大千书画馆\"（183幅临摹敦煌壁画）", "万佛寺石刻馆\"（南朝至唐代石刻造像）", "汉代陶石艺术展", "藏传佛教文物馆", "四川民族文物展"], "dynastyCoverage": "新石器 → 古蜀（三星堆/金沙）→ 秦汉（画像砖/陶俑）→ 南朝至唐（万佛寺石刻/佛教造像）→ 宋元明清 → 近现代（抗战/红军长征）", "timeline": "四川是\"天府之国\"，从古蜀文明到秦统一、再到汉代富庶、唐代佛教艺术繁荣、直至近代抗战大后方，四川的文化积淀极其深厚。四川博物院的藏品时间跨度和门类广度堪称西南之最。", "artifacts": [{"name": "张大千临摹敦煌壁画", "period": "1941-1943年绘制，1963年家属捐赠", "description": "183幅，张大千在敦煌近3年系统临摹莫高窟壁画的成果。大部分为未完稿，包含北魏、西魏、隋、唐、五代等各时期壁画临摹，是研究敦煌壁画和张大千艺术的珍贵资料"}, {"name": "巴蜀青铜器", "period": "商周至战国", "description": "汇集三星堆、金沙、新繁水观音、巴县冬笋坝、彭州竹瓦街、新都马家乡、涪陵小田溪等重大考古出土。巴蜀青铜器以多样的锋刃器（兵器/工具）为特色，器上常有巴蜀特殊符号铭文"}, {"name": "万佛寺石刻造像", "period": "南朝梁至唐代，约200余件", "description": "万佛寺（成都西门外）自清光绪八年（1882年）以来先后四次出土大批石刻造像，包括佛像、菩萨像、造像碑、伎乐像。南朝造像风格秀美，是长江流域佛教艺术的高峰"}, {"name": "汉代画像砖", "period": "东汉", "description": "四川汉代画像砖题材极为丰富（盐井、市集、宴饮、车马出行、播种收获等），是汉代社会生活的图像百科全书"}, {"name": "新都马家乡大墓出土铜器", "period": "战国", "description": "礼器形制和纹饰与楚器相似，反映巴蜀与楚文化的交流"}, {"name": "格萨尔唐卡", "period": "清至近代", "description": "描绘藏族英雄史诗《格萨尔》故事的唐卡系列，川西藏区文化的珍贵遗产"}], "dynastyConnections": [], "sources": ["百度百科·四川博物院（详细词条，含馆藏数据、展厅描述、历史沿革）"]}, {"id": "silk", "name": "中国丝绸博物馆", "lat": 30.2244, "lng": 120.1575, "location": "浙江省杭州市西湖区玉皇山路73-1号", "level": "国家一级博物馆", "corePeriod": "新石器时代至明清（中国丝绸五千年通史）", "specialty": "世界上最大的丝绸专题博物馆。占地42286㎡，建筑面积22999㎡，建筑整体为蚕的造型。馆藏文物70246件/套（截至2022年），珍贵文物5093件/套。设有中国纺织品鉴定保护中心和纺织品文物保护国家文物局重点科研基地。丝绸之路沿线出土的汉唐织物、辽金服饰、宋代服饰、明清官机产品为核心收藏。", "treasures": ["1. 战国对龙对风纹锦 — 中国早期丝织技术代表"], "halls": ["丝绸故事陈列\"（丝绸厅→丝绸之路连廊→服饰厅）", "丝绸工艺陈列\"（蚕桑厅→染织厅→织造坊", "含古代织机操作演示）", "纺织品文物修复展示馆", "时装馆"], "dynastyCoverage": "新石器时代（浙江出土距今5000余年丝线）→ 商周（丝织起步）→ 秦汉（丝路开通）→ 魏晋南北朝（绞缬工艺）→ 隋唐（丝路繁荣高峰）→ 宋元（织锦技术革新）→ 明清（官营织造/缂丝/刺绣高峰）", "timeline": "中国是世界上最早发明丝绸的国家。浙江余姚河姆渡和钱山漾遗址出土了距今约5000年的丝线和丝织物残片。丝绸之路即因中国丝绸而得名。从先秦到明清，丝绸始终是中国最重要的出口商品和文化符号。", "artifacts": [{"name": "战国对龙对风纹锦", "period": "战国", "description": "中国早期丝织技术的代表作，图案对称精美"}, {"name": "汉晋长葆子孙锦", "period": "北朝", "description": "长192cm，宽72cm，交领大袖，面料用绞缬工艺染出黄色小点纹。是中国目前所知最早的绞缬（扎染）丝绸服饰实物之一"}, {"name": "唐朵花纹蓝地蜡缬绢", "period": "唐代", "description": "长78cm，宽51cm，蜡缬是唐代\"三缬\"（绞缬/蜡缬/夹缬）之一"}, {"name": "唐立狮宝花纹锦", "period": "唐代", "description": "典型的\"陵阳公样\"（联珠环内动物纹与中国花卉纹的结合），反映丝路文化交融"}, {"name": "元代菱地飞鸟纹绫海青衣", "period": "元代", "description": "衣长119cm，袖长224cm，右衽交领，肩部可伸出手臂，后襟开衩便于骑马。袖肩有钉金高绣，是元代游牧民族服饰与中原丝绸工艺结合的杰作"}, {"name": "宋代花罗裙裤", "period": "宋代", "description": "江南出土的宋代丝绸服饰，反映宋代丝织工艺的精细"}], "dynastyConnections": [{"dynasty": "起源（新石器-商周）", "description": "浙江出土的距今5000年丝线证明中国是丝绸的发源地"}, {"dynasty": "丝路时代（秦汉-唐）", "description": "汉代张骞通西域后，丝绸成为连接东西方的纽带。馆藏大量丝路出土的汉唐织物是这一辉煌时代的实物证据"}, {"dynasty": "技术高峰（宋元明清）", "description": "宋代花罗、元代织金、明清缂丝和刺绣将丝织技艺推向新高度。明清官营织造（江宁/苏州/杭州三织造）产出了最精美的丝绸制品"}], "sources": ["百度百科·中国丝绸博物馆（详细词条，含馆藏数据、展厅描述、文物详情）"]}, {"id": "suzhou", "name": "苏州博物馆", "lat": 31.323, "lng": 120.6318, "location": "江苏省苏州市姑苏区东北街", "level": "国家一级博物馆", "corePeriod": "春秋（吴国）、五代宋元（丝织、书画）、明清（文人文化）", "specialty": "建筑本身即为最大展品——贝聿铭封刀之作，将现代建筑与苏州传统园林完美融合。馆藏以吴文化文物、宋元明清书画和苏作工艺为核心，是文人江南美学的集中体现。", "treasures": ["五代秘色瓷莲花碗", "明代真珠舍利宝幢", "北宋黄庭坚草书（局部）", "吴王余眜剑", "明代文徵明手卷"], "halls": ["吴地遗珍（吴文化考古）", "吴门书画（明四家）", "吴中风雅（文人生活）", "现代艺术厅", "贝聿铭建筑本体"], "dynastyCoverage": "新石器时代（草鞋山）→ 春秋（吴国）→ 六朝 → 唐宋 → 明清（苏州为经济文化中心）", "timeline": "吴国（约前12世纪-前473年）以姑苏为都，是春秋五霸之一；苏州自唐代起即为中国最繁华的城市之一，明清时期苏州府赋税占全国十分之一，是全国经济文化重心", "artifacts": [{"name": "五代秘色瓷莲花碗", "description": "五代（10世纪）。1956年苏州虎丘云岩寺塔发现，碗托与碗身合为莲花形，釉色青翠如湖水，是存世秘色瓷中的极品，也是确认秘色瓷概念的关键实物。"}, {"name": "明代真珠舍利宝幢", "description": "北宋（1013年）。虎丘云岩寺塔出土，高1.22米，以珍珠、玛瑙、水晶等七宝装饰，工艺极其繁复，是宋代佛教艺术的巅峰之作。"}, {"name": "吴王余眜剑", "description": "春秋（约前6世纪）。铸有铭文\"攻吾王余眜自作用剑\"，是吴国青铜兵器的代表，反映了吴国高超的铸剑技术。"}, {"name": "明代文徵明书画", "description": "明代（16世纪）。苏州是\"吴门画派\"的大本营，文徵明、沈周、唐寅、仇英合称\"明四家\"，苏博收藏丰富。"}, {"name": "宋代碑刻《天文图》《地理图》《帝王绍运图》《平江图》", "description": "南宋。苏州文庙\"四大宋碑\"，其中《平江图》是现存最古老的苏州城市地图，展示了宋代苏州的城市格局。"}, {"name": "明清苏作家具", "description": "明清。苏作家具以黄花梨、紫檀为材，造型简约雅致，是中国古典家具的最高代表，深刻影响了世界家具设计。"}, {"name": "草鞋山出土纺织品残片", "description": "新石器时代（约前4000年）。是中国已知最早的葛布残片之一，证明苏州地区纺织传统源远流长。"}], "dynastyConnections": [{"dynasty": "春秋（吴国）", "description": "阖闾、夫差以姑苏为都城，伍子胥筑城，孙武练兵。吴国铸剑技术冠绝诸侯，干将莫邪的传说即出于此。苏博的吴国青铜器是理解吴文化军事和礼仪的核心。"}, {"dynasty": "明代（吴门画派）", "description": "明中期苏州经济繁荣，文人荟萃，诞生了以沈周、文徵明为代表的吴门画派，以及昆曲、苏绣、苏作家具等文化艺术形式。苏州博物馆是吴门书画收藏的重镇。"}, {"dynasty": "建筑本身的时代意义", "description": "贝聿铭（1917-2019）是苏州望族后人，苏博新馆是他的收官之作。建筑以白墙灰瓦、几何山水呼应苏州传统，同时用现代材料和光影手法创造了全新的空间体验，本身就是一件连接古今的艺术品。"}], "sources": ["苏州博物馆官网: https://www.szmuseum.com/"]}, {"id": "taipei-gugong", "name": "台北故宫博物院", "lat": 25.1024, "lng": 121.5485, "location": "台湾省台北市士林区至善路二段221号", "level": "世界级博物馆（与北京故宫、大英博物馆等并列）", "corePeriod": "宋元明清（中国古代书画/瓷器/青铜器/玉器精品）", "specialty": "中国三大博物馆之一。截至2021年馆藏698854件/册，源自紫禁城、沈阳故宫、避暑山庄、颐和园等皇家旧藏精华。1948-1949年分三批从南京迁台：故宫2972箱、中央博物院筹备处852箱。瓷器25595件、绘画6744件、书法3741件、玉器13478件、铜器6241件、善本图书216507册、档案文献395551册件。甲骨档案2万余片（世界第二）。建筑为宫殿式，淡蓝色琉璃瓦覆顶。2015年南部院区（嘉义）开馆。", "treasures": ["1. 西周毛公鼎 — 铭文497字", "现存青铜器铭文最长"], "halls": ["书画厅（轮换展出历代名家真迹）", "瓷器厅（汝窑/官窑/哥窑等宋瓷精品）", "青铜器厅（毛公鼎/散氏盘等）", "玉器厅（翠玉白菜等）"], "dynastyCoverage": "商周（甲骨/青铜器）→ 秦汉 → 魏晋南北朝 → 唐 → 宋（书画/瓷器高峰）→ 元明清（宫廷收藏鼎盛）", "timeline": "台北故宫的藏品是中国皇家收藏历经千年积淀的精华。从1933年故宫文物南迁避日军，到抗战期间辗转巴县、峨眉、乐山，再到1948-1949年迁台——这批文物经历了中国近代史上最大规模的文物迁移，也是国家分裂的文化缩影。", "artifacts": [{"name": "毛公鼎", "period": "西周晚期", "description": "铭文497字，是现存商周青铜器中铭文最长的一件，记录了周宣王对毛公的册命，是研究西周政治制度的第一手资料"}, {"name": "翠玉白菜", "period": "清代", "description": "以一块半白半绿的翠玉雕琢成白菜造型，菜叶上伏螽斯和蝗虫，寓意多子多孙。原置于紫禁城永和宫，据传为光绪妃嫔嫁妆"}, {"name": "王羲之《快雪时晴帖》", "period": "东晋/唐摹本", "description": "乾隆\"三希堂\"三件珍宝之首。帖文仅28字，但被乾隆帝视为至宝"}, {"name": "黄公望《富春山居图》（无用师卷）", "period": "元代", "description": "中国十大传世名画之一的后半卷（前半卷\"剩山图\"藏于浙江省博物馆）"}, {"name": "汝窑瓷器", "period": "北宋", "description": "台北故宫藏21件，全球存世仅约90件。汝窑釉色\"天青\"被誉为宋瓷之冠"}, {"name": "怀素《自叙帖》", "period": "唐代", "description": "狂草极致，中国书法史巅峰之作"}, {"name": "苏轼《寒食帖》", "period": "北宋", "description": "\"天下第三行书\""}, {"name": "散氏盘", "period": "西周晚期", "description": "铭文357字，记录西周土地契约"}], "dynastyConnections": [{"dynasty": "商周青铜器", "description": "毛公鼎、散氏盘等西周重器，是中国金石学的核心实物"}, {"dynasty": "宋代书画与瓷器", "description": "宋代是中国文人艺术的巅峰。台北故宫的宋画收藏（范宽/郭熙/李唐等）和汝窑瓷器为全球之冠"}, {"dynasty": "元明清", "description": "元四家、明四家到清代宫廷画家的作品完整呈现了中国绘画史的后半段。善本《四库全书》（文渊阁本）是清代文化工程的顶峰"}], "sources": ["百度百科·台北故宫博物院（详细词条，含馆藏统计、文物迁移史、建筑布局）"]}, {"id": "tianjin", "name": "天津博物馆", "lat": 39.0836, "lng": 117.2258, "location": "天津市河西区平江道62号（天津文化中心内）", "level": "国家一级博物馆", "corePeriod": "清代至近代（书画、瓷器、文房收藏）", "specialty": "以清代书画和瓷器收藏见长，得益于天津近代作为北方商贸中心和文化重镇的地位，大量清宫旧藏和民间珍品汇聚于此。天津开埠后中西文化交融的近代史也是重要展示内容。", "treasures": ["范宽《雪景寒林图》", "青花釉里红开光贴花大罐（元）", "西周太保鼎", "清乾隆珐琅彩芍药雉鸡纹玉壶春瓶"], "halls": ["耀世奇珍——馆藏文物精品陈列", "中华百年看天津"], "dynastyCoverage": "商周、宋、元、明、清、近代", "timeline": "西周燕国 → 金代直沽寨 → 明永乐筑城设卫（1404年）→ 清代漕运重镇 → 1860年开埠 → 近代\"百年中国看天津\"", "artifacts": [{"name": "范宽《雪景寒林图》", "period": "北宋，约11世纪初", "description": "—三联幅绢本水墨，描绘北方冬日的雄浑山水。范宽是北宋山水画三大家之一，此画气势磅礴，是宋代山水画的巅峰之作。此画传世仅此一件，极为珍贵。"}, {"name": "元青花釉里红开光贴花盖罐", "period": "元代，14世纪", "description": "—罐身以青花和釉里红两种釉下彩装饰，开光内贴塑花卉。元代青花釉里红器物存世极少，此罐工艺复杂、保存完好，是元代瓷器的绝世珍品。"}, {"name": "西周太保鼎", "period": "西周早期", "description": "—\"太保\"即召公奭，为西周开国重臣。鼎形制庄重，四足呈柱形，腹部及足部有扉棱装饰。是西周早期青铜礼器的重要代表，也是研究周初政治的实物材料。"}, {"name": "清乾隆珐琅彩芍药雉鸡纹玉壶春瓶", "period": "清乾隆", "description": "—珐琅彩瓷器中的精品，画工细腻，色彩绚丽。珐琅彩瓷是清代宫廷瓷器中最珍贵的品种，存世数量极少。"}, {"name": "翡翠蝈蝈白菜", "period": "清代", "description": "—利用翡翠天然色彩巧雕而成，白菜叶片上蝈蝈栩栩如生。与台北故宫翠玉白菜齐名，是清代玉雕工艺的杰出代表。"}, {"name": "北宋范宽款山水", "period": "清代", "description": "—天津博物馆收藏有多件清宫旧藏的欧洲和中国制造钟表，反映了清代宫廷对西方机械工艺的浓厚兴趣。"}], "dynastyConnections": [], "sources": ["天津博物馆官网: https://www.tjbwg.com/"]}, {"id": "wenzi", "name": "中国文字博物馆", "lat": 36.099, "lng": 114.3928, "location": "河南省安阳市人民大道东段656号", "level": "国家一级博物馆", "corePeriod": "商代（甲骨文）至当代（汉字发展全史）", "specialty": "全球首座以文字为主题的国家级博物馆，位于甲骨文故乡安阳殷墟旁。由主体馆\"宣文馆\"、东馆\"徽文馆\"、西馆\"博文馆\"和汉字公园组成，总占地470.4亩。从甲骨文到信息时代，完整呈现汉字及中国少数民族文字的发展历程。", "treasures": ["甲骨文实物", "青铜器铭文拓片", "秦代诏版（统一文字证据）", "历代碑帖善本", "少数民族文字文物"], "halls": ["中国文字发展史\"常设展（宣文馆）", "一片甲骨惊天下\"甲骨文专题展", "字书琼林\"（徽文馆）"], "dynastyCoverage": "商（甲骨文）→ 西周（金文）→ 秦（小篆/统一文字）→ 汉（隶书）→ 魏晋（楷书）→ 唐宋元明清（印刷术）→ 当代", "timeline": "安阳殷墟出土的甲骨文是中国发现的年代最早的成熟文字系统，把中国信史向上推进了约1000年。文字博物馆在殷墟旁建馆，形成\"文字+考古\"的完整体验", "artifacts": [{"name": "甲骨文实物", "period": "商代晚期，约前1300-前1046年", "description": "龟甲和兽骨上的刻辞，是商王室占卜的记录。自1899年王懿荣首次发现以来，累计出土约16万片，已识别字形约4500个，可释读约1500字"}, {"name": "青铜器铭文", "period": "西周", "description": "展示金文（钟鼎文）的发展，字形比甲骨文更规整，内容涉及册命、赏赐、战争等，是西周社会的直接文献"}, {"name": "秦代诏版", "period": "秦，前221年后", "description": "刻有秦始皇统一度量衡诏书的铜版/铁版，是\"书同文\"政策的实物证据"}], "dynastyConnections": [], "sources": ["中国文字博物馆官网: https://www.wzbwg.com/", "百度百科·中国文字博物馆", "维基百科·中国文字博物馆", "国家民委报道: https://www.neac.gov.cn/seac/xwzx/202603/1187705.shtml"]}, {"id": "xinjiang", "name": "新疆维吾尔自治区博物馆", "lat": 43.81, "lng": 87.5775, "location": "新疆维吾尔自治区乌鲁木齐市西北路581号", "level": "国家一级博物馆（2008年首批）", "corePeriod": "青铜时代至唐代（丝绸之路西域段）", "specialty": "中国唯一全面展示西域文明的省级博物馆。馆藏3.2万件，一级品288件。以古代干尸（楼兰美女等）、多语言文书（汉文、回鹘文、佉卢文、吐火罗文、梵文、粟特文等9种文字）、汉唐丝织品为三大独特收藏。2022年二期投用后，展览面积从6178㎡增至1.13万㎡。2023年设立\"国博厅\"和\"故宫厅\"。", "treasures": ["1. \"五星出东方利中国\"锦护膊（汉代）— 长18.5cm", "宽12.5cm", "1995年出土", "织有汉字\"五星出东方利中国\""], "halls": ["新疆历史文物展\"（700余件文物", "12个单元", "2022年获全国十大陈列展览精品特别奖）", "逝而不朽惊天下——新疆古代干尸展\"（7个单元）", "瀚海霓裳——西域服饰的记忆\"（3800年跨度）", "新疆民族风情陈列\"（12个民族民俗）"], "dynastyCoverage": "青铜时代（小河/楼兰）→ 汉（西域都护府，前60年）→ 魏晋南北朝（高昌/龟兹）→ 唐（安西都护府）→ 宋元（回鹘/西辽）→ 清（新疆建省）", "timeline": "前60年汉设西域都护府，新疆正式纳入中国版图。此后历经东汉班超经营西域、唐代安西都护府管辖、清代新疆建省，新疆始终是丝绸之路的核心段和东西方文明交汇之地。", "artifacts": [{"name": "\"五星出东方利中国\"锦护膊", "period": "汉代，1995年尼雅遗址出土", "description": "长18.5cm，宽12.5cm，织有汉字\"五星出东方利中国\"和凤凰、鸾鸟、白虎等纹样。是目前所知汉代织锦中工艺最复杂、色彩最丰富的品种之一，被列为首批禁止出国展览文物"}, {"name": "楼兰女尸", "period": "约3800年前，1980年罗布泊铁板河出土", "description": "身长152cm，生前约155.8cm，死亡年龄40-45岁。栗色直发，尖高鼻梁，眼睛深凹，皮肤呈古铜色。是世界上保存最好的古尸之一"}, {"name": "营盘男尸", "period": "汉晋，1995年尉犁县营盘遗址15号墓出土", "description": "男性，约25岁，身高约1.8米。面覆金箔面具，身穿红地对人兽树纹罽袍（毛织物，图案含人物、狮鹫和石榴树），具有强烈的希腊化艺术风格，是东西方文化交融的标本"}, {"name": "小河墓地女性干尸", "period": "约3800年前", "description": "身长158cm，灰棕色头发自然中分，保存极为完好。小河墓地\"千口棺材\"的发现震惊考古界"}, {"name": "汉唐丝织品", "period": "汉至唐", "description": "包括锦、绮、绫、罗、纱等大量丝织品，以及毯、毡、绦带等毛织品，是研究中国古代纺织史和丝路贸易的第一手实物"}], "dynastyConnections": [], "sources": ["百度百科·新疆维吾尔自治区博物馆（详细词条，含馆藏数据、展厅描述、文物详情）", "新疆博物馆官网"]}, {"id": "xizang", "name": "西藏博物馆", "lat": 29.65, "lng": 91.1, "location": "西藏自治区拉萨市城关区罗布林卡路19号", "level": "国家一级博物馆", "corePeriod": "吐蕃王朝（7-9世纪）、藏传佛教艺术（元明清至今）", "specialty": "西藏唯一集典藏、展示、研究、教育为一体的现代化综合博物馆。新馆占地6.5万㎡，馆藏52万余件，珍贵文物4万余件（套）。以藏传佛教艺术（唐卡、佛像、法器）、历代中央政府颁赐金印金册、贝叶经和藏文典籍为核心收藏。\"西藏历史文化\"基本陈列获1999年全国十大陈列展览精品。", "treasures": ["1. 双体陶罐（新石器时代·卡若文化）— 镇馆之宝", "卡若先民制陶最高水平"], "halls": ["雪域长歌——西藏历史与文化\"（2022年新馆基本陈列）", "离太阳最近的人——西藏民俗文化", "元明清玉器精品馆"], "dynastyCoverage": "新石器时代（卡若文化/曲贡文化）→ 吐蕃王朝（7-9世纪）→ 分裂割据 → 萨迦/帕竹/甘丹颇章 → 清代（金瓶掣签制度）→ 近现代", "timeline": "7世纪松赞干布统一吐蕃并迁都拉萨，与唐朝联姻（文成公主、金城公主入藏）。13世纪西藏纳入元朝版图，此后历经明清两代中央政府持续管辖。清乾隆时期建立金瓶掣签制度。", "artifacts": [{"name": "双体陶罐", "period": "新石器时代·卡若文化，昌都卡若遗址出土", "description": "镇馆之宝。两个圆形陶罐通过桥状提手连为一体，造型独特，制作工艺纯熟，代表了卡若文化的最高制陶水平，也是新石器时代西藏陶器的标志作品"}, {"name": "贝叶经", "period": "古代印度传入", "description": "用南亚贝多罗树叶制作的梵文佛经，经特殊药物处理不干裂、不虫蛀、不霉变，是研究早期佛教史和佛教文化的第一手资料"}, {"name": "桦树皮书写经", "period": "吐蕃时代", "description": "世界上唯一完整的桦树皮经，采用桦树内层树皮双面墨书手写，历经千年文字仍清晰可读"}, {"name": "金瓶", "period": "清·乾隆", "description": "清乾隆帝颁赐，用于金瓶掣签制度认定活佛转世灵童。将候选灵童名字写在象牙签牌上放入金瓶，由呼图克图和驻藏大臣在大昭寺共同抽签认定"}, {"name": "历代达赖喇嘛金印金册", "period": "清代", "description": "清帝册封达赖喇嘛时颁布，金印为金或玉质，书写汉、藏、满、蒙四种文字；金册将诏书直接刻于金箔之上"}, {"name": "唐卡精品", "period": "历代", "description": "博物馆收藏大量勉唐画派、齐岗画派、尼泊尔画派唐卡，题材涉及历史、宗教、文化和社会生活"}, {"name": "青花缠枝莲纹花觚", "period": "清·乾隆", "description": "督窑官唐英监制，造型高大精美，成对保存，是中央政府赏赐给西藏的宫廷瓷器"}, {"name": "元明清玉器", "period": "元至清", "description": "107件历代中央政府赏赐给西藏地方政府的玉器"}], "dynastyConnections": [], "sources": ["百度百科·西藏博物馆（详细词条，含建馆历程、馆藏数据、文物详情）", "西藏博物馆官方信息"]}, {"id": "xuzhou", "name": "徐州博物馆", "lat": 34.2554, "lng": 117.1847, "location": "江苏省徐州市云龙区和平路118号（云龙山北麓）", "level": "国家一级博物馆", "corePeriod": "西汉（楚国/彭城，诸侯王陵墓群）", "specialty": "徐州是西汉楚国都城，出土了大量汉代诸侯王墓葬文物。狮子山楚王陵是中国规模最大的西汉诸侯王崖洞墓之一，出土金缕玉衣等珍贵文物。汉画像石收藏也是一大特色。", "treasures": ["金缕玉衣（狮子山楚王陵出土）", "S形玉龙佩（西汉）", "银缕玉衣", "汉画像石", "铜牛灯"], "halls": ["汉室遗珍——徐州汉代文物陈列\"（核心）", "天工汉玉\"（汉代玉器专题）", "俑偶华彩\"（汉俑）"], "dynastyCoverage": "新石器（大墩子遗址）→ 先秦（宋国/楚国）→ 西汉（楚国，核心）→ 三国（徐州争夺战）→ 唐宋", "timeline": "西汉分封楚国于徐州（彭城），传12代楚王。狮子山楚王陵（约第3代楚王刘戊）是理解西汉\"郡国并行\"制度和诸侯王奢华生活的重要窗口", "artifacts": [{"name": "金缕玉衣", "period": "西汉，约前154年", "description": "狮子山楚王陵出土，由4248片玉片以金丝编缀，是目前出土年代较早、玉片数量较多的金缕玉衣之一。与河北满城汉墓的金缕玉衣互为参照"}, {"name": "S形玉龙佩", "period": "西汉", "description": "以整块玉料雕成S形飞龙，线条流畅，动感十足，是汉代玉雕艺术的杰作"}, {"name": "银缕玉衣", "period": "西汉", "description": "玉衣等级低于金缕，用银丝编缀，反映汉代严格的丧葬等级制度"}, {"name": "汉画像石", "period": "东汉", "description": "徐州地区出土大量画像石，题材涵盖车马出行、宴饮乐舞、神话故事、历史故事等，是汉代社会生活的图像百科"}, {"name": "铜牛灯", "period": "西汉", "description": "牛形铜灯，烟气通过牛角导入牛体内水中过滤，与南京博物院的错银铜牛灯异曲同工"}, {"name": "彩绘兵马俑", "period": "西汉", "description": "狮子山楚王陵附近出土数千件汉代兵马俑，虽小于秦俑但数量可观"}, {"name": "玉棺", "period": "西汉", "description": "狮子山楚王陵出土，以玉片镶嵌的棺椁"}], "dynastyConnections": [], "sources": ["核心信息基于AI知识库", "狮子山楚王陵考古报告"]}, {"id": "yangzhou", "name": "扬州博物馆 / 中国大运河博物馆", "lat": 32.3942, "lng": 119.435, "location": "扬州博物馆：江苏省扬州市邗江区；中国大运河博物馆：扬州市广陵区三湾古运河畔", "level": "均为国家一级博物馆", "corePeriod": "隋唐（大运河开凿、唐代扬州极盛）、清代（盐商文化）", "specialty": "扬州博物馆以地方通史和雕版印刷为特色；中国大运河博物馆是唯一全面展示大运河2500年历史的国家级专题馆，建筑恢宏，沉浸式体验突出。两馆配合可完整理解运河与扬州的共生关系。", "treasures": ["元代霁蓝釉白龙纹梅瓶（扬博）", "隋炀帝墓出土蹀躞金玉带（扬博）", "唐代长沙窑瓷器（大运河博物馆）", "雕版印刷古籍"], "halls": ["扬博\"广陵潮——扬州城市故事", "大运河博物馆\"大运河——中国的世界文化遗产", "运河上的舟楫\"（1:1复原古船）", "河之恋\"沉浸式体验厅"], "dynastyCoverage": "春秋（吴王夫差开邗沟）→ 隋代（开凿大运河）→ 唐代（扬州为国际都会）→ 宋元 → 明清（盐商文化、扬州学派）", "timeline": "邗沟（前486年）是大运河最早的河段；隋炀帝（605-610年）贯通南北大运河，扬州为起点；唐代扬州是中国最富庶的城市之一，\"扬一益二\"；2014年大运河列入世界遗产", "artifacts": [{"name": "元代霁蓝釉白龙纹梅瓶", "description": "元代（14世纪）。扬博镇馆之宝，全球仅存三件同类器之一。钴蓝釉上以白泥堆塑游龙，气势磅礴，是元代景德镇瓷器的极品。"}, {"name": "隋炀帝墓出土蹀躞金玉带", "description": "隋代（7世纪初）。2013年扬州曹庄发现隋炀帝墓，出土的十三环蹀躞金玉带是确认墓主帝王身份的关键证据。"}, {"name": "隋炀帝墓铜编钟铜编磬", "description": "隋代。随葬礼乐器，虽经缩小制作但规制完整，反映了隋代宫廷礼仪制度。"}, {"name": "唐代长沙窑青釉褐彩瓷器", "description": "唐代（9世纪）。大运河沿线出土的外销瓷，证明运河作为南北商品流通大动脉的角色。"}, {"name": "清代扬州雕版印刷版片", "description": "清代。扬州是中国雕版印刷的重镇，清代刻印了《全唐诗》等大型丛书，版片保存至今。"}, {"name": "唐代铜镜", "description": "唐代。扬州是唐代最重要的铜镜产地之一，出土的铜镜纹饰精美，反映了唐代扬州手工业的繁荣。"}, {"name": "汉代广陵王刘胥墓出土漆器", "description": "西汉。扬州（古称广陵）汉墓出土的漆器工艺精湛，反映了汉代扬州作为漆器生产中心的地位。"}], "dynastyConnections": [{"dynasty": "春秋（邗沟）", "description": "前486年吴王夫差为北伐齐国，开凿邗沟连接长江与淮河，这是大运河最早的河段，也是扬州因运河而生的起点。"}, {"dynasty": "隋代（大运河贯通）", "description": "隋炀帝以洛阳为中心贯通南北大运河，三下江都（扬州）。大运河全长近2700公里，是世界最长的人工运河。2013年扬州发现隋炀帝真墓，推翻了此前多处\"伪墓\"的说法。"}, {"dynasty": "唐代（扬州极盛）", "description": "唐代扬州是长江与运河交汇处的国际都会，人口超百万，\"天下之盛，扬为首\"。鉴真从扬州东渡日本，阿拉伯商人聚居于此。李白\"烟花三月下扬州\"即咏此盛况。"}, {"dynasty": "明清（盐商文化）", "description": "两淮盐运使驻扬州，盐商富甲天下，资助了扬州八怪等艺术流派，建造了精美的私家园林，形成了独特的扬州文化。"}], "sources": ["中国大运河博物馆官网: https://www.canal-museum.cn/"]}, {"id": "yinxu", "name": "殷墟博物馆", "lat": 36.1272, "lng": 114.3131, "location": "河南省安阳市殷都区小屯村", "level": "全国重点文物保护单位 / UNESCO世界文化遗产（2006年）", "corePeriod": "商代晚期（约前1300-前1046年）", "specialty": "中国考古学的诞生地，甲骨文的发现地，商代晚期都城遗址。殷墟的发掘开启了中国现代考古学，甲骨文的释读将中国有文字记载的历史上推至3300年前。2024年新馆是目前全面展示商文明的最现代化场馆。", "treasures": ["甲骨文卜辞", "妇好墓青铜器群", "司母辛鼎（后母辛鼎）", "亚长牛尊", "玉凤"], "halls": ["甲骨文专题展", "妇好墓原址及随葬品展示", "青铜器展厅", "车马坑展示", "宫殿宗庙遗址区"], "dynastyCoverage": "商代晚期（盘庚迁殷至纣王灭国，约270年）", "timeline": "约前1300年盘庚迁殷，此后殷墟作为商都约270年。前1046年（一说前1045年）周武王克商，商朝灭亡。殷墟是商代最后也是最辉煌的都城，甲骨文、青铜器、玉器代表了商文明的最高成就", "artifacts": [{"name": "甲骨文卜辞", "description": "商代晚期（前13-前11世纪）。1899年被发现，是中国已知最早的成熟文字系统。殷墟出土甲骨约15万片，内容涉及祭祀、战争、农业、天象等，是研究商代社会的第一手资料。甲骨文的发现改变了世界对中国古代文明的认识。"}, {"name": "司母辛鼎（后母辛鼎）", "description": "商代晚期。妇好墓出土，与中国国家博物馆的后母戊鼎形制相近但略小，铭文\"司母辛\"（或\"后母辛\"），是妇好之子为其所铸的祭器。"}, {"name": "妇好鸮尊", "description": "商代晚期。妇好墓出土的猫头鹰形青铜酒器，造型独特威武，是商代青铜器的代表作之一（原件藏河南博物院，殷墟有复制品及其他妇好墓青铜器）。"}, {"name": "亚长牛尊", "description": "商代晚期。以青铜铸成的写实水牛形酒器，体态浑圆，造型生动，出土于殷墟亚长墓，是商代动物形青铜器的杰作。"}, {"name": "玉凤", "description": "商代晚期。妇好墓出土，以和田玉雕成的凤鸟，造型简洁而优美，是商代玉器的标志性作品。"}, {"name": "甲骨文\"天象记录\"", "description": "商代晚期。部分甲骨记录了日食、月食、新星等天文现象，是世界最早的天文记录之一。"}, {"name": "车马坑", "description": "商代晚期。殷墟发现的车马坑是中国最早的马车实物证据，对研究商代交通和军事制度有重要价值。"}, {"name": "人殉与人牲遗存", "description": "商代晚期。殷墟王陵区发现大量殉人和祭祀坑，虽然令人不安，但这是理解商代宗教和社会等级制度不可回避的实物证据。"}], "dynastyConnections": [{"dynasty": "商代", "description": "殷墟是商代研究的基石，也是中国考古学的起点。    - **甲骨文与文字起源**：甲骨文有约4500个单字，已释读约1500字。它是汉字的直系祖先，从甲骨文到金文、篆书、隶书、楷书，一脉相承三千余年。2017年甲骨文入选UNESCO\"世界记忆名录\"。    - **妇好与商代女性**：妇好是商王武丁的王后，甲骨卜辞记载她曾领兵征伐、主持祭祀，是中国有文字记载的第一位女军事家。1976年其墓被完整发掘，出土随葬品1928件（含青铜器468件、玉器755件），是殷墟唯一未被盗掘的王室墓葬。    - **青铜文明巅峰**：商代晚期是中国青铜文明的巅峰。后母戊鼎（重832.84公斤，现藏国家博物馆）是世界已知最重的青铜器。殷墟出土的青铜器铸造工艺精湛，代表了人类早期金属冶铸的最高水平。    - **与三星堆的对话**：殷墟与四川三星堆是同时期的两大文明中心，风格截然不同。殷墟青铜器以礼器为主，三星堆以神像和面具为主，两者对比揭示了商代中国文明的多元面貌。"}], "sources": ["殷墟博物馆官网: https://www.ayyx.com/", "UNESCO世界文化遗产名录（2006年）"]}, {"id": "yungang", "name": "云冈石窟", "lat": 40.1113, "lng": 113.132, "location": "山西省大同市云冈区云冈镇", "level": "世界文化遗产(2001年)、全国重点文物保护单位、国家5A级景区", "corePeriod": "北魏(460-524年)", "specialty": "中国四大石窟之一(与敦煌莫高窟、洛阳龙门石窟、天水麦积山石窟并列)。云冈石窟是北魏皇家主持开凿的佛教石窟群,现存主要洞窟45个,大小造像59000余尊。开凿时间集中于北魏平城时代,风格融合了印度犍陀罗、中亚和中原艺术,是佛教艺术中国化的里程碑。", "treasures": ["昙曜五窟大佛(第16-20窟)", "第6窟释迦佛传故事雕刻", "第5窟17米大佛", "第12窟\"音乐窟\""], "halls": ["昙曜五窟(第16-20窟)", "第5-6窟(双窟)", "第9-13窟(中期洞窟)", "云冈博物馆"], "dynastyCoverage": "北魏(为主体)、唐、辽", "timeline": "太武帝灭佛(446年)→ 文成帝复法·昙曜开窟(460年)→ 早期(460-470年,昙曜五窟)→ 中期(471-494年,孝文帝时期大规模营造)→ 迁洛后晚期(494-524年)", "artifacts": [{"name": "第20窟露天大佛", "period": "北魏,约460-465年", "description": "-高13.7米,结跏趺坐,面容丰满,两耳垂肩,薄衣贴体(犍陀罗风格),神态庄严安详。因前壁崩塌而露天,成为云冈石窟的标志性形象。此像被认为是以北魏太武帝或文成帝为原型,体现了\"帝佛合一\"的政治理念--昙曜向文成帝提议\"令如帝身\"造佛像。"}, {"name": "第16-20窟(昙曜五窟)", "period": "北魏,460-470年", "description": "-云冈最早开凿的五个大窟,每窟一尊大佛,分别象征北魏五位皇帝(从道武帝到文成帝)。大佛高13-17米,风格统一而各具特色,体现了印度犍陀罗艺术与凉州佛教艺术的融合。这是中国石窟寺\"以帝王之身造佛\"的首创。"}, {"name": "第6窟释迦佛传浮雕", "period": "北魏,约471-494年", "description": "-中期代表洞窟,中心塔柱四面及窟壁雕刻了释迦牟尼一生的故事,从诞生到涅槃共33幅连续画面。雕刻精细繁复,是中国石窟叙事浮雕的巅峰之作。中心塔柱高达15米,四面雕满佛像和装饰。"}, {"name": "第5窟大佛", "period": "北魏", "description": "-高17米,是云冈最大的佛像。面容慈祥,衣纹流畅,已开始呈现中国化的审美特征(与昙曜五窟的西域风格相比)。前有清代修建的四层木构阁楼保护。"}, {"name": "第12窟\"音乐窟\"", "period": "北魏,约471-494年", "description": "-前室壁面雕刻了大量伎乐天人,手持各种乐器(琵琶、筚篥、排箫、细腰鼓等),是研究北魏音乐和乐器的珍贵图像资料,也是中国古代音乐图像最集中的石窟。"}, {"name": "第9-10窟(双窟)", "period": "北魏中期", "description": "-窟门雕刻中国式的殿堂建筑形式,窟内天花板雕飞天、莲花。是云冈中期洞窟中西合璧风格的典型代表。"}, {"name": "第3窟(灵岩寺洞)", "period": "北魏至唐辽", "description": "-云冈最大的洞窟,可能原计划开凿为大型塔庙窟但未完工。后壁有唐代补刻的一佛二菩萨像。"}], "dynastyConnections": [], "sources": ["云冈石窟官网: https://www.yungang.org/", "UNESCO世界文化遗产名录（2001年）", "现存45个主要洞窟、59000余尊造像（多源核实）"]}, {"id": "yunnan", "name": "云南省博物馆", "lat": 24.963, "lng": 102.748, "location": "云南省昆明市官渡区广福路6393号", "level": "国家一级博物馆", "corePeriod": "古滇国（战国至西汉）、南诏/大理（唐宋）", "specialty": "云南唯一的省级综合性博物馆。馆藏文物22万余件，其中一级文物509件。以古滇国青铜器（晋宁石寨山/江川李家山出土）为核心特色，是中国青铜文化中独立于中原的重要一支。南诏大理国时期佛教艺术和云南少数民族文物也极为丰富。", "treasures": ["1. 牛虎铜案（战国·古滇）— 晋宁石寨山出土", "一虎扑牛", "牛腹下藏小牛", "中国古代青铜艺术杰作"], "halls": ["远古云南——史前时期的云南", "文明之光——青铜时代的云南\"（古滇青铜器核心展）", "妙香佛国——南诏大理历史文化", "百年风云——近现代时期的云南"], "dynastyCoverage": "旧石器（元谋人，距今约170万年）→ 新石器 → 青铜时代（古滇国，战国至西汉）→ 东汉至隋 → 南诏（唐）→ 大理（宋）→ 元明清（改土归流）→ 近现代（滇越铁路/西南联大/抗战）", "timeline": "元谋人（约170万年前）是中国境内已知最早的古人类化石之一。古滇国（约前5世纪-前109年）以晋宁石寨山为王墓所在地，汉武帝赐滇王金印后纳入版图。南诏（738-902年）和大理（937-1253年）是云南地方政权的高峰期。", "artifacts": [{"name": "牛虎铜案", "period": "战国·古滇国，晋宁石寨山出土", "description": "一只大牛四足立地，背部为承物的浅盘，牛尾立一猛虎，虎口咬住牛尾，大牛腹下藏一小牛犊。构图大胆，充满生命力，是中国青铜艺术的杰作和云南省博的标志"}, {"name": "四牛鎏金骑士贮贝器", "period": "西汉·古滇，石寨山出土", "description": "贮贝器是古滇国特有的器型（用于储存海贝货币），器盖上有一鎏金骑士和四牛。古滇国以海贝为货币，贮贝器是滇文化的标识"}, {"name": "战争场面叠鼓形贮贝器", "period": "西汉·古滇", "description": "器盖上铸有数十个人物的战争场面群雕，包括骑马的将领、持兵器的步兵、被俘的敌人等，是古滇社会军事生活的微缩场景"}, {"name": "滇王金印", "period": "西汉，复制品/相关文物", "description": "汉武帝元封二年（前109年）赐滇王尝羌金印，原印出土于石寨山，现藏中国国家博物馆。是云南纳入中央版图的里程碑"}, {"name": "银鎏金镶珠金翅鸟", "period": "大理国，大理崇圣寺三塔出土", "description": "佛教中的迦楼罗鸟造型，银鎏金工艺，镶嵌宝珠，是大理国佛教艺术的代表"}, {"name": "大理国写经和佛像", "period": "近代", "description": "国歌《义勇军进行曲》曲作者、云南玉溪人聂耳使用的小提琴，近现代革命文物中的珍品"}], "dynastyConnections": [], "sources": ["核心数据基于AI知识库，牛虎铜案等核心文物数据已多源交叉核实", "百度百科·云南省博物馆词条因多义词页面未能完整获取"]}, {"id": "zhejiang", "name": "浙江省博物馆", "lat": 30.2518, "lng": 120.144, "location": "浙江省杭州市西湖区（孤山馆区）/ 拱墅区（之江馆区）", "level": "国家一级博物馆", "corePeriod": "新石器时代（良渚文化）、五代十国（吴越国）、宋代", "specialty": "以良渚文化玉器、越窑青瓷和宋代文物为三大支柱，是理解长江下游文明起源和江南文化高峰的核心场馆。之江新馆2023年开放，展陈面积大幅扩展。", "treasures": ["良渚文化玉琮王", "战国越王者旨於睗剑", "五代吴越鎏金银阿育王塔", "元代黄公望《富春山居图》（剩山图卷）", "宁波万工轿"], "halls": ["越地长歌\"通史陈列", "良渚文化专题展", "青瓷展厅", "宋韵文化展区"], "dynastyCoverage": "新石器时代（河姆渡、良渚）→ 春秋战国（越国）→ 三国两晋（越窑）→ 五代（吴越国）→ 宋代 → 元明清", "timeline": "良渚文化（约前3300-前2000年）是中华五千年文明的实证，2019年列入世界遗产；越国和越窑代表了浙江先秦至中古的工艺传统；南宋定都临安（杭州），使浙江成为中国文化经济重心", "artifacts": [{"name": "良渚文化玉琮王", "description": "新石器时代（约前3000年）。体量最大、纹饰最精的良渚玉琮，刻有神人兽面纹，是良渚信仰体系的核心象征，证明了五千年前的复杂社会组织。"}, {"name": "战国越王者旨於睗剑", "description": "战国（约前5世纪）。越王勾践之子所用青铜剑，铸造精良，铭文保存完好，是越国青铜兵器工艺的代表。"}, {"name": "五代吴越鎏金银阿育王塔", "description": "五代（10世纪）。雷峰塔地宫出土，纯银鎏金，工艺极精，是吴越国佛教文化的顶级遗物。"}, {"name": "元·黄公望《富春山居图》（剩山图卷）", "description": "元代（约1350年）。中国山水画史上的巅峰之作，现存前半卷\"剩山图\"藏于浙博，后半卷在台北故宫。"}, {"name": "宁波万工轿（花轿）", "description": "清末民初。耗时万工制作的朱金木雕花轿，代表浙东民间工艺的极致，是民俗文物的经典。"}, {"name": "越窑青瓷莲花碗", "description": "五代（10世纪）。釉色如玉，造型典雅，是\"秘色瓷\"审美的代表作。"}, {"name": "河姆渡文化双鸟朝阳纹象牙蝶形器", "description": "新石器时代（约前5000年）。河姆渡遗址出土，雕刻精细，是长江流域早期艺术的杰作。"}], "dynastyConnections": [{"dynasty": "新石器时代（良渚文化）", "description": "浙博是全球了解良渚文明的最佳窗口。良渚的玉器、城址、水利系统证明了中国五千年文明史，2019年良渚古城遗址列入UNESCO世界遗产。馆藏良渚玉器数量和质量首屈一指。"}, {"dynasty": "春秋战国（越国）", "description": "越国以会稽（绍兴）为中心，越王勾践卧薪尝胆的故事家喻户晓。浙博藏有多柄越王剑，是理解越国军事和青铜工艺的关键。"}, {"dynasty": "五代十国（吴越国）", "description": "钱氏吴越国偏安杭州，大兴佛教，雷峰塔等遗存丰富。鎏金银阿育王塔等佛教文物反映了这一时期江南的信仰与工艺。"}, {"dynasty": "宋代（南宋）", "description": "南宋定都临安，杭州成为世界最大城市之一。浙博的宋代文物涵盖官窑瓷器、书画、文房等，展现了宋代文化的精致与雅趣。"}], "sources": ["浙江省博物馆官网: https://www.zhejiangmuseum.com/"]}, {"id": "zhongshanguo", "name": "中山古城遗址·中山国王陵陈列馆", "lat": 38.334, "lng": 114.142, "location": "河北省石家庄市平山县三汲乡", "level": "全国重点文物保护单位，遗址类博物馆", "corePeriod": "战国中山国（前414年-前296年）", "specialty": "中国唯一专门展示战国中山国历史的遗址博物馆。中山国是战国\"千乘之国\"，由白狄鲜虞族建立，虽非\"七雄\"却创造了令人惊叹的青铜文明。遗址包括中山国都城灵寿和王陵区，出土文物精美绝伦。", "treasures": ["错金银四龙四凤铜方案座", "中山王铁足铜鼎（刻铭469字）", "错金银虎噬鹿铜屏风座", "十五连盏铜灯", "中山王\"兆域图\"铜版"], "halls": ["王陵区（1号墓", "6号墓出土品）", "中山古城遗址展示"], "dynastyCoverage": "战国", "timeline": "白狄鲜虞（春秋，前6世纪）→ 中山国建立（前414年）→ 鼎盛期（前4世纪中后期）→ 被赵国所灭（前296年）", "artifacts": [{"name": "错金银四龙四凤铜方案座", "period": "战国中期，前4世纪", "description": "—1号墓出土，案座底部四只梅花鹿伏卧承托，中间四条蟠龙翼然腾起，龙身之间四只凤鸟展翅。整器用失蜡法铸造，工艺极其复杂，是中国青铜铸造技术的巅峰之作。"}, {"name": "中山王铁足铜鼎", "period": "战国中期", "description": "—鼎腹刻铭文469字，为目前所见铭文最长的战国铜鼎之一。铭文记载中山王讨伐燕国的胜利及对嗣子的告诫，语言文辞典雅，内容涉及中山国与燕、赵等国的政治军事关系，是研究中山国历史的第一手资料。"}, {"name": "错金银虎噬鹿铜屏风座", "period": "战国中期", "description": "—猛虎咬住小鹿的瞬间造型，虎身错金银斑纹，鹿做挣扎状。构图紧张生动，是战国动物题材青铜器的杰作，可能受到了北方草原文化\"动物搏斗\"题材的影响。"}, {"name": "十五连盏铜灯", "period": "战国中期", "description": "—树形灯架分三层，共十五个灯盏。树上有猿猴攀缘、群鸟栖息，底座有两个人形力士。是战国灯具中造型最复杂、最精美的一件。"}, {"name": "中山王\"兆域图\"铜版", "period": "战国中期", "description": "—一块铜版上刻有王陵区的建筑规划图，标注了各建筑的名称和尺寸。是中国目前所见最早的建筑平面设计图，也是世界上最古老的铜版建筑规划图之一。"}, {"name": "错银双翼神兽", "period": "战国中期", "description": "—有翼神兽造型，错银装饰。造型融合了中原与北方草原的审美元素，体现了中山国作为非华夏族裔国家的独特文化气质。"}, {"name": "山字形器", "period": "战国", "description": "—中山国特有的器物，用途不明（可能是仪仗或旗座），已成为中山国的标志性符号，现为平山县县标。"}, {"name": "中山王方壶", "period": "战国中期", "description": "—壶腹刻铭文450字，内容与铁足铜鼎铭文相呼应，记载了中山国的政治理念和历史事件。"}], "dynastyConnections": [], "sources": ["中山古城遗址（河北省文物局）"]}], "dynasties": [{"id": "neolithic", "center": [34.0, 109.0], "name": "远古与新石器时代（约公元前10000年—前2070年）", "period": "约公元前10000年—前2070年", "overview": "中国的远古与新石器时代是中华文明的孕育期，从约一万年前的农业萌芽到夏朝建立前夕，跨越近八千年。这一时期中国大地上出现了多个相互独立又有交流的文化区系，形成了\"满天星斗\"式的文明起源格局。苏秉琦提出的\"区系类型\"理论揭示了这种多元并进的面貌。  黄河流域的仰韶文化（约前5000—前3000年）以彩陶闻名，半坡遗址展示了早期定居农业村落的完整面貌。随后的龙山文化（约前3000—前2000年）以黑陶和城址为标志，社会分化加剧，已处于文明门槛。长江流域的河姆渡文化（约前5000年）证明了稻作农业的独立起源；良渚文化（约前3300—前2300年）则以大型水利工程、玉礼器系统和古城遗址震惊世界，2019年被列入世界遗产名录。  东北的红山文化（约前4000—前3000年）以玉龙、女神庙闻名，被认为与早期国家形态有关。此外还有大汶口文化、马家窑文化、屈家岭文化等，共同构成了中华文明多元一体的源头。", "events": [{"date": "约前10000年", "event": "华北和长江中下游出现最早的栽培水稻和粟", "lat": 34.0, "lng": 109.0}, {"date": "约前7000年", "event": "河姆渡文化兴起，稻作农业成熟；贾湖遗址出现骨笛、龟甲刻符", "lat": 34.0, "lng": 109.0}, {"date": "约前5000年", "event": "仰韶文化在黄河中游兴盛，半坡聚落形成", "lat": 34.0, "lng": 109.0}, {"date": "约前4000年", "event": "红山文化出现大型祭祀建筑（牛河梁女神庙）", "lat": 34.0, "lng": 109.0}, {"date": "约前3300年", "event": "良渚古城开始营建，大规模水利工程启动", "lat": 34.0, "lng": 109.0}, {"date": "约前3000年", "event": "龙山文化兴起，出现城墙和暴力冲突证据，社会复杂化加速", "lat": 34.0, "lng": 109.0}, {"date": "约前2500年", "event": "陶寺遗址出现疑似观象台和早期文字符号", "lat": 34.0, "lng": 109.0}, {"date": "约前2300年", "event": "良渚文化衰落，石峁古城等北方城址兴盛", "lat": 34.0, "lng": 109.0}, {"date": "约前2070年", "event": "传统史学认为夏朝建立，新石器时代结束", "lat": 34.0, "lng": 109.0}], "recommendedMuseums": [{"name": "中国国家博物馆", "location": "北京", "reason": "\"古代中国\"基本陈列的远古部分，汇集各文化代表性文物，包括仰韶彩陶、红山玉龙等", "museumId": "guobo"}, {"name": "浙江省博物馆", "location": "杭州", "reason": "良渚文化玉器收藏丰富，\"玉魂国魄\"展是了解良渚的必看展览", "museumId": "zhejiang"}, {"name": "良渚博物院", "location": "杭州余杭", "reason": "良渚遗址现场博物馆，完整展示良渚古城和水利系统，沉浸感极强", "museumId": "liangzhu"}, {"name": "西安半坡博物馆", "location": "西安", "reason": "中国第一座史前遗址博物馆，原址保护仰韶文化半坡聚落", "museumId": "banpo"}, {"name": "河南博物院", "location": "郑州", "reason": "贾湖骨笛、仰韶彩陶等中原新石器文物的核心收藏地", "museumId": "henan"}, {"name": "辽宁省博物馆", "location": "沈阳", "reason": "红山文化玉器重要藏馆，包括C形玉龙", "museumId": "liaoning"}, {"name": "南京博物院", "location": "南京", "reason": "收藏江苏地区新石器遗址出土文物", "museumId": "nanjing"}, {"name": "山东博物馆", "location": "济南", "reason": "蛋壳黑陶杯等龙山文化和大汶口文化精品", "museumId": "shandong"}, {"name": "湖南省博物馆", "location": "长沙", "reason": "高庙文化、彭头山文化等长江中游新石器遗存", "museumId": "hunan"}], "culture": [{"category": "农业革命", "description": "独立驯化水稻（长江流域）和粟/黍（黄河流域），是世界农业起源中心之一"}, {"category": "陶器工艺", "description": "从素面陶到仰韶彩陶、龙山蛋壳黑陶，工艺水平极高；蛋壳黑陶壁厚仅0.2毫米"}, {"category": "玉器系统", "description": "良渚玉琮、玉璧、玉钺形成完整的礼器体系；红山玉龙成为中华龙文化源头"}, {"category": "建筑与城市", "description": "良渚古城面积近300万平方米，外围水利系统工程量巨大"}, {"category": "音乐", "description": "贾湖骨笛（前7000年）可吹奏七声音阶，是世界最早的可吹奏乐器之一"}, {"category": "纺织与蚕丝", "description": "河姆渡已有原始纺织，良渚出现丝织品残片"}, {"category": "文字萌芽", "description": "贾湖龟甲刻符、大汶口陶文、良渚刻符等均为文字起源的线索"}]}, {"id": "xia", "center": [34.6, 112.5], "name": "夏朝（约公元前2070年—前1600年）", "period": "约公元前2070年—前1600年", "overview": "夏朝是中国历史上第一个世袭制王朝，由大禹之子启建立，标志着中国从传说中的\"禅让制\"进入\"家天下\"时代。夏朝是否真实存在，长期以来是学术界争论的焦点——传世文献（《史记·夏本纪》等）有详细记载，但长期缺乏直接的考古学证据。  1959年发现的二里头遗址（河南洛阳偃师）被多数学者认为是夏朝中晚期的都城遗址。二里头遗址出土了中国最早的宫殿建筑基址、最早的青铜礼器（爵、鼎）、大型绿松石器作坊，以及具有明确中轴线布局的宫城——这些发现使\"夏\"从传说走向了考古学可讨论的范畴。  但需要注意的是，\"二里头=夏都\"仍非学界共识。部分学者认为二里头可能是早商文化，或横跨夏商之际。这一争论的核心在于：二里头遗址没有出土自证身份的文字资料（如甲骨文），因此无法像殷墟那样直接与文献对应。", "events": [{"date": "约前2070年", "event": "禹传位于子启，夏朝建立（传统纪年）", "lat": 34.6, "lng": 112.5}, {"date": "太康失国", "event": "后羿、寒浞先后篡权，夏朝一度中断", "lat": 34.6, "lng": 112.5}, {"date": "少康中兴", "event": "少康复国，夏朝重新稳固", "lat": 34.6, "lng": 112.5}, {"date": "约前1600年", "event": "商汤灭夏（鸣条之战），夏朝终结", "lat": 34.6, "lng": 112.5}], "recommendedMuseums": [{"name": "二里头夏都遗址博物馆", "location": "洛阳偃师", "reason": "唯一系统展示夏文化的专题博物馆，绿松石龙形器、乳钉纹青铜爵为镇馆之宝", "museumId": "erlitou"}, {"name": "河南博物院", "location": "郑州", "reason": "夏商周三代文物体系完整", "museumId": "henan"}, {"name": "洛阳博物馆", "location": "", "reason": "夏代乳钉纹青铜爵", "museumId": "luoyang"}, {"name": "中国国家博物馆", "location": "北京", "reason": "通史视角下的夏代文物", "museumId": "guobo"}], "culture": [{"category": "青铜冶炼起步", "description": "二里头出土了中国最早的青铜容器（爵、鼎），标志青铜时代开端"}, {"category": "宫殿建筑", "description": "二里头一号宫殿是中国最早的具有中轴线布局的大型建筑"}, {"category": "绿松石工艺", "description": "绿松石龙形器（2000余片拼合）代表了极高的手工业组织能力"}, {"category": "牙璋传播", "description": "二里头文化的牙璋（礼仪用玉器）传播到南中国和越南，反映了广域王权的影响"}, {"category": "历法", "description": "传说夏朝已有\"夏历\"（农历前身），\"夏小正\"记录了一年十二个月的物候"}]}, {"id": "shang", "center": [36.1, 114.3], "name": "商朝（约公元前1600年—前1046年）", "period": "约公元前1600年—前1046年", "overview": "商朝是中国第一个有直接文字记载的王朝，也是中国青铜文明的巅峰时代。殷墟甲骨文的发现不仅证实了《史记》中商王世系的基本可靠性，更让我们直接\"听到\"了三千多年前商人的声音——他们的占卜、祭祀、战争和日常生活。商朝以安阳殷墟为晚期都城，统治核心在今河南、河北、山东一带，影响力远及长江流域。  商代最令人震撼的成就是青铜铸造。以后母戊鼎为代表的大型青铜礼器，不仅体量惊人（重达832.84公斤），而且采用复杂的块范法铸造，工艺水平在当时的世界首屈一指。商人的宗教世界以祖先崇拜和占卜为核心，甲骨文记录的内容从军事行动到天气预报，从疾病诊断到生育预测，无所不包。  商代社会已高度分化，王室贵族拥有大量殉葬品（包括人殉），妇好墓的发现展示了一位集军事统帅、祭司、王后于一身的传奇女性。商朝后期政治腐败，纣王暴虐失政，最终在牧野之战中被周武王联军击败。", "events": [{"date": "约前1600年", "event": "商汤灭夏，建立商朝，定都于亳", "lat": 36.1, "lng": 114.3}, {"date": "约前1300年", "event": "盘庚迁殷，都城定于安阳小屯一带", "lat": 36.12, "lng": 114.3}, {"date": "约前1250年", "event": "武丁即位，商朝进入鼎盛时期", "lat": 36.1, "lng": 114.3}, {"date": "约前1250—前1200年", "event": "妇好率军征伐，甲骨文记录多次军事行动", "lat": 36.1, "lng": 114.3}, {"date": "约前1200年后", "event": "商朝逐渐衰落，王位继承不稳", "lat": 36.1, "lng" ": "约前1042年", "event": "周公东征，平定管叔、蔡叔和武庚的三监之乱", "lat": 34.3, "lng": 108.9}, {"date": "约前1040年", "event": "营建洛邑（成周），作为东方统治中心", "lat": 34.3, "lng": 108.9}, {"date": "约前1040—前1020年", "event": "周公制礼作乐，确立分封制和宗法制", "lat": 34.3, "lng": 108.9}, {"date": "前963年左右", "event": "周穆王西征犬戎", "lat": 34.3, "lng": 108.9}, {"date": "前841年", "event": "国人暴动，周厉王出逃，共和行政，中国准确纪年开始", "lat": 34.3, "lng": 108.9}, {"date": "前771年", "event": "犬戎攻破镐京，幽王被杀，西周灭亡", "lat": 34.3, "lng": 108.9}, {"date": "前770年", "event": "平王东迁洛邑，东周开始", "lat": 34.3, "lng": 108.9}], "recommendedMuseums": [{"name": "宝鸡青铜器博物院", "location": "宝鸡", "reason": "西周青铜器最重要的出土地和收藏地，何尊（\"中国\"首现）、逨盘等国宝级文物", "museumId": null}, {"name": "中国国家博物馆", "location": "北京", "reason": "利簋（武王伐纣的直接证据）、大盂鼎等西周重器", "museumId": "guobo"}, {"name": "陕西历史博物馆", "location": "西安", "reason": "西周都城所在地，大量周原出土文物", "museumId": "shaanxi"}, {"name": "故宫博物院", "location": "北京", "reason": "毛公鼎（原件在台北故宫），但散氏盘等西周铭文重器有收藏", "museumId": "gugong"}, {"name": "台北故宫博物院", "location": "", "reason": "毛公鼎（497字铭文）、散氏盘，西周金文的巅峰之作", "museumId": "gugong"}, {"name": "周原博物馆", "location": "宝鸡扶风/岐山", "reason": "西周宗庙遗址和甲骨出土地，了解周人起源", "museumId": null}, {"name": "洛阳博物馆", "location": "洛阳", "reason": "成周遗址相关文物", "museumId": "luoyang"}, {"name": "上海博物馆", "location": "", "reason": "大克鼎等西周青铜精品", "museumId": "shanghai"}], "culture": [{"category": "礼乐制度", "description": "以\"礼\"规范社会等级（天子九鼎、诸侯七鼎、卿大夫五鼎……），以\"乐\"调和人际关系"}, {"category": "宗法制", "description": "嫡长子继承制为核心的家族-政治秩序，影响中国社会至近代"}, {"category": "分封制", "description": "封建诸侯以藩屏周室，齐鲁晋燕宋等大国均为西周所封"}, {"category": "金文（铭文）", "description": "西周青铜器铭文篇幅增长，毛公鼎铭文长达497字，是先秦最长金文"}, {"category": "《诗经》", "description": "收录西周至春秋的诗歌305篇（部分为西周时期作品），是中国最早的诗歌总集"}, {"category": "天命思想", "description": "提出\"天命靡常\"\"以德配天\"，为后世政治正当性理论奠基"}, {"category": "井田制", "description": "土地公有分配制度（理想化程度有争议），影响后世均田思想"}]}, {"id": "eastern-zhou", "center": [34.7, 112.5], "name": "东周：春秋与战国（公元前770年—前221年）", "period": "公元前770年—前221年", "overview": "东周是中国历史上最动荡也最精彩的时期，分为春秋（前770—前476年）和战国（前475—前221年）两段。周天子名义上仍是天下共主，但实际权力落入各路诸侯手中。春秋时期\"礼崩乐坏\"，齐桓公、晋文公等五霸先后称雄，大国以\"尊王攘夷\"为名行争霸之实。战国时期，兼并战争白热化，七雄（齐楚燕韩赵魏秦）逐鹿中原，最终秦国横扫六国，统一天下。  这五百多年的乱世恰恰是中华文明的轴心时代。百家争鸣产生了孔子、老子、墨子、孟子、庄子、荀子、韩非子等伟大思想家，他们的思想塑造了中国此后两千年的精神世界。儒家重仁义礼乐，道家崇自然无为，墨家讲兼爱非攻，法家主赏罚严明——这场思想大爆炸与古希腊哲学、古印度佛教同属雅斯贝尔斯所说的\"轴心时代\"。  技术层面，铁器和牛耕的推广引发了农业革命，都江堰、郑国渠等大型水利工程改变了经济版图。各国纷纷变法图强（李悝变法、商鞅变法等），从贵族分封制向官僚郡县制转变，为秦统一后的帝国制度奠定了基础。", "events": [{"date": "前770年", "event": "周平王东迁洛邑，东周开始", "lat": 34.7, "lng": 112.5}, {"date": "前685年", "event": "管仲相齐，齐桓公开始称霸", "lat": 34.7, "lng": 112.5}, {"date": "前632年", "event": "城濮之战，晋文公败楚，确立霸业", "lat": 34.7, "lng": 112.5}, {"date": "前597年", "event": "邲之战，楚庄王称霸，\"问鼎中原\"", "lat": 34.7, "lng": 112.5}, {"date": "前551年", "event": "孔子诞生于鲁国", "lat": 34.7, "lng": 112.5}, {"date": "前506年", "event": "吴国伐楚，攻入郢都", "lat": 34.7, "lng": 112.5}, {"date": "前473年", "event": "越王勾践灭吴，卧薪尝胆", "lat": 34.7, "lng": 112.5}, {"date": "前403年", "event": "三家分晋（韩赵魏），战国格局正式形成", "lat": 34.7, "lng": 112.5}, {"date": "前356年", "event": "商鞅第一次变法", "lat": 34.7, "lng": 112.5}, {"date": "前278年", "event": "秦将白起攻破楚国郢都，屈原投汨罗江", "lat": 34.7, "lng": 112.5}, {"date": "前260年", "event": "长平之战，秦将白起坑杀赵军四十万（数字有争议）", "lat": 34.7, "lng": 112.5}, {"date": "前256年", "event": "秦灭东周王室", "lat": 34.7, "lng": 112.5}, {"date": "前230—前221年", "event": "秦先后灭韩赵魏楚燕齐，统一六国", "lat": 34.7, "lng": 112.5}], "recommendedMuseums": [{"name": "湖北省博物馆", "location": "武汉", "reason": "曾侯乙编钟（战国早期，65件，总重2567公斤）是镇馆之宝，也是中国古代音乐和青铜铸造的巅峰", "museumId": "hubei"}, {"name": "河南博物院", "location": "郑州", "reason": "莲鹤方壶（春秋，新郑出土）等东周青铜精品", "museumId": "henan"}, {"name": "中国国家博物馆", "location": "北京", "reason": "收藏大量春秋战国青铜器、兵器和货币", "museumId": "guobo"}, {"name": "故宫博物院", "location": "北京", "reason": "收藏东周玉器和青铜器精品", "museumId": "gugong"}, {"name": "湖南省博物馆", "location": "长沙", "reason": "楚文化漆器、帛画等，展示南方楚文化的独特魅力", "museumId": "hunan"}, {"name": "荆州博物馆", "location": "荆州", "reason": "楚国都城所在地，楚文化核心区域，出土丝织品和漆器", "museumId": null}, {"name": "曲阜孔子博物馆", "location": "曲阜", "reason": "2019年新开，孔子及儒学相关文物，配合孔庙孔府参 9年", "event": "崖山之战，南宋灭亡（陆秀夫背幼帝跳海）", "lat": 22.08, "lng": 113.08}, {"date": "1292年", "event": "郭守敬完成《授时历》", "lat": 39.9, "lng": 116.4}, {"date": "1351年", "event": "红巾军起义爆发", "lat": 39.9, "lng": 116.4}, {"date": "1368年", "event": "朱元璋攻克大都，元朝灭亡", "lat": 39.91, "lng": 116.4}], "recommendedMuseums": [{"name": "故宫博物院", "location": "", "reason": "元代书画（赵孟頫等），宫廷收藏", "museumId": "gugong"}, {"name": "台北故宫", "location": "", "reason": "黄公望《富春山居图》（无用师卷）、元代书画精品", "museumId": "taipei-gugong"}, {"name": "湖北省博物馆", "location": "", "reason": "元青花四爱图梅瓶", "museumId": "hubei"}, {"name": "景德镇中国陶瓷博物馆", "location": "", "reason": "元青花通史", "museumId": "jingdezhen"}, {"name": "扬州博物馆", "location": "", "reason": "霁蓝釉白龙纹梅瓶", "museumId": "yangzhou"}, {"name": "内蒙古博物院", "location": "", "reason": "元上都遗址相关文物", "museumId": "neimenggu"}, {"name": "西藏博物馆", "location": "", "reason": "元代藏传佛教（帝师八思巴）", "museumId": "xizang"}, {"name": "敦煌莫高窟", "location": "", "reason": "元代洞窟", "museumId": "mogao"}], "culture": [{"category": "元曲", "description": "元杂剧是中国戏曲艺术的第一个高峰，关汉卿、马致远、郑光祖、白朴\"四大家\""}, {"category": "书画", "description": "赵孟頫引领\"复古\"书风；元四家（黄公望、吴镇、倪瓒、王蒙）是文人山水画巅峰"}, {"category": "青花瓷", "description": "景德镇元青花是中国陶瓷史的革命性突破，远销世界各地"}, {"category": "天文历法", "description": "郭守敬《授时历》比现行公历早300年，精度相当"}, {"category": "驿站系统", "description": "帝国范围内的高效通讯和交通网络"}, {"category": "中外交流", "description": "马可·波罗来华、伊本·白图泰到访、阿拉伯天文学和医学传入"}]}, {"id": "ming", "center": [39.9, 116.4], "name": "明朝（公元1368年—1644年）", "period": "公元1368年—1644年", "overview": "明朝是中国最后一个由汉人建立的大一统王朝。朱元璋从乞丐、僧人到开国皇帝的传奇经历本身就是中国历史上最精彩的草根逆袭故事。他驱逐蒙元、恢复中华，定都南京，后由其孙建文帝时期，燕王朱棣发动\"靖难之役\"夺取皇位，迁都北京，形成了此后近五百年（含清代）的北京政治格局。  明朝前期国力强盛。永乐年间（1403—1424年），郑和七下西洋，率领当时世界上最庞大的舰队远航东南亚、印度洋、东非海岸，展示了中国的海上实力。北京紫禁城、天坛、明十三陵等大型建筑工程在这一时期兴建。明代中后期，商品经济发展，白银大量流入（来自日本和美洲），江南地区出现了资本主义萌芽的讨论（学术上有争议），市民文化繁荣，小说（四大名著中的三部成书于明代）和戏曲蓬勃发展。  然而明朝中后期的政治痼疾——宦官专权（如魏忠贤）、党争激烈、皇帝怠政（嘉靖、万历数十年不上朝）——逐渐侵蚀了国家机器。加之小冰期导致的气候恶化、李自成农民起义和满清入关，明朝最终在1644年覆灭。", "events": [{"date": "1368年", "event": "朱元璋建立明朝，定都南京，北伐驱逐蒙元", "lat": 32.06         const EMBEDDED_DATA = {"museums": [{"id": "anhui", "name": "安徽博物院", "lat": 31.8206, "lng": 117.2272, "location": "安徽省合肥市蜀山区（新馆）/ 庐阳区（老馆）", "level": "国家一级博物馆", "corePeriod": "新石器时代（凌家滩文化）、春秋战国（楚文化）、明清（徽文化）", "specialty": "安徽地跨淮河、长江两大流域，文化兼具南北特色。馆藏以凌家滩玉器、楚国青铜器和徽州文化三大板块见长，是理解皖南徽商文化和长江中下游古代文明的重要场馆。", "treasures": ["楚大鼎（铸客大鼎）", "凌家滩玉鹰", "战国鄂君启金节", "明代徽州砖雕", "北宋金棺银椁"], "halls": ["安徽文明史陈列", "徽州古建筑专题展", "楚文化青铜器展厅", "凌家滩玉器展区"], "dynastyCoverage": "新石器时代（凌家滩）→ 商周（皖南铜矿）→ 春秋战国（楚、吴越）→ 三国（曹魏、东吴争夺）→ 宋元 → 明清（徽文化鼎盛）", "timeline": "凌家滩（约前3600-前3300年）是良渚文化的重要源头之一；战国时期安徽为楚国东部重地，寿春（寿县）为楚晚期都城；明清时期徽商崛起，"无徽不成镇"，深刻影响了中国商业与文化", "artifacts": [{"name": "楚大鼎（铸客大鼎）", "description": "战国（约前4世纪）。中国现存最大的先秦圆鼎之一，重约400公斤，出土于寿县楚王墓，铸有"铸客"铭文，是楚国国力与青铜铸造技术的象征。"}, {"name": "凌家滩玉鹰", "description": "新石器时代（约前3500年）。玉雕展翅飞鹰，造型抽象而有力，是凌家滩文化的标志性文物，反映了史前先民的精神信仰和高超玉作工艺。"}, {"name": "战国鄂君启金节", "description": "战国（前323年）。楚怀王颁发给鄂君启的免税通行凭证，分车节和舟节，金质错铭，是研究楚国交通、商业和政治制度的珍贵实物。"}, {"name": "凌家滩玉人", "description": "新石器时代（约前3500年）。站立玉人像，双手置于胸前，是中国最早的玉雕人像之一，对理解史前社会等级和宗教仪式有重要价值。"}, {"name": "北宋金棺银椁", "description": "北宋（11世纪）。出土于寿县报恩寺，工艺精湛，是宋代佛教舍利瘗埋制度的重要实物。"}, {"name": "吴王光剑", "description": "春秋（约前5世纪）。安徽南陵出土，铸有铭文"吴王光自作用剑"，证明了安徽在吴楚争霸中的前线地位。"}, {"name": "明代徽州三雕（砖雕、木雕、石雕）", "description": "明清。精美的建筑装饰构件，展现徽派建筑的艺术成就和徽商的文化品位。"}], "dynastyConnections": [{"dynasty": "新石器时代（凌家滩文化）", "description": "凌家滩遗址（含山县）出土的玉器在年代上早于良渚，被认为是良渚玉器文化的重要源头之一。玉鹰、玉龟、玉人等文物展示了长江流域早期文明的高度发展。"}, {"dynasty": "春秋战国（楚国）", "description": "战国晚期楚国迁都寿春（今寿县），安徽成为楚文化的核心区域。铸客大鼎等重器反映了楚国的强盛与衰亡。鄂君启金节则揭示了楚国发达的水陆交通网络。"}, {"dynasty": "明清（徽文化）", "description": "明中期至清中期，徽商是中国最强大的商帮之一，经营盐业、茶叶、木材等。徽商"贾而好儒"，推动了徽派建筑、新安画派、徽墨歙砚等文化成就。安徽博物院是理解徽文化全貌的最佳场馆。"}], "sources": ["安徽博物院官网: https://www.ahm.cn/"]}, {"id": "banpo", "name": "西安半坡博物馆", "lat": 34.2784, "lng": 109.0336, "location": "陕西省西安市灞桥区半坡路155号", "level": "国家一级博物馆（2008年评定）", "corePeriod": "新石器时代仰韶文化半坡类型（约前4800-前4300年）", "specialty": "中国建国后第一座史前遗址博物馆。1953年发现，1954-1957年进行五次大规模发掘，清理出房屋遗迹40多座、窖穴200多座、墓葬170多座、陶窑6座，出土近万件文物。遗址大厅保存原始村落面貌约3000㎡。人面鱼纹彩陶盆是仰韶文化的标志性文物。馆藏文物3万多件，一级品200多件，其中陶器1.4万件。", "treasures": ["1. 人面鱼纹彩陶盆（仰韶文化）— 高16.5cm", "口径39.5cm", "1955年出土", "半坡文化标志"], "halls": ["遗址大厅（3000㎡原始村落遗迹保护展示", "含房屋", "窖穴", "墓葬）", "第一/第二展室（出土石器/骨器/陶器陈列）"], "dynastyCoverage": "新石器时代仰韶文化半坡类型（约前4800-前4300年）", "timeline": "半坡遗址是黄河中游仰韶文化的典型代表，距今约6000-6700年。半坡先民以粟作农业为主、渔猎为辅，已有成熟的制陶技术和原始艺术，居住在半地穴式房屋中，形成了有防御沟壕的聚落。", "artifacts": [{"name": "人面鱼纹彩陶盆", "period": "约前4800年，1955年出土", "description": "高16.5cm，口径39.5cm。盆内壁绘有对称的两个人面和两条鱼纹。人面圆形，头顶三角形发髻，嘴部以留空法表现，左右各衔一条变形鱼纹，双耳处有两条小鱼，构成人鱼合体图案。其含义自出土以来有图腾说、神话说、祖先形象说、面具说等20余种解释。1961年遗址即被列为全国第一批重点文物保护单位。"}, {"name": "鱼纹彩陶盆", "period": "约前4800年", "description": "高17cm，红陶底，外壁绘三条互相追逐的游鱼，眼圆睁、嘴大张，线条流畅比例准确。鱼纹是半坡彩陶最核心的纹饰主题。"}, {"name": "小口尖底瓶", "period": "约前4800-前4300年", "description": "半坡文化最典型器物。细泥或细砂硬陶，红色，小口短颈鼓腹尖底，腹侧有双耳。最初被认为是汲水器（利用力学原理自动灌水），后经实验考古证明无法自动灌满，功能至今有争议（酒器说、祭器说等）。"}, {"name": "陶器刻划符号", "period": "约前4800年", "description": "出土陶器上发现22种刻划符号，有些学者认为是中国文字的最早萌芽，但也有学者认为只是工匠标记。"}], "dynastyConnections": [], "sources": ["百度百科·西安半坡博物馆（详细词条，含发掘数据、文物详情、建筑布局）", "《西安半坡》考古发掘报告"]}, {"id": "beilin", "name": "西安碑林博物馆", "lat": 34.2535, "lng": 108.953, "location": "陕西省西安市碑林区三学街15号", "level": "国家一级博物馆、全国重点文物保护单位", "corePeriod": "汉代至清代（历代碑刻书法）", "specialty": "中国收藏碑石最多的博物馆，现藏碑石、墓志4000余方，是中国书法艺术和文字学的宝库。从秦代《峄山刻石》到清代碑刻，历代名家书法汇聚于此。碑林始建于北宋，最初为保存唐代《开成石经》而设，历经900余年不断扩充。", "treasures": ["《开成石经》（唐）", "《大秦景教流行中国碑》（唐）", "颜真卿《多宝塔碑》《颜家庙碑》", "怀素《千字文》碑", "昭陵六骏（其中四骏）"], "halls": ["第一展室（《开成石经》）", "第二展室（唐代名碑）", "第三展室（历代书法）", "石刻艺术室（昭陵六骏）"], "dynastyCoverage": "秦、汉、魏晋、北朝、隋、唐、宋、元、明、清", "timeline": "秦统一文字 → 汉隶成熟 → 魏晋书法自觉 → 北碑南帖分流 → 唐代楷书极盛·开成石经（837年）→ 北宋移碑建林（1087年）→ 历代增补", "artifacts": [{"name": "《开成石经》", "period": "唐代，837年", "description": "—唐文宗开成二年刻成，共114石228面，刻《周易》《尚书》《诗经》《周礼》《仪礼》《礼记》《春秋左传》《春秋公羊传》《春秋穀梁传》《论语》《孝经》《尔雅》十二部儒家经典，共65万余字。是保存最完整的唐代石经，也是碑林创建的缘起。在印刷术尚未普及的时代，石经是国家级的"教科书标准版本"。"}, {"name": "《大秦景教流行中国碑》", "period": "唐代，781年", "description": "—记载了基督教聂斯脱里派（景教）在唐代中国的传播历程，碑文以汉文为主，旁有叙利亚文。是东西方宗教文化交流的重要物证，在世界宗教史上具有极高地位。1625年出土后引起来华传教士极大关注。"}, {"name": "颜真卿《多宝塔碑》", "period": "唐代，752年", "description": "—颜真卿44岁时所书，楷书端庄秀丽，结构严谨。是学习颜体楷书的经典范本，也是唐代楷书的代表作之一。"}, {"name": "颜真卿《颜家庙碑》", "period": "唐代，780年", "description": "—颜真卿晚年力作，笔力雄浑苍劲，气势磅礴。与早期的《多宝塔碑》对比，可以清晰看到颜体书法的演变轨迹。"}, {"name": "怀素《千字文》碑", "period": "唐代", "description": "—草书大家怀素的代表作之一，笔势奔放连绵。碑林藏有多种怀素作品的刻石。"}, {"name": "《曹全碑》", "period": "东汉，185年", "description": "—隶书精品，笔画秀润流丽，结体扁平匀称。是汉隶的经典代表之一，历代书法家临习隶书的必选范本。"}, {"name": "昭陵六骏石刻", "period": "唐代，约636年", "description": "—唐太宗李世民昭陵前的六块骏马浮雕，分别记录了李世民征战天下时所骑的六匹战马。其中"飒露紫"和"拳毛騧"两骏于1914年被盗卖至美国（现藏宾夕法尼亚大学博物馆），其余四骏现存碑林。浮雕造型生动有力，是唐代石刻艺术的巅峰。"}, {"name": "《皇甫诞碑》", "period": "唐代，欧阳询书", "description": "—欧阳询楷书代表作之一，笔力险劲，结构精密。欧体、颜体、柳体、赵体并称楷书四大家，碑林集中收藏了这些名家的碑刻真迹。"}], "dynastyConnections": [], "sources": ["西安碑林博物馆官网: https://www.beilin-museum.com/"]}, {"id": "bingmayong", "name": "秦始皇兵马俑博物馆（秦始皇帝陵博物院）", "lat": 34.3841, "lng": 109.2785, "location": "陕西省西安市临潼区秦陵北路", "level": "国家一级博物馆 / 世界文化遗产", "corePeriod": "秦（前221-前207）", "specialty": "世界第八大奇迹。三个兵马俑坑出土陶俑8000余件，每个面孔都不同。是秦始皇陵的陪葬坑，展现了秦帝国的军事力量和工匠技艺。", "treasures": ["1. 一号坑兵马俑军阵（秦）— 6000余件陶俑排列成实战军阵"], "halls": ["一号坑（最大", "军阵全景）", "铜车马展厅", "二号坑（多兵种混编）", "三号坑（指挥部）"], "dynastyCoverage": "秦", "timeline": "秦始皇陵始建于前246年（始皇13岁即位时），动用70万人修建近40年。兵马俑坑是陵园外围的军事陪葬，整个陵园面积56平方公里，大部分尚未发掘。", "artifacts": [{"name": "一号坑军阵", "period": "秦", "description": "长230米、宽62米，6000余陶俑排列成前锋、主体、侧翼的实战阵型"}, {"name": "铜车马", "period": "秦", "description": "两乘：立车（高车）和安车（轿车），用3000多个零件组装，最细的金丝直径仅0.5mm"}, {"name": "将军俑", "period": "秦", "description": "戴鹖冠、穿彩色铠甲，面部表情沉着威严"}, {"name": "跪射俑", "period": "秦", "description": "单膝跪地持弩射击姿态，鞋底纹路清晰可见"}, {"name": "青铜剑", "period": "秦", "description": "出土时仍锋利，表面经过铬盐氧化处理（比西方早2000年）"}, {"name": "石铠甲", "period": "秦", "description": "用石片穿缀的铠甲，每件由数百片石片组成"}, {"name": "彩绘陶俑", "period": "秦", "description": "原本兵马俑都是彩色的，少数保留了颜料痕迹"}], "dynastyConnections": [], "sources": ["秦始皇帝陵博物院官网: https://www.bmy.com.cn/", "UNESCO世界文化遗产名录（1987年）"]}, {"id": "chengdu", "name": "成都博物馆", "lat": 30.657, "lng": 104.0635, "location": "四川省成都市青羊区小河街1号（天府广场西侧）", "level": "国家一级博物馆", "corePeriod": "古蜀至近现代（成都城市通史）", "specialty": "成都城市史的完整叙事，从古蜀到当代。2012年老官山汉墓出土的织机模型是世界纺织史重大发现。新馆建筑面积约6.5万平方米，是西南地区规模最大的城市博物馆之一。", "treasures": ["老官山汉墓织机模型（西汉）", "石犀（秦汉）", "经穴漆人（西汉）", "皮影戏藏品"], "halls": ["花重锦官城——成都历史文化陈列"（通史主线）", "影舞万象·偶戏大千——中国皮影木偶展"], "dynastyCoverage": "古蜀（宝墩文化/三星堆/金沙）→ 秦汉（蜀郡/老官山）→ 三国（蜀汉）→ 唐宋（繁荣期）→ 明清 → 近现代", "timeline": "成都建城2300余年，城址未迁。秦李冰修都江堰使成都平原成为"天府之国"。老官山汉墓织机证明蜀锦技术在西汉就已高度发达。", "artifacts": [{"name": "老官山汉墓织机模型", "period": "西汉，约前1世纪", "description": "2012年天回镇老官山汉墓出土4部织机模型，是世界上发现最早的提花织机模型，证明蜀锦技术在西汉就达到相当高度。填补了中国纺织史的重大空白"}, {"name": "石犀", "period": "秦汉", "description": "2012年天府广场出土，长3.3米、高1.7米、重约8.5吨。可能与李冰治水传说中"作石犀以镇水精"有关"}, {"name": "经穴漆人", "period": "西汉", "description": "老官山汉墓出土，漆人身上标注经络和穴位，是目前发现最早最完整的人体经穴模型，对中医学史研究意义重大"}, {"name": "医简", "period": "西汉", "description": "老官山汉墓出土920余支竹简，含多部医书，部分内容与《黄帝内经》相关"}, {"name": "皮影戏藏品** — 成都博物馆收藏皮影木偶数万件，是中国最大的皮影专题收藏之一
6. **汉代画像砖", "period": "东汉", "description": "成都地区出土的画像砖，描绘宴饮、车马出行、农耕等场景，是了解汉代四川社会生活的图像资料"}], "dynastyConnections": [], "sources": ["核心信息基于AI知识库", "老官山汉墓织机: 2013年考古发掘报道"]}, {"id": "chongqing", "name": "重庆中国三峡博物馆（重庆博物馆）", "lat": 29.5537, "lng": 106.5466, "location": "重庆市渝中区人民路236号", "level": "首批国家一级博物馆、中央地方共建国家级博物馆", "corePeriod": "先秦巴文化、三峡文明、抗战时期", "specialty": "占地5万㎡，建筑面积7.17万㎡，展厅面积3.1万㎡。馆藏文物11.5万余件/套，珍贵古籍善本1.8万余册，涵盖23个文物门类。由主馆、白鹤梁水下博物馆、宋庆龄纪念馆、涂山窑遗址、三峡文物科技保护中心五个场馆组成。与人民大礼堂、人民广场形成"三位一体"城市标志性建筑群。设有4个基本陈列、6个专题陈列和360度全周电影。", "treasures": ["1. 偏将军印章（汉）— 巴蜀地区出土"], "halls": ["壮丽三峡"（三峡自然与文化通史", "含360度全周电影）", "远古巴渝"（石器/青铜时代巴文明）", "抗战岁月"（重庆作为战时首都的历史）", "巴蜀汉代雕塑艺术展"（近160件汉代雕塑类文物）"], "dynastyCoverage": "旧石器时代 → 先秦巴国 → 秦汉 → 六朝 → 唐宋 → 元明清（明玉珍大夏国）→ 近现代（抗战首都）", "timeline": "巴文化与蜀文化并称"巴蜀文化"，是中国西南文明的两大源流。三峡地区自旧石器时代就有人类活动，巴国在春秋战国时期与楚国长期对峙。三峡工程蓄水前的大规模抢救性考古发掘，使大量珍贵文物得以保存。抗战时期重庆作为陪都，留下了丰富的近代史料。", "artifacts": [{"name": "白鹤梁题刻", "period": "唐至清，涪陵长江江心", "description": "被称为"世界第一古代水文站"，石梁上有自唐代以来的163段题刻、3万余字，记录了1200年间长江枯水位变化，是世界水文史的珍贵遗产。三峡蓄水后建成白鹤梁水下博物馆原址保护"}, {"name": "巴蜀青铜器", "period": "先秦", "description": "包括巴式柳叶剑、铜钲、虎纽錞于等巴文化标志性器物，与中原和楚国青铜器风格迥异"}, {"name": "汉代画像石棺和画像砖", "period": "东汉", "description": "巴蜀地区汉代雕塑艺术的精品，题材涵盖生产劳动、宴饮乐舞、神话故事、建筑等，展厅含一级文物47件（套）"}, {"name": "偏将军印章", "period": "汉代", "description": "军事官印"}, {"name": "明玉珍墓出土文物", "period": "明初，1366年", "description": "明玉珍为元末农民起义军领袖，在重庆建立大夏国，其墓葬出土的文物反映了元末明初的政治格局"}, {"name": "锁江铁柱", "period": "宋", "description": "三峡地区水道军事防御设施"}, {"name": "秦良玉"太子太保总镇关防"印", "period": "明末", "description": "秦良玉是中国历史上唯一正式列入正史将相传的女将军"}, {"name": "朐忍令景云神道碑", "period": "东汉", "description": "重要的汉代碑刻"}], "dynastyConnections": [], "sources": ["百度百科·重庆中国三峡博物馆（详细词条，含馆藏数据、展厅描述、历史沿革）"]}, {"id": "dingzhou", "name": "定州博物馆", "lat": 38.5132, "lng": 114.9902, "location": "河北省定州市中山东路南侧", "level": "国家二级博物馆", "corePeriod": "西汉中山国、北宋（定窑白瓷、静志寺/净众院塔基地宫）", "specialty": "定州是西汉中山国都城（卢奴）、北宋定窑所在地，两大文化高峰在此交汇。静志寺塔基地宫出土的大批北宋定窑白瓷和佛教文物，质量之高、数量之多为全国罕见。虽为县级市博物馆，但藏品质量极高。", "treasures": ["东汉龙螭衔环谷纹青玉壁", "北宋白釉刻花龙首净瓶", ""只此青绿"定窑绿釉", "透影白瓷", "西汉错金银铜车伞铤"], "halls": ["汉家陵阙", "北朝佛陀", "天下大白——定窑", "尘外千年——静志寺·净众院塔基地宫"], "dynastyCoverage": "西汉（中山国）、东汉、北朝、隋唐、北宋（定窑）", "timeline": "战国中山国灭亡（前296年）→ 西汉中山国重建（前154年）→ 东汉中山国 → 北朝佛教兴盛 → 唐宋定窑发展（晚唐-金代为盛期）→ 北宋静志寺塔（977年建）", "artifacts": [{"name": "北宋白釉刻花龙首净瓶", "period": "北宋", "description": "—静志寺塔基地宫出土，瓶口为龙首造型，通体白釉，刻花精美。是定窑白瓷中的极品，也是佛教法器的精品。净瓶是佛教僧人盛水器具，此件工艺之精在宋代瓷器中罕有其匹。"}, {"name": "东汉龙螭衔环谷纹青玉壁", "period": "东汉", "description": "—直径约25厘米，双面浮雕龙螭纹和谷纹，龙螭衔环悬挂。玉质温润，雕工精细，是东汉玉壁中的上乘之作。"}, {"name": "定窑白瓷群", "period": "北宋，10-11世纪", "description": "—静志寺和净众院两处塔基地宫共出土定窑白瓷等器物700余件，包括碗、盘、瓶、炉、盒等各种器形，许多为定窑精品中的精品。定窑是宋代五大名窑之一，以白瓷著称，"定州花瓷瑕不见"即指此窑。"}, {"name": "西汉错金银铜车伞铤", "period": "西汉", "description": "—定州中山王墓出土，车伞的支撑构件，以错金银工艺装饰。体现了西汉中山国的手工业水平，与满城汉墓出土品风格相近。"}, {"name": "北宋定窑绿釉划花净瓶", "period": "北宋", "description": "—极为稀有的定窑绿釉品种，世所罕见。定窑以白瓷为主，彩釉产品极少，此件绿釉净瓶是定窑色釉瓷的珍贵孤品。"}, {"name": "透影白瓷杯", "period": "北宋", "description": "—薄胎白瓷，迎光可透影，有"薄如纸"之称。体现了定窑白瓷工艺的极致追求。"}, {"name": "北朝佛教造像", "period": "北朝，5-6世纪", "description": "—定州在北朝时期是佛教重镇，出土大量白石造像，风格独特，被称为"定州样式"，对中国佛教造像艺术有重要影响。"}], "dynastyConnections": [], "sources": ["定州博物馆官网: https://www.dzmuseum.com/"]}, {"id": "erlitou", "name": "二里头夏都遗址博物馆", "lat": 34.694, "lng": 112.683, "location": "河南省洛阳市偃师区翟镇镇二里头村", "level": "国家"十三五"重大文化工程", "corePeriod": "夏代中晚期（二里头文化，约前1750-前1530年）", "specialty": "二里头遗址被学界称为"最早的中国"，是夏王朝中晚期都城遗址。博物馆占地246亩，总建筑面积3.2万㎡，馆藏文物2000余件。建筑外观暗含"钥匙"形象，寓意二里头是打开中华文明的钥匙。设有五个基本陈列展厅："第一王朝""赫赫夏都""世纪探索"。", "treasures": ["1. 乳钉纹青铜爵（夏）— "华夏第一爵"", "高26.5cm", "中国目前发现最早的青铜容器之一"], "halls": ["第一王朝"（夏朝发展脉络）", "国之大事"（祭祀与战争", "二里头精品器物）", "建中立极"（都城环境和手工业）", "数字馆（全面复原二里头文化面貌）"], "dynastyCoverage": "夏代中晚期（二里头文化一至四期，约前1750-前1530年）", "timeline": "二里头遗址（约前1750-前1530年）是目前考古学上能确认的最早的具有明确城市规划的都邑遗址。其宫殿区、铸铜作坊、绿松石器作坊等证明了王权和国家机器的存在。二里头文化的辐射范围远超中原，其牙璋传播到南中国和越南，反映了广域王权的影响。", "artifacts": [{"name": "乳钉纹青铜爵", "period": "夏，二里头遗址出土", "description": "高26.5cm，总长31.5cm。束腰平底，三锥足细长，槽状长流，被誉为"华夏第一爵"，是中国目前发现时代最早的青铜容器之一。造型夸张，形态修长，极富美感"}, {"name": "绿松石龙形器", "period": "夏，高等级贵族墓葬出土", "description": "长64.5cm，由2000余片各种形状的绿松石片拼合而成，每片仅0.2-0.9cm大小，厚约0.1cm。龙身略呈波状，菱形主纹象征鳞纹，白玉为睛。是中国早期龙形象的杰出代表"}, {"name": "七孔玉刀", "period": "夏，1975年出土", "description": "长60.4-65cm，宽9.5cm，墨绿色玉料。两面以交叉直线阴纹组成网状和几何图形，刀背有七个等距圆孔。二里头遗址出土最大的玉器"}, {"name": "网格纹青铜鼎", "period": "夏", "description": "通高20cm，口径15.3cm。造型承自龙山文化陶鼎，但材质为青铜——中国考古发现最早的青铜鼎，是王权礼制萌生的象征"}, {"name": "镶嵌绿松石兽面纹铜牌饰", "period": "夏", "description": "长16.5cm，宽8-11cm。青铜框架上以数百片绿松石拼合镶嵌兽面纹，历经三四千年无一松动脱落。出土时置于墓主人胸前"}, {"name": "龙形牙璋", "period": "夏", "description": "长48.1cm，造型精美。牙璋是二里头文化典型的玉礼器，随二里头文化扩张传播到南中国和东南亚"}, {"name": "铜圆形器", "period": "夏", "description": "直径17cm，周边镶嵌61块绿松石，中间两圈各13个十字形绿松石。有专家认为与夏历历法天数相关"}], "dynastyConnections": [{"dynasty": "城市规划", "description": "二里头是中国最早的具有明确中轴线布局的宫城。宫殿区、手工业作坊区、贵族居住区和一般居住区的分化，说明国家机器已经形成"}, {"dynasty": "青铜文明起点", "description": "青铜爵和青铜鼎的出土，标志着中国青铜时代的正式开始。铸铜作坊的发现说明二里头掌握了先进的青铜铸造技术"}, {"dynasty": "绿松石手工业", "description": "绿松石龙形器和铜牌饰等展现了极高的工艺水平，绿松石可能来自远方（甘肃等地），说明二里头有远距离资源调配能力  **与前后文化的关系**: 二里头文化承接龙山文化晚期（如新砦遗址、王湾三期文化），并对后来的偃师商城（早商文化）产生了直接影响。从二里头到殷墟，构成了夏商文明的完整过渡序列。"}], "sources": ["百度百科·二里头夏都遗址博物馆（详细词条，含文物尺寸、展厅描述）", "二里头夏都遗址博物馆官网"]}, {"id": "famensi", "name": "法门寺博物馆（法门寺珍宝馆）", "lat": 34.4439, "lng": 107.9016, "location": "陕西省宝鸡市扶风县法门镇", "level": "国家一级博物馆", "corePeriod": "唐代（皇家佛教供奉）", "specialty": "1987年法门寺唐代地宫开启，出土2000余件唐代皇室重宝和4枚佛指舍利，被列为"20世纪中国考古重大发现"。地宫封闭于公元874年（唐僖宗），至1987年重现世间，封存长达1113年。秘色瓷的发现解开了困扰学界千年的谜题。", "treasures": ["佛指舍利（4枚", "含1枚真身舍利）", "八重宝函", "鎏金银茶具（中国最早宫廷茶具套件）", "秘色瓷（13件）", "鎏金双蛾团花纹银香囊"], "halls": ["法门寺地宫珍宝展", "佛指舍利展区", "唐代金银器展区"], "dynastyCoverage": "唐代（核心），东汉末年始建寺院", "timeline": "法门寺始建于东汉末年。唐高宗至唐僖宗，先后8位皇帝6次迎请佛骨舍利至长安供奉。874年唐僖宗最后一次送还舍利并封闭地宫，直至1987年重见天日。", "artifacts": [{"name": "佛指舍利", "period": "释迦牟尼真身舍利", "description": "4枚佛指骨舍利（1枚真身+3枚影骨），以八重宝函层层供奉。唐代先后8位皇帝6次迎奉，是佛教界至高圣物"}, {"name": "八重宝函", "period": "唐·咸通年间", "description": "供奉佛指舍利的层层嵌套容器，从外到内分别为檀木函、鎏金函、金函等八层，每层均有精美装饰"}, {"name": "鎏金银茶具套件", "period": "唐·咸通年间", "description": "包括茶碾、茶罗、银风炉、银盐台等，是中国乃至世界上发现最早最完整的宫廷茶具，反映唐代宫廷茶文化"}, {"name": "秘色瓷", "period": "唐", "description": "13件越窑秘色瓷，地宫《衣物帐》碑上明确记载"瓷秘色"三字，解开了"秘色瓷到底是什么"这一困扰学界千年的谜题。产自浙江慈溪上林湖窑址"}, {"name": "鎏金双蛾团花纹银香囊", "period": "唐", "description": "球形镂空银香囊，内部常平装置使香盂始终保持水平（类似陀螺仪原理），体现唐代精密机械工艺"}, {"name": "鎏金四天王盝顶银宝函", "period": "唐", "description": "錾刻四大天王像，工艺精湛"}, {"name": "琉璃器", "period": "东罗马/伊斯兰", "description": "地宫出土的20件琉璃器，来自东罗马帝国和伊斯兰世界，是丝路贸易的实物证据"}], "dynastyConnections": [{"dynasty": "政教关系", "description": "唐代帝王"三十年一开"佛骨的制度，反映了佛教在唐代政治中的特殊地位。韩愈《谏迎佛骨表》与唐宪宗的冲突，是儒佛之争的标志性事件"}, {"dynasty": "物质文化", "description": "金银器工艺代表唐代最高水平；茶具套件是唐代饮茶风俗"从煮到煎"转变的实物见证"}, {"dynasty": "国际交流", "description": "琉璃器来自东罗马和伊斯兰世界，秘色瓷产自浙江，说明唐代皇室能调动全国乃至国际资源供奉佛教  法门寺与陕西历史博物馆互为补充：陕历博展示唐代世俗生活，法门寺展示唐代皇家宗教生活。"}], "sources": ["百度百科·法门国宝", "1987年法门寺地宫考古发掘报告", ""秘色瓷"相关研究: 法门寺地宫《衣物帐》碑记载"]}, {"id": "fujian", "name": "福建博物院", "lat": 26.0998, "lng": 119.2812, "location": "福建省福州市鼓楼区西湖公园旁", "level": "国家一级博物馆", "corePeriod": "秦汉（闽越国）、宋元明（海上丝绸之路）、近代（船政文化）", "specialty": "以闽越文化、海上丝绸之路和船政文化为三大特色，是理解中国东南沿海海洋文明的核心场馆。馆藏德化白瓷、寿山石雕等福建特色工艺品也十分丰富。", "treasures": ["闽越国"万岁"瓦当", "南宋建窑兔毫盏", "云纹青铜大铙", "寿山石田黄冻雕件", "德化白瓷观音"], "halls": ["福建古代文明之光"通史陈列", "丝路帆远——海上丝绸之路"专题展", "船政文化展", "闽越王城专题"], "dynastyCoverage": "新石器时代（昙石山文化）→ 秦汉（闽越国）→ 唐宋（海上丝绸之路兴盛）→ 宋代（建窑）→ 元明清（德化窑、海外贸易）→ 近代（福建船政）", "timeline": "闽越国（前334-前110年）是东南沿海最重要的地方政权；泉州在宋元时期是世界最大港口之一（2021年列入世界遗产）；马尾船政局（1866年）是中国近代海军的摇篮", "artifacts": [{"name": "闽越国"万岁"瓦当", "description": "西汉（前2世纪）。福州冶山闽越王城遗址出土，"万岁"二字反映闽越国的政治野心，是闽越国存在的重要物证。"}, {"name": "南宋建窑兔毫盏", "description": "南宋（12-13世纪）。建窑（建阳）黑釉茶盏，兔毫纹自然天成，是宋代点茶文化的代表器物，深受日本茶道推崇。"}, {"name": "云纹青铜大铙", "description": "西周（约前10世纪）。福建出土的大型青铜乐器，证明商周时期中原文化已向东南沿海传播。"}, {"name": "宋代沉船出水瓷器", "description": "宋代。福建沿海发现的海上丝绸之路沉船出水的大量外销瓷，是海上贸易繁荣的直接证据。"}, {"name": "德化窑白釉观音像", "description": "明代（16-17世纪）。何朝宗款白瓷观音，釉色温润如玉，被欧洲称为"中国白"（Blanc de Chine），代表了德化瓷塑的最高水平。"}, {"name": "寿山石田黄冻印章", "description": "明清。田黄石产于福州寿山，有"石帝"之称，质地温润，是中国印石文化的极品。"}, {"name": "闽越国铁器和建筑构件", "description": "西汉。武夷山城村闽越王城遗址出土，展现了闽越国发达的城市建设和冶铁技术。"}], "dynastyConnections": [{"dynasty": "秦汉（闽越国）", "description": "闽越是百越族群的一支，秦统一后设闽中郡，汉初封无诸为闽越王。闽越国在福州、武夷山等地建有宫殿城池，前110年被汉武帝灭国。福建博物院是了解闽越历史的首要场馆。"}, {"dynasty": "宋元（海上丝绸之路）", "description": "宋元时期，泉州（刺桐港）是世界最大的港口之一，马可·波罗称其为"光明之城"。福建的建窑、德化窑、磁灶窑大量生产外销瓷器。"丝路帆远"展是理解中国海洋贸易史的经典展览。"}, {"dynasty": "近代（船政文化）", "description": "1866年左宗棠在福州马尾创办福建船政局，是中国第一个现代造船厂和海军学堂。培养了严复、邓世昌等近代人物，是中国近代化的重要起点。"}], "sources": ["福建博物院官网: https://www.fjbwg.com/"]}, {"id": "gansu", "name": "甘肃省博物馆", "lat": 36.0611, "lng": 103.8343, "location": "甘肃省兰州市七里河区西津西路3号", "level": "国家一级博物馆（2012年升级）", "corePeriod": "新石器彩陶、汉代丝绸之路、佛教艺术", "specialty": "馆藏8万余件，以甘肃彩陶（时跨7000-3000年，体系最完整）、汉代简牍文书、汉唐丝绸之路珍品、佛教艺术萃宝为四大特色。铜奔马（马踏飞燕）是中国旅游标志。总面积43000平方米，平面呈"山"字形。国宝级文物16件（组），国家一级文物720余件（组）。", "treasures": ["1. 铜奔马（东汉）— 武威雷台汉墓出土", "通高34.5cm", "长45cm", "重7.3kg", "中国旅游标志"], "halls": ["甘肃丝绸之路文明展"（420余件丝路文物）", "甘肃彩陶展"（大地湾→仰韶→马家窑→青铜时代）", "庄严妙相——甘肃佛教艺术展"（十六国至明清佛教艺术）"], "dynastyCoverage": "新石器时代（大地湾/仰韶/马家窑/齐家）→ 先秦 → 秦汉（丝路/简牍）→ 魏晋（壁画砖）→ 十六国至隋唐（佛教艺术）→ 宋元明清", "timeline": "甘肃是彩陶之乡（马家窑彩陶代表中国新石器彩陶最高成就）和丝绸之路的黄金段。河西走廊是连接中原与西域的唯一通道，武威、张掖、酒泉、敦煌四郡自汉代设置以来就是丝路重镇。", "artifacts": [{"name": "铜奔马", "period": "东汉，武威雷台汉墓出土", "description": "通高34.5cm，长45cm，重7.3kg。三足腾空，一足踏飞鸟（鹰），塑造奔马超掠飞鹰的瞬间。着力点集中在踏鸟的一足上，精确掌握力学平衡。1983年被确定为中国旅游标志。集西域马和蒙古马优点于一身，展现河西走马的对侧步特征。"}, {"name": "人头形器口彩陶瓶", "period": "仰韶文化，约5000年前", "description": "瓶口塑为人头形，齐刘海发型，耳有耳洞，身上绘三角茎叶纹与飞鸟纹，是新石器时代最具人文气息的彩陶作品之一"}, {"name": "铜车马仪仗队", "period": "东汉，武威雷台汉墓", "description": "含铜奔马在内的成组铜车马群，是了解汉代车马制度和军事仪仗的实物资料"}, {"name": "莲花形玻璃托盏", "period": "元代，漳县汪世显家族墓出土", "description": "普蓝色半透明玻璃，盏为七瓣莲花形，托为八瓣莲花形，迄今出土最完整的元代玻璃器"}, {"name": "彩绘木博戏俑", "period": "西汉，武威磨嘴子汉墓出土", "description": "两位老者对弈博戏，高29cm，生动刻画蓄势待发的对弈场面"}, {"name": "绢底平绣人像", "period": "西汉，武威磨嘴子汉墓", "description": "红色绢底，用多色丝线平绣二人像，是极珍贵的汉代丝绣实物"}, {"name": "魏晋壁画砖", "period": "魏晋，嘉峪关墓出土", "description": "烫鸡、烤肉煮肉等日常生活场景画像砖，生动反映河西地区魏晋社会生活"}, {"name": "葫芦形网纹彩陶壶", "period": "马家窑文化半山类型，约4500年前", "description": "高46.7cm，红黑彩绘葫芦形网纹，马家窑彩陶代表作"}], "dynastyConnections": [], "sources": ["百度百科·甘肃省博物馆（含馆藏数据、文物尺寸、展厅信息）", "甘肃省博物馆官网: http://www.gansumuseum.com/"]}, {"id": "guangdong", "name": "广东省博物馆", "lat": 23.1175, "lng": 113.3253, "location": "广东省广州市天河区珠江东路2号（珠江新城）", "level": "国家一级博物馆", "corePeriod": "宋元明清（海上丝绸之路与对外贸易）", "specialty": "以海上丝绸之路为主线，系统展示广东作为中国对外贸易门户的千年历史。外销瓷、外销画、广绣和潮州木雕是特色收藏，完整呈现了岭南文化从百越时代到近代开埠的演变脉络。", "treasures": ["南宋陈容《墨龙图》", "清乾隆广彩瓷大碗", "潮州金漆木雕蟹篓", "北宋木雕罗汉像", "西汉铜提筒"], "halls": ["广东历史文化陈列", "海洋出水文物展", "潮州木雕艺术展", "广珐琅特展"], "dynastyCoverage": "先秦百越、秦汉南越、唐宋海贸、明清外销", "timeline": "先秦百越文化 → 秦汉南越国（前203-前111年）→ 唐宋广州港崛起 → 明清一口通商（1757-1842年）→ 近代开埠", "artifacts": [{"name": "南宋陈容《墨龙图》", "period": "南宋，约1235-1262年", "description": "—陈容是南宋画龙名家，开创"所翁龙"画法，此图以水墨渲染龙腾云雾的气势，笔法苍劲奔放，是中国龙画的巅峰之作，对日本水墨画影响深远。"}, {"name": "清乾隆广彩人物纹大碗", "period": "清，约1750年", "description": "—广州织金彩瓷的代表，色彩浓艳，满工装饰，是专为欧洲市场定制的外销瓷精品，反映了十八世纪中西贸易的繁荣景象。"}, {"name": "潮州金漆木雕蟹篓", "period": "清末民初", "description": "—整块樟木镂空雕成，螃蟹、篓筐层层透雕，玲珑剔透至极。是潮州木雕多层镂空技艺的巅峰之作，被誉为"木雕之王"。"}, {"name": "西汉铜提筒", "period": "西汉", "description": "—广州出土，筒身刻有羽人划船纹饰，风格与越南东山文化铜鼓相近。是南越国时期海上文化交流的实物证据，体现了环南海文化圈的联系。"}, {"name": "北宋木雕罗汉像", "period": "北宋", "description": "—南华寺旧藏，造型写实、神态各异，保存状况极佳。是中国现存最早的大型木雕罗汉组像之一，对研究宋代佛教雕塑具有重要价值。"}, {"name": "明万历端砚", "period": "明，1573-1620年", "description": "—取材肇庆端溪老坑，石质细腻如婴儿肌肤，有青花、鱼脑冻等珍贵石品。是文房四宝中端砚的顶级藏品。"}, {"name": "元代广州港铜钟", "period": "元代", "description": "—铸有多语文铭文，反映了元代广州作为国际港口的多元文化面貌。"}], "dynastyConnections": [], "sources": ["广东省博物馆官网: https://www.gdmuseum.com/"]}, {"id": "guangxi", "name": "广西壮族自治区博物馆", "lat": 22.8155, "lng": 108.366, "location": "广西壮族自治区南宁市青秀区民族大道34号", "level": "国家一级博物馆", "corePeriod": "先秦至汉代（百越文化与铜鼓文明）", "specialty": "拥有世界上数量最多、类型最齐全的铜鼓收藏，是研究中国南方及东南亚铜鼓文化的核心机构。合浦汉墓出土文物系统展示了汉代海上丝绸之路始发港的繁荣面貌，百越民族文化与中原文明的交融是贯穿始终的主题。", "treasures": ["翔鹭纹铜鼓（云雷纹大铜鼓）", "西汉羽纹铜凤灯", "东汉大铜马", "合浦出土罗马玻璃碗", "西汉铜牛"], "halls": ["瓯骆遗粹——广西百越文化", "铜鼓文化", "合浦汉代文化"], "dynastyCoverage": "先秦百越、秦汉、东汉、唐宋、明清", "timeline": "先秦骆越/西瓯文化 → 秦设桂林郡 → 西汉合浦郡（海丝始发港）→ 唐代邕州 → 明清土司制度", "artifacts": [{"name": "翔鹭纹铜鼓", "period": "战国至西汉", "description": "—面径超过160厘米，鼓面有翔鹭纹和太阳纹，体型巨大，铸造精良。铜鼓在百越社会中是权力和财富的象征，此鼓是广西乃至全世界已知最大的铜鼓之一。"}, {"name": "西汉羽纹铜凤灯", "period": "西汉", "description": "—合浦望牛岭汉墓出土，凤鸟回首衔灯，灯盘可蓄油点燃，凤身中空导烟。造型优美、设计巧妙，与长信宫灯异曲同工，是百越地区汉代青铜灯具的杰出代表。"}, {"name": "合浦出土罗马玻璃碗", "period": "东汉，约1-2世纪", "description": "—合浦汉墓出土，深蓝色半透明玻璃，钠钙玻璃成分证实为罗马帝国制品。是汉代海上丝绸之路连通罗马帝国的直接物证，极为珍贵。"}, {"name": "东汉大铜马", "period": "东汉", "description": "—体量巨大、造型雄健，四肢比例准确。是岭南地区出土的最大青铜马，反映了汉代合浦地区的经济实力和铸造水平。"}, {"name": "西汉铜牛", "period": "西汉", "description": "—贵县（今贵港）罗泊湾汉墓出土，牛身壮硕、刻有花纹，是用于祭祀的礼器。体现了骆越人与农耕文化的密切关系。"}, {"name": "合浦出土琥珀饰件", "period": "汉代", "description": "—数量多、品种丰富，包括狮形、蛙形等造型，原料来自缅甸。是汉代南海贸易网络的重要物证。"}, {"name": "铜鼓王（北流型大铜鼓）", "period": "汉代", "description": "—北流出土，面径达165厘米，重约300公斤，是世界上已知最大的铜鼓，被称为"铜鼓王"，现为广西博物馆标志性藏品。"}], "dynastyConnections": [], "sources": ["广西壮族自治区博物馆官网: https://www.gxmuseum.cn/"]}, {"id": "gugong", "name": "故宫博物院", "lat": 39.9163, "lng": 116.3972, "location": "北京市东城区景山前街4号", "level": "国家一级博物馆", "corePeriod": "明清（1368-1912）", "specialty": "世界上现存规模最大、保存最完整的木质结构古建筑群。藏品180余万件（套），涵盖书画、陶瓷、青铜、玉器、宫廷用品。建筑本身即是最大的展品。", "treasures": ["1. 《清明上河图》（北宋·张择端）— 中国十大传世名画之首"], "halls": ["珍宝馆（宁寿宫区）", "钟表馆（奉先殿）", "书画馆", "陶瓷馆"], "dynastyCoverage": "明、清为主，藏品横跨新石器至清末", "timeline": "明永乐帝迁都北京（1420年建成）→ 明清两代24位皇帝居所 → 1925年建院。宫廷收藏的集大成者。", "artifacts": [{"name": "《清明上河图》", "period": "北宋", "description": "5米长卷描绘汴京繁华，社会史百科全书"}, {"name": "《千里江山图》", "period": "北宋", "description": "王希孟18岁所作，青绿山水绝唱"}, {"name": "各种釉彩大瓶", "period": "清乾隆", "description": "融合15种釉彩技法，工艺极限"}, {"name": "金瓯永固杯", "period": "清乾隆", "description": "皇帝元旦开笔仪式用杯"}, {"name": "大禹治水图玉山", "period": "清乾隆", "description": "重5吨，中国最大玉雕"}, {"name": "郎窑红釉穿带直口瓶", "period": "清康熙", "description": "红釉瓷器巅峰"}, {"name": "酗亚方樽", "period": "商晚期", "description": "青铜酒器精品"}, {"name": "张成造款雕漆云纹盘", "period": "元", "description": "漆器工艺巅峰"}], "dynastyConnections": [], "sources": ["故宫博物院官网·藏品: https://www.dpm.org.cn/explore/collections.html（藏品180余万
